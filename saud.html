<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المكتب القانوني الذكي - الإصدار السيادي</title>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-purple: #5856D6; --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --text-main: #000;
        }
        body.dark-mode { --ios-bg: #000; --ios-card: #1C1C1E; --text-main: #FFF; }
        body { background-color: var(--ios-bg); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; color: var(--text-main); transition: 0.3s; }
        
        .header { position: sticky; top: 0; background: rgba(var(--ios-card), 0.8); backdrop-filter: blur(20px); padding: 50px 20px 15px; z-index: 100; border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; }

        .session-card { background: var(--ios-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-right: 8px solid var(--ios-purple); }
        
        /* قسم الذكاء الاصطناعي */
        .ai-box { background: linear-gradient(135deg, #1e1e2e, #2d2d44); color: #e0e0e0; padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 13px; line-height: 1.6; border: 1px solid var(--ios-purple); }
        .ai-loading { animation: pulse 1.5s infinite; color: var(--ios-purple); font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .btn-ai { background: var(--ios-purple); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #444; border-radius: 15px; background: var(--ios-bg); color: var(--text-main); font-size: 16px; box-sizing: border-box; }
        
        .mic-btn { background: var(--ios-red); color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-right: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; font-size:20px;">المحامي السيادي AI ✨</h1>
    <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; font-size:20px;">🌓</button>
</div>

<div class="container">
    <div style="background:var(--ios-card); padding:20px; border-radius:20px; margin-bottom:20px;">
        <h3 style="margin:0 0 10px 0;">قضية جديدة</h3>
        <input type="text" id="ai-title" placeholder="اسم القضية / الخصم">
        
        <div style="display:flex; align-items:center;">
            <textarea id="ai-facts" placeholder="اشرح الوقائع أو أملِها صوتياً..." rows="4"></textarea>
            <button class="mic-btn" onclick="startVoice()">🎙️</button>
        </div>
        
        <button onclick="saveAndAnalyze()" style="background:var(--ios-blue); color:white; width:100%; padding:18px; border:none; border-radius:12px; font-weight:bold; margin-top:10px;">حفظ وتحليل بالذكاء الاصطناعي</button>
    </div>

    <div id="session-list"></div>
</div>

<script>
    let sessions = JSON.parse(localStorage.getItem('legal_ai_vault')) || [];
    const API_KEY = "AIzaSyBL67Iqz9IJone1WfbadvNLyh5XIQvdXBo"; 

    // ميزة الإملاء الصوتي
    function startVoice() {
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'ar-SA';
        recognition.start();
        recognition.onresult = (event) => {
            document.getElementById('ai-facts').value += event.results[0][0].transcript;
        };
    }

    async function analyzeWithAI(id, text) {
        const aiBox = document.getElementById(`ai-result-${id}`);
        aiBox.style.display = "block";
        aiBox.innerHTML = "<div class='ai-loading'>⚖️ جاري استحضار الأنظمة والتحليل الذكي...</div>";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `بصفتك مستشاراً قانونياً سعودياً، حلل هذه الوقائع: "${text}". اذكر المواد النظامية، نقاط القوة، واقترح رداً قانونياً مفحماً.` }] }]
                })
            });

            const data = await response.json();
            const reply = data.candidates[0].content.parts[0].text;
            aiBox.innerHTML = `<strong>💡 رأي الذكاء الاصطناعي:</strong><br>${reply.replace(/\n/g, '<br>')}`;
            
            const s = sessions.find(x => x.id === id);
            s.analysis = reply;
            localStorage.setItem('legal_ai_vault', JSON.stringify(sessions));

        } catch (e) {
            aiBox.innerHTML = "❌ حدث خطأ. تأكد من اتصال الإنترنت.";
        }
    }

    function saveAndAnalyze() {
        const title = document.getElementById('ai-title').value;
        const facts = document.getElementById('ai-facts').value;
        if(!title || !facts) return alert("أكمل البيانات");

        const newId = Date.now();
        sessions.push({ id: newId, title, facts, analysis: "" });
        localStorage.setItem('legal_ai_vault', JSON.stringify(sessions));
        renderSessions();
        analyzeWithAI(newId, facts);
    }

    function renderSessions() {
        const list = document.getElementById('session-list');
        list.innerHTML = sessions.map(s => `
            <div class="session-card">
                <h3 style="margin:0">${s.title}</h3>
                <p style="font-size:13px; opacity:0.7;">${s.facts}</p>
                <div id="ai-result-${s.id}" class="ai-box" style="${s.analysis ? 'display:block' : 'display:none'}">
                    ${s.analysis ? '<strong>💡 التحليل المحفوظ:</strong><br>' + s.analysis.replace(/\n/g, '<br>') : ''}
                </div>
                <button class="btn-ai" onclick="analyzeWithAI(${s.id}, '${s.facts}')">✨ تحديث التحليل الذكي</button>
            </div>
        `).join('');
    }

    renderSessions();
</script>
</body>
</html>
