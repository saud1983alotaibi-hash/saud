<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090d">
<title>الجلسات القضائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #08090d;
  --surface: #0f1118;
  --surface2: #161923;
  --surface3: #1d2232;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --gold: #d4a843;
  --gold2: #f0c55a;
  --gold3: #ffe08a;
  --gold-a10: rgba(212,168,67,0.1);
  --gold-a20: rgba(212,168,67,0.2);
  --gold-a30: rgba(212,168,67,0.3);
  --text: #f0f2f8;
  --text2: #8893ab;
  --text3: #4a5568;
  --blue: #4a90d9;
  --blue-a: rgba(74,144,217,0.12);
  --amber: #e8a030;
  --amber-a: rgba(232,160,48,0.12);
  --green: #3ab882;
  --green-a: rgba(58,184,130,0.12);
  --red: #e85050;
  --red-a: rgba(232,80,80,0.12);
  --purple: #8b6fd4;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); overflow: hidden; font-family: 'Tajawal', sans-serif; color: var(--text); direction: rtl; }
::-webkit-scrollbar { display: none; }
button, input, select, textarea { font-family: inherit; border: none; outline: none; background: none; }
input[type=date], input[type=time] { -webkit-appearance: none; color: var(--text); color-scheme: dark; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; overflow: hidden; background: var(--bg); }

#hdr { flex-shrink: 0; padding-top: var(--safe-top); background: var(--bg); z-index: 40; border-bottom: 1px solid var(--border); }
.hdr-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; }
.hdr-brand { display: flex; flex-direction: column; }
.hdr-eyebrow { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.hdr-title { font-family: 'Scheherazade New', serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--gold2), var(--gold3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hdr-date { font-size: 10px; color: var(--text3); margin-top: 1px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.btn-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-icon:active { transform: scale(0.92); }
.btn-icon.active { background: var(--gold-a20); border-color: var(--gold-a30); color: var(--gold2); }
.btn-new { display: flex; align-items: center; gap: 6px; background: var(--gold); color: #0a0905; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px rgba(212,168,67,0.3); transition: all 0.15s; }
.btn-new:active { transform: scale(0.95); opacity: 0.9; }

.tabs-scroll { display: flex; padding: 6px 10px 0; gap: 2px; overflow-x: auto; background: var(--bg); }
.tab { flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-sm) var(--r-sm) 0 0; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; border-bottom: none; white-space: nowrap; position: relative; }
.tab.on { background: var(--surface); color: var(--gold2); border-color: var(--border); }
.tab.on::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--surface); }

#cnt { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(20px + var(--safe-bottom)); background: var(--surface); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 70px; height: 70px; border-radius: 50%; background: var(--sc-clr, var(--gold)); opacity: 0.07; filter: blur(18px); }
.stat-icon { font-size: 18px; margin-bottom: 8px; }
.stat-value { font-size: 30px; font-weight: 900; line-height: 1; color: var(--sc-clr, var(--gold2)); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }

.sec-hdr { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px; margin-top: 6px; }
.sec-hdr::before { content: ''; width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.s-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 8px; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.1s, border-color 0.15s; }
.s-card:active { transform: scale(0.985); border-color: var(--gold-a30); }
.s-card-accent { position: absolute; top: 0; right: 0; width: 3px; height: 100%; border-radius: 0 var(--r-md) var(--r-md) 0; }
.s-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.s-card-num { font-family: 'Scheherazade New', serif; font-size: 17px; font-weight: 700; color: var(--gold2); }
.s-card-meta { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.s-card-time { text-align: left; }
.s-card-timestr { font-size: 22px; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.s-card-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
.s-card-parties { font-size: 11px; color: var(--text2); background: var(--surface3); border-radius: 8px; padding: 7px 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
.s-card-footer { display: flex; justify-content: space-between; align-items: center; }
.s-card-court { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.s-card-actions { display: flex; align-items: center; gap: 6px; }
.btn-cycle { background: var(--surface3); border: 1px solid var(--border2); border-radius: 7px; padding: 3px 9px; font-size: 10px; color: var(--text3); cursor: pointer; transition: all 0.12s; }
.btn-cycle:active { background: var(--gold-a10); }

.prio-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; }
.prio-high { background: var(--red-a); color: #f87171; border-color: rgba(232,80,80,0.3); }
.prio-med  { background: var(--amber-a); color: #fbbf24; border-color: rgba(232,160,48,0.3); }
.prio-low  { background: var(--green-a); color: #34d399; border-color: rgba(58,184,130,0.3); }
.prio-none { background: var(--blue-a); color: #60a5fa; border-color: rgba(74,144,217,0.3); }

.status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 18px; font-size: 10px; font-weight: 700; border: 1px solid; }

.countdown-bar { margin-top: 9px; background: var(--surface3); border-radius: 8px; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.cd-label { font-size: 9px; color: var(--text3); margin-bottom: 2px; }
.cd-time { font-size: 15px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.cd-urgent { color: #f87171; }
.cd-soon   { color: #fbbf24; }
.cd-ok     { color: #34d399; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.pulse { animation: pulse 1.2s ease-in-out infinite; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-md); padding: 11px 42px 11px 50px; font-size: 13px; color: var(--text); transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--gold-a30); }
.search-ico { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--text3); }
.search-adv { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: var(--gold2); cursor: pointer; }

.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 18px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.12s; }

.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 14px; font-size: 9px; font-weight: 700; background: var(--gold-a10); color: var(--gold2); border: 1px solid var(--gold-a20); }

.empty { text-align: center; padding: 50px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.empty-icon { font-size: 52px; opacity: 0.3; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 12px; color: var(--text3); }

.overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
.overlay.hid { display: none; }
.overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); }
.sheet { position: relative; background: var(--surface); border-radius: var(--r-xl) var(--r-xl) 0 0; border-top: 1px solid var(--border2); max-height: 92vh; overflow-y: auto; padding-bottom: max(20px, var(--safe-bottom)); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 12px auto 16px; }
.sheet-hdr { position: sticky; top: 0; background: var(--surface); padding: 0 18px 14px; border-bottom: 1px solid var(--border); z-index: 1; display: flex; justify-content: space-between; align-items: center; }
.sheet-title { font-family: 'Scheherazade New', serif; font-size: 20px; font-weight: 700; color: var(--gold2); }
.sheet-close { width: 30px; height: 30px; border-radius: 8px; background: var(--surface2); color: var(--text3); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.sheet-body { padding: 16px 18px; }

.det-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.det-row:last-of-type { border-bottom: none; }
.det-key { font-size: 11px; color: var(--text3); font-weight: 500; flex-shrink: 0; }
.det-val { font-size: 12px; color: var(--text); font-weight: 600; text-align: left; flex: 1; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.04em; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 12px 13px; font-size: 13px; color: var(--text); display: block; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-a30); }
.field textarea { resize: none; }
option { background: var(--surface); }

.prio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.prio-btn { padding: 9px; border-radius: var(--r-sm); font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; text-align: center; transition: all 0.12s; }
.prio-btn.sel { border-color: currentColor; }

.note-box { border-radius: var(--r-md); padding: 12px; margin: 10px 0; }
.note-box-hdr { font-size: 10px; font-weight: 700; margin-bottom: 8px; }
.note-box textarea { width: 100%; background: transparent; font-size: 12px; color: var(--text); resize: none; min-height: 70px; direction: rtl; line-height: 1.6; }

.att-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface); border-radius: 9px; margin-bottom: 5px; }
.att-name { font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.stage-btn { padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid; margin: 3px; transition: all 0.12s; }

.btn-primary { width: 100%; background: var(--gold); color: #0a0905; border-radius: var(--r-md); padding: 14px; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(212,168,67,0.25); transition: all 0.12s; margin-bottom: 8px; }
.btn-primary:active { opacity: 0.9; transform: scale(0.98); }
.btn-primary:disabled { background: var(--surface3); color: var(--text3); box-shadow: none; }
.btn-ghost { width: 100%; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; font-weight: 600; font-size: 13px; cursor: pointer; }
.action-row { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
.action-btn { flex: 1; min-width: 60px; border-radius: var(--r-sm); padding: 10px 5px; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; border: 1px solid; }

.dlg-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: center; justify-content: center; padding: 22px; }
.dlg-overlay.hid { display: none; }
.dlg-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
.dlg { position: relative; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 28px 22px 22px; width: 100%; max-width: 280px; text-align: center; }
.dlg-icon { font-size: 44px; margin-bottom: 12px; }
.dlg-title { font-family: 'Scheherazade New', serif; font-size: 18px; color: var(--text); margin-bottom: 5px; }
.dlg-sub { font-size: 12px; color: var(--text3); margin-bottom: 22px; }
.dlg-btns { display: flex; gap: 9px; }
.dlg-del { flex: 1; background: var(--red); color: #fff; border-radius: 11px; padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; }
.dlg-cancel { flex: 1; background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); border-radius: 11px; padding: 12px; font-weight: 600; font-size: 13px; cursor: pointer; }

.toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 9px 18px; font-size: 12px; font-weight: 600; color: var(--text); z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap; transition: all 0.25s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.cal-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 14px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-month { font-family: 'Scheherazade New', serif; font-size: 18px; font-weight: 700; color: var(--gold2); }
.cal-btn-nav { width: 34px; height: 34px; border-radius: 9px; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-days-hdr { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
.cal-day-name { text-align: center; font-size: 9px; color: var(--text3); font-weight: 600; padding: 3px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-cell { text-align: center; border-radius: 9px; padding: 6px 1px; cursor: pointer; border: 2px solid transparent; min-height: 40px; display: flex; flex-direction: column; align-items: center; transition: all 0.1s; }
.cal-cell-num { font-size: 13px; font-weight: 600; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

.stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.stat-mini { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 8px; text-align: center; }
.stat-mini-val { font-size: 22px; font-weight: 900; }
.stat-mini-lbl { font-size: 9px; color: var(--text3); margin-top: 4px; }
.bar-chart { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.bar-label { font-size: 10px; color: var(--text3); width: 70px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 5px; height: 9px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-size: 10px; font-weight: 700; width: 20px; }

.task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; margin-bottom: 7px; }
.task-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.task-title { font-size: 13px; font-weight: 600; color: var(--text); }
.task-title.done { text-decoration: line-through; opacity: 0.45; }

.contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.contact-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

.folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.folder-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; cursor: pointer; position: relative; transition: transform 0.1s; }
.folder-card:active { transform: scale(0.97); }
.file-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════
   AI CHAT - ENHANCED
═══════════════════════════════════════════════ */
.ai-wrap { display: flex; flex-direction: column; height: calc(100vh - 145px - var(--safe-top) - var(--safe-bottom)); }

.ai-header {
  background: linear-gradient(135deg, rgba(16,163,127,0.12), rgba(16,163,127,0.05));
  border: 1px solid rgba(16,163,127,0.2);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.ai-avatar-wrap { position: relative; flex-shrink: 0; }
.ai-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #0d9f77, #065e46);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 16px rgba(16,163,127,0.35);
}
.ai-online-dot {
  position: absolute; bottom: 1px; left: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #10a37f; border: 2px solid var(--surface);
}
.ai-name { font-family: 'Scheherazade New', serif; font-size: 16px; color: var(--gold2); font-weight: 700; }
.ai-status { font-size: 10px; color: #10a37f; margin-top: 2px; }
.ai-clear-btn {
  margin-right: auto; background: none;
  color: var(--text3); font-size: 11px; cursor: pointer;
  border: 1px solid var(--border2); border-radius: 8px; padding: 5px 9px;
}

.ai-context-bar {
  background: var(--surface2);
  border: 1px solid var(--gold-a20);
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 7px;
}
.ai-context-bar span { color: var(--gold2); font-weight: 700; }

.ai-msg-wrap { flex: 1; overflow-y: auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }

.ai-bubble-user {
  display: flex; justify-content: flex-start; margin-bottom: 12px;
}
.ai-bubble-user > div {
  background: var(--gold-a20); border: 1px solid var(--gold-a30);
  border-radius: 18px 18px 4px 18px;
  padding: 11px 14px; max-width: 82%;
  font-size: 13px; color: var(--text); line-height: 1.65;
}

.ai-bubble-ai {
  display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px; align-items: flex-end;
}
.ai-bubble-ai > .bubble-content {
  background: var(--surface2); border: 1px solid rgba(16,163,127,0.2);
  border-radius: 18px 18px 18px 4px;
  padding: 11px 14px; max-width: 86%;
  font-size: 13px; color: var(--text); line-height: 1.65;
}
.ai-bubble-ai .ai-mini-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #0d9f77, #065e46);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}

/* Typing animation */
.typing-bubble { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #10a37f; opacity: 0.6; animation: typingBounce 1.3s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100%{ transform: translateY(0); opacity: 0.6; } 30%{ transform: translateY(-6px); opacity: 1; } }

.ai-quick-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 7px; margin-bottom: 14px;
}
.ai-quick-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 10px;
  font-size: 11px; color: var(--text2); cursor: pointer;
  text-align: right; line-height: 1.4; font-family: 'Tajawal', sans-serif;
  transition: all 0.15s;
}
.ai-quick-btn:hover { border-color: rgba(16,163,127,0.35); color: var(--text); }
.ai-quick-btn .q-icon { font-size: 16px; margin-bottom: 5px; display: block; }

.ai-smart-btn {
  background: rgba(16,163,127,0.08); border: 1px solid rgba(16,163,127,0.25);
  border-radius: 20px; padding: 7px 13px;
  font-size: 11px; font-weight: 600; color: #2ecc9a;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: 'Tajawal', sans-serif;
  transition: all 0.15s;
}
.ai-smart-btn:hover { background: rgba(16,163,127,0.15); }

.ai-input-row {
  display: flex; gap: 8px; padding-top: 10px;
  border-top: 1px solid var(--border);
  align-items: flex-end;
}
.ai-input-row textarea {
  flex: 1; background: var(--surface2);
  border: 1.5px solid var(--border2); border-radius: var(--r-md);
  padding: 11px 13px; font-size: 13px; color: var(--text);
  resize: none; line-height: 1.5; max-height: 90px;
  font-family: 'Tajawal', sans-serif;
}
.ai-input-row textarea:focus { border-color: rgba(16,163,127,0.4); }
.ai-send {
  width: 44px; height: 44px; border-radius: var(--r-sm);
  background: linear-gradient(135deg, #0d9f77, #065e46);
  color: #fff; font-size: 18px; cursor: pointer;
  flex-shrink: 0; align-self: flex-end;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px rgba(16,163,127,0.3);
  transition: all 0.15s;
}
.ai-send:active { transform: scale(0.92); }
.ai-send:disabled { opacity: 0.4; cursor: not-allowed; }

.ai-upload-btn {
  width: 44px; height: 44px; border-radius: var(--r-sm);
  background: var(--surface2); border: 1.5px solid var(--border2);
  color: var(--text3); font-size: 18px; cursor: pointer;
  flex-shrink: 0; align-self: flex-end;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.ai-upload-btn:hover { border-color: rgba(16,163,127,0.4); color: #10a37f; background: rgba(16,163,127,0.08); }

.doc-analysis-card {
  background: var(--surface2);
  border: 1px solid rgba(16,163,127,0.25);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.doc-analysis-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(16,163,127,0.08);
  filter: blur(20px);
}
.doc-preview-bubble {
  background: rgba(16,163,127,0.08);
  border: 1px solid rgba(16,163,127,0.2);
  border-radius: 12px 12px 4px 12px;
  padding: 9px 13px; max-width: 82%;
  font-size: 12px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.doc-file-icon {
  width: 32px; height: 32px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.analysis-progress {
  height: 3px; border-radius: 2px;
  background: var(--surface3); overflow: hidden;
  margin-top: 8px;
}
.analysis-progress-bar {
  height: 100%; background: linear-gradient(90deg,#0d9f77,#10d9a0);
  border-radius: 2px;
  animation: progressSweep 1.8s ease-in-out infinite;
}
@keyframes progressSweep {
  0% { width: 0%; margin-right: 100%; }
  50% { width: 60%; margin-right: 20%; }
  100% { width: 0%; margin-right: 0%; margin-left: 100%; }
}

/* Markdown-like formatting in AI responses */
.ai-response-text strong { color: var(--gold2); font-weight: 700; }
.ai-response-text em { color: #2ecc9a; font-style: normal; }
.ai-response-text .ai-list-item { display: flex; gap: 7px; margin-bottom: 5px; }
.ai-response-text .ai-list-item::before { content: '◈'; color: #10a37f; font-size: 10px; margin-top: 3px; flex-shrink: 0; }

.week-date-pill { background: var(--gold-a10); border: 1px solid var(--gold-a20); border-radius: 9px; padding: 6px 12px; margin-bottom: 7px; font-size: 11px; font-weight: 700; color: var(--gold2); }

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ani { animation: slideUp 0.2s ease both; }
.stagger > * { animation: slideUp 0.25s ease both; }
.stagger > *:nth-child(1) { animation-delay: 0.02s; }
.stagger > *:nth-child(2) { animation-delay: 0.06s; }
.stagger > *:nth-child(3) { animation-delay: 0.10s; }
.stagger > *:nth-child(4) { animation-delay: 0.14s; }
.stagger > *:nth-child(5) { animation-delay: 0.18s; }
.stagger > *:nth-child(6) { animation-delay: 0.22s; }
.stagger > *:nth-child(7) { animation-delay: 0.26s; }

.hid { display: none !important; }

@media print {
  body { background: #fff !important; color: #000 !important; direction: rtl; }
  #app { display: none !important; }
  #pa { display: block !important; }
}
#pa { display: none; }
</style>

/* ═══════════════════════════════════════════════════════════
   DATABASE
═══════════════════════════════════════════════════════════ */
var DB_NAME='JalsatDB', DB_VER=9, STORE='sessions';
var db=null;
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){db=e.target.result;res();};r.onerror=rej;});}
function dbAll(){return new Promise(function(res){if(!db){res([]);return;}var tx=db.transaction(STORE,'readonly');var r=tx.objectStore(STORE).getAll();r.onsuccess=function(){res(r.result||[]);};r.onerror=function(){res([]);};});}
function dbPut(s){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(s);tx.oncomplete=res;tx.onerror=res;});}
function dbDel(id){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=res;});}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function pad(n){return String(n).padStart(2,'0');}
function today(){return new Date().toISOString().split('T')[0];}
function fmtS(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{day:'numeric',month:'short'});}
function fmtL(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtLD(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'short',year:'numeric',month:'long',day:'numeric'});}
function bdg(s){var c=ST[s];return'<span class="status-badge" style="color:'+c.clr+';background:'+c.bg+';border-color:'+c.rim+'">'+c.lbl+'</span>';}
function ptag(p){var pt=PT[p||'none'];return'<span class="prio-badge '+pt.cls+'">'+pt.icon+' '+pt.lbl+'</span>';}
function tagsHTML(tags){if(!tags||!tags.length)return'';return'<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:5px">'+tags.map(function(t){return'<span class="tag">🏷️ '+t+'</span>';}).join('')+'</div>';}
function saveTasks(){try{localStorage.setItem('j_tasks',JSON.stringify(tasks));}catch(e){}}
function saveContacts(){try{localStorage.setItem('j_contacts',JSON.stringify(contacts));}catch(e){}}

function formatAIResponse(text){
  if(!text)return'';
  text=String(text);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  var lines=text.split('\n');
  var result=[];
  lines.forEach(function(line){
    var trimmed=line.trim();
    if(!trimmed)return;
    if(trimmed.match(/^[-•]\s+/)||trimmed.match(/^\d+\.\s+/)){
      var content=trimmed.replace(/^[-•]\s+/,'').replace(/^\d+\.\s+/,'');
      result.push('<div class="ai-list-item">'+content+'</div>');
    } else {
      result.push('<p style="margin-bottom:6px">'+trimmed+'</p>');
    }
  });
  return'<div class="ai-response-text">'+(result.length?result.join(''):text)+'</div>';
}

          h+='<div class="ai-bubble-user" style="animation:slideUp 0.2s ease"><div>'+m.content+'</div></div>';
        }
      } else {
        h+='<div class="ai-bubble-ai" style="animation:slideUp 0.2s ease"><div class="bubble-content">'+formatAIResponse(m.content)+'</div><div class="ai-mini-avatar">⚖️</div></div>';
      }
    });
    if(aiLoading){
      // Check if last user message is a doc
      var lastMsg=aiMessages[aiMessages.length-1];
      var loadingLabel=lastMsg&&lastMsg.isDoc?'جارٍ تحليل المستند...':'سعود يفكر...';
      h+='<div class="ai-bubble-ai"><div class="bubble-content">';

  }

  if(aiMessages.length>0&&!aiLoading){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch">';
    smartPrompts.slice(0,2).forEach(function(p){
      h+='<button class="ai-smart-btn" onclick="sendAI(\''+p+'\')">'+p+'</button>';
    });
    AI_STATIC_QUICK.slice(0,2).forEach(function(q2){
      h+='<button class="ai-smart-btn" onclick="sendAI(\''+q2.text+'\')">'+q2.icon+' '+q2.text.slice(0,18)+'...</button>';
    });

  }

  // Input
  h+='<div class="ai-input-row">';
  h+='<label class="ai-upload-btn" title="رفع مستند للتحليل"><span>📎</span><input type="file" accept=".pdf,image/*" style="display:none" onchange="analyzeDocument(this,\'auto\')"></label>';
  h+='<textarea id="ai-input" placeholder="اسأل سعود عن جلساتك أو أي سؤال قانوني..." dir="rtl" rows="2"';
  h+=' onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendAIInput();}"></textarea>';
  h+='<button onclick="sendAIInput()" class="ai-send" id="ai-send-btn" '+(aiLoading?'disabled':'')+'>';
  h+=aiLoading?'…':'↑';
  h+='</button>';
  h+='</div>';
  h+='</div>';

  return h;
}

function sendAIInput(){
  var inp=document.getElementById('ai-input');
  if(!inp||!inp.value.trim())return;
  sendAI(inp.value.trim());
  inp.value='';
}

function sendAI(msg){
  if(aiLoading)return;
  if(!msg||!msg.trim())return;
  if(!requireApiKey())return;
  aiMessages.push({role:'user',content:msg.trim()});
  aiLoading=true;
  render();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);

  // Build clean alternating messages (API requires user/assistant alternation, must start with user)
  var rawMsgs=aiMessages.slice(-20);
  var cleanMsgs=[];
  var lastRole=null;
  for(var mi=rawMsgs.length-1;mi>=0;mi--){
    var rm=rawMsgs[mi];
    if(rm.role!==lastRole){
      cleanMsgs.unshift({role:rm.role,content:rm.content});
      lastRole=rm.role;
    }
  }
  // Must start with user role
  while(cleanMsgs.length&&cleanMsgs[0].role!=='user')cleanMsgs.shift();
  if(!cleanMsgs.length)cleanMsgs=[{role:'user',content:msg.trim()}];

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      system:buildAISystem(),
      messages:cleanMsgs
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(d){
    var reply='';
    if(d.content&&d.content.length>0){
      d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
    }
    if(!reply)reply='عذراً، لم أتمكن من الرد. حاول مرة أخرى.';
    aiMessages.push({role:'assistant',content:reply});
    saveAIMsgs();
    aiLoading=false;
    render();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
  })
  .catch(function(err){
    console.error('AI Error:',err);
    var errMsg='⚠️ '+( err.message&&err.message.length<120 ? err.message : 'تعذّر الاتصال. تحقق من اتصالك بالإنترنت وحاول مجدداً.' );
    aiMessages.push({role:'assistant',content:errMsg});
    saveAIMsgs();
    aiLoading=false;
    render();
  });
}

function clearAI(){
  if(aiMessages.length&&!confirm('مسح كل المحادثة؟'))return;
  aiMessages=[];
  saveAIMsgs();
  render();
}

/* ═══════════════════════════════════════════════════════════
   DOCUMENT ANALYSIS
═══════════════════════════════════════════════════════════ */
function analyzeDocument(input, hint){
  var file=input.files[0];
  if(!file){return;}
  if(!requireApiKey()){input.value='';return;}
  input.value='';

  var maxMB=20;
  if(file.size>maxMB*1024*1024){toast('⚠️ الملف أكبر من '+maxMB+'MB');return;}

  // Detect type
  var isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  var isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){toast('⚠️ يُقبل PDF أو صورة فقط');return;}

  var mediaType=isPDF?'application/pdf':file.type;
  var fileIcon=isPDF?'📕':'🖼️';
  var label=file.name.length>36?file.name.substring(0,33)+'...':file.name;

  // Show file bubble in chat immediately
  if(curTab!=='ai'){go('ai');}
  aiLoading=true;

  // Add a special "user" message showing the doc
  aiMessages.push({
    role:'user',
    content:'📎 '+label+'\n[يتم تحليل المستند...]',
    isDoc:true,
    docIcon:fileIcon,
    docName:label
  });
  render();
  setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(!b64){
      toast('⚠️ فشل قراءة الملف');
      aiMessages.pop();
      aiLoading=false;
      render();
      return;
    }

    // Build the user text input if any
    var userText=document.getElementById('ai-input');
    var customQ=userText&&userText.value.trim()?userText.value.trim():'';
    if(userText)userText.value='';

    var prompt=customQ||
      (isPDF
        ? 'حلّل هذه الوثيقة القانونية واستخرج: ١) الموضوع الرئيسي ٢) الأطراف المذكورة ٣) النقاط القانونية الجوهرية ٤) أي تواريخ أو مواعيد مهمة ٥) توصياتك القانونية.'
        : 'حلّل هذه الصورة واستخرج أي محتوى قانوني أو نصي مهم، واذكر ملاحظاتك.');

    // Build message content as multipart
    var contentBlock=[];
    if(isPDF){
      contentBlock.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else {
      contentBlock.push({type:'image',source:{type:'base64',media_type:mediaType,data:b64}});
    }
    contentBlock.push({type:'text',text:prompt});

    // Update the last message with the real prompt shown to user
    aiMessages[aiMessages.length-1].content='📎 '+label+(customQ?'\n'+customQ:'');

    // Build history — previous messages (text only) + this multipart message
    var prevMsgs=[];
    var hist=aiMessages.slice(-10,-1);
    var lastR=null;
    for(var mi=hist.length-1;mi>=0;mi--){
      var hm=hist[mi];
      if(hm.role!==lastR&&!hm.isDoc){
        prevMsgs.unshift({role:hm.role,content:hm.content});
        lastR=hm.role;
      }
    }
    // Remove trailing assistant (last must be user)
    while(prevMsgs.length&&prevMsgs[prevMsgs.length-1].role==='assistant')prevMsgs.pop();

    var apiMessages=prevMsgs.concat([{role:'user',content:contentBlock}]);

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2048,
        system:buildAISystem()+'\nعند تحليل مستند، كن منظماً واستخدم عناوين وقوائم واضحة.',
        messages:apiMessages
      })
    })
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(d){
      var reply='';
      if(d.content&&d.content.length>0){
        d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
      }
      if(!reply)reply='لم أتمكن من قراءة المستند. تأكد أنه ملف PDF أو صورة واضحة.';
      aiMessages.push({role:'assistant',content:reply});
      saveAIMsgs();
      aiLoading=false;
      render();
      setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
    })
    .catch(function(err){
      console.error('Doc analysis error:',err);
      var msg='⚠️ '+(err.message&&err.message.length<120?err.message:'فشل تحليل المستند. تأكد من الاتصال وحاول مرة أخرى.');
      aiMessages.push({role:'assistant',content:msg});
      saveAIMsgs();
      aiLoading=false;
      render();
    });
  };
  reader.onerror=function(){
    toast('⚠️ خطأ في قراءة الملف');
    aiMessages.pop();
    aiLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

function cdInfo(s){if(s.status==='completed'||s.status==='postponed')return null;var now=new Date(),tgt=new Date(s.date+'T'+s.time+':00'),diff=tgt-now;if(diff<0){var e=Math.abs(diff);return{passed:true,time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)),cls:'urgent'};}var ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;var cls=ts<3600?'urgent':ts<86400?'soon':'ok';var t=days>0?(days+'ي '+pad(h)+':'+pad(m)+':'+pad(sec)):(pad(h)+':'+pad(m)+':'+pad(sec));return{passed:false,time:t,cls:cls,ts:ts};}

function rHome(){

function rWeek(){var next7=[];for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()+i);next7.push(d.toISOString().split('T')[0]);}var weekData=data.filter(function(s){return next7.indexOf(s.date)>-1;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});var h=secHdr('📅','الأسبوع القادم');if(!weekData.length)return h+'<div class="empty" style="padding:22px 0"><div style="font-size:32px;opacity:.25">📅</div><div class="empty-sub" style="margin-top:6px">لا توجد جلسات هذا الأسبوع</div></div>';var byDate={};weekData.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});Object.keys(byDate).sort().forEach(function(d){h+='<div class="week-date-pill">'+fmtL(d)+' ('+byDate[d].length+')</div>';byDate[d].forEach(function(s){h+=card(s);});});return h;}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function rList(){

function showTemplates(){var modal=document.createElement('div');modal.id='tplModal';modal.style.cssText='position:fixed;inset:0;z-index:500;display:flex;align-items:flex-end;justify-content:center';var bg=document.createElement('div');bg.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)';bg.onclick=function(){modal.remove();};var box=document.createElement('div');box.style.cssText='position:relative;background:var(--surface);border-radius:22px 22px 0 0;border-top:1px solid var(--border2);width:100%;max-width:430px;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom))';var h='<div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2);margin-bottom:14px">📜 اختر قالباً جاهزاً</div>';TEMPLATES.forEach(function(t,i){h+='<button onclick="applyTemplate('+i+')" style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;text-align:right;cursor:pointer;display:flex;align-items:center;gap:10px"><span style="font-size:20px">📋</span><div><div style="font-size:13px;font-weight:700;color:var(--text)">'+t.name+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px">'+t.type+' · '+PT[t.priority].icon+' '+PT[t.priority].lbl+'</div></div></button>';});h+='<button onclick="document.getElementById(\'tplModal\').remove()" style="width:100%;background:none;color:var(--text3);padding:10px;font-size:13px;cursor:pointer;margin-top:4px">إلغاء</button>';box.innerHTML=h;modal.appendChild(bg);modal.appendChild(box);document.body.appendChild(modal);}
function applyTemplate(idx){var t=TEMPLATES[idx];if(!t)return;document.getElementById('fType').value=t.type;document.getElementById('fStatus').value=t.status;document.getElementById('fNotes').value=t.notes;setPrio(t.priority);var tp=document.getElementById('tagsPicker');if(tp)tp.innerHTML=renderTagsPicker([]);toast('📜 تم تطبيق: '+t.name);var modal=document.getElementById('tplModal');if(modal)modal.remove();}

/* ═══════════════════════════════════════════════════════════
   DUPLICATE
═══════════════════════════════════════════════════════════ */
function dupSession(id){var s=data.find(function(x){return x.id===id;});if(!s)return;editId=null;curPrio=s.priority||'none';curTags=(s.tags||[]).slice();document.getElementById('formTitle').textContent='نسخة من: '+s.num;document.getElementById('btnSave').textContent='حفظ النسخة';document.getElementById('fNum').value=s.num;document.getElementById('fType').value=s.type;document.getElementById('fCourt').value=s.court||'';document.getElementById('fRoom').value=s.room||'';document.getElementById('fPlnt').value=s.plnt||'';document.getElementById('fDfnd').value=s.dfnd||'';document.getElementById('fDate').value='';document.getElementById('fTime').value='';document.getElementById('fStatus').value='scheduled';document.getElementById('fNotes').value=s.notes||'';document.getElementById('btnSave').disabled=true;setPrio(s.priority||'none');var tp=document.getElementById('tagsPicker');if(tp)tp.innerHTML=renderTagsPicker(s.tags||[]);closeDet();document.getElementById('formSheet').classList.remove('hid');toast('🔄 نُسخت الجلسة – أدخل التاريخ والوقت');}

/* ═══════════════════════════════════════════════════════════
   BACKUP
═══════════════════════════════════════════════════════════ */
function fullBackup(){var payload={version:2,date:new Date().toISOString(),sessions:data,tasks:tasks,contacts:contacts,theme:localStorage.getItem('j_theme')||'night',ctheme:localStorage.getItem('j_ctheme')||'0'};var blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='جلسات_backup_'+today()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('💾 تم حفظ النسخة الاحتياطية');}
function fullRestore(input){var file=input.files[0];if(!file)return;var r=new FileReader();r.onload=function(e){try{var p=JSON.parse(e.target.result);if(!p.sessions){toast('⚠️ ملف غير صالح');return;}if(!confirm('استعادة '+p.sessions.length+' جلسة. متابعة؟'))return;data=p.sessions||[];tasks=p.tasks||[];contacts=p.contacts||[];if(p.theme)localStorage.setItem('j_theme',p.theme);if(p.ctheme)localStorage.setItem('j_ctheme',p.ctheme);Promise.all(data.map(function(s){return dbPut(s);})).then(function(){saveTasks();saveContacts();toast('✅ تم الاسترداد: '+data.length+' جلسة');applyTheme();render();});}catch(err){toast('⚠️ خطأ في قراءة الملف');}};r.readAsText(file);}
function clearAllData(){if(!confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات!'))return;data=[];tasks=[];contacts=[];saveTasks();saveContacts();dbAll().then(function(rows){return Promise.all(rows.map(function(s){return dbDel(s.id);}));}).then(function(){toast('🗑️ تم المسح');render();});}
function showBackupModal(){var modal=document.createElement('div');modal.id='bkModal';modal.style.cssText='position:fixed;inset:0;z-index:500;display:flex;align-items:flex-end;justify-content:center';var bg=document.createElement('div');bg.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px)';bg.onclick=function(){modal.remove();};var box=document.createElement('div');box.style.cssText='position:relative;background:var(--surface);border-radius:22px 22px 0 0;border-top:1px solid var(--border2);width:100%;max-width:430px;padding:20px;padding-bottom:max(20px,env(safe-area-inset-bottom))';box.innerHTML='<div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2);margin-bottom:6px">💾 حفظ واسترداد البيانات</div><div style="font-size:11px;color:var(--text3);margin-bottom:16px">احفظ نسخة احتياطية أو استردّ بياناتك</div><div style="background:var(--surface2);border:1px solid rgba(58,184,130,.25);border-radius:var(--r-md);padding:14px;margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#34d399;margin-bottom:6px">📤 حفظ نسخة احتياطية</div><button onclick="fullBackup();document.getElementById(\'bkModal\').remove();" style="width:100%;background:var(--green-a);color:#34d399;border:1px solid rgba(58,184,130,.3);border-radius:10px;padding:12px;font-weight:700;font-size:13px;cursor:pointer">💾 حفظ الآن</button></div><div style="background:var(--surface2);border:1px solid rgba(74,144,217,.25);border-radius:var(--r-md);padding:14px;margin-bottom:10px"><div style="font-size:12px;font-weight:700;color:#60a5fa;margin-bottom:6px">📥 استرداد من ملف</div><label style="width:100%;background:var(--blue-a);color:#60a5fa;border:1px solid rgba(74,144,217,.3);border-radius:10px;padding:12px;font-weight:700;font-size:13px;cursor:pointer;display:block;text-align:center">📂 اختر ملف<input type="file" accept=".json" style="display:none" onchange="fullRestore(this);document.getElementById(\'bkModal\').remove();"></label></div><div style="background:var(--surface2);border:1px solid rgba(232,80,80,.25);border-radius:var(--r-md);padding:14px;margin-bottom:14px"><div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:6px">⚠️ مسح جميع البيانات</div><button onclick="clearAllData();document.getElementById(\'bkModal\').remove();" style="width:100%;background:var(--red-a);color:#f87171;border:1px solid rgba(232,80,80,.3);border-radius:10px;padding:12px;font-weight:700;font-size:13px;cursor:pointer">🗑️ مسح الكل</button></div><button onclick="document.getElementById(\'bkModal\').remove()" style="width:100%;background:none;color:var(--text3);padding:10px;font-size:13px;cursor:pointer">إغلاق</button>';modal.appendChild(bg);modal.appendChild(box);document.body.appendChild(modal);}

/* ═══════════════════════════════════════════════════════════
   DETAIL SHEET
═══════════════════════════════════════════════════════════ */
function openDet(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  detId=id;
  document.getElementById('detNum').textContent=s.num;
  document.getElementById('detBadge').innerHTML=bdg(s.status);
  var rows=[['نوع القضية',s.type],['الأهمية',ptag(s.priority||'none')],['🏛️ المحكمة',s.court||'—'],['المدعي',s.plnt||'—'],['المدعى عليه',s.dfnd||'—'],['التاريخ',fmtLD(s.date)],['الوقت',s.time],['القاعة',s.room||'—']];
  if(s.notes)rows.push(['ملاحظات',s.notes]);
  if(s.tags&&s.tags.length)rows.push(['الوسوم',tagsHTML(s.tags)]);
  var b=cdLarge(s);
  b+=rows.map(function(r){return'<div class="det-row"><span class="det-key">'+r[0]+'</span><span class="det-val">'+r[1]+'</span></div>';}).join('');

  // Ask AI about this session
  b+='<button onclick="askAIAboutSession('+s.id+')" style="width:100%;background:rgba(16,163,127,0.1);color:#2ecc9a;border:1px solid rgba(16,163,127,0.25);border-radius:var(--r-md);padding:11px;font-weight:700;font-size:12px;cursor:pointer;margin:12px 0;display:flex;align-items:center;justify-content:center;gap:7px">⚖️ اسأل سعود عن هذه القضية</button>';

  b+='<div class="note-box" style="background:var(--surface2);border:1px solid var(--border2)"><div class="note-box-hdr" style="color:var(--text2)">💬 ملاحظة سريعة</div><textarea id="qn-'+s.id+'" class="note-box textarea" placeholder="ملاحظة سريعة..." dir="rtl" rows="2">'+(s.quickNote||'')+'</textarea><button onclick="saveQuickNote('+s.id+')" style="width:100%;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:9px;padding:7px;font-weight:700;font-size:11px;cursor:pointer;margin-top:5px">💾 حفظ</button></div>';
  b+=progressHTML(s);
  b+='<div class="note-box" style="background:var(--surface2);border:1px solid var(--gold-a20)"><div class="note-box-hdr" style="color:var(--gold2)">🔒 مذكرة سرية</div><textarea id="memo-'+s.id+'" placeholder="ملاحظاتك السرية..." dir="rtl" rows="4" style="width:100%;background:transparent;font-size:12px;color:var(--text);resize:none;min-height:72px;line-height:1.6">'+(s.memo||'')+'</textarea><button onclick="saveMemo('+s.id+')" style="width:100%;background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:9px;padding:7px;font-weight:700;font-size:11px;cursor:pointer;margin-top:5px">💾 حفظ المذكرة</button></div>';
  b+='<div class="note-box" style="background:var(--surface2);border:1px solid var(--blue-a)"><div class="note-box-hdr" style="color:var(--blue)">📝 محضر الجلسة</div><textarea id="min-'+s.id+'" placeholder="سجّل ما دار في الجلسة..." dir="rtl" rows="5" style="width:100%;background:transparent;font-size:12px;color:var(--text);resize:none;min-height:90px;line-height:1.6">'+(s.minutes||'')+'</textarea><button onclick="saveMinutes('+s.id+')" style="width:100%;background:var(--blue-a);color:var(--blue);border:1px solid rgba(74,144,217,.3);border-radius:9px;padding:7px;font-weight:700;font-size:11px;cursor:pointer;margin-top:5px">💾 حفظ المحضر</button></div>';
  b+=attHTML(s);
  b+='<button onclick="scanDoc('+s.id+')" style="width:100%;background:rgba(139,111,212,.1);color:#a78bfa;border:1px solid rgba(139,111,212,.3);border-radius:var(--r-md);padding:12px;font-weight:700;font-size:13px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:7px">📸 مسح مستند بالكاميرا</button>';
  b+='<div class="action-row">'+
    '<button class="action-btn" onclick="editFD()" style="background:var(--gold-a10);color:var(--gold2);border-color:var(--gold-a30)">✏️ تعديل</button>'+
    '<button class="action-btn" onclick="copyS('+id+')" style="background:var(--blue-a);color:#60a5fa;border-color:rgba(74,144,217,.3)">📋 نسخ</button>'+
    '<button class="action-btn" onclick="dupSession('+id+')" style="background:rgba(139,111,212,.1);color:#a78bfa;border-color:rgba(139,111,212,.3)">🔄 استنساخ</button>'+
    '<button class="action-btn" onclick="printS('+id+')" style="background:var(--green-a);color:#34d399;border-color:rgba(58,184,130,.3)">🖨️ طباعة</button>'+
    '<button class="action-btn" onclick="shareWA('+id+')" style="background:rgba(37,211,102,.1);color:#25d366;border-color:rgba(37,211,102,.25)">💬 واتساب</button>'+
    '<button class="action-btn" onclick="confDel()" style="background:var(--red-a);color:#f87171;border-color:rgba(232,80,80,.3)">🗑️ حذف</button>'+
  '</div>';
  document.getElementById('detBody').innerHTML=b;
  document.getElementById('detSheet').classList.remove('hid');
}
function closeDet(){document.getElementById('detSheet').classList.add('hid');detId=null;}
function editFD(){var s=data.find(function(x){return x.id===detId;});closeDet();openEdit(s);}
function confDel(){delTgt=detId;document.getElementById('dlg').classList.remove('hid');}

/* ═══════════════════════════════════════════════════════════
   FORM
═══════════════════════════════════════════════════════════ */
function openAdd(){editId=null;curPrio='none';curTags=[];document.getElementById('formTitle').textContent='جلسة جديدة';document.getElementById('btnSave').textContent='حفظ الجلسة';['fNum','fCourt','fRoom','fPlnt','fDfnd','fNotes'].forEach(function(i){document.getElementById(i).value='';});document.getElementById('fType').value='جنائية';document.getElementById('fStatus').value='scheduled';document.getElementById('fDate').value='';document.getElementById('fTime').value='';document.getElementById('btnSave').disabled=true;setPrio('none');var tp=document.getElementById('tagsPicker');if(tp)tp.innerHTML=renderTagsPicker([]);document.getElementById('formSheet').classList.remove('hid');}
function openEdit(s){editId=s.id;curPrio=s.priority||'none';curTags=(s.tags||[]).slice();document.getElementById('formTitle').textContent='تعديل الجلسة';document.getElementById('btnSave').textContent='💾 حفظ التعديلات';document.getElementById('fNum').value=s.num;document.getElementById('fType').value=s.type;document.getElementById('fCourt').value=s.court||'';document.getElementById('fRoom').value=s.room||'';document.getElementById('fPlnt').value=s.plnt||'';document.getElementById('fDfnd').value=s.dfnd||'';document.getElementById('fDate').value=s.date;document.getElementById('fTime').value=s.time;document.getElementById('fStatus').value=s.status;document.getElementById('fNotes').value=s.notes||'';document.getElementById('btnSave').disabled=false;setPrio(s.priority||'none');var tp=document.getElementById('tagsPicker');if(tp)tp.innerHTML=renderTagsPicker(s.tags||[]);document.getElementById('formSheet').classList.remove('hid');}
function closeForm(){document.getElementById('formSheet').classList.add('hid');editId=null;}
function chkV(){var ok=document.getElementById('fNum').value.trim()&&document.getElementById('fCourt').value.trim()&&document.getElementById('fDate').value&&document.getElementById('fTime').value;document.getElementById('btnSave').disabled=!ok;}
function saveS(){var ex=editId?data.find(function(x){return x.id===editId;}):null;var s={id:editId||Date.now(),num:document.getElementById('fNum').value.trim(),type:document.getElementById('fType').value,court:document.getElementById('fCourt').value.trim(),room:document.getElementById('fRoom').value.trim(),plnt:document.getElementById('fPlnt').value.trim(),dfnd:document.getElementById('fDfnd').value.trim(),date:document.getElementById('fDate').value,time:document.getElementById('fTime').value,status:document.getElementById('fStatus').value,priority:curPrio,tags:curTags.slice(),notes:document.getElementById('fNotes').value.trim(),attachments:ex?(ex.attachments||[]):[],memo:ex?(ex.memo||''):'',minutes:ex?(ex.minutes||''):'',quickNote:ex?(ex.quickNote||''):'',stage:ex?(ex.stage||''):''};if(!s.num||!s.court||!s.date||!s.time)return;dbPut(s).then(function(){if(editId)data=data.map(function(x){return x.id===editId?s:x;});else data.push(s);schedNotifs();toast(editId?'✅ تم حفظ التعديلات':'✅ أُضيفت الجلسة');closeForm();render();});}

/* ═══════════════════════════════════════════════════════════
   DELETE
═══════════════════════════════════════════════════════════ */
function closeDlg(){document.getElementById('dlg').classList.add('hid');delTgt=null;}
function doDel(){if(!delTgt)return;dbDel(delTgt).then(function(){data=data.filter(function(x){return x.id!==delTgt;});toast('🗑️ تم الحذف');closeDlg();closeDet();render();});}

   FILTERS
═══════════════════════════════════════════════════════════ */
function setQ(v){q=v;render();}
function setF(v){filterS=v;render();}
function tgAdv(){advOpen=!advOpen;render();}
function clrAdv(){advType='';advCourt='';advFrom='';advTo='';advPrio='';render();}
function calPrev(){calD=new Date(calD.getFullYear(),calD.getMonth()-1,1);render();}
function calNext(){calD=new Date(calD.getFullYear(),calD.getMonth()+1,1);render();}
function selDay(d){selD=new Date(d+'T00:00:00');render();}

/* ═══════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════ */
document.getElementById('hdate').textContent=new Date().toLocaleDateString('ar-SA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
applyTheme();
updNotifBtn();
// Update key button indicator
(function(){var b=document.getElementById('btnKey');if(b){b.style.borderColor=apiKey?'':'rgba(232,80,80,0.4)';b.style.color=apiKey?'':'#f87171';}})();

openDB().then(function(){return dbAll();}).then(function(rows){
  data=rows;
  if(!data.length){return Promise.all(SAMPLE.map(function(s){return dbPut(s);})).then(function(){return dbAll();});}
  return rows;
}).then(function(rows){
  data=rows;
  if(notifOn&&Notification.permission==='granted'){schedNotifs();schedDaily();}
  render();
}).catch(function(){data=JSON.parse(JSON.stringify(SAMPLE));render();});
