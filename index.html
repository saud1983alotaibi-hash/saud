function calcDeadlineInSession(sid){
  var dateEl=document.getElementById('dlcDate_'+sid);
  var typeEl=document.getElementById('dlcType_'+sid);
  var resEl=document.getElementById('dlcResult_'+sid);
  if(!dateEl||!dateEl.value){toast('вҡ пёҸ Ш§Ш®ШӘШұ ШӘШ§ШұЩҠШ® Ш§Щ„ШӯЩғЩ… ШЈЩҲЩ„Ш§ЩӢ');return;}
  var days=parseInt(typeEl.value)||30;
  var typeName=typeEl.options[typeEl.selectedIndex].text;
  var base=new Date(dateEl.value+'T00:00:00');
  var deadline=new Date(base);
  deadline.setDate(deadline.getDate()+days);
  var deadlineStr=deadline.toISOString().split('T')[0];

  // в”Җв”Җ Save deadline for this session в”Җв”Җ
  var sid2=parseInt(sid);
  var s=data.find(function(x){return x.id===sid2;});
  sessionDeadlines[sid2]={
    deadlineDate:deadlineStr,
    baseDate:dateEl.value,
    days:days,
    typeName:typeName,
    sessionNum:s?s.num:'',
    sessionType:s?s.type:'',
    court:s?s.court:''
  };
  saveDeadlines();

  var now=new Date();now.setHours(0,0,0,0);
  var remaining=Math.ceil((deadline-now)/86400000);
  var clr,icon,status,bg,border;
  if(remaining<0){clr='#f87171';icon='рҹ”ҙ';bg='rgba(232,80,80,0.08)';border='rgba(232,80,80,0.25)';status='Ш§ЩҶШӘЩҮЩү Щ…ЩҶШ° '+Math.abs(remaining)+' ЩҠЩҲЩ…';}
  else if(remaining===0){clr='#f87171';icon='вҡЎ';bg='rgba(232,80,80,0.1)';border='rgba(232,80,80,0.3)';status='Ш§Щ„ЩҠЩҲЩ… ЩҮЩҲ ШўШ®Шұ ЩҠЩҲЩ…!';}
  else if(remaining<=7){clr='#fbbf24';icon='вҡ пёҸ';bg='rgba(251,191,36,0.08)';border='rgba(251,191,36,0.25)';status='Щ…ШӘШЁЩӮЩҠ '+remaining+' ЩҠЩҲЩ… ЩҒЩӮШ·';}
  else if(remaining<=14){clr='#f59e0b';icon='рҹҹЎ';bg='rgba(245,158,11,0.08)';border='rgba(245,158,11,0.2)';status='Щ…ШӘШЁЩӮЩҠ '+remaining+' ЩҠЩҲЩ…';}
  else{clr='#34d399';icon='вң…';bg='rgba(52,211,153,0.08)';border='rgba(52,211,153,0.2)';status='Щ…ШӘШЁЩӮЩҠ '+remaining+' ЩҠЩҲЩ…';}

  var deadlineFmt=deadline.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var baseDateFmt=base.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
  resEl.style.display='block';
  resEl.innerHTML=
    '<div style="background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:12px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<div style="font-size:22px">'+icon+'</div>'+
    '<div style="font-size:13px;font-weight:900;color:'+clr+'">'+status+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:5px">'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">ЩҶЩҲШ№ Ш§Щ„ШҘШ¬ШұШ§ШЎ</span><span style="color:var(--text);font-weight:600">'+typeName+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">ШӘШ§ШұЩҠШ® Ш§Щ„ШЁШҜШ§ЩҠШ©</span><span style="color:var(--text);font-weight:600">'+baseDateFmt+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">Ш§Щ„Щ…ШҜШ© Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠШ©</span><span style="color:var(--text);font-weight:600">'+days+' ЩҠЩҲЩ…</span></div>'+
    '<div style="border-top:1px solid '+border+';margin-top:5px;padding-top:7px;display:flex;justify-content:space-between;align-items:center">'+
    '<span style="font-size:10px;color:var(--text3);font-weight:700">Ш§Щ„Щ…ЩҲШ№ШҜ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ</span>'+
    '<span style="font-size:13px;font-weight:900;color:'+clr+'">'+deadlineFmt+'</span>'+
    '</div></div>'+
    (remaining>=0?
    '<div style="margin-top:10px;background:var(--surface3);border-radius:4px;height:6px;overflow:hidden">'+
    '<div style="height:100%;background:'+clr+';border-radius:4px;width:'+Math.min(100,Math.round(((days-remaining)/days)*100))+'%;transition:width .4s"></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:3px"><span>Ш§Щ„ЩҠЩҲЩ… 0</span><span>ЩҠЩҲЩ… '+days+'</span></div>':'')+'</div>'+
    '<div style="margin-top:8px;font-size:10px;color:var(--text3);text-align:center">рҹ’ҫ ШӘЩ… ШӯЩҒШё Ш§Щ„Щ…ЩҲШ№ШҜ вҖ” ЩҠШёЩҮШұ ЩҒЩҠ Ш§Щ„ШұШҰЩҠШіЩҠШ© ШӘЩ„ЩӮШ§ШҰЩҠШ§ЩӢ</div>';
}

function calcDeadline(){
  var dateEl=document.getElementById('dlcDate');
  var typeEl=document.getElementById('dlcType');
  var resEl=document.getElementById('dlcResult');
  if(!dateEl||!dateEl.value){toast('вҡ пёҸ Ш§Ш®ШӘШұ Ш§Щ„ШӘШ§ШұЩҠШ® ШЈЩҲЩ„Ш§ЩӢ');return;}
  var days=parseInt(typeEl.value)||30;
  var base=new Date(dateEl.value+'T00:00:00');
  var deadline=new Date(base);deadline.setDate(deadline.getDate()+days);
  var remaining=Math.ceil((deadline-new Date())/86400000);
  var clr=remaining<0?'#f87171':remaining<7?'#fbbf24':'#34d399';
  var msg=remaining<0?'Ш§ЩҶШӘЩҮЩү Ш§Щ„Щ…ЩҲШ№ШҜ Щ…ЩҶШ° '+Math.abs(remaining)+' ЩҠЩҲЩ…':remaining===0?'Ш§Щ„ЩҠЩҲЩ… ЩҮЩҲ ШўШ®Шұ ЩҠЩҲЩ…!':'Щ…ШӘШЁЩӮЩҠ '+remaining+' ЩҠЩҲЩ…';
  resEl.style.display='block';
  resEl.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:11px;color:var(--text3);margin-bottom:4px">Ш§Щ„Щ…ЩҲШ№ШҜ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ</div>'+
    '<div style="font-size:16px;font-weight:700;color:var(--text)">'+deadline.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div></div>'+
    '<div style="text-align:left"><div style="font-size:18px;font-weight:900;color:'+clr+'">'+msg+'</div></div></div>';
}

function exportExcel(){
  var csv='\uFEFF'+'ШұЩӮЩ… Ш§Щ„ЩӮШ¶ЩҠШ©,ЩҶЩҲШ№ Ш§Щ„ЩӮШ¶ЩҠШ©,Ш§Щ„Щ…ШӯЩғЩ…Ш©,Ш§Щ„ЩӮШ§Ш№Ш©,Ш§Щ„Щ…ШҜШ№ЩҠ,Ш§Щ„Щ…ШҜШ№Щү Ш№Щ„ЩҠЩҮ,Ш§Щ„ШӘШ§ШұЩҠШ®,Ш§Щ„ЩҲЩӮШӘ,Ш§Щ„ШӯШ§Щ„Ш©,Ш§Щ„ШЈЩҮЩ…ЩҠШ©,Щ…Щ„Ш§ШӯШёШ§ШӘ\n';
  data.forEach(function(s){
    var row=[s.num,s.type,s.court||'',s.room||'',s.plnt||'',s.dfnd||'',s.date,s.time,ST[s.status].lbl,PT[s.priority||'none'].lbl,s.notes||''];
    csv+=row.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='Ш§Щ„Ш¬Щ„ШіШ§ШӘ_'+today()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

var liveSessionId=null,liveNotes='',liveTick=null,liveStart=null;

function rLive(){
  var active=liveSessionId?data.find(function(x){return x.id===liveSessionId;}):null;

    var upcoming=data.filter(function(s){return s.date>=td&&s.status==='scheduled';}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,5);

    if(!list.length){
      h+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">Щ„Ш§ ШӘЩҲШ¬ШҜ Ш¬Щ„ШіШ§ШӘ Щ…Ш¬ШҜЩҲЩ„Ш© Ш§Щ„ЩҠЩҲЩ…</div>';
    } else {
      list.forEach(function(s){
        h+='<div onclick="startLiveSession('+s.id+')" style="padding:12px;background:var(--surface3);border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border2);transition:border-color .15s" onmouseenter="this.style.borderColor=\'var(--gold-a30)\'" onmouseleave="this.style.borderColor=\'var(--border2)\'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div><div style="font-size:13px;font-weight:700;color:var(--gold2)">'+s.num+'</div>';
        h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+s.court+' В· '+s.time+'</div></div>';
        h+=bdg(s.status)+'</div></div>';
      });
    }
    h+='</div>';
    return h;
  }

  var elapsed=liveStart?Math.floor((Date.now()-liveStart)/1000):0;
  var eh=Math.floor(elapsed/3600),em=Math.floor((elapsed%3600)/60),es=elapsed%60;
  var etime=pad(eh)+':'+pad(em)+':'+pad(es);

  h+='<div style="background:rgba(232,80,80,0.08);border:1px solid rgba(232,80,80,0.25);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;text-align:center">';
  h+='<div style="font-size:10px;color:#f87171;font-weight:700;letter-spacing:.1em;margin-bottom:6px;animation:pulse 1.2s infinite">в—Ҹ Ш¬Ш§ШұЩҚ Ш§Щ„ШўЩҶ</div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-bottom:4px">'+active.num+' В· '+active.court+'</div>';
  h+='<div style="font-size:38px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:.04em" id="liveTimer">'+etime+'</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px">Щ…ШҜШ© Ш§Щ„Ш¬Щ„ШіШ©</div>';
  h+='</div>';

  // Quick notes
  h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px">рҹ“қ ШӘШҜЩҲЩҠЩҶ ШіШұЩҠШ№</div>';
  h+='<textarea id="liveNoteArea" placeholder="ШіШ¬Щ‘Щ„ Щ…Ш§ ЩҠШҜЩҲШұ ЩҒЩҠ Ш§Щ„Ш¬Щ„ШіШ©..." dir="rtl" rows="6" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;color:var(--text);resize:none;line-height:1.7;font-family:Tajawal,sans-serif">'+liveNotes+'</textarea>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px">';
  h+='<button onclick="saveLiveNotes()" style="background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:9px;padding:9px;font-weight:700;font-size:12px;cursor:pointer">рҹ’ҫ ШӯЩҒШё</button>';

  [['рҹ“Ӣ','ЩҶШіШ® ШӘЩҒШ§ШөЩҠЩ„','copyS('+active.id+')'],['рҹ“Ҙ','Щ…ШұЩҒЩӮ','addAttFromLive('+active.id+')'],['рҹ”Ғ','ШәЩҠШұ Ш§Щ„ШӯШ§Щ„Ш©','cycleStatusLive('+active.id+')']].forEach(function(b){

  return h;

function startLiveSession(id){
  liveSessionId=id;liveNotes='';liveStart=Date.now();
  var s=data.find(function(x){return x.id===id;});
  if(s&&s.status==='scheduled'){s.status='inProgress';dbPut(s);}
  render();toast('рҹ”ҙ ШЁШҜШЈШӘ Ш§Щ„Ш¬Щ„ШіШ© Ш§Щ„Щ…ШЁШ§ШҙШұШ©');
}

function startLiveTick(){
  if(liveTick)clearInterval(liveTick);
  if(!liveSessionId||!liveStart)return;
  liveTick=setInterval(function(){
    var el=document.getElementById('liveTimer');if(!el)return;
    var elapsed=Math.floor((Date.now()-liveStart)/1000);
    el.textContent=pad(Math.floor(elapsed/3600))+':'+pad(Math.floor((elapsed%3600)/60))+':'+pad(elapsed%60);
    // Sync notes
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  },1000);
}

function saveLiveNotes(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;
  dbPut(s).then(function(){toast('рҹ’ҫ ШӘЩ… ШӯЩҒШё Ш§Щ„Щ…Щ„Ш§ШӯШёШ§ШӘ');});
}

function askAIFromLive(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  var msg='ШЈЩҶШ§ ЩҒЩҠ Ш¬Щ„ШіШ© Щ…ШЁШ§ШҙШұШ© Ш§Щ„ШўЩҶ: '+s.num+' '+s.type+' ЩҒЩҠ '+s.court;
  if(liveNotes)msg+='\n\nЩ…Ш§ ШҜЩҲЩ‘ЩҶШӘЩҮ:\n'+liveNotes+'\n\nШЈШӯШӘШ§Ш¬ ШӘЩҲШ¬ЩҠЩҮШ§ЩӢ ЩӮШ§ЩҶЩҲЩҶЩҠШ§ЩӢ ШіШұЩҠШ№Ш§ЩӢ.';
  saveLiveNotes();
  go('ai');
  setTimeout(function(){sendAI(msg);},350);
}

function addAttFromLive(id){
  var input=document.createElement('input');input.type='file';input.accept='image/*,.pdf';
  input.capture='environment';
  input.onchange=function(){addAtt(id,input);toast('рҹ“Һ ШӘЩ… ШҘШ¶Ш§ЩҒШ© Ш§Щ„Щ…ШұЩҒЩӮ');};
  input.click();
}

function cycleStatusLive(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  var order=['scheduled','inProgress','completed','postponed'];
  s.status=order[(order.indexOf(s.status)+1)%order.length];
  dbPut(s).then(function(){toast('рҹ”Ғ '+ST[s.status].lbl);});
}

function endLiveSession(){
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(liveTick)clearInterval(liveTick);
  if(s){
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
    if(liveNotes){s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;dbPut(s);}
    if(s.status==='inProgress'){s.status='completed';dbPut(s);}
  }
  var elapsed=liveStart?Math.floor((Date.now()-liveStart)/1000):0;
  var em=Math.floor(elapsed/60);
  liveSessionId=null;liveNotes='';liveStart=null;
  toast('вң… Ш§ЩҶШӘЩҮШӘ Ш§Щ„Ш¬Щ„ШіШ© ('+em+' ШҜЩӮЩҠЩӮШ©)');
  render();
}

function pinKey(k){
  var err=document.getElementById('pinErr');
  if(k==='DEL'){window._pinEntry=(window._pinEntry||'').slice(0,-1);}
  else if((window._pinEntry||'').length<4){window._pinEntry=(window._pinEntry||'')+k;}
  updPinDots();
  if((window._pinEntry||'').length===4){
    setTimeout(function(){
      if(window._pinEntry===pinCode){
        pinLocked=false;pinAttempts=0;
        var s=document.getElementById('pinScreen');if(s)s.remove();
        window._pinEntry='';
      } else {
        pinAttempts++;
        if(err)err.textContent='ШұЩ…ШІ Ш®Ш§Ш·ШҰ вҖ” Щ…ШӯШ§ЩҲЩ„Ш© '+(pinAttempts)+'/5';
        window._pinEntry='';updPinDots();
        if(pinAttempts>=5&&err)err.textContent='вҡ пёҸ ШӘЩ… ШҘЩҠЩӮШ§ЩҒ Ш§Щ„ШӘШ·ШЁЩҠЩӮ Щ…ШӨЩӮШӘШ§ЩӢ';
      }
    },200);
  }
}

function updPinDots(){
  var dots=document.querySelectorAll('#pinDots div');
  var len=(window._pinEntry||'').length;
  dots.forEach(function(d,i){
    d.style.background=i<len?'var(--gold)':'var(--surface3)';
    d.style.borderColor=i<len?'var(--gold-a30)':'var(--border2)';
    d.style.transform=i===len-1?'scale(1.2)':'scale(1)';
    setTimeout(function(){if(d)d.style.transform='scale(1)';},150);
  });
}

function tryBiometric(){
  if(window.PublicKeyCredential&&window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(ok){
      if(ok){
        // Use WebAuthn for biometric
        var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
        navigator.credentials.get({publicKey:{challenge:challenge,timeout:30000,userVerification:'required'}}).then(function(){
          pinLocked=false;var s=document.getElementById('pinScreen');if(s)s.remove();
          toast('вң… ШӘЩ… Ш§Щ„ШҜШ®ЩҲЩ„ ШЁШ§Щ„ШЁШөЩ…Ш©');
        }).catch(function(){toast('вҡ пёҸ ЩҒШҙЩ„ Ш§Щ„ШӘШӯЩӮЩӮ вҖ” ШЈШҜШ®Щ„ PIN');});
      } else toast('вҡ пёҸ Ш§Щ„ШЁШөЩ…Ш© ШәЩҠШұ Щ…ШӘЩҲЩҒШұШ© Ш№Щ„Щү ЩҮШ°Ш§ Ш§Щ„Ш¬ЩҮШ§ШІ');
    });
  } else toast('вҡ пёҸ ШәЩҠШұ Щ…ШҜШ№ЩҲЩ… вҖ” ШЈШҜШ®Щ„ PIN');
}

function saveCaseLinks(){try{localStorage.setItem('j_case_links',JSON.stringify(caseLinks));}catch(e){}}

function addCaseLink(fromId,toId,type){
  if(!fromId||!toId||fromId===toId)return;
  var exists=caseLinks.find(function(l){return(l.from===fromId&&l.to===toId)||(l.from===toId&&l.to===fromId);});
  if(exists){toast('вҡ пёҸ Ш§Щ„ШұШЁШ· Щ…ЩҲШ¬ЩҲШҜ Щ…ШіШЁЩӮШ§ЩӢ');return;}
  caseLinks.push({id:'lnk_'+Date.now(),from:fromId,to:toId,type:type||'related'});
  saveCaseLinks();toast('рҹ”— ШӘЩ… ШұШЁШ· Ш§Щ„ЩӮШ¶ЩҠШӘЩҠЩҶ');
}

function delCaseLink(id){caseLinks=caseLinks.filter(function(l){return l.id!==id;});saveCaseLinks();render();}

function getLinkedSessions(sid){
  return caseLinks.filter(function(l){return l.from===sid||l.to===sid;}).map(function(l){
    var otherId=l.from===sid?l.to:l.from;
    var other=data.find(function(s){return s.id===otherId;})||archivedSessions.find(function(s){return s.id===otherId;});
    return other?{session:other,type:l.type,linkId:l.id}:null;
  }).filter(Boolean);
}

   3. COURT FEES CALCULATOR
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
var COURT_FEES={
  civil:     {name:'Щ…ШҜЩҶЩҠШ©',    base:500, pct:0.025, min:500,  max:20000},
  commercial:{name:'ШӘШ¬Ш§ШұЩҠШ©',   base:600, pct:0.03,  min:600,  max:30000},
  criminal:  {name:'Ш¬ЩҶШ§ШҰЩҠШ©',   base:400, pct:0,     min:400,  max:400},
  personal:  {name:'ШЈШӯЩҲШ§Щ„ ШҙШ®ШөЩҠШ©',base:300,pct:0,   min:300,  max:300},
  labor:     {name:'Ш№Щ…Ш§Щ„ЩҠШ©',   base:250, pct:0,     min:250,  max:250},
  admin:     {name:'ШҘШҜШ§ШұЩҠШ©',   base:350, pct:0,     min:350,  max:350},
  appeal:    {name:'Ш§ШіШӘШҰЩҶШ§ЩҒ',  base:800, pct:0.015, min:800,  max:15000},
  cassation: {name:'ЩҶЩӮШ¶',      base:1000,pct:0.02,  min:1000, max:20000}
};

function calcCourtFees(type,amount){
  var f=COURT_FEES[type];if(!f)return 0;
  var fee=f.base+(f.pct*( amount||0));
  return Math.min(Math.max(fee,f.min),f.max);
}

function saveArchive(){try{localStorage.setItem('j_archive',JSON.stringify(archivedSessions));}catch(e){}}

function archiveSession(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  if(!confirm('ШЈШұШҙЩҒШ© Ш§Щ„Ш¬Щ„ШіШ© '+s.num+'Шҹ ЩҠЩ…ЩғЩҶ Ш§ШіШӘШ№Ш§ШҜШӘЩҮШ§ Щ„Ш§ШӯЩӮШ§ЩӢ.'))return;
  s.archivedAt=new Date().toISOString();
  archivedSessions.unshift(s);
  data=data.filter(function(x){return x.id!==id;});
  dbDel(id).then(function(){saveArchive();closeDet();toast('рҹ—„пёҸ ШӘЩ… Ш§Щ„ШЈШұШҙЩҒШ©');render();});
}

function restoreSession(id){
  var s=archivedSessions.find(function(x){return x.id===id;});if(!s)return;
  delete s.archivedAt;
  data.push(s);
  archivedSessions=archivedSessions.filter(function(x){return x.id!==id;});
  dbPut(s).then(function(){saveArchive();toast('вң… ШӘЩ…ШӘ Ш§Щ„Ш§ШіШӘШ№Ш§ШҜШ©');render();});
}

function delArchived(id){
  if(!confirm('ШӯШ°ЩҒ ЩҶЩҮШ§ШҰЩҠШҹ'))return;
  archivedSessions=archivedSessions.filter(function(x){return x.id!==id;});
  saveArchive();toast('рҹ—‘пёҸ ШӘЩ… Ш§Щ„ШӯШ°ЩҒ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ');render();
}

    h+='<span style="background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:14px;padding:3px 10px;font-size:11px;font-weight:600">'+e[0]+' ('+e[1]+')</span>';
  });
  h+='</div></div>';
  archivedSessions.forEach(function(s){
    var d=s.archivedAt?new Date(s.archivedAt).toLocaleDateString('ar-SA'):'';
    h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:13px;margin-bottom:8px;opacity:.9">';

    h+='<button onclick="restoreSession('+s.id+')" style="flex:1;background:var(--green-a);color:#34d399;border:1px solid rgba(58,184,130,.3);border-radius:9px;padding:8px;font-weight:700;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">вҶ©пёҸ Ш§ШіШӘШ№Ш§ШҜШ©</button>';

function applyHiddenTabs(){
  var allTabs=['home','list','tasks','contacts','files','ai','cal','stats','fees','tools','live','archive','settings'];
  allTabs.forEach(function(t){
    var el=document.getElementById('tb-'+t);if(!el)return;

    el.style.display=(hiddenTabs.indexOf(t)>-1&&forceShow.indexOf(t)===-1)?'none':'';
  });
}

}

      '<div style="font-size:32px;margin-bottom:12px">'+(step===0?'рҹ”‘':'вң…')+'</div>'+
      '<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">'+(step===0?(isChange?'ШұЩ…ШІ PIN Ш§Щ„Ш¬ШҜЩҠШҜ':'ШӯШҜШҜ ШұЩ…ШІ PIN'):'ШӘШЈЩғЩҠШҜ ШұЩ…ШІ PIN')+'</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:20px">ШЈШҜШ®Щ„ 4 ШЈШұЩӮШ§Щ…</div>'+
      '<div id="spDots" style="display:flex;gap:12px;justify-content:center;margin-bottom:16px">'+
        [1,2,3,4].map(function(){return'<div style="width:14px;height:14px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2)"></div>';}).join('')+
      '</div>'+
      '<div id="spErr" style="font-size:11px;color:#f87171;min-height:16px;margin-bottom:12px"></div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,62px);gap:8px;justify-content:center">'+
        [1,2,3,4,5,6,7,8,9,'','0','DEL'].map(function(n){
          if(n==='')return'<div></div>';
          return'<button onclick="spKey(\''+n+'\')" style="width:62px;height:62px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);font-size:18px;font-weight:700;color:var(--text);cursor:pointer;font-family:Tajawal,sans-serif">'+n+'</button>';
        }).join('')+
      '</div>'+
      '<button onclick="this.closest(\'div[style*=fixed]\').remove();if(!pinEnabled)render();" style="margin-top:16px;background:none;color:var(--text3);border:none;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">ШҘЩ„ШәШ§ШЎ</button>';
  }
  var entry='';
  window.spKey=function(k){
    var err=box.querySelector('#spErr');
    if(k==='DEL'){entry=entry.slice(0,-1);}
    else if(entry.length<4)entry+=k;
    var dots=box.querySelectorAll('#spDots div');
    dots.forEach(function(d,i){d.style.background=i<entry.length?'var(--gold)':'var(--surface3)';d.style.borderColor=i<entry.length?'var(--gold-a30)':'var(--border2)';});
    if(entry.length===4){
      setTimeout(function(){
        if(step===0){pin1=entry;entry='';step=1;renderStep();}
        else{
          if(entry===pin1){
            pinEnabled=true;pinCode=entry;savePinState();
            modal.remove();toast('вң… ШӘЩ… ШӘЩҒШ№ЩҠЩ„ ЩӮЩҒЩ„ PIN');render();
          } else {
            if(err)err.textContent='Ш§Щ„ШұЩ…ШІШ§ЩҶ ШәЩҠШұ Щ…ШӘШ·Ш§ШЁЩӮШ§ЩҶ';entry='';step=0;pin1='';
            setTimeout(renderStep,600);
          }
        }
      },200);
    }
  };
  renderStep();
  modal.appendChild(box);document.body.appendChild(modal);
}

function toggleTabVis(tab,visible){
  if(visible){hiddenTabs=hiddenTabs.filter(function(t){return t!==tab;});}
  else{if(hiddenTabs.indexOf(tab)===-1)hiddenTabs.push(tab);}
  saveHiddenTabs();applyHiddenTabs();
  toast(visible?'вң… ШӘЩ… ШҘШёЩҮШ§Шұ Ш§Щ„ШӘШЁЩҲЩҠШЁ':'рҹ‘Ғ ШӘЩ… ШҘШ®ЩҒШ§ШЎ Ш§Щ„ШӘШЁЩҲЩҠШЁ');
}

/* в”Җв”Җ Export Word в”Җв”Җ */
function wdExportWord(){
  var ed=document.getElementById('wdEditor');
  if(ed)wdBodyText=ed.innerHTML;
  var plain=wdBodyText
    .replace(/<br\s*\/?>/gi,'\n')
    .replace(/<\/p>/gi,'\n').replace(/<\/div>/gi,'\n')
    .replace(/<\/h[1-6]>/gi,'\n')
    .replace(/<\/li>/gi,'\n')
    .replace(/<[^>]+>/g,'')
    .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"')
    .trim();
  if(!plain){toast('вҡ пёҸ Ш§Щ„Щ…ШіШӘЩҶШҜ ЩҒШ§ШұШә');return;}
  toast('вҸі Ш¬Ш§ШұЩҚ ШҘЩҶШҙШ§ШЎ Word...');
  function go(){
    try{
      var D=docx;
      var ps=WD_PAGE[wdPageSize].dxa;
      var align=D.AlignmentType.RIGHT;
      var fontMap={'Tajawal':'Arial','Scheherazade New':'Traditional Arabic','Georgia':'Times New Roman'};
      var font=fontMap[wdFontFamily]||wdFontFamily;
      var sz=Math.round(wdFontSize*2);
      var lh=Math.round(wdLineHeight*240);

      var lines=plain.split('\n');
      var paras=lines.map(function(l){
        return new D.Paragraph({
          alignment:align,bidirectional:true,
          spacing:{line:lh,lineRule:'auto',before:0,after:60},
          children:[new D.TextRun({text:l||'',font:{name:font},size:sz,rtl:true})]
        });
      });

      var doc=new D.Document({
        sections:[{
          properties:{page:{
            size:{width:ps.w,height:ps.h},
            margin:{top:2835,right:2835,bottom:2835,left:2835}
          }},
          children:paras
        }]
      });

      D.Packer.toBlob(doc).then(function(blob){
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url;a.download=(wdDocTitle||'Щ…ШіШӘЩҶШҜ')+'_'+today()+'.docx';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('вң… ШӘЩ… ШӘШөШҜЩҠШұ Word');
      }).catch(function(e){toast('вҡ пёҸ '+e.message);});
    }catch(e){toast('вҡ пёҸ '+e.message);}
  }
  if(typeof docx!=='undefined'){go();return;}
  var s=document.createElement('script');
  s.src='https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js';
  s.onload=go;s.onerror=function(){toast('вҡ пёҸ ЩҒШҙЩ„ ШӘШӯЩ…ЩҠЩ„ Щ…ЩғШӘШЁШ© Word');};
  document.head.appendChild(s);
}

/* в”Җв”Җ Import в”Җв”Җ */
function wdImport(input){
  var file=input.files[0];if(!file)return;
  input.value='';
  var name=file.name.toLowerCase();
  if(name.endsWith('.txt')){
    var r=new FileReader();
    r.onload=function(e){
      var txt=e.target.result;
      var html=txt.split('\n').map(function(l){return'<div>'+(l||'<br>')+'</div>';}).join('');
      wdSetContent(html,file.name);
    };
    r.readAsText(file,'UTF-8');
    return;
  }
  if(name.endsWith('.html')||name.endsWith('.htm')){
    var r2=new FileReader();
    r2.onload=function(e){wdSetContent(e.target.result,file.name);};
    r2.readAsText(file,'UTF-8');
    return;
  }
  // docx
  toast('вҸі Ш¬Ш§ШұЩҚ Ш§Щ„ЩӮШұШ§ШЎШ©...');
  function doDocx(buf){
    if(typeof mammoth!=='undefined'){doMam(buf);return;}
    var s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
    s.onload=function(){doMam(buf);};
    s.onerror=function(){doRaw(buf);};
    document.head.appendChild(s);
  }
  function doMam(buf){
    mammoth.convertToHtml({arrayBuffer:buf})
      .then(function(r){wdSetContent(r.value,file.name);})
      .catch(function(){doRaw(buf);});
  }
  function doRaw(buf){
    var bytes=new Uint8Array(buf);
    var str='';for(var i=0;i<Math.min(bytes.length,2000000);i++)str+=String.fromCharCode(bytes[i]);
    var paras=str.split(/<\/w:p>/);
    var result=paras.map(function(p){
      var t=[];var re=/<w:t[^>]*>([^<]*)<\/w:t>/g;var m;
      while((m=re.exec(p))!==null)t.push(m[1]);
      return t.join('');
    }).filter(Boolean).join('\n');
    if(result.trim()){
      wdSetContent(result.split('\n').map(function(l){return'<div>'+(l||'<br>')+'</div>';}).join(''),file.name);
    } else toast('вҡ пёҸ Щ„Щ… ЩҠЩҸШ№Ш«Шұ Ш№Щ„Щү ЩҶШө');
  }
  var r3=new FileReader();
  r3.onload=function(e){doDocx(e.target.result);};
  r3.onerror=function(){toast('вҡ пёҸ ЩҒШҙЩ„ Ш§Щ„ЩӮШұШ§ШЎШ©');};
  r3.readAsArrayBuffer(file);
}

function wdSetContent(html,name){
  var ed=document.getElementById('wdEditor');
  if(ed&&ed.innerHTML.trim()&&!confirm('Ш§ШіШӘШЁШҜШ§Щ„ Ш§Щ„Щ…ШӯШӘЩҲЩү Ш§Щ„ШӯШ§Щ„ЩҠ ШЁЩҖ "'+name+'"Шҹ'))return;
  wdBodyText=html;wdSave();
  if(ed)ed.innerHTML=html;
  toast('вң… ШӘЩ… Ш§ШіШӘЩҠШұШ§ШҜ: '+name.substring(0,30));
}

function wdClear(){
  if(!wdBodyText.trim()&&!(document.getElementById('wdEditor')||{}).innerHTML)return;
  if(!confirm('Щ…ШіШӯ ЩғЩ„ Ш§Щ„Щ…ШӯШӘЩҲЩүШҹ'))return;
  wdBodyText='';wdSave();
  var ed=document.getElementById('wdEditor');if(ed)ed.innerHTML='';
}

function wdCopy(){
  var ed=document.getElementById('wdEditor');
  var txt=ed?ed.innerText:wdBodyText.replace(/<[^>]+>/g,' ').trim();
  if(!txt){toast('вҡ пёҸ Ш§Щ„Щ…ШіШӘЩҶШҜ ЩҒШ§ШұШә');return;}
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast('рҹ“Ӣ ШӘЩ… Ш§Щ„ЩҶШіШ®');});
  else toast('вҡ пёҸ ШәЩҠШұ Щ…ШҜШ№ЩҲЩ…');
}

function importLegalDoc(input){
  var file=input.files[0];if(!file)return;
  input.value='';
  var name=file.name.replace(/\.(pdf|docx?|txt)$/i,'').trim();
  toast('вҸі Ш¬Ш§ШұЩҚ Ш§ШіШӘЩҠШұШ§ШҜ: '+name+'...');

  function addDoc(text){
    // Split into paragraphs (non-empty lines)
    var paras=text.split(/\n+/).map(function(l){return l.trim();}).filter(function(l){return l.length>10;});
    if(!paras.length){toast('вҡ пёҸ Щ„Щ… ЩҠЩҸШ№Ш«Шұ Ш№Щ„Щү ЩҶШө ЩӮШ§ШЁЩ„ Щ„Щ„ЩӮШұШ§ШЎШ©');return;}
    // Check duplicate title
    var title=name;
    var existing=legalUserDocs.findIndex(function(d){return d.title===title;});
    if(existing>-1){
      if(!confirm('ЩҠЩҲШ¬ШҜ Щ…ШіШӘЩҶШҜ ШЁЩҶЩҒШі Ш§Щ„Ш§ШіЩ…. Ш§ШіШӘШЁШҜШ§Щ„ЩҮШҹ'))return;
      legalUserDocs[existing]={title:title,paragraphs:paras,date:today()};
    } else {
      legalUserDocs.push({title:title,paragraphs:paras,date:today()});
    }
    saveLegalDocs();
    legalCat=title;
    toast('вң… ШӘЩ… Ш§ШіШӘЩҠШұШ§ШҜ '+paras.length+' ЩҒЩӮШұШ© Щ…ЩҶ: '+title);
    render();
  }

  var fname=file.name.toLowerCase();

  if(fname.endsWith('.txt')){
    var r=new FileReader();
    r.onload=function(e){addDoc(e.target.result);};
    r.readAsText(file,'UTF-8');
    return;
  }

  // DOCX or PDF вҖ” need libraries
  var reader=new FileReader();
  reader.onload=function(e){
    var buf=e.target.result;
    if(fname.endsWith('.pdf')){
      loadPDFJS(function(){extractPDFText(buf,addDoc);});
    } else {
      // DOCX via mammoth
      if(typeof mammoth!=='undefined'){doMammothExtract(buf,addDoc);return;}
      var s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js';
      s.onload=function(){doMammothExtract(buf,addDoc);};
      s.onerror=function(){doRawDocxExtract(buf,addDoc);};
      document.head.appendChild(s);
    }
  };
  reader.onerror=function(){toast('вҡ пёҸ ЩҒШҙЩ„ ЩӮШұШ§ШЎШ© Ш§Щ„Щ…Щ„ЩҒ');};
  reader.readAsArrayBuffer(file);
}

function doMammothExtract(buf,cb){
  mammoth.extractRawText({arrayBuffer:buf})
    .then(function(r){cb(r.value||'');})
    .catch(function(){doRawDocxExtract(buf,cb);});
}

function doRawDocxExtract(buf,cb){
  try{
    var bytes=new Uint8Array(buf);var str='';
    for(var i=0;i<bytes.length;i++)str+=String.fromCharCode(bytes[i]);
    var paras=str.split(/<\/w:p>/);
    var text=paras.map(function(p){
      var t=[];var re=/<w:t[^>]*>([^<]*)<\/w:t>/g;var m;
      while((m=re.exec(p))!==null)t.push(m[1]);
      return t.join('');
    }).filter(Boolean).join('\n');
    cb(text);
  }catch(e){toast('вҡ пёҸ ЩҒШҙЩ„ Ш§ШіШӘШ®ШұШ§Ш¬ Ш§Щ„ЩҶШө: '+e.message);}
}

function loadPDFJS(cb){
  if(typeof pdfjsLib!=='undefined'){cb();return;}
  var s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  s.onload=function(){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    cb();
  };
  s.onerror=function(){toast('вҡ пёҸ ЩҒШҙЩ„ ШӘШӯЩ…ЩҠЩ„ Щ…ЩғШӘШЁШ© PDF');};
  document.head.appendChild(s);
}

function extractPDFText(buf,cb){
  pdfjsLib.getDocument({data:buf}).promise.then(function(pdf){
    var pages=[];
    var total=pdf.numPages;
    var done=0;
    for(var i=1;i<=total;i++){
      (function(pageNum){
        pdf.getPage(pageNum).then(function(page){
          page.getTextContent().then(function(content){
            var text=content.items.map(function(item){return item.str;}).join(' ');
            pages[pageNum-1]=text;
            done++;
            if(done===total){cb(pages.join('\n'));}
          });
        });
      })(i);
    }
  }).catch(function(e){toast('вҡ пёҸ Ш®Ш·ШЈ ЩҒЩҠ ЩӮШұШ§ШЎШ© PDF: '+e.message);});
}

var reportPeriod='month';

function rReports(){
  var now=new Date(),td=today();
  var mo=now.getMonth(),yr=now.getFullYear();
  // Filter by period
  function inPeriod(s){
    if(reportPeriod==='week'){var d=new Date(s.date+'T00:00');var diff=(new Date(td)-d)/86400000;return diff>=0&&diff<7;}
    if(reportPeriod==='month')return s.date.startsWith(yr+'-'+pad(mo+1));
    if(reportPeriod==='year')return s.date.startsWith(String(yr));
    return true;
  }
  var filtered=data.filter(inPeriod);
  var allFees=fees.filter(function(f){return true;});
  var totalFees=allFees.reduce(function(s,f){return s+(f.amount||0);},0);
  var paidFees=allFees.filter(function(f){return f.paid;}).reduce(function(s,f){return s+(f.amount||0);},0);

  // Win rate (completed vs total)
  var completed=data.filter(function(s){return s.status==='completed';}).length;
  var winRate=data.length?Math.round((completed/data.length)*100):0;

  // By court
  var byCourt={};filtered.forEach(function(s){var c=s.court||'ШәЩҠШұ Щ…ШӯШҜШҜ';byCourt[c]=(byCourt[c]||0)+1;});

function showSessionComments(sid){
  var area=document.getElementById('commentsArea');if(!area)return;

  var id=parseInt(sid);
  var comments=sessionComments[id]||[];
  var h='<div style="margin-bottom:8px">';
  if(!comments.length){
    h+='<div style="font-size:11px;color:var(--text3);margin-bottom:8px">Щ„Ш§ ШӘЩҲШ¬ШҜ ШӘШ№Щ„ЩҠЩӮШ§ШӘ ШЁШ№ШҜ</div>';
  } else {
    comments.forEach(function(c,i){
      h+='<div style="background:var(--surface3);border-radius:10px;padding:9px 12px;margin-bottom:6px;direction:rtl">';
      h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
      h+='<div style="font-size:10px;font-weight:700;color:var(--gold2)">'+( c.author||lawyerProfile.name||'ШЈЩҶШӘ')+'</div>';
      h+='<div style="display:flex;gap:6px;align-items:center"><div style="font-size:9px;color:var(--text3)">'+c.date+'</div><button onclick="delComment('+id+','+i+')" style="background:none;color:#f87171;font-size:12px;cursor:pointer;border:none">вң•</button></div>';
      h+='</div>';
      h+='<div style="font-size:12px;color:var(--text);line-height:1.5">'+c.text+'</div>';
      h+='</div>';
    });

function addComment(sid){
  var inp=document.getElementById('newComment');if(!inp||!inp.value.trim()){toast('вҡ пёҸ Ш§ЩғШӘШЁ ШӘШ№Щ„ЩҠЩӮШ§ЩӢ');return;}
  if(!sessionComments[sid])sessionComments[sid]=[];
  sessionComments[sid].push({text:inp.value.trim(),author:lawyerProfile.name||'ШЈЩҶШӘ',date:today()});
  saveComments();inp.value='';showSessionComments(sid);toast('вң… ШӘЩ… ШҘШ¶Ш§ЩҒШ© Ш§Щ„ШӘШ№Щ„ЩҠЩӮ');
}

function delComment(sid,idx){
  if(!sessionComments[sid])return;
  sessionComments[sid].splice(idx,1);
  saveComments();showSessionComments(sid);
}

function sendWATemplate(template){
  var sel=document.getElementById('shareSessionSel');
  var s=sel&&sel.value?data.find(function(x){return x.id===parseInt(sel.value);}):null;
  var msg=template;
  if(s){
    msg=msg.replace(/{num}/g,s.num).replace(/{date}/g,s.date).replace(/{time}/g,s.time).replace(/{court}/g,s.court||'вҖ”');
  }
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

/* в”Җв”Җ Morning briefing notification в”Җв”Җ */
function schedMorningBriefing(){
  if(!notifOn||Notification.permission!=='granted')return;
  var now=new Date(),nxt=new Date(now);
  nxt.setHours(7,30,0,0);
  if(nxt<=now)nxt.setDate(nxt.getDate()+1);
  setTimeout(function(){
    var td3=today();
    var todaySess=data.filter(function(s){return s.date===td3;});
    var reminders=data.filter(function(s){
      if(s.status!=='scheduled')return false;
      var tgt=new Date(s.date+'T00:00:00');
      var diff=Math.ceil((tgt-new Date())/86400000);
      return diff>0&&diff<=3;
    });
    if(todaySess.length>0){
      new Notification('рҹҢ… ШӘЩӮШұЩҠШұ ШөШЁШ§ШӯЩҠ',{body:'Щ„ШҜЩҠЩғ '+todaySess.length+' Ш¬Щ„ШіШ© Ш§Щ„ЩҠЩҲЩ…'+(reminders.length?' ЩҲ'+reminders.length+' ЩӮШ§ШҜЩ…Ш© Ш®Щ„Ш§Щ„ 3 ШЈЩҠШ§Щ…':''),requireInteraction:false});
    }
    schedMorningBriefing();
  },nxt-now);
}

// Start morning briefing when notifications enabled
var _origToggleNotif=toggleNotif;
toggleNotif=function(){
  _origToggleNotif();
  if(notifOn)schedMorningBriefing();
};

// в”Җв”Җ Helper: generate PWA icon as PNG data URL в”Җв”Җ
function makePWAIcon(size,color){
  try{
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    // Background
    ctx.fillStyle='#08090d';
    var r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    // Scales of justice emoji approximation
    ctx.fillStyle=color||'#d4a843';
    ctx.font='bold '+(size*0.55)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('вҡ–',size/2,size/2);
    return c.toDataURL('image/png');
  }catch(e){return'data:image/png;base64,iVBORw0KGgo=';}
}
