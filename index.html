<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الجلسات">
<meta name="theme-color" content="#0a0e17">
<title>الجلسات القضائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0e17;--ink2:#111827;--ink3:#1a2233;--card:#1c2540;--card2:#222d48;
  --rim:rgba(255,255,255,0.07);--rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c;--gold2:#e8c870;--gold-dim:rgba(201,168,76,0.15);--gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff;--text2:#94a3c0;--text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
  --s-blue:#3b82f6;--s-blue-bg:rgba(59,130,246,0.12);--s-blue-rim:rgba(59,130,246,0.3);
  --s-amber:#f59e0b;--s-amber-bg:rgba(245,158,11,0.12);--s-amber-rim:rgba(245,158,11,0.3);
  --s-green:#10b981;--s-green-bg:rgba(16,185,129,0.12);--s-green-rim:rgba(16,185,129,0.3);
  --s-red:#ef4444;--s-red-bg:rgba(239,68,68,0.12);--s-red-rim:rgba(239,68,68,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--ink);overflow:hidden;font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--text);direction:rtl;}
::-webkit-scrollbar{display:none;}
button,input,select,textarea{font-family:'IBM Plex Sans Arabic',sans-serif;border:none;outline:none;}
input[type=date],input[type=time]{-webkit-appearance:none;color:var(--text);color-scheme:dark;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--ink);}
#hdr{flex-shrink:0;padding-top:var(--safe-top);background:var(--ink);position:relative;z-index:40;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 14px;}
.hdr-left{display:flex;flex-direction:column;}
.hdr-eyebrow{font-size:11px;color:var(--text3);letter-spacing:0.08em;margin-bottom:3px;}
.hdr-title{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--gold2);line-height:1.2;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.btn-new{display:flex;align-items:center;gap:6px;background:var(--gold);color:var(--ink);border-radius:14px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,0.35);transition:transform .1s;}
.btn-new:active{transform:scale(0.96);}
.btn-icon{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--rim2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-icon.on{background:var(--gold-dim);border-color:var(--gold-rim);color:var(--gold2);}
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-rim),transparent);margin:0 20px;}
.tab-strip{display:flex;padding:10px 10px 0;gap:4px;background:var(--ink);}
.tab-pill{flex:1;padding:9px 4px;border-radius:12px;background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .15s,color .15s;border:1px solid transparent;}
.tab-pill.active{background:var(--gold-dim);color:var(--gold2);border-color:var(--gold-rim);}
.tab-pip{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;}
.tab-pill.active .tab-pip{opacity:1;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(20px + var(--safe-bottom));}
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--gold-rim);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--gold2);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-c{background:var(--card);border:1px solid var(--rim);border-radius:18px;padding:16px 14px;position:relative;overflow:hidden;}
.stat-c::before{content:'';position:absolute;top:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent-clr,var(--gold));opacity:0.06;filter:blur(20px);}
.stat-emoji{font-size:22px;margin-bottom:8px;}
.stat-num{font-size:32px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500;}
.p-high{border-right:4px solid #ef4444!important;}
.p-med{border-right:4px solid #f59e0b!important;}
.p-low{border-right:4px solid #10b981!important;}
.p-none{border-right:4px solid #3b82f6!important;}
.priority-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
.priority-tag.high{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.priority-tag.med{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
.priority-tag.low{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.priority-tag.none{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);}
.s-card{background:var(--card);border:1px solid var(--rim);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s,border-color .15s;}
.s-card:active{transform:scale(0.985);border-color:var(--gold-rim);}
.s-card-accent{position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 18px 18px 0;}
.s-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.s-num{font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.s-type{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.s-time{font-size:22px;font-weight:700;color:var(--text);text-align:left;font-variant-numeric:tabular-nums;}
.s-date{font-size:11px;color:var(--text3);text-align:left;margin-top:2px;}
.s-parties{font-size:12px;color:var(--text2);background:var(--ink3);border-radius:10px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.s-sep{color:var(--text3);flex-shrink:0;}
.s-footer{display:flex;justify-content:space-between;align-items:center;}
.s-court{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
.attach-count{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;margin-top:6px;}
.countdown-box{margin-top:10px;background:var(--ink3);border:1px solid var(--rim2);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.countdown-box.urgent{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.08);}
.countdown-box.soon{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.08);}
.countdown-box.ok{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.06);}
.cd-label{font-size:11px;color:var(--text3);font-weight:500;}
.cd-timer{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.04em;}
.cd-timer.urgent{color:#f87171;}.cd-timer.soon{color:#fbbf24;}.cd-timer.ok{color:#34d399;}
.cd-icon{font-size:16px;margin-left:6px;}
.det-cd{background:var(--ink3);border:1px solid var(--rim2);border-radius:16px;padding:16px;margin:14px 0;text-align:center;}
.det-cd-lbl{font-size:12px;color:var(--text3);margin-bottom:8px;}
.det-cd-time{font-size:36px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.06em;}
.det-cd-sub{font-size:11px;color:var(--text3);margin-top:4px;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.03em;border:1px solid;}
.sec-hdr{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px;margin-top:4px;}
.sec-hdr::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--rim2),transparent);}
.s-input-wrap{position:relative;margin-bottom:8px;}
.s-input{width:100%;background:var(--card);border:1px solid var(--rim2);border-radius:14px;padding:13px 42px 13px 60px;font-size:14px;color:var(--text);display:block;transition:border-color .15s;}
.s-input:focus{border-color:var(--gold-rim);}
.s-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.btn-adv{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--gold2);font-weight:700;cursor:pointer;background:none;}
.adv-search{background:var(--card);border:1px solid var(--rim2);border-radius:18px;padding:14px;margin-bottom:12px;}
.adv-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.adv-field input,.adv-field select{width:100%;background:var(--ink3);border:1px solid var(--rim2);border-radius:10px;padding:9px 12px;font-size:12px;color:var(--text);}
.adv-field label{font-size:10px;color:var(--text3);font-weight:600;display:block;margin-bottom:4px;}
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;margin-bottom:4px;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid;transition:all .15s;}
.cal-wrap{background:var(--card);border:1px solid var(--rim);border-radius:20px;padding:18px 14px;margin-bottom:14px;}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-month{font-family:'Amiri',serif;font-size:20px;font-weight:700;color:var(--gold2);}
.cal-nav{width:36px;height:36px;border-radius:10px;background:var(--ink3);border:1px solid var(--rim2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px;}
.cal-dn{text-align:center;font-size:10px;color:var(--text3);font-weight:600;padding:2px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{text-align:center;border-radius:10px;padding:7px 1px;cursor:pointer;border:2px solid transparent;min-height:44px;transition:all .15s;display:flex;flex-direction:column;align-items:center;}
.cal-num{font-size:14px;font-weight:600;}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:3px;}
.report-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;}
.rep-c{background:var(--card);border:1px solid var(--rim);border-radius:14px;padding:12px 10px;text-align:center;}
.rep-num{font-size:24px;font-weight:700;}
.rep-lbl{font-size:10px;color:var(--text3);margin-top:4px;}
.chart-bar-wrap{background:var(--card);border:1px solid var(--rim);border-radius:18px;padding:16px;margin-bottom:16px;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-lbl{font-size:11px;color:var(--text3);width:70px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--ink3);border-radius:6px;height:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .5s ease;}
.bar-val{font-size:11px;font-weight:700;width:24px;text-align:left;flex-shrink:0;}
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
.overlay.hidden{display:none;}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.sheet{position:relative;background:var(--card);border-radius:24px 24px 0 0;border-top:1px solid var(--rim2);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(20px,var(--safe-bottom));}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--rim2);margin:14px auto 16px;}
.sheet-hdr{position:sticky;top:0;background:var(--card);padding:0 20px 14px;border-bottom:1px solid var(--rim);z-index:1;}
.sheet-hdr-inner{display:flex;justify-content:space-between;align-items:center;}
.sheet-title{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--gold2);}
.sheet-close{width:32px;height:32px;border-radius:10px;background:var(--ink3);color:var(--text3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sheet-body{padding:16px 20px;}
.d-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--rim);gap:12px;}
.d-row:last-of-type{border-bottom:none;}
.d-key{font-size:12px;color:var(--text3);font-weight:500;flex-shrink:0;}
.d-val{font-size:13px;color:var(--text);font-weight:600;text-align:left;flex:1;}
.attach-section{background:var(--ink3);border:1px solid var(--rim2);border-radius:14px;padding:12px;margin:12px 0;}
.attach-title{font-size:12px;color:var(--text3);font-weight:600;margin-bottom:10px;}
.attach-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:10px;margin-bottom:6px;}
.attach-name{font-size:12px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.attach-del{font-size:14px;cursor:pointer;padding:4px;color:#f87171;}
.attach-add{display:flex;align-items:center;gap:8px;padding:10px;background:var(--gold-dim);border:1px dashed var(--gold-rim);border-radius:10px;cursor:pointer;font-size:12px;color:var(--gold2);font-weight:600;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--text3);font-weight:600;margin-bottom:7px;letter-spacing:0.03em;}
.field input,.field select,.field textarea{width:100%;background:var(--ink3);border:1.5px solid var(--rim2);border-radius:14px;padding:13px 14px;font-size:14px;color:var(--text);display:block;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-rim);}
.field textarea{resize:none;}
option{background:var(--ink2);}
.priority-select{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.p-btn{padding:10px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;text-align:center;transition:all .15s;}
.p-btn.selected{border-color:currentColor;}
.btn-gold{width:100%;background:var(--gold);color:var(--ink);border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;margin-bottom:10px;box-shadow:0 4px 20px rgba(201,168,76,0.3);transition:transform .1s;}
.btn-gold:active{transform:scale(0.98);}
.btn-gold:disabled{background:var(--rim2);color:var(--text3);box-shadow:none;}
.btn-ghost{width:100%;background:var(--ink3);color:var(--text2);border:1px solid var(--rim2);border-radius:16px;padding:14px;font-weight:600;font-size:14px;cursor:pointer;}
.row-btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;}
.btn-sm{flex:1;min-width:70px;border-radius:14px;padding:12px 6px;font-weight:700;font-size:12px;cursor:pointer;text-align:center;}
.btn-edit-sm{background:var(--gold-dim);color:var(--gold2);border:1px solid var(--gold-rim);}
.btn-del-sm{background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.25);}
.btn-copy-sm{background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.25);}
.btn-print-sm{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.btn-pdf{width:100%;background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.3);border-radius:14px;padding:14px;font-weight:700;font-size:14px;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}
.dialog-overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:24px;}
.dialog-overlay.hidden{display:none;}
.dlg-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7);}
.dlg-box{position:relative;background:var(--card2);border:1px solid var(--rim2);border-radius:22px;padding:28px 22px;width:100%;max-width:300px;text-align:center;}
.dlg-icon{font-size:44px;margin-bottom:12px;}
.dlg-title{font-family:'Amiri',serif;font-size:20px;color:var(--text);margin-bottom:6px;}
.dlg-sub{font-size:13px;color:var(--text3);margin-bottom:22px;}
.dlg-btns{display:flex;gap:10px;}
.dlg-del{flex:1;background:#ef4444;color:#fff;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;}
.dlg-cancel{flex:1;background:var(--ink3);color:var(--text2);border:1px solid var(--rim2);border-radius:12px;padding:13px;font-weight:600;font-size:14px;cursor:pointer;}
.empty{text-align:center;padding:52px 0;}
.empty-icon{font-size:52px;margin-bottom:12px;opacity:0.5;}
.empty-title{font-size:16px;font-weight:600;color:var(--text2);}
.empty-sub{font-size:13px;color:var(--text3);margin-top:6px;}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.animate-in{animation:fadeSlideUp .25s ease both;}
.stagger>*{animation:fadeSlideUp .3s ease both;}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.06s}.stagger>*:nth-child(3){animation-delay:.10s}.stagger>*:nth-child(4){animation-delay:.14s}.stagger>*:nth-child(5){animation-delay:.18s}.stagger>*:nth-child(6){animation-delay:.22s}
.hidden{display:none!important;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pulse{animation:pulse 1s ease-in-out infinite;}
@media print{body{background:#fff!important;color:#000!important;direction:rtl;}#app,#hdr{display:none!important;}#print-area{display:block!important;}}
#print-area{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-inner">
      <div class="hdr-left">
        <div class="hdr-eyebrow">⚖️ منظومة المحاكم</div>
        <div class="hdr-title">الجلسات القضائية</div>
        <div class="hdr-sub" id="hdr-date"></div>
      </div>
      <div class="hdr-actions">
        <button class="btn-icon" id="btn-notif" onclick="toggleNotif()">🔔</button>
        <button class="btn-new" onclick="openAdd()"><span style="font-size:16px;line-height:1">+</span> جديدة</button>
      </div>
    </div>
    <div class="gold-divider"></div>
    <div class="tab-strip">
      <button class="tab-pill active" id="tab-home" onclick="switchTab('home')"><div class="tab-pip"></div>الرئيسية</button>
      <button class="tab-pill" id="tab-list" onclick="switchTab('list')"><div class="tab-pip"></div>الجلسات</button>
      <button class="tab-pill" id="tab-cal" onclick="switchTab('cal')"><div class="tab-pip"></div>التقويم</button>
      <button class="tab-pill" id="tab-stats" onclick="switchTab('stats')"><div class="tab-pip"></div>التقارير</button>
    </div>
    <div style="height:10px;background:var(--ink)"></div>
  </div>
  <div id="content"></div>
</div>
<div id="print-area"></div>
<div class="toast" id="toast"></div>

<!-- DETAIL -->
<div class="overlay hidden" id="det-sheet">
  <div class="ov-bg" onclick="closeDet()"></div>
  <div class="sheet animate-in">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-hdr-inner"><div class="sheet-title" id="det-num"></div><span id="det-badge"></span></div></div>
    <div class="sheet-body" id="det-body"></div>
  </div>
</div>

<!-- FORM -->
<div class="overlay hidden" id="form-sheet">
  <div class="ov-bg" onclick="closeForm()"></div>
  <div class="sheet animate-in">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-hdr-inner"><div class="sheet-title" id="form-title">جلسة جديدة</div><button class="sheet-close" onclick="closeForm()">✕</button></div></div>
    <div class="sheet-body">

<script>
/* ══ IndexedDB ══ */
const DB_NAME='JalsatDB', DB_VER=5, STORE='sessions';
let db=null;
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej();
  });
}
function dbGetAll(){return new Promise(res=>{if(!db){res([]);return;}const tx=db.transaction(STORE,'readonly');const req=tx.objectStore(STORE).getAll();req.onsuccess=()=>res(req.result||[]);req.onerror=()=>res([]);});}
function dbPut(s){return new Promise(res=>{if(!db){res();return;}const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(s);tx.oncomplete=res;tx.onerror=res;});}
function dbDelete(id){return new Promise(res=>{if(!db){res();return;}const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=res;});}

/* ══ CONSTANTS ══ */
const MONTHS=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
const DAYS=["أحد","اثن","ثلا","أرب","خمس","جمع","سبت"];
const ST={
  scheduled:{lbl:"مجدولة",clr:"var(--s-blue)",bg:"var(--s-blue-bg)",rim:"var(--s-blue-rim)"},
  inProgress:{lbl:"جارية",clr:"var(--s-amber)",bg:"var(--s-amber-bg)",rim:"var(--s-amber-rim)"},
  completed:{lbl:"منتهية",clr:"var(--s-green)",bg:"var(--s-green-bg)",rim:"var(--s-green-rim)"},
  postponed:{lbl:"مؤجلة",clr:"var(--s-red)",bg:"var(--s-red-bg)",rim:"var(--s-red-rim)"}
};
const PT={
  high:{lbl:"عالية",cls:"high",icon:"🔴"},
  med:{lbl:"متوسطة",cls:"med",icon:"🟡"},
  low:{lbl:"منخفضة",cls:"low",icon:"🟢"},
  none:{lbl:"عادية",cls:"none",icon:"🔵"}
};
const SAMPLE=[
  {id:1,num:"2024/1234",type:"جنائية",court:"محكمة الجزاء بالرياض",plnt:"النيابة العامة",dfnd:"أحمد خالد السعيد",date:"2026-03-20",time:"09:00",room:"قاعة 3",status:"scheduled",priority:"high",notes:"جلسة الاستماع الأولى",attachments:[]},
  {id:2,num:"2024/5678",type:"مدنية",court:"المحكمة العامة بالرياض",plnt:"شركة الأمانة",dfnd:"محمد بن علي",date:"2026-03-20",time:"11:00",room:"قاعة 1",status:"inProgress",priority:"med",notes:"النظر في البيّنات",attachments:[]},
  {id:3,num:"2023/9012",type:"تجارية",court:"المحكمة التجارية",plnt:"بنك الخليج",dfnd:"مؤسسة النور",date:"2026-03-15",time:"10:00",room:"قاعة 5",status:"completed",priority:"none",notes:"صدر الحكم",attachments:[]},
  {id:4,num:"2024/3456",type:"أحوال شخصية",court:"محكمة الأحوال الشخصية",plnt:"نورة محمد",dfnd:"عمر الشمري",date:"2026-03-18",time:"09:30",room:"قاعة 2",status:"postponed",priority:"med",notes:"تأجلت",attachments:[]},
  {id:5,num:"2024/7890",type:"عمالية",court:"المحكمة العمالية",plnt:"عمال شركة البناء",dfnd:"شركة المستقبل",date:"2026-03-22",time:"13:00",room:"قاعة 4",status:"scheduled",priority:"low",notes:"",attachments:[]},
];

/* ══ STATE ══ */
let data=[],tab="home",filter="all",q="",advOpen=false;
let advType="",advCourt="",advDateFrom="",advDateTo="",advPrio="";
let calD=new Date(),selD=new Date(),editId=null,detId=null,delTgt=null,tickInterval=null;
let notifOn=false,scheduledNotifs=[],curPrio="none";

/* ══ TOAST ══ */
let toastTimer=null;
function showToast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2500);
}

/* ══ NOTIFICATIONS ══ */
async function toggleNotif(){
  if(!('Notification' in window)){showToast("⚠️ المتصفح لا يدعم الإشعارات");return;}
  if(notifOn){
    notifOn=false;scheduledNotifs.forEach(t=>clearTimeout(t));scheduledNotifs=[];
    localStorage.setItem('notif','0');updateNotifBtn();showToast("🔕 تم إيقاف الإشعارات");return;
  }
  const perm=await Notification.requestPermission();
  if(perm==="granted"){notifOn=true;localStorage.setItem('notif','1');scheduleNotifs();scheduleDailyReminder();updateNotifBtn();showToast("🔔 تم تفعيل الإشعارات");}
  else showToast("⚠️ لم يتم السماح بالإشعارات");
}
function updateNotifBtn(){const b=document.getElementById("btn-notif");if(b){b.classList.toggle("on",notifOn);b.textContent=notifOn?"🔔":"🔕";}}
function scheduleNotifs(){
  scheduledNotifs.forEach(t=>clearTimeout(t));scheduledNotifs=[];
  if(!notifOn)return;
  const now=new Date();
  data.filter(s=>s.status==="scheduled").forEach(s=>{
    const target=new Date(s.date+"T"+s.time+":00");
    const d30=target-now-1800000,d0=target-now;
    if(d30>0)scheduledNotifs.push(setTimeout(()=>new Notification("⚖️ تذكير",{body:`جلسة ${s.num} بعد 30 دقيقة - ${s.court||""}`}),d30));
    if(d0>0&&d0<86400000)scheduledNotifs.push(setTimeout(()=>new Notification("🔴 جلسة الآن",{body:`جلسة ${s.num} - ${s.court||""}`}),d0));
  });
}
function scheduleDailyReminder(){
  const now=new Date(),next=new Date(now);
  next.setHours(8,0,0,0);
  if(next<=now)next.setDate(next.getDate()+1);
  setTimeout(()=>{
    if(notifOn&&Notification.permission==="granted"){
      const td=new Date().toISOString().split("T")[0];
      const n=data.filter(s=>s.date===td).length;
      if(n>0)new Notification("📅 جلساتك اليوم",{body:`لديك ${n} جلسة اليوم`});
    }
    scheduleDailyReminder();
  },next-now);
}

/* ══ PRIORITY ══ */
function setPrio(p){
  curPrio=p;
  ['high','med','low','none'].forEach(k=>{const b=document.getElementById('p-'+k);if(b)b.classList.toggle('selected',k===p);});
}
function prioTag(p){const pt=PT[p||'none'];return`<span class="priority-tag ${pt.cls}">${pt.icon} ${pt.lbl}</span>`;}

/* ══ COUNTDOWN ══ */
function getCountdownInfo(s){
  if(s.status==="completed"||s.status==="postponed")return null;
  const now=new Date(),target=new Date(s.date+"T"+s.time+":00"),diff=target-now;
  if(diff<0){
    const e=Math.abs(diff),h=Math.floor(e/3600000),m=Math.floor((e%3600000)/60000),sec=Math.floor((e%60000)/1000);
    return{passed:true,time:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`,cls:"urgent"};
  }
  const ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;
  const cls=ts<3600?"urgent":ts<86400?"soon":"ok";
  const timeStr=days>0?`${days}ي ${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`:`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`;
  return{passed:false,time:timeStr,cls,totalSec:ts};
}
function cdHTML(s,inline=true){
  const info=getCountdownInfo(s);if(!info)return"";
  if(inline)return`<div class="countdown-box ${info.cls}" id="cd-${s.id}"><div><div class="cd-label">${info.passed?"⏱ مضى":"⏳ الوقت المتبقي"}</div><div class="cd-timer ${info.cls}${info.cls==="urgent"&&!info.passed?" pulse":""}" id="cd-time-${s.id}">${info.time}</div></div><span class="cd-icon">${info.passed?"🔴":info.cls==="urgent"?"🚨":info.cls==="soon"?"⚠️":"🟢"}</span></div>`;
  return`<div class="det-cd" style="border-color:${info.cls==="urgent"?"rgba(239,68,68,0.4)":info.cls==="soon"?"rgba(245,158,11,0.4)":"rgba(16,185,129,0.3)"}"><div class="det-cd-lbl">${info.passed?"⏱ مضى":"⏳ الوقت المتبقي"}</div><div class="det-cd-time" style="color:${info.cls==="urgent"?"#f87171":info.cls==="soon"?"#fbbf24":"#34d399"}" id="det-cd-val">${info.time}</div><div class="det-cd-sub">${info.passed?"الجلسة بدأت":info.totalSec<3600?"أقل من ساعة":info.totalSec<86400?"اليوم":"قادمة"}</div></div>`;
}
function startTick(){
  if(tickInterval)clearInterval(tickInterval);
  tickInterval=setInterval(()=>{
    data.forEach(s=>{
      const info=getCountdownInfo(s);if(!info)return;
      const el=document.getElementById("cd-time-"+s.id);
      if(el){el.textContent=info.time;el.className="cd-timer "+info.cls+(info.cls==="urgent"&&!info.passed?" pulse":"");const box=document.getElementById("cd-"+s.id);if(box)box.className="countdown-box "+info.cls;}
      const detEl=document.getElementById("det-cd-val");if(detEl&&detId===s.id)detEl.textContent=info.time;
    });
  },1000);
}

/* ══ HELPERS ══ */
const todayStr=()=>new Date().toISOString().split("T")[0];
const fmtShort=d=>new Date(d+"T00:00:00").toLocaleDateString("ar-SA",{day:"numeric",month:"short"});
const fmtLong=d=>new Date(d+"T00:00:00").toLocaleDateString("ar-SA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
const fmtLongD=d=>new Date(d+"T00:00:00").toLocaleDateString("ar-SA",{weekday:"short",year:"numeric",month:"long",day:"numeric"});
function badge(s,lg){const c=ST[s];return`<span class="badge${lg?' badge-lg':''}" style="color:${c.clr};background:${c.bg};border-color:${c.rim}">${c.lbl}</span>`;}

function card(s){
  const c=ST[s.status],p=s.priority||'none';
  const attCount=(s.attachments||[]).length;
  return`<div class="s-card p-${p}" onclick="openDet(${s.id})">
    <div class="s-card-accent" style="background:${c.clr}"></div>
    <div class="s-card-top">
      <div><div class="s-num">${s.num}</div><div class="s-type">${s.type}${s.room?" · "+s.room:""} ${prioTag(p)}</div></div>
      <div><div class="s-time">${s.time}</div><div class="s-date">${fmtShort(s.date)}</div></div>
    </div>
    <div class="s-parties"><span style="opacity:.5">👤</span><span>${s.plnt||"—"}</span><span class="s-sep">↔</span><span>${s.dfnd||"—"}</span></div>
    <div class="s-footer"><div class="s-court">🏛️ ${s.court||"—"}</div>${badge(s.status)}</div>
    ${attCount>0?`<div class="attach-count">📎 ${attCount} مرفق</div>`:""}
    ${cdHTML(s,true)}
  </div>`;
}
function secHdr(icon,title){return`<div class="sec-hdr"><span>${icon}</span>${title}</div>`;}

/* ══ TABS ══ */
function switchTab(t){tab=t;document.querySelectorAll('.tab-pill').forEach(el=>el.classList.remove('active'));document.getElementById(`tab-${t}`).classList.add('active');render();}

/* ══ RENDER ══ */
function render(){
  const el=document.getElementById("content");
  if(tab==="home")el.innerHTML=rHome();
  else if(tab==="list")el.innerHTML=rList();
  else if(tab==="cal")el.innerHTML=rCal();
  else if(tab==="stats")el.innerHTML=rStats();
  startTick();
}

/* ══ HOME ══ */
function rHome(){
  const td=todayStr();
  const todaySess=data.filter(s=>s.date===td).sort((a,b)=>a.time.localeCompare(b.time));
  const upcoming=data.filter(s=>s.date>td&&s.status==="scheduled").sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).slice(0,3);
  const highPrio=data.filter(s=>s.priority==="high"&&s.status==="scheduled"&&s.date>=td);
  const stats=[
    {e:"📋",lbl:"إجمالي",val:data.length,clr:"#c9a84c"},
    {e:"📅",lbl:"اليوم",val:todaySess.length,clr:"var(--s-amber)"},
    {e:"🔵",lbl:"مجدولة",val:data.filter(s=>s.status==="scheduled").length,clr:"var(--s-blue)"},
    {e:"✅",lbl:"منتهية",val:data.filter(s=>s.status==="completed").length,clr:"var(--s-green)"}
  ];
  let h=`<div class="stat-row stagger">`;
  stats.forEach(s=>{h+=`<div class="stat-c" style="--accent-clr:${s.clr}"><div class="stat-emoji">${s.e}</div><div class="stat-num" style="color:${s.clr}">${s.val}</div><div class="stat-lbl">${s.lbl}</div></div>`;});
  h+=`</div>`;
  if(highPrio.length){h+=secHdr("🔴","عالية الأهمية");h+=`<div class="stagger">`;highPrio.slice(0,2).forEach(s=>{h+=card(s);});h+=`</div>`;}
  if(todaySess.length){h+=secHdr("📅","جلسات اليوم");h+=`<div class="stagger">`;todaySess.forEach(s=>{h+=card(s);});h+=`</div>`;}
  if(upcoming.length){h+=secHdr("🔜","قادمة قريباً");h+=`<div class="stagger">`;upcoming.forEach(s=>{h+=card(s);});h+=`</div>`;}
  if(!todaySess.length&&!upcoming.length&&!highPrio.length)h+=`<div class="empty"><div class="empty-icon">⚖️</div><div class="empty-title">لا توجد جلسات مجدولة</div><div class="empty-sub">اضغط جديدة لإضافة جلسة</div></div>`;
  return h;
}

/* ══ LIST ══ */
function rList(){
  const filt=data.filter(s=>{
    const mS=filter==="all"||s.status===filter;
    const mQ=!q||[s.num,s.plnt,s.dfnd,s.court,s.type,s.room,s.notes].some(x=>x&&x.includes(q));
    const mType=!advType||s.type===advType;
    const mCourt=!advCourt||(s.court&&s.court.includes(advCourt));
    const mFrom=!advDateFrom||s.date>=advDateFrom;
    const mTo=!advDateTo||s.date<=advDateTo;
    const mPrio=!advPrio||s.priority===advPrio;
    return mS&&mQ&&mType&&mCourt&&mFrom&&mTo&&mPrio;
  }).sort((a,b)=>{
    const po={high:0,med:1,low:2,none:3};
    return(po[a.priority||'none']-po[b.priority||'none'])||(a.date+a.time).localeCompare(b.date+b.time);
  });

  let h=`<div class="s-input-wrap"><span class="s-icon">🔍</span><input class="s-input" type="search" placeholder="بحث سريع..." dir="rtl" value="${q}" oninput="setQ(this.value)"><button class="btn-adv" onclick="toggleAdv()">${advOpen?"▲":"▼ متقدم"}</button></div>`;

  if(advOpen){
    h+=`<div class="adv-search animate-in">
      <div class="adv-row">
        <div class="adv-field"><label>نوع القضية</label><select onchange="advType=this.value;render()" dir="rtl"><option value="">الكل</option><option>جنائية</option><option>مدنية</option><option>تجارية</option><option>أحوال شخصية</option><option>عمالية</option><option>إدارية</option></select></div>
        <div class="adv-field"><label>الأهمية</label><select onchange="advPrio=this.value;render()" dir="rtl"><option value="">الكل</option><option value="high">عالية</option><option value="med">متوسطة</option><option value="low">منخفضة</option><option value="none">عادية</option></select></div>
      </div>
      <div class="adv-row">
        <div class="adv-field"><label>من تاريخ</label><input type="date" value="${advDateFrom}" onchange="advDateFrom=this.value;render()" style="color-scheme:dark"></div>
        <div class="adv-field"><label>إلى تاريخ</label><input type="date" value="${advDateTo}" onchange="advDateTo=this.value;render()" style="color-scheme:dark"></div>
      </div>
      <div class="adv-row" style="margin-top:8px">
        <div class="adv-field" style="grid-column:span 2"><label>🏛️ المحكمة</label><input type="text" value="${advCourt}" placeholder="ابحث باسم المحكمة..." oninput="advCourt=this.value;render()" dir="rtl"></div>
      </div>
      <button onclick="clearAdv()" style="width:100%;background:none;color:var(--text3);font-size:12px;padding:8px;cursor:pointer;margin-top:8px;">✕ مسح الفلاتر</button>
    </div>`;
  }

  h+=`<div class="chips">`;
  [["all","الكل"],["scheduled","مجدولة"],["inProgress","جارية"],["completed","منتهية"],["postponed","مؤجلة"]].forEach(([k,l])=>{
    const a=filter===k;
    h+=`<button class="chip" onclick="setF('${k}')" style="color:${a?"var(--gold)":"var(--text3)"};background:${a?"var(--gold-dim)":"var(--ink3)"};border-color:${a?"var(--gold-rim)":"var(--rim)"}">${l}</button>`;
  });
  h+=`</div>`;
  if(filt.length){h+=`<div style="font-size:11px;color:var(--text3);margin-bottom:10px">${filt.length} جلسة</div><div class="stagger">`;filt.forEach(s=>{h+=card(s);});h+=`</div>`;}
  else h+=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد نتائج</div></div>`;
  return h;
}

/* ══ STATS ══ */
function rStats(){
  const total=data.length;
  if(total===0)return`<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">لا توجد بيانات</div></div>`;
  const byStatus={scheduled:0,inProgress:0,completed:0,postponed:0};
  const byType={},byCourt={};
  data.forEach(s=>{
    byStatus[s.status]=(byStatus[s.status]||0)+1;
    byType[s.type]=(byType[s.type]||0)+1;
    byCourt[s.court||"غير محدد"]=(byCourt[s.court||"غير محدد"]||0)+1;
  });
  const maxType=Math.max(...Object.values(byType)),maxCourt=Math.max(...Object.values(byCourt));
  let h=secHdr("📊","نظرة عامة");
  h+=`<div class="report-grid stagger">`;
  [{e:"📋",v:total,l:"إجمالي"},{e:"✅",v:byStatus.completed,l:"منتهية"},{e:"📅",v:byStatus.scheduled,l:"مجدولة"},{e:"⚡",v:byStatus.inProgress,l:"جارية"},{e:"⏸",v:byStatus.postponed,l:"مؤجلة"},{e:"📈",v:total>0?Math.round((byStatus.completed/total)*100)+"%":"0%",l:"نسبة الإنجاز"}].forEach(x=>{
    h+=`<div class="rep-c"><div style="font-size:18px;margin-bottom:4px">${x.e}</div><div class="rep-num" style="color:var(--gold2)">${x.v}</div><div class="rep-lbl">${x.l}</div></div>`;
  });
  h+=`</div>`;
  h+=secHdr("📁","توزيع حسب النوع");
  h+=`<div class="chart-bar-wrap">`;
  Object.entries(byType).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{
    h+=`<div class="bar-row"><div class="bar-lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((v/maxType)*100)}%;background:var(--gold)"></div></div><div class="bar-val" style="color:var(--gold2)">${v}</div></div>`;
  });
  h+=`</div>`;
  h+=secHdr("🏛️","أكثر المحاكم جلسات");
  h+=`<div class="chart-bar-wrap">`;
  Object.entries(byCourt).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([k,v])=>{
    h+=`<div class="bar-row"><div class="bar-lbl">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round((v/maxCourt)*100)}%;background:var(--s-blue)"></div></div><div class="bar-val" style="color:var(--s-blue)">${v}</div></div>`;
  });
  h+=`</div>`;
  h+=`<button class="btn-pdf" onclick="exportPDF()">🖨️ تصدير تقرير PDF كامل</button>`;
  return h;
}

/* ══ CALENDAR ══ */
function rCal(){
  const yr=calD.getFullYear(),mo=calD.getMonth();
  const days=new Date(yr,mo+1,0).getDate(),first=new Date(yr,mo,1).getDay();
  const byDate={};data.forEach(s=>{if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  const today=todayStr(),selStr=selD?selD.toISOString().split("T")[0]:null;
  const ds=d=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  let h=`<div class="cal-wrap"><div class="cal-hdr"><button class="cal-nav" onclick="calPrev()">›</button><div class="cal-month">${MONTHS[mo]} ${yr}</div><button class="cal-nav" onclick="calNext()">‹</button></div><div class="cal-days">`;
  DAYS.forEach(d=>{h+=`<div class="cal-dn">${d}</div>`;});
  h+=`</div><div class="cal-grid">`;
  for(let i=0;i<first;i++)h+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const dstr=ds(d),has=!!(byDate[dstr]?.length),isT=dstr===today,isSel=dstr===selStr;
    const bg=isSel?"var(--gold-dim)":isT?"rgba(59,130,246,0.1)":"transparent";
    const bdr=isSel?"var(--gold-rim)":isT?"rgba(59,130,246,0.35)":"transparent";
    const nc=isSel?"var(--gold2)":isT?"var(--s-blue)":"var(--text2)";
    const dotC=has?(isSel?"var(--gold)":ST[byDate[dstr][0].status].clr):"";
    h+=`<div class="cal-cell" onclick="selDay('${dstr}')" style="background:${bg};border-color:${bdr}"><div class="cal-num" style="color:${nc}">${d}</div>${has?`<div class="cal-dot" style="background:${dotC}"></div>`:""}</div>`;
  }
  h+=`</div></div>`;
  if(selD){
    const ss=byDate[selStr]||[];
    h+=secHdr("📌",fmtLong(selStr||todayStr()));
    if(!ss.length)h+=`<div class="empty" style="padding:28px 0"><div style="font-size:32px;opacity:.4;margin-bottom:8px">📭</div><div style="font-size:13px;color:var(--text3)">لا توجد جلسات في هذا اليوم</div></div>`;
    else{h+=`<div class="stagger">`;ss.forEach(s=>{h+=card(s);});h+=`</div>`;}
  }
  return h;
}

/* ══ ATTACHMENTS ══ */
function attachHTML(s){
  const atts=s.attachments||[];
  let h=`<div class="attach-section"><div class="attach-title">📎 المرفقات (${atts.length})</div>`;
  atts.forEach((a,i)=>{h+=`<div class="attach-item"><span style="font-size:16px">${a.type==='image'?'🖼️':'📄'}</span><span class="attach-name">${a.name}</span><span class="attach-del" onclick="delAttach(${s.id},${i})">✕</span></div>`;});
  h+=`<label class="attach-add"><input type="file" style="display:none" onchange="addAttach(${s.id},this)" accept="image/*,.pdf,.doc,.docx">➕ إضافة مرفق</label></div>`;
  return h;
}
function addAttach(sid,input){
  const file=input.files[0];if(!file)return;
  const s=data.find(x=>x.id===sid);if(!s)return;
  const reader=new FileReader();
  reader.onload=async e=>{
    if(!s.attachments)s.attachments=[];
    s.attachments.push({name:file.name,type:file.type.startsWith('image')?'image':'doc',data:e.target.result});
    await dbPut(s);showToast("📎 تم إضافة المرفق");openDet(sid);
  };
  reader.readAsDataURL(file);
}
async function delAttach(sid,idx){
  const s=data.find(x=>x.id===sid);if(!s)return;
  s.attachments.splice(idx,1);await dbPut(s);showToast("✅ تم حذف المرفق");openDet(sid);
}

/* ══ COPY ══ */
function copySession(id){
  const s=data.find(x=>x.id===id);if(!s)return;
  const txt=`جلسة قضائية\nرقم القضية: ${s.num}\nالنوع: ${s.type}\nالمحكمة: ${s.court||"—"}\nالمدعي: ${s.plnt||"—"}\nالمدعى عليه: ${s.dfnd||"—"}\nالتاريخ: ${s.date}\nالوقت: ${s.time}\nالقاعة: ${s.room||"—"}\nالحالة: ${ST[s.status].lbl}${s.notes?'\nملاحظات: '+s.notes:''}`;
  navigator.clipboard.writeText(txt).then(()=>showToast("📋 تم نسخ التفاصيل")).catch(()=>{
    const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("📋 تم النسخ");
  });
}

/* ══ PRINT ONE ══ */
function printSession(id){
  const s=data.find(x=>x.id===id);if(!s)return;
  const pa=document.getElementById("print-area");
  pa.innerHTML=`<div style="font-family:'IBM Plex Sans Arabic',Arial,sans-serif;direction:rtl;padding:40px;color:#000;max-width:600px;margin:0 auto">
    <div style="text-align:center;border-bottom:3px solid #c9a84c;padding-bottom:20px;margin-bottom:30px"><h1 style="font-size:24px">⚖️ بيان جلسة قضائية</h1></div>
    <table style="width:100%;border-collapse:collapse;font-size:14px">
      ${[["رقم القضية",s.num],["نوع القضية",s.type],["المحكمة",s.court||"—"],["المدعي",s.plnt||"—"],["المدعى عليه",s.dfnd||"—"],["التاريخ",fmtLongD(s.date)],["الوقت",s.time],["القاعة",s.room||"—"],["الحالة",ST[s.status].lbl],["الأهمية",PT[s.priority||'none'].lbl],...(s.notes?[["ملاحظات",s.notes]]:[])].map(([k,v],i)=>`<tr><td style="padding:10px;${i%2===0?"background:#f8f8f8;"}font-weight:bold;border:1px solid #ddd;width:150px">${k}</td><td style="padding:10px;border:1px solid #ddd">${v}</td></tr>`).join("")}
    </table>
    <div style="margin-top:30px;text-align:center;color:#999;font-size:11px">منظومة الجلسات القضائية</div>
  </div>`;
  setTimeout(()=>window.print(),100);
  showToast("🖨️ جاري الطباعة...");
}

/* ══ EXPORT PDF ══ */
function exportPDF(){
  const pa=document.getElementById("print-area");
  const td=new Date().toLocaleDateString("ar-SA",{year:"numeric",month:"long",day:"numeric"});
  const rows=data.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)).map(s=>`<tr><td>${s.num}</td><td>${s.type}</td><td>${s.court||"—"}</td><td>${s.plnt||"—"}</td><td>${s.dfnd||"—"}</td><td>${s.date}</td><td>${s.time}</td><td>${ST[s.status].lbl}</td><td>${PT[s.priority||'none'].lbl}</td></tr>`).join("");
  pa.innerHTML=`<div style="font-family:Arial,sans-serif;direction:rtl;padding:30px;color:#000">
    <div style="text-align:center;margin-bottom:30px;border-bottom:3px solid #c9a84c;padding-bottom:20px"><h1>⚖️ تقرير الجلسات القضائية</h1><p style="color:#666;font-size:13px">تاريخ التقرير: ${td} | إجمالي: ${data.length} جلسة</p></div>
    <table style="width:100%;border-collapse:collapse;font-size:11px">
      <thead><tr style="background:#0a0e17;color:#e8c870">
        <th style="padding:8px;border:1px solid #333">رقم القضية</th><th style="padding:8px;border:1px solid #333">النوع</th>
        <th style="padding:8px;border:1px solid #333">المحكمة</th><th style="padding:8px;border:1px solid #333">المدعي</th>
        <th style="padding:8px;border:1px solid #333">المدعى عليه</th><th style="padding:8px;border:1px solid #333">التاريخ</th>
        <th style="padding:8px;border:1px solid #333">الوقت</th><th style="padding:8px;border:1px solid #333">الحالة</th>
        <th style="padding:8px;border:1px solid #333">الأهمية</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  setTimeout(()=>window.print(),100);
  showToast("🖨️ جاري تصدير التقرير...");
}

/* ══ DETAIL ══ */
function openDet(id){
  const s=data.find(x=>x.id===id);if(!s)return;
  detId=id;
  document.getElementById("det-num").textContent=s.num;
  document.getElementById("det-badge").innerHTML=badge(s.status,true);
  const rows=[
    ["نوع القضية",s.type],["الأهمية",prioTag(s.priority||'none')],
    ["🏛️ المحكمة",s.court||"—"],["المدعي",s.plnt||"—"],
    ["المدعى عليه",s.dfnd||"—"],["التاريخ",fmtLongD(s.date)],
    ["الوقت",s.time],["القاعة",s.room||"—"],
    ...(s.notes?[["ملاحظات",s.notes]]:[])
  ];
  let b=cdHTML(s,false);
  b+=rows.map(([k,v])=>`<div class="d-row"><span class="d-key">${k}</span><span class="d-val">${v}</span></div>`).join("");
  b+=attachHTML(s);
  b+=`<div class="row-btns">
    <button class="btn-sm btn-edit-sm" onclick="editFromDet()">✏️ تعديل</button>
    <button class="btn-sm btn-copy-sm" onclick="copySession(${id})">📋 نسخ</button>
    <button class="btn-sm btn-print-sm" onclick="printSession(${id})">🖨️ طباعة</button>
    <button class="btn-sm btn-del-sm" onclick="confirmDel()">🗑️ حذف</button>
  </div>`;
  document.getElementById("det-body").innerHTML=b;
  document.getElementById("det-sheet").classList.remove("hidden");
}
function closeDet(){document.getElementById("det-sheet").classList.add("hidden");detId=null;}
function editFromDet(){const s=data.find(x=>x.id===detId);closeDet();openEdit(s);}
function confirmDel(){delTgt=detId;document.getElementById("dlg").classList.remove("hidden");}

/* ══ FORM ══ */
function openAdd(){
  editId=null;curPrio="none";
  document.getElementById("form-title").textContent="جلسة جديدة";
  document.getElementById("btn-save").textContent="حفظ الجلسة";
  ["f-num","f-court","f-room","f-plnt","f-dfnd","f-notes"].forEach(i=>document.getElementById(i).value="");
  document.getElementById("f-type").value="جنائية";
  document.getElementById("f-status").value="scheduled";
  document.getElementById("f-date").value="";
  document.getElementById("f-time").value="";
  document.getElementById("btn-save").disabled=true;
  setPrio("none");
  document.getElementById("form-sheet").classList.remove("hidden");
}
function openEdit(s){
  editId=s.id;curPrio=s.priority||"none";
  document.getElementById("form-title").textContent="تعديل الجلسة";
  document.getElementById("btn-save").textContent="💾 حفظ التعديلات";
  document.getElementById("f-num").value=s.num;
  document.getElementById("f-type").value=s.type;
  document.getElementById("f-court").value=s.court||"";
  document.getElementById("f-room").value=s.room||"";
  document.getElementById("f-plnt").value=s.plnt||"";
  document.getElementById("f-dfnd").value=s.dfnd||"";
  document.getElementById("f-date").value=s.date;
  document.getElementById("f-time").value=s.time;
  document.getElementById("f-status").value=s.status;
  document.getElementById("f-notes").value=s.notes||"";
  document.getElementById("btn-save").disabled=false;
  setPrio(s.priority||"none");
  document.getElementById("form-sheet").classList.remove("hidden");
}
function closeForm(){document.getElementById("form-sheet").classList.add("hidden");editId=null;}
function chkV(){
  const ok=document.getElementById("f-num").value.trim()&&
            document.getElementById("f-court").value.trim()&&
            document.getElementById("f-date").value&&
            document.getElementById("f-time").value;
  document.getElementById("btn-save").disabled=!ok;
}
async function saveS(){
  const existing=editId?data.find(x=>x.id===editId):null;
  const s={
    id:editId||Date.now(),
    num:document.getElementById("f-num").value.trim(),
    type:document.getElementById("f-type").value,
    court:document.getElementById("f-court").value.trim(),
    room:document.getElementById("f-room").value.trim(),
    plnt:document.getElementById("f-plnt").value.trim(),
    dfnd:document.getElementById("f-dfnd").value.trim(),
    date:document.getElementById("f-date").value,
    time:document.getElementById("f-time").value,
    status:document.getElementById("f-status").value,
    priority:curPrio,
    notes:document.getElementById("f-notes").value.trim(),
    attachments:existing?.attachments||[],
  };
  if(!s.num||!s.court||!s.date||!s.time)return;
  await dbPut(s);
  if(editId)data=data.map(x=>x.id===editId?s:x);
  else data.push(s);
  scheduleNotifs();
  showToast(editId?"✅ تم حفظ التعديلات":"✅ تمت إضافة الجلسة");
  closeForm();render();
}

/* ══ DELETE ══ */
function closeDlg(){document.getElementById("dlg").classList.add("hidden");delTgt=null;}
async function doDel(){
  if(!delTgt)return;
  await dbDelete(delTgt);
  data=data.filter(x=>x.id!==delTgt);
  showToast("🗑️ تم حذف الجلسة");
  closeDlg();closeDet();render();
}

/* ══ CAL & FILTERS ══ */
function calPrev(){calD=new Date(calD.getFullYear(),calD.getMonth()-1,1);render();}
function calNext(){calD=new Date(calD.getFullYear(),calD.getMonth()+1,1);render();}
function selDay(ds){selD=new Date(ds+"T00:00:00");render();}
function setQ(v){q=v;render();}
function setF(v){filter=v;render();}
function toggleAdv(){advOpen=!advOpen;render();}
function clearAdv(){advType="";advCourt="";advDateFrom="";advDateTo="";advPrio="";render();}

/* ══ INIT ══ */
document.getElementById("hdr-date").textContent=new Date().toLocaleDateString("ar-SA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
notifOn=localStorage.getItem('notif')==='1';
updateNotifBtn();
openDB().then(async()=>{
  data=await dbGetAll();
  if(data.length===0){for(const s of SAMPLE)await dbPut(s);data=await dbGetAll();}
  if(notifOn&&Notification.permission==="granted"){scheduleNotifs();scheduleDailyReminder();}
  render();
}).catch(()=>{data=JSON.parse(JSON.stringify(SAMPLE));render();});
</script>
