<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المكتب القانوني السيادي الشامل</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --ios-blue: #007AFF; --ios-purple: #5856D6; --ios-red: #FF3B30; --ios-green: #34C759;
            --ios-bg: #F2F2F7; --ios-card: #FFFFFF; --text-main: #000;
        }
        body.dark-mode { --ios-bg: #000; --ios-card: #1C1C1E; --text-main: #FFF; }
        body { background-color: var(--ios-bg); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; color: var(--text-main); transition: 0.3s; }
        
        /* شاشة القفل */
        #lock-screen { position: fixed; inset: 0; background: var(--ios-bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .header { position: sticky; top: 0; background: rgba(var(--ios-card), 0.8); backdrop-filter: blur(20px); padding: 50px 20px 15px; z-index: 100; border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 15px; display: none; }

        .session-card { background: var(--ios-card); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-right: 8px solid var(--ios-blue); }
        
        /* رادار الاستئناف والمالية */
        .badge { font-size: 11px; padding: 5px 10px; border-radius: 8px; margin-top: 5px; display: inline-block; }
        .deadline { background: rgba(255, 59, 48, 0.1); color: var(--ios-red); border: 0.5px solid var(--ios-red); }
        .finance { background: rgba(52, 199, 89, 0.1); color: var(--ios-green); border: 0.5px solid var(--ios-green); }

        /* مصفوفة الرد والذكاء الاصطناعي */
        .ai-box { background: linear-gradient(135deg, #1e1e2e, #2d2d44); color: #e0e0e0; padding: 15px; border-radius: 15px; margin-top: 15px; font-size: 13px; line-height: 1.6; border: 1px solid var(--ios-purple); }
        
        .btn-main { background: var(--ios-blue); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        input, textarea, select { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid #ccc; border-radius: 12px; background: var(--ios-card); color: var(--text-main); font-size: 15px; box-sizing: border-box; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h2>المكتب السيادي 🛡️</h2>
    <input type="password" id="pass-input" placeholder="كلمة المرور (123)">
    <button class="btn-main" onclick="unlock()">فتح المكتب</button>
</div>

<div class="header" id="app-header" style="display:none;">
    <h1 style="margin:0; font-size:18px;">المحامي السيادي (الشامل) ✨</h1>
    <button onclick="document.body.classList.toggle('dark-mode')" style="background:none; border:none; font-size:20px;">🌓</button>
</div>

<div class="container" id="app-container">
    <div style="background:var(--ios-card); padding:20px; border-radius:20px; margin-bottom:20px;">
        <input type="text" id="title" placeholder="اسم القضية / الموكل">
        <input type="date" id="jDate" title="تاريخ صدور الحكم (لرادار الاستئناف)">
        <div class="action-grid">
            <input type="number" id="totalFee" placeholder="إجمالي الأتعاب">
            <input type="number" id="paidFee" placeholder="المبلغ المحصل">
        </div>
        <textarea id="facts" placeholder="وقائع القضية (للتحليل الذكي)..." rows="3"></textarea>
        <button onclick="saveSession()" class="btn-main">حفظ واعتماد القضية ⚖️</button>
    </div>

    <div id="session-list"></div>
</div>

<script>
    const APP_PASSWORD = "123"; // غيرها حسب رغبتك
    let API_KEY = localStorage.getItem('gemini_api_key');

    function unlock() {
        if (document.getElementById('pass-input').value === APP_PASSWORD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-container').style.display = 'block';
            if (!API_KEY) {
                API_KEY = prompt("أدخل مفتاح API (Gemini):");
                localStorage.setItem('gemini_api_key', API_KEY);
            }
            renderSessions();
        } else { alert("خطأ!"); }
    }

    let sessions = JSON.parse(localStorage.getItem('legal_master_vault')) || [];

    function saveSession() {
        const title = document.getElementById('title').value;
        const jDate = document.getElementById('jDate').value;
        const total = document.getElementById('totalFee').value || 0;
        const paid = document.getElementById('paidFee').value || 0;
        const facts = document.getElementById('facts').value;

        if(!title) return alert("أدخل اسم القضية");

        const deadline = jDate ? new Date(jDate) : null;
        if(deadline) deadline.setDate(deadline.getDate() + 30);

        const newS = {
            id: Date.now(), title, facts,
            appealDate: deadline ? deadline.toISOString().split('T')[0] : 'غير محدد',
            total, paid, analysis: ""
        };

        sessions.push(newS);
        localStorage.setItem('legal_master_vault', JSON.stringify(sessions));
        renderSessions();
    }

    async function runAI(id) {
        const s = sessions.find(x => x.id === id);
        const aiBox = document.getElementById(`ai-${id}`);
        aiBox.style.display = "block";
        aiBox.innerHTML = "جاري التحليل الذكي...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `كمحامي سعودي، حلل هذه الواقعة واذكر المواد النظامية المناسبة: ${s.facts}` }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            s.analysis = reply;
            localStorage.setItem('legal_master_vault', JSON.stringify(sessions));
            renderSessions();
        } catch (e) { aiBox.innerHTML = "خطأ في الاتصال!"; }
    }

    function renderSessions() {
        const list = document.getElementById('session-list');
        list.innerHTML = sessions.map(s => `
            <div class="session-card">
                <h3 style="margin:0">${s.title}</h3>
                <div class="badge deadline">⚖️ آخر موعد استئناف: ${s.appealDate}</div>
                <div class="badge finance">💰 المحصل: ${s.paid} من ${s.total}</div>
                
                <p style="font-size:12px; opacity:0.7;">${s.facts}</p>
                
                <div id="ai-${s.id}" class="ai-box" style="${s.analysis ? 'display:block' : 'display:none'}">
                    ${s.analysis ? '<strong>💡 التحليل:</strong><br>' + s.analysis.replace(/\n/g, '<br>') : ''}
                </div>

                <div class="action-grid">
                    <button onclick="runAI(${s.id})" style="background:var(--ios-purple); color:white; border:none; padding:10px; border-radius:10px;">✨ تحليل AI</button>
                    <button onclick="deleteS(${s.id})" style="background:#eee; border:none; padding:10px; border-radius:10px;">🗑 حذف</button>
                </div>
            </div>
        `).join('');
    }

    function deleteS(id) {
        sessions = sessions.filter(x => x.id !== id);
        localStorage.setItem('legal_master_vault', JSON.stringify(sessions));
        renderSessions();
    }
</script>
</body>
</html>
