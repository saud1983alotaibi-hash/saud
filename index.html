<style>
:root {
  --bg: #08090d;
  --surface: #0f1118;
  --surface2: #161923;
  --surface3: #1d2232;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --gold: #d4a843;
  --gold2: #f0c55a;
  --gold3: #ffe08a;
  --gold-a10: rgba(212,168,67,0.1);
  --gold-a20: rgba(212,168,67,0.2);
  --gold-a30: rgba(212,168,67,0.3);
  --text: #f0f2f8;
  --text2: #8893ab;
  --text3: #4a5568;
  --blue: #4a90d9;
  --blue-a: rgba(74,144,217,0.12);
  --amber: #e8a030;
  --amber-a: rgba(232,160,48,0.12);
  --green: #3ab882;
  --green-a: rgba(58,184,130,0.12);
  --red: #e85050;
  --red-a: rgba(232,80,80,0.12);
  --purple: #8b6fd4;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); overflow: hidden; font-family: 'Tajawal', sans-serif; color: var(--text); direction: rtl; }
::-webkit-scrollbar { display: none; }
button, input, select, textarea { font-family: inherit; border: none; outline: none; background: none; }
input[type=date], input[type=time] { -webkit-appearance: none; color: var(--text); color-scheme: dark; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; overflow: hidden; background: var(--bg); }

#hdr { flex-shrink: 0; padding-top: var(--safe-top); background: var(--bg); z-index: 40; border-bottom: 1px solid var(--border); }
.hdr-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; }
.hdr-brand { display: flex; flex-direction: column; }
.hdr-eyebrow { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.hdr-title { font-family: 'Scheherazade New', serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--gold2), var(--gold3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hdr-date { font-size: 10px; color: var(--text3); margin-top: 1px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.btn-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-icon:active { transform: scale(0.92); }
.btn-icon.active { background: var(--gold-a20); border-color: var(--gold-a30); color: var(--gold2); }
.btn-new { display: flex; align-items: center; gap: 6px; background: var(--gold); color: #0a0905; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px rgba(212,168,67,0.3); transition: all 0.15s; }
.btn-new:active { transform: scale(0.95); opacity: 0.9; }

.tabs-scroll { display: flex; padding: 6px 10px 0; gap: 2px; overflow-x: auto; background: var(--bg); }
.tab { flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-sm) var(--r-sm) 0 0; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; border-bottom: none; white-space: nowrap; position: relative; }
.tab.on { background: var(--surface); color: var(--gold2); border-color: var(--border); }
.tab.on::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--surface); }

#cnt { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(20px + var(--safe-bottom)); background: var(--surface); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 70px; height: 70px; border-radius: 50%; background: var(--sc-clr, var(--gold)); opacity: 0.07; filter: blur(18px); }
.stat-icon { font-size: 18px; margin-bottom: 8px; }
.stat-value { font-size: 30px; font-weight: 900; line-height: 1; color: var(--sc-clr, var(--gold2)); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }

.sec-hdr { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px; margin-top: 6px; }
.sec-hdr::before { content: ''; width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.s-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 8px; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.1s, border-color 0.15s; }
.s-card:active { transform: scale(0.985); border-color: var(--gold-a30); }
.s-card-accent { position: absolute; top: 0; right: 0; width: 3px; height: 100%; border-radius: 0 var(--r-md) var(--r-md) 0; }
.s-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.s-card-num { font-family: 'Scheherazade New', serif; font-size: 17px; font-weight: 700; color: var(--gold2); }
.s-card-meta { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.s-card-time { text-align: left; }
.s-card-timestr { font-size: 22px; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.s-card-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
.s-card-parties { font-size: 11px; color: var(--text2); background: var(--surface3); border-radius: 8px; padding: 7px 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
.s-card-footer { display: flex; justify-content: space-between; align-items: center; }
.s-card-court { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.s-card-actions { display: flex; align-items: center; gap: 6px; }
.btn-cycle { background: var(--surface3); border: 1px solid var(--border2); border-radius: 7px; padding: 3px 9px; font-size: 10px; color: var(--text3); cursor: pointer; transition: all 0.12s; }
.btn-cycle:active { background: var(--gold-a10); }

.prio-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; }
.prio-high { background: var(--red-a); color: #f87171; border-color: rgba(232,80,80,0.3); }
.prio-med  { background: var(--amber-a); color: #fbbf24; border-color: rgba(232,160,48,0.3); }
.prio-low  { background: var(--green-a); color: #34d399; border-color: rgba(58,184,130,0.3); }
.prio-none { background: var(--blue-a); color: #60a5fa; border-color: rgba(74,144,217,0.3); }

.status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 18px; font-size: 10px; font-weight: 700; border: 1px solid; }

.countdown-bar { margin-top: 9px; background: var(--surface3); border-radius: 8px; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.cd-label { font-size: 9px; color: var(--text3); margin-bottom: 2px; }
.cd-time { font-size: 15px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.cd-urgent { color: #f87171; }
.cd-soon   { color: #fbbf24; }
.cd-ok     { color: #34d399; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.pulse { animation: pulse 1.2s ease-in-out infinite; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-md); padding: 11px 42px 11px 50px; font-size: 13px; color: var(--text); transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--gold-a30); }
.search-ico { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--text3); }
.search-adv { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: var(--gold2); cursor: pointer; }

.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 18px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.12s; }

.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 14px; font-size: 9px; font-weight: 700; background: var(--gold-a10); color: var(--gold2); border: 1px solid var(--gold-a20); }

.empty { text-align: center; padding: 50px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.empty-icon { font-size: 52px; opacity: 0.3; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 12px; color: var(--text3); }

.overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
.overlay.hid { display: none; }
.overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); }
.sheet { position: relative; background: var(--surface); border-radius: var(--r-xl) var(--r-xl) 0 0; border-top: 1px solid var(--border2); max-height: 92vh; overflow-y: auto; padding-bottom: max(20px, var(--safe-bottom)); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 12px auto 16px; }
.sheet-hdr { position: sticky; top: 0; background: var(--surface); padding: 0 18px 14px; border-bottom: 1px solid var(--border); z-index: 1; display: flex; justify-content: space-between; align-items: center; }
.sheet-title { font-family: 'Scheherazade New', serif; font-size: 20px; font-weight: 700; color: var(--gold2); }
.sheet-close { width: 30px; height: 30px; border-radius: 8px; background: var(--surface2); color: var(--text3); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.sheet-body { padding: 16px 18px; }

.det-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.det-row:last-of-type { border-bottom: none; }
.det-key { font-size: 11px; color: var(--text3); font-weight: 500; flex-shrink: 0; }
.det-val { font-size: 12px; color: var(--text); font-weight: 600; text-align: left; flex: 1; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.04em; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 12px 13px; font-size: 13px; color: var(--text); display: block; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-a30); }
.field textarea { resize: none; }
option { background: var(--surface); }

.prio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.prio-btn { padding: 9px; border-radius: var(--r-sm); font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; text-align: center; transition: all 0.12s; }
.prio-btn.sel { border-color: currentColor; }

.note-box { border-radius: var(--r-md); padding: 12px; margin: 10px 0; }
.note-box-hdr { font-size: 10px; font-weight: 700; margin-bottom: 8px; }
.note-box textarea { width: 100%; background: transparent; font-size: 12px; color: var(--text); resize: none; min-height: 70px; direction: rtl; line-height: 1.6; }

.att-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface); border-radius: 9px; margin-bottom: 5px; }
.att-name { font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.stage-btn { padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid; margin: 3px; transition: all 0.12s; }

.btn-primary { width: 100%; background: var(--gold); color: #0a0905; border-radius: var(--r-md); padding: 14px; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(212,168,67,0.25); transition: all 0.12s; margin-bottom: 8px; }
.btn-primary:active { opacity: 0.9; transform: scale(0.98); }
.btn-primary:disabled { background: var(--surface3); color: var(--text3); box-shadow: none; }
.btn-ghost { width: 100%; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; font-weight: 600; font-size: 13px; cursor: pointer; }
.action-row { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
.action-btn { flex: 1; min-width: 60px; border-radius: var(--r-sm); padding: 10px 5px; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; border: 1px solid; }

.dlg-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: center; justify-content: center; padding: 22px; }
.dlg-overlay.hid { display: none; }
.dlg-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
.dlg { position: relative; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 28px 22px 22px; width: 100%; max-width: 280px; text-align: center; }
.dlg-icon { font-size: 44px; margin-bottom: 12px; }
.dlg-title { font-family: 'Scheherazade New', serif; font-size: 18px; color: var(--text); margin-bottom: 5px; }
.dlg-sub { font-size: 12px; color: var(--text3); margin-bottom: 22px; }
.dlg-btns { display: flex; gap: 9px; }
.dlg-del { flex: 1; background: var(--red); color: #fff; border-radius: 11px; padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; }
.dlg-cancel { flex: 1; background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); border-radius: 11px; padding: 12px; font-weight: 600; font-size: 13px; cursor: pointer; }

.toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 9px 18px; font-size: 12px; font-weight: 600; color: var(--text); z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap; transition: all 0.25s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.cal-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 14px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-month { font-family: 'Scheherazade New', serif; font-size: 18px; font-weight: 700; color: var(--gold2); }
.cal-btn-nav { width: 34px; height: 34px; border-radius: 9px; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-days-hdr { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
.cal-day-name { text-align: center; font-size: 9px; color: var(--text3); font-weight: 600; padding: 3px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-cell { text-align: center; border-radius: 9px; padding: 6px 1px; cursor: pointer; border: 2px solid transparent; min-height: 40px; display: flex; flex-direction: column; align-items: center; transition: all 0.1s; }
.cal-cell-num { font-size: 13px; font-weight: 600; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

.stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.stat-mini { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 8px; text-align: center; }
.stat-mini-val { font-size: 22px; font-weight: 900; }
.stat-mini-lbl { font-size: 9px; color: var(--text3); margin-top: 4px; }
.bar-chart { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.bar-label { font-size: 10px; color: var(--text3); width: 70px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 5px; height: 9px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-size: 10px; font-weight: 700; width: 20px; }

.task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; margin-bottom: 7px; }
.task-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.task-title { font-size: 13px; font-weight: 600; color: var(--text); }
.task-title.done { text-decoration: line-through; opacity: 0.45; }

.contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.contact-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

.folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.folder-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; cursor: pointer; position: relative; transition: transform 0.1s; }
.folder-card:active { transform: scale(0.97); }
.file-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; margin-bottom: 8px; }

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   AI CHAT - ENHANCED
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.ai-wrap { display: flex; flex-direction: column; height: calc(100vh - 145px - var(--safe-top) - var(--safe-bottom)); }

.ai-header {
  background: linear-gradient(135deg, rgba(16,163,127,0.12), rgba(16,163,127,0.05));
  border: 1px solid rgba(16,163,127,0.2);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.ai-avatar-wrap { position: relative; flex-shrink: 0; }
.ai-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #0d9f77, #065e46);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 16px rgba(16,163,127,0.35);
}
.ai-online-dot {
  position: absolute; bottom: 1px; left: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #10a37f; border: 2px solid var(--surface);
}
.ai-name { font-family: 'Scheherazade New', serif; font-size: 16px; color: var(--gold2); font-weight: 700; }

  border: 1px solid var(--border2); border-radius: 8px; padding: 5px 9px;
}

.ai-context-bar {
  background: var(--surface2);
  border: 1px solid var(--gold-a20);
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 7px;
}
.ai-context-bar span { color: var(--gold2); font-weight: 700; }

.ai-msg-wrap { flex: 1; overflow-y: auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }

.ai-bubble-user {
  display: flex; justify-content: flex-start; margin-bottom: 12px;
}
.ai-bubble-user > div {
  background: var(--gold-a20); border: 1px solid var(--gold-a30);
  border-radius: 18px 18px 4px 18px;
  padding: 11px 14px; max-width: 82%;
  font-size: 13px; color: var(--text); line-height: 1.65;
}

.ai-bubble-ai {
  display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px; align-items: flex-end;
}
.ai-bubble-ai > .bubble-content {
  background: var(--surface2); border: 1px solid rgba(16,163,127,0.2);
  border-radius: 18px 18px 18px 4px;
  padding: 11px 14px; max-width: 86%;
  font-size: 13px; color: var(--text); line-height: 1.65;
}
.ai-bubble-ai .ai-mini-avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #0d9f77, #065e46);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; flex-shrink: 0;
}

/* Typing animation */
.typing-bubble { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
.typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #10a37f; opacity: 0.6; animation: typingBounce 1.3s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100%{ transform: translateY(0); opacity: 0.6; } 30%{ transform: translateY(-6px); opacity: 1; } }

.ai-quick-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 7px; margin-bottom: 14px;
}
.ai-quick-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--r-sm); padding: 10px;
  font-size: 11px; color: var(--text2); cursor: pointer;

  transition: all 0.15s;
}
.ai-quick-btn:hover { border-color: rgba(16,163,127,0.35); color: var(--text); }

.ai-smart-btn {

.ai-smart-btn:hover { background: rgba(16,163,127,0.15); }

.ai-input-row {

}

}
.ai-upload-btn:hover { border-color: rgba(16,163,127,0.4); color: #10a37f; background: rgba(16,163,127,0.08); }

.doc-analysis-card {
  background: var(--surface2);
  border: 1px solid rgba(16,163,127,0.25);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}
.doc-analysis-card::before {
  content: '';
  position: absolute; top: 0; right: 0;
  width: 60px; height: 60px; border-radius: 50%;
  background: rgba(16,163,127,0.08);
  filter: blur(20px);
}
.doc-preview-bubble {
  background: rgba(16,163,127,0.08);
  border: 1px solid rgba(16,163,127,0.2);
  border-radius: 12px 12px 4px 12px;
  padding: 9px 13px; max-width: 82%;
  font-size: 12px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.doc-file-icon {
  width: 32px; height: 32px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.analysis-progress {
  height: 3px; border-radius: 2px;
  background: var(--surface3); overflow: hidden;
  margin-top: 8px;
}
.analysis-progress-bar {
  height: 100%; background: linear-gradient(90deg,#0d9f77,#10d9a0);
  border-radius: 2px;
  animation: progressSweep 1.8s ease-in-out infinite;
}
@keyframes progressSweep {
  0% { width: 0%; margin-right: 100%; }
  50% { width: 60%; margin-right: 20%; }
  100% { width: 0%; margin-right: 0%; margin-left: 100%; }
}

/* Markdown-like formatting in AI responses */
.ai-response-text strong { color: var(--gold2); font-weight: 700; }
.ai-response-text em { color: #2ecc9a; font-style: normal; }
.ai-response-text .ai-list-item { display: flex; gap: 7px; margin-bottom: 5px; }
.ai-response-text .ai-list-item::before { content: 'в—Ҳ'; color: #10a37f; font-size: 10px; margin-top: 3px; flex-shrink: 0; }

.week-date-pill { background: var(--gold-a10); border: 1px solid var(--gold-a20); border-radius: 9px; padding: 6px 12px; margin-bottom: 7px; font-size: 11px; font-weight: 700; color: var(--gold2); }

@keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ani { animation: slideUp 0.2s ease both; }
.stagger > * { animation: slideUp 0.25s ease both; }
.stagger > *:nth-child(1) { animation-delay: 0.02s; }
.stagger > *:nth-child(2) { animation-delay: 0.06s; }
.stagger > *:nth-child(3) { animation-delay: 0.10s; }
.stagger > *:nth-child(4) { animation-delay: 0.14s; }
.stagger > *:nth-child(5) { animation-delay: 0.18s; }
.stagger > *:nth-child(6) { animation-delay: 0.22s; }
.stagger > *:nth-child(7) { animation-delay: 0.26s; }

function toggleNotif(){if(!('Notification' in window)){toast("вҡ пёҸ Ш§Щ„Щ…ШӘШөЩҒШӯ Щ„Ш§ ЩҠШҜШ№Щ… Ш§Щ„ШҘШҙШ№Ш§ШұШ§ШӘ");return;}if(notifOn){notifOn=false;notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];localStorage.setItem('j_notif','0');updNotifBtn();toast("рҹ”• ШӘЩ… ШҘЩҠЩӮШ§ЩҒ Ш§Щ„ШҘШҙШ№Ш§ШұШ§ШӘ");return;}Notification.requestPermission().then(function(p){if(p==='granted'){notifOn=true;localStorage.setItem('j_notif','1');schedNotifs();schedDaily();updNotifBtn();toast("рҹ”” ШӘЩ… ШӘЩҒШ№ЩҠЩ„ Ш§Щ„ШҘШҙШ№Ш§ШұШ§ШӘ");}else toast("вҡ пёҸ Щ„Щ… ЩҠШӘЩ… Ш§Щ„ШіЩ…Ш§Шӯ");});}
function updNotifBtn(){var b=document.getElementById('btnNotif');if(b){b.classList.toggle('active',notifOn);b.textContent=notifOn?'рҹ””':'рҹ”•';}}
function schedNotifs(){
  notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];if(!notifOn)return;
  var now=new Date();
  data.filter(function(s){return s.status==='scheduled';}).forEach(function(s){
    var tgt=new Date(s.date+'T'+s.time+':00');
    var d30=tgt-now-1800000,d5=tgt-now-300000,d0=tgt-now;
    if(d30>0)notifTimers.push(setTimeout(function(){new Notification('вҡ–пёҸ ШӘШ°ЩғЩҠШұ',{body:'Ш¬Щ„ШіШ© '+s.num+' ШЁШ№ШҜ 30 ШҜЩӮЩҠЩӮШ©'+(s.meetUrl?' вҖ” Ш№ЩҶ ШЁЩҸШ№ШҜ':'')});},d30));
    if(d5>0&&s.meetUrl)notifTimers.push(setTimeout(function(){
      var n=new Notification('рҹҺҘ Ш¬Щ„ШіШ© Ш№ЩҶ ШЁЩҸШ№ШҜ Ш®Щ„Ш§Щ„ 5 ШҜЩӮШ§ШҰЩӮ',{body:'Ш¬Щ„ШіШ© '+s.num+' вҖ” Ш§Ш¶ШәШ· Щ„Щ„Ш§ЩҶШ¶Щ…Ш§Щ…',requireInteraction:true});
      n.onclick=function(){window.open(s.meetUrl,'_blank');};
    },d5));
    if(d0>0&&d0<86400000)notifTimers.push(setTimeout(function(){
      var body='Ш¬Щ„ШіШ© '+s.num+' вҖ” '+(s.court||'');
      var n=new Notification('рҹ”ҙ Ш¬Щ„ШіШ© Ш§Щ„ШўЩҶ',{body:body+(s.meetUrl?' (Ш№ЩҶ ШЁЩҸШ№ШҜ)':''),requireInteraction:!!s.meetUrl});
      if(s.meetUrl)n.onclick=function(){window.open(s.meetUrl,'_blank');};
    },d0));
  });
}
function schedDaily(){var now=new Date(),nxt=new Date(now);nxt.setHours(8,0,0,0);if(nxt<=now)nxt.setDate(nxt.getDate()+1);setTimeout(function(){if(notifOn&&Notification.permission==='granted'){var n=data.filter(function(s){return s.date===today();}).length;if(n>0)new Notification("рҹ“… Ш¬Щ„ШіШ§ШӘЩғ Ш§Щ„ЩҠЩҲЩ…",{body:"Щ„ШҜЩҠЩғ "+n+" Ш¬Щ„ШіШ© Ш§Щ„ЩҠЩҲЩ…"});}schedDaily();},nxt-now);}

function buildAISystem(){
  var td=today();
  var todaySessions=data.filter(function(s){return s.date===td;});
  var upcoming=data.filter(function(s){return s.date>td&&s.status==='scheduled';}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,5);
  var highPrio=data.filter(function(s){return s.priority==='high'&&s.status==='scheduled';});

  var sessionSummary='';
  if(data.length>0){
    sessionSummary='\n\n=== ШЁЩҠШ§ЩҶШ§ШӘ Ш¬Щ„ШіШ§ШӘ Ш§Щ„Щ…ШӯШ§Щ…ЩҠ ===\n';
    sessionSummary+='ШҘШ¬Щ…Ш§Щ„ЩҠ Ш§Щ„Ш¬Щ„ШіШ§ШӘ: '+data.length+'\n';
    sessionSummary+='Щ…Ш¬ШҜЩҲЩ„Ш©: '+data.filter(function(s){return s.status==='scheduled';}).length+'\n';
    sessionSummary+='Ш¬Ш§ШұЩҠШ©: '+data.filter(function(s){return s.status==='inProgress';}).length+'\n';
    sessionSummary+='Щ…ЩҶШӘЩҮЩҠШ©: '+data.filter(function(s){return s.status==='completed';}).length+'\n';
    sessionSummary+='Щ…ШӨШ¬Щ„Ш©: '+data.filter(function(s){return s.status==='postponed';}).length+'\n';

    if(todaySessions.length>0){

function formatAIResponse(text){
  if(!text)return'';
  text=String(text);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  var lines=text.split('\n');
  var result=[];
  lines.forEach(function(line){
    var trimmed=line.trim();
    if(!trimmed)return;
    if(trimmed.match(/^[-вҖў]\s+/)||trimmed.match(/^\d+\.\s+/)){
      var content=trimmed.replace(/^[-вҖў]\s+/,'').replace(/^\d+\.\s+/,'');
      result.push('<div class="ai-list-item">'+content+'</div>');
    } else {
      result.push('<p style="margin-bottom:6px">'+trimmed+'</p>');
    }
  });
  return'<div class="ai-response-text">'+(result.length?result.join(''):text)+'</div>';
}

function sendAIInput(){

}

function sendAI(msg){
  if(aiLoading)return;
  if(!msg||!msg.trim())return;
  if(!requireApiKey())return;
  aiMessages.push({role:'user',content:msg.trim()});
  aiLoading=true;
  render();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);

  // Build clean alternating messages (API requires user/assistant alternation, must start with user)
  var rawMsgs=aiMessages.slice(-20);
  var cleanMsgs=[];
  var lastRole=null;
  for(var mi=rawMsgs.length-1;mi>=0;mi--){
    var rm=rawMsgs[mi];
    if(rm.role!==lastRole){
      cleanMsgs.unshift({role:rm.role,content:rm.content});
      lastRole=rm.role;
    }
  }
  // Must start with user role
  while(cleanMsgs.length&&cleanMsgs[0].role!=='user')cleanMsgs.shift();
  if(!cleanMsgs.length)cleanMsgs=[{role:'user',content:msg.trim()}];

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      system:buildAISystem(),
      messages:cleanMsgs
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(d){
    var reply='';
    if(d.content&&d.content.length>0){
      d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
    }
    if(!reply)reply='Ш№Ш°ШұШ§ЩӢШҢ Щ„Щ… ШЈШӘЩ…ЩғЩҶ Щ…ЩҶ Ш§Щ„ШұШҜ. ШӯШ§ЩҲЩ„ Щ…ШұШ© ШЈШ®ШұЩү.';
    aiMessages.push({role:'assistant',content:reply});
    saveAIMsgs();
    aiLoading=false;
    render();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
  })
  .catch(function(err){
    console.error('AI Error:',err);

   DOCUMENT ANALYSIS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function analyzeDocument(input, hint){
  var file=input.files[0];
  if(!file){return;}
  if(!requireApiKey()){input.value='';return;}
  input.value='';

  var maxMB=20;
  if(file.size>maxMB*1024*1024){toast('вҡ пёҸ Ш§Щ„Щ…Щ„ЩҒ ШЈЩғШЁШұ Щ…ЩҶ '+maxMB+'MB');return;}

  // Detect type
  var isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  var isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){toast('вҡ пёҸ ЩҠЩҸЩӮШЁЩ„ PDF ШЈЩҲ ШөЩҲШұШ© ЩҒЩӮШ·');return;}

  var mediaType=isPDF?'application/pdf':file.type;
  var fileIcon=isPDF?'рҹ“•':'рҹ–јпёҸ';
  var label=file.name.length>36?file.name.substring(0,33)+'...':file.name;

  // Show file bubble in chat immediately
  if(curTab!=='ai'){go('ai');}
  aiLoading=true;

  // Add a special "user" message showing the doc
  aiMessages.push({
    role:'user',
    content:'рҹ“Һ '+label+'\n[ЩҠШӘЩ… ШӘШӯЩ„ЩҠЩ„ Ш§Щ„Щ…ШіШӘЩҶШҜ...]',
    isDoc:true,
    docIcon:fileIcon,
    docName:label
  });
  render();
  setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(!b64){
      toast('вҡ пёҸ ЩҒШҙЩ„ ЩӮШұШ§ШЎШ© Ш§Щ„Щ…Щ„ЩҒ');
      aiMessages.pop();
      aiLoading=false;
      render();
      return;
    }

    // Build the user text input if any
    var userText=document.getElementById('ai-input');
    var customQ=userText&&userText.value.trim()?userText.value.trim():'';
    if(userText)userText.value='';

    var prompt=customQ||
      (isPDF
        ? 'ШӯЩ„Щ‘Щ„ ЩҮШ°ЩҮ Ш§Щ„ЩҲШ«ЩҠЩӮШ© Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠШ© ЩҲШ§ШіШӘШ®ШұШ¬: ЩЎ) Ш§Щ„Щ…ЩҲШ¶ЩҲШ№ Ш§Щ„ШұШҰЩҠШіЩҠ Щў) Ш§Щ„ШЈШ·ШұШ§ЩҒ Ш§Щ„Щ…Ш°ЩғЩҲШұШ© ЩЈ) Ш§Щ„ЩҶЩӮШ§Ш· Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠШ© Ш§Щ„Ш¬ЩҲЩҮШұЩҠШ© ЩӨ) ШЈЩҠ ШӘЩҲШ§ШұЩҠШ® ШЈЩҲ Щ…ЩҲШ§Ш№ЩҠШҜ Щ…ЩҮЩ…Ш© ЩҘ) ШӘЩҲШөЩҠШ§ШӘЩғ Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠШ©.'
        : 'ШӯЩ„Щ‘Щ„ ЩҮШ°ЩҮ Ш§Щ„ШөЩҲШұШ© ЩҲШ§ШіШӘШ®ШұШ¬ ШЈЩҠ Щ…ШӯШӘЩҲЩү ЩӮШ§ЩҶЩҲЩҶЩҠ ШЈЩҲ ЩҶШөЩҠ Щ…ЩҮЩ…ШҢ ЩҲШ§Ш°ЩғШұ Щ…Щ„Ш§ШӯШёШ§ШӘЩғ.');

    // Build message content as multipart
    var contentBlock=[];
    if(isPDF){
      contentBlock.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else {
      contentBlock.push({type:'image',source:{type:'base64',media_type:mediaType,data:b64}});
    }
    contentBlock.push({type:'text',text:prompt});

    // Update the last message with the real prompt shown to user
    aiMessages[aiMessages.length-1].content='рҹ“Һ '+label+(customQ?'\n'+customQ:'');

    // Build history вҖ” previous messages (text only) + this multipart message
    var prevMsgs=[];
    var hist=aiMessages.slice(-10,-1);
    var lastR=null;
    for(var mi=hist.length-1;mi>=0;mi--){
      var hm=hist[mi];
      if(hm.role!==lastR&&!hm.isDoc){
        prevMsgs.unshift({role:hm.role,content:hm.content});
        lastR=hm.role;
      }
    }
    // Remove trailing assistant (last must be user)
    while(prevMsgs.length&&prevMsgs[prevMsgs.length-1].role==='assistant')prevMsgs.pop();

    var apiMessages=prevMsgs.concat([{role:'user',content:contentBlock}]);

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2048,
        system:buildAISystem()+'\nШ№ЩҶШҜ ШӘШӯЩ„ЩҠЩ„ Щ…ШіШӘЩҶШҜШҢ ЩғЩҶ Щ…ЩҶШёЩ…Ш§ЩӢ ЩҲШ§ШіШӘШ®ШҜЩ… Ш№ЩҶШ§ЩҲЩҠЩҶ ЩҲЩӮЩҲШ§ШҰЩ… ЩҲШ§Ш¶ШӯШ©.',
        messages:apiMessages
      })
    })
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(d){
      var reply='';
      if(d.content&&d.content.length>0){
        d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
      }
      if(!reply)reply='Щ„Щ… ШЈШӘЩ…ЩғЩҶ Щ…ЩҶ ЩӮШұШ§ШЎШ© Ш§Щ„Щ…ШіШӘЩҶШҜ. ШӘШЈЩғШҜ ШЈЩҶЩҮ Щ…Щ„ЩҒ PDF ШЈЩҲ ШөЩҲШұШ© ЩҲШ§Ш¶ШӯШ©.';
      aiMessages.push({role:'assistant',content:reply});
      saveAIMsgs();
      aiLoading=false;
      render();
      setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
    })
    .catch(function(err){
      console.error('Doc analysis error:',err);
      var msg='вҡ пёҸ '+(err.message&&err.message.length<120?err.message:'ЩҒШҙЩ„ ШӘШӯЩ„ЩҠЩ„ Ш§Щ„Щ…ШіШӘЩҶШҜ. ШӘШЈЩғШҜ Щ…ЩҶ Ш§Щ„Ш§ШӘШөШ§Щ„ ЩҲШӯШ§ЩҲЩ„ Щ…ШұШ© ШЈШ®ШұЩү.');
      aiMessages.push({role:'assistant',content:msg});
      saveAIMsgs();
      aiLoading=false;
      render();
    });
  };
  reader.onerror=function(){
    toast('вҡ пёҸ Ш®Ш·ШЈ ЩҒЩҠ ЩӮШұШ§ШЎШ© Ш§Щ„Щ…Щ„ЩҒ');
    aiMessages.pop();
    aiLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function cdInfo(s){if(s.status==='completed'||s.status==='postponed')return null;var now=new Date(),tgt=new Date(s.date+'T'+s.time+':00'),diff=tgt-now;if(diff<0){var e=Math.abs(diff);return{passed:true,time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)),cls:'urgent'};}var ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;var cls=ts<3600?'urgent':ts<86400?'soon':'ok';var t=days>0?(days+'ЩҠ '+pad(h)+':'+pad(m)+':'+pad(sec)):(pad(h)+':'+pad(m)+':'+pad(sec));return{passed:false,time:t,cls:cls,ts:ts};}
function cdInline(s){var i=cdInfo(s);if(!i)return'';return'<div class="countdown-bar" id="cdb-'+s.id+'"><div><div class="cd-label">'+(i.passed?'вҸұ Щ…Ш¶Щү':'вҸі Ш§Щ„Щ…ШӘШЁЩӮЩҠ')+'</div><div class="cd-time cd-'+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'')+'" id="cdt-'+s.id+'">'+i.time+'</div></div><span style="font-size:18px">'+(i.passed?'рҹ”ҙ':i.cls==='urgent'?'рҹҡЁ':i.cls==='soon'?'вҡ пёҸ':'рҹҹў')+'</span></div>';}
function cdLarge(s){var i=cdInfo(s);if(!i)return'';var clr=i.cls==='urgent'?'#f87171':i.cls==='soon'?'#fbbf24':'#34d399';var bdr=i.cls==='urgent'?'rgba(232,80,80,.35)':i.cls==='soon'?'rgba(232,160,48,.35)':'rgba(58,184,130,.3)';return'<div style="background:var(--surface2);border:1px solid '+bdr+';border-radius:14px;padding:14px;margin:12px 0;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">'+(i.passed?'вҸұ Щ…Ш¶Щү':'вҸі Ш§Щ„Щ…ШӘШЁЩӮЩҠ')+'</div><div style="font-size:34px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums" id="cdtL-'+s.id+'">'+i.time+'</div><div style="font-size:10px;color:var(--text3);margin-top:3px">'+(i.passed?'Ш§Щ„Ш¬Щ„ШіШ© ШЁШҜШЈШӘ':i.ts<3600?'ШЈЩӮЩ„ Щ…ЩҶ ШіШ§Ш№Ш©':i.ts<86400?'Ш§Щ„ЩҠЩҲЩ…':'ЩӮШ§ШҜЩ…Ш©')+'</div></div>';}

function startTick(){
  if(tick)clearInterval(tick);
  tick=setInterval(function(){
    // в”Җв”Җ Session countdowns в”Җв”Җ
    data.forEach(function(s){
      var i=cdInfo(s);if(!i)return;
      var el=document.getElementById('cdt-'+s.id);
      if(el){el.textContent=i.time;el.className='cd-time cd-'+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'');}
      var el2=document.getElementById('cdtL-'+s.id);
      if(el2&&detId===s.id)el2.textContent=i.time;
    });
    // в”Җв”Җ Deadline full countdown (days + HH:MM:SS) в”Җв”Җ
    var now=Date.now();
    Object.keys(sessionDeadlines).forEach(function(sid){
      var d=sessionDeadlines[sid];if(!d)return;
      // Deadline at end of the deadline day (23:59:59)
      var target=new Date(d.deadlineDate+'T23:59:59').getTime();
      var diff=target-now;
      if(diff<0)return; // expired вҖ” no ticking needed

      var totalSec=Math.floor(diff/1000);
      var days=Math.floor(totalSec/86400);
      var hours=Math.floor((totalSec%86400)/3600);
      var mins=Math.floor((totalSec%3600)/60);
      var secs=totalSec%60;

      function p(n){return n<10?'0'+n:String(n);}

      var elD=document.getElementById('dlcd-'+sid);
      var elH=document.getElementById('dlch-'+sid);
      var elM=document.getElementById('dlcm-'+sid);
      var elS=document.getElementById('dlcs-'+sid);

      if(elD)elD.textContent=days;
      if(elH)elH.textContent=p(hours);
      if(elM)elM.textContent=p(mins);
      if(elS)elS.textContent=p(secs);

      // Update progress bar
      var info=getDeadlineInfo(parseInt(sid));
      if(info){
        var elPb=document.getElementById('dlcpb-'+sid);
        var elPct=document.getElementById('dlcpct-'+sid);
        var pct=Math.min(100,Math.round(((d.days-(diff/86400000))/d.days)*100));
        if(elPb)elPb.style.width=pct+'%';
        if(elPct)elPct.textContent=pct+'%';
        // Color update if urgency changed
        var clr=info.clr;
        [elD,elH,elM,elS].forEach(function(el){if(el)el.style.color=clr;});
      }
    });
  },1000);
}

в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* в”Җв”Җ Deadline helpers в”Җв”Җ */
function getDeadlineInfo(sid){
  var d=sessionDeadlines[sid];if(!d)return null;
  var deadline=new Date(d.deadlineDate+'T00:00:00');
  var now=new Date();now.setHours(0,0,0,0);
  var remaining=Math.ceil((deadline-now)/86400000);
  var clr,icon,urgent=false;
  if(remaining<0){clr='#f87171';icon='рҹ”ҙ';}
  else if(remaining===0){clr='#f87171';icon='вҡЎ';urgent=true;}
  else if(remaining<=7){clr='#fbbf24';icon='вҡ пёҸ';urgent=true;}
  else if(remaining<=14){clr='#f59e0b';icon='рҹҹЎ';}
  else{clr='#34d399';icon='вң…';}
  return{remaining:remaining,clr:clr,icon:icon,urgent:urgent,days:d.days,typeName:d.typeName,deadlineDate:d.deadlineDate,sessionNum:d.sessionNum,sessionType:d.sessionType,court:d.court};
}

function deadlineBadge(s){
  var info=getDeadlineInfo(s.id);if(!info)return'';
  var label=info.remaining<0?'Ш§ЩҶШӘЩҮЩү':info.remaining===0?'Ш§Щ„ЩҠЩҲЩ…':info.remaining+' ЩҠЩҲЩ…';
  return'<div style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;background:'+(info.remaining<=7?'rgba(251,191,36,0.1)':'rgba(52,211,153,0.08)')+';border:1px solid '+(info.remaining<=0?'rgba(232,80,80,.3)':info.remaining<=7?'rgba(251,191,36,.25)':'rgba(52,211,153,.2)')+';border-radius:12px;padding:3px 9px;font-size:10px;font-weight:700;color:'+info.clr+'">'+info.icon+' '+label+' В· '+info.typeName.split('(')[0].trim()+'</div>';
}

function card(s){
  var c=ST[s.status],p=s.priority||'none';
  var att=(s.attachments||[]).length,hasMemo=s.memo&&s.memo.trim().length>0;
  var dlBadge=deadlineBadge(s);
  return'<div class="s-card" onclick="openDet('+s.id+')">'+
    '<div class="s-card-accent" style="background:'+c.clr+'"></div>'+
    '<div class="s-card-top"><div><div class="s-card-num">'+s.num+'</div>'+
    '<div class="s-card-meta">'+s.type+(s.room?' В· '+s.room:'')+'&nbsp;&nbsp;'+ptag(p)+'</div></div>'+
    '<div class="s-card-time"><div class="s-card-timestr">'+s.time+'</div><div class="s-card-date">'+fmtS(s.date)+'</div></div></div>'+
    '<div class="s-card-parties"><span style="opacity:.4">рҹ‘Ө</span> '+(s.plnt||'вҖ”')+' <span style="color:var(--text3)">вҶ”</span> '+(s.dfnd||'вҖ”')+'</div>'+
    '<div class="s-card-footer"><div class="s-card-court">рҹҸӣпёҸ '+(s.court||'вҖ”')+'</div>'+
    '<div class="s-card-actions">'+bdg(s.status)+'<button onclick="cycleStatus('+s.id+',event)" class="btn-cycle">рҹ”Ғ</button></div></div>'+
    ((att>0||hasMemo)?'<div style="font-size:9px;color:var(--text3);margin-top:6px;display:flex;gap:8px">'+(att>0?'<span>рҹ“Һ '+att+' Щ…ШұЩҒЩӮ</span>':'')+(hasMemo?'<span>рҹ“қ Щ…Ш°ЩғШұШ©</span>':'')+'</div>':'')+
    (s.meetUrl?'<div style="margin-top:8px">'+meetJoinBtn(s,'small')+'</div>':'')+
    dlBadge+
    tagsHTML(s.tags||[])+cdInline(s)+'</div>';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   NAVIGATION & RENDER
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function go(t){curTab=t;document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('on');});var tb=document.getElementById('tb-'+t);if(tb)tb.classList.add('on');render();}
function render(){var el=document.getElementById('cnt');if(curTab==='home')el.innerHTML=rHome();else if(curTab==='list')el.innerHTML=rList();else if(curTab==='tasks')el.innerHTML=rTasks();else if(curTab==='contacts')el.innerHTML=rContacts();else if(curTab==='files')el.innerHTML=rFiles();else if(curTab==='ai')el.innerHTML=rAI();else if(curTab==='cal')el.innerHTML=rCal();else if(curTab==='stats')el.innerHTML=rStats();else if(curTab==='fees')el.innerHTML=rFees();else if(curTab==='tools'){el.innerHTML=rTools();setTimeout(renderToolCharts,100);}else if(curTab==='live'){el.innerHTML=rLive();startLiveTick();}else if(curTab==='archive')el.innerHTML=rArchive();else if(curTab==='letterhead')el.innerHTML=rLetterhead();else if(curTab==='legal')el.innerHTML=rLegal();else if(curTab==='reports')el.innerHTML=rReports();else if(curTab==='share')el.innerHTML=rShare();else if(curTab==='settings')el.innerHTML=rSettings();applyHiddenTabs();startTick();}
function secHdr(icon,title){return'<div class="sec-hdr"><span>'+icon+'</span>'+title+'</div>';}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   HOME
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function rHome(){
  var td=today();var todayS=data.filter(function(s){return s.date===td;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var upcoming=data.filter(function(s){return s.date>td&&s.status==='scheduled';}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,3);
  var high=data.filter(function(s){return s.priority==='high'&&s.status==='scheduled'&&s.date>=td;});
  var statsData=[{e:'рҹ“Ӣ',l:'ШҘШ¬Щ…Ш§Щ„ЩҠ',v:data.length,c:'var(--gold2)'},{e:'рҹ“…',l:'Ш§Щ„ЩҠЩҲЩ…',v:todayS.length,c:'var(--amber)'},{e:'рҹ”ө',l:'Щ…Ш¬ШҜЩҲЩ„Ш©',v:data.filter(function(s){return s.status==='scheduled';}).length,c:'var(--blue)'},{e:'вң…',l:'Щ…ЩҶШӘЩҮЩҠШ©',v:data.filter(function(s){return s.status==='completed';}).length,c:'var(--green)'}];
  var h='<div class="stats-grid stagger">';statsData.forEach(function(s){h+='<div class="stat-card" style="--sc-clr:'+s.c+'"><div class="stat-icon">'+s.e+'</div><div class="stat-value">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>';});h+='</div>';
  if(high.length){h+=secHdr('рҹ”ҙ','Ш№Ш§Щ„ЩҠШ© Ш§Щ„ШЈЩҮЩ…ЩҠШ©')+'<div class="stagger">';high.slice(0,2).forEach(function(s){h+=card(s);});h+='</div>';}

  // в”Җв”Җ Deadlines section в”Җв”Җ
  var deadlineEntries=Object.keys(sessionDeadlines).map(function(sid){
    var s=data.find(function(x){return x.id===parseInt(sid);})||archivedSessions.find(function(x){return x.id===parseInt(sid);});
    var info=getDeadlineInfo(parseInt(sid));
    if(!info)return null;
    return{sid:parseInt(sid),s:s,info:info};
  }).filter(function(x){return x&&x.info.remaining>=-3;})
    .sort(function(a,b){return a.info.remaining-b.info.remaining;});

  if(deadlineEntries.length){
    h+=secHdr('вҸ°','Щ…ЩҲШ§Ш№ЩҠШҜ Ш§Щ„Ш·Ш№ЩҶ ЩҲШ§Щ„Ш§ШіШӘШҰЩҶШ§ЩҒ');
    h+='<div id="deadlinesSection" style="margin-bottom:14px">';
    deadlineEntries.forEach(function(entry){
      var info=entry.info,s=entry.s,sid=entry.sid;
      var remaining=info.remaining;
      var expired=remaining<0;
      var bg,border,clr=info.clr,glowClr;
      if(expired||remaining===0){bg='rgba(232,80,80,0.07)';border='rgba(232,80,80,0.28)';glowClr='rgba(232,80,80,0.15)';}
      else if(remaining<=7){bg='rgba(251,191,36,0.07)';border='rgba(251,191,36,0.28)';glowClr='rgba(251,191,36,0.12)';}
      else{bg='var(--surface2)';border='var(--border)';glowClr='transparent';}

      h+='<div style="background:'+bg+';border:1px solid '+border+';border-radius:var(--r-lg);margin-bottom:10px;overflow:hidden;cursor:pointer;box-shadow:0 0 0 0 '+glowClr+'" onclick="'+(s?'openDet('+sid+')':'')+'\">';

      // Header row: case info + delete
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 14px 0">';
      h+='<div>';
      h+='<div style="font-size:12px;font-weight:700;color:var(--text)">'+(s?s.num+' В· '+s.type:'ЩӮШ¶ЩҠШ©')+'</div>';
      h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+info.typeName.split('(')[0].trim()+(s&&s.court?' В· '+s.court:'')+'</div>';
      h+='</div>';
      h+='<div style="display:flex;align-items:center;gap:8px">';
      h+='<span style="font-size:18px">'+(expired?'рҹ”ҙ':remaining===0?'вҡЎ':remaining<=7?'вҡ пёҸ':'вҸі')+'</span>';
      h+='<button onclick="event.stopPropagation();delDeadline('+sid+')" style="background:none;color:var(--text3);font-size:14px;cursor:pointer;padding:3px 7px;border-radius:6px;border:1px solid var(--border2)">вң•</button>';
      h+='</div></div>';

      // BIG countdown display
      h+='<div style="padding:12px 14px">';
      if(expired){
        h+='<div style="text-align:center;padding:10px 0">';
        h+='<div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:4px">вӣ” Ш§ЩҶШӘЩҮЩү Ш§Щ„Щ…ЩҲШ№ШҜ</div>';
        h+='<div style="font-size:11px;color:var(--text3)">Щ…ЩҶШ° '+Math.abs(remaining)+' ЩҠЩҲЩ… В· '+new Date(info.deadlineDate+'T00:00:00').toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'})+'</div>';
        h+='</div>';
      } else {
        // Digital clock style: DD HH:MM:SS
        h+='<div id="dlc-'+sid+'" style="display:flex;gap:6px;justify-content:center;align-items:flex-end;direction:ltr">';
        // Days
        h+='<div style="text-align:center">';
        h+='<div id="dlcd-'+sid+'" style="background:var(--surface3);border:1px solid '+border+';border-radius:10px;padding:6px 10px;min-width:52px;font-size:28px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums;line-height:1">--</div>';
        h+='<div style="font-size:9px;color:var(--text3);margin-top:4px;font-weight:700">ЩҠЩҲЩ…</div>';
        h+='</div>';
        h+='<div style="font-size:24px;font-weight:900;color:var(--text3);padding-bottom:18px">:</div>';
        // Hours
        h+='<div style="text-align:center">';
        h+='<div id="dlch-'+sid+'" style="background:var(--surface3);border:1px solid '+border+';border-radius:10px;padding:6px 10px;min-width:46px;font-size:28px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums;line-height:1">--</div>';
        h+='<div style="font-size:9px;color:var(--text3);margin-top:4px;font-weight:700">ШіШ§Ш№Ш©</div>';
        h+='</div>';
        h+='<div style="font-size:24px;font-weight:900;color:var(--text3);padding-bottom:18px">:</div>';
        // Minutes
        h+='<div style="text-align:center">';
        h+='<div id="dlcm-'+sid+'" style="background:var(--surface3);border:1px solid '+border+';border-radius:10px;padding:6px 10px;min-width:46px;font-size:28px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums;line-height:1">--</div>';
        h+='<div style="font-size:9px;color:var(--text3);margin-top:4px;font-weight:700">ШҜЩӮЩҠЩӮШ©</div>';
        h+='</div>';
        h+='<div style="font-size:24px;font-weight:900;color:var(--text3);padding-bottom:18px">:</div>';
        // Seconds
        h+='<div style="text-align:center">';
        h+='<div id="dlcs-'+sid+'" style="background:var(--surface3);border:1px solid '+border+';border-radius:10px;padding:6px 10px;min-width:46px;font-size:28px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums;line-height:1">--</div>';
        h+='<div style="font-size:9px;color:var(--text3);margin-top:4px;font-weight:700">Ш«Ш§ЩҶЩҠШ©</div>';
        h+='</div>';
        h+='</div>';
        // Deadline date label
        h+='<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--text3)">рҹ“… Ш§Щ„Щ…ЩҲШ№ШҜ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ: <strong style="color:'+clr+'">'+new Date(info.deadlineDate+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</strong></div>';
        // Progress bar
        var pct=Math.min(100,Math.round(((info.days-remaining)/info.days)*100));
        h+='<div style="margin-top:10px;background:var(--surface3);border-radius:4px;height:5px;overflow:hidden">';
        h+='<div id="dlcpb-'+sid+'" style="height:100%;background:'+clr+';border-radius:4px;width:'+pct+'%;transition:width 1s linear"></div></div>';
        h+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:3px"><span>ШЁШҜШ§ЩҠШ© Ш§Щ„Щ…ШҜШ©</span><span id="dlcpct-'+sid+'">'+pct+'%</span><span>Ш§Щ„Щ…ЩҲШ№ШҜ Ш§Щ„ЩҶЩҮШ§ШҰЩҠ</span></div>';
      }
      h+='</div></div>';
    });
    h+='</div>';
  }

  // Remote sessions today
  var remoteSessions=data.filter(function(s){return s.date===td&&s.meetUrl&&(s.status==='scheduled'||s.status==='inProgress');});
  if(remoteSessions.length){
    h+=secHdr('рҹҺҘ','Ш¬Щ„ШіШ§ШӘ Ш№ЩҶ ШЁЩҸШ№ШҜ Ш§Щ„ЩҠЩҲЩ…');
    h+='<div class="stagger">';
    remoteSessions.forEach(function(s){
      var info=getMeetInfo(s.meetUrl)||{icon:'рҹ”—',color:'var(--gold2)',bg:'var(--gold-a10)',border:'var(--gold-a30)',name:'Ш§Ш¬ШӘЩ…Ш§Ш№'};
      h+='<div style="background:'+info.bg+';border:1px solid '+info.border+';border-radius:var(--r-md);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px">';
      h+='<div style="font-size:24px">'+info.icon+'</div>';
      h+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">'+s.num+'</div>';
      h+='<div style="font-size:10px;color:var(--text3);margin-top:1px">'+s.time+' В· '+info.name+'</div></div>';
      h+=meetJoinBtn(s,'small');
      h+='</div>';
    });
    h+='</div>';
  }
  if(todayS.length){h+=secHdr('рҹ“…','Ш¬Щ„ШіШ§ШӘ Ш§Щ„ЩҠЩҲЩ…')+'<div class="stagger">';todayS.forEach(function(s){h+=card(s);});h+='</div>';}
  if(upcoming.length){h+=secHdr('рҹ”ң','ЩӮШ§ШҜЩ…Ш© ЩӮШұЩҠШЁШ§ЩӢ')+'<div class="stagger">';upcoming.forEach(function(s){h+=card(s);});h+='</div>';}
  h+=rWeek();
  // AI shortcut on home
  h+='<div style="background:rgba(16,163,127,0.08);border:1px solid rgba(16,163,127,0.2);border-radius:var(--r-md);padding:14px;margin-top:14px;display:flex;align-items:center;gap:10px;cursor:pointer" onclick="go(\'ai\')">';
  h+='<div style="font-size:28px">вҡ–пёҸ</div><div><div style="font-size:13px;font-weight:700;color:#2ecc9a">ШіШ№ЩҲШҜ вҖ“ Щ…ШіШӘШҙШ§ШұЩғ Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠ</div><div style="font-size:11px;color:var(--text3);margin-top:3px">Ш§ШіШЈЩ„ЩҮ Ш№ЩҶ Ш¬Щ„ШіШ§ШӘЩғ ШЈЩҲ ШЈЩҠ ШіШӨШ§Щ„ ЩӮШ§ЩҶЩҲЩҶЩҠ</div></div><div style="margin-right:auto;font-size:18px;color:#10a37f">вҖә</div>';
  h+='</div>';
  if(!todayS.length&&!upcoming.length&&!high.length)h+='<div class="empty"><div class="empty-icon">вҡ–пёҸ</div><div class="empty-title">Щ„Ш§ ШӘЩҲШ¬ШҜ Ш¬Щ„ШіШ§ШӘ Щ…Ш¬ШҜЩҲЩ„Ш©</div><div class="empty-sub">Ш§Ш¶ШәШ· В«Ш¬ШҜЩҠШҜШ©В» Щ„ШҘШ¶Ш§ЩҒШ© Ш¬Щ„ШіШ©</div></div>';
  return h;
}

or:var(--text3);font-size:15px;cursor:pointer">рҹ—‘пёҸ</button></div>';});h+='</div>';}h+='<div id="cform" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px;margin-top:12px"><div style="font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px">ШҘШ¶Ш§ЩҒШ© Ш·ШұЩҒ Ш¬ШҜЩҠШҜ</div><input id="cn" type="text" placeholder="Ш§Щ„Ш§ШіЩ… Ш§Щ„ЩғШ§Щ…Щ„ *" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><select id="cr" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block">'+roles.map(function(r){return'<option>'+r+'</option>';}).join('')+'</select><input id="cc" type="text" placeholder="ШұЩӮЩ… Ш§Щ„ЩӮШ¶ЩҠШ© (Ш§Ш®ШӘЩҠШ§ШұЩҠ)" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="cp" type="tel" placeholder="ШұЩӮЩ… Ш§Щ„Ш¬ЩҲШ§Щ„ (Ш§Ш®ШӘЩҠШ§ШұЩҠ)" dir="ltr" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:11px;display:block"><div style="display:flex;gap:7px"><button onclick="saveCon()" style="flex:1;background:var(--gold);color:#0a0905;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer">ШӯЩҒШё</button><button onclick="clsConForm()" style="flex:1;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;cursor:pointer">ШҘЩ„ШәШ§ШЎ</button></div></div>';return h;}

function saveCon(){var cn=document.getElementById('cn');if(!cn||!cn.value.trim()){toast('вҡ пёҸ ШЈШҜШ®Щ„ Ш§Щ„Ш§ШіЩ…');return;}contacts.push({id:Date.now(),name:cn.value.trim(),role:document.getElementById('cr').value,caseNum:document.getElementById('cc').value.trim(),phone:document.getElementById('cp').value.trim()});saveContacts();toast('вң… ШӘЩ…ШӘ Ш§Щ„ШҘШ¶Ш§ЩҒШ©');render();}
function delCon(id){contacts=contacts.filter(function(x){return x.id!==id;});saveContacts();toast('рҹ—‘пёҸ ШӘЩ… Ш§Щ„ШӯШ°ЩҒ');render();}

function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function fileIcon(ext){var m={'.doc':'рҹ“„','.docx':'рҹ“„','.pdf':'рҹ“•','.txt':'рҹ“қ','.xls':'рҹ“Ҡ','.xlsx':'рҹ“Ҡ','.png':'рҹ–јпёҸ','.jpg':'рҹ–јпёҸ','.jpeg':'рҹ–јпёҸ'};return m[ext]||'рҹ“Һ';}

function uploadWordFile(input){var file=input.files[0];if(!file)return;var allowed=['.doc','.docx','.pdf','.txt','.xls','.xlsx','.png','.jpg','.jpeg'];var ext=file.name.substring(file.name.lastIndexOf('.')).toLowerCase();if(allowed.indexOf(ext)===-1){toast('вҡ пёҸ ШөЩҠШәШ© ШәЩҠШұ Щ…ШҜШ№ЩҲЩ…Ш©');return;}if(file.size>10*1024*1024){toast('вҡ пёҸ Ш§Щ„ШӯШ¬Щ… ШЈЩғШЁШұ Щ…ЩҶ 10MB');return;}var r=new FileReader();r.onload=function(e){wordFiles.unshift({id:Date.now(),name:file.name,size:file.size,type:ext,date:new Date().toLocaleDateString('ar-SA'),folder:curFolder||'Ш№Ш§Щ…',data:e.target.result});saveWordFiles();toast('вң… ШӘЩ… ШұЩҒШ№: '+file.name);render();};r.readAsDataURL(file);}

function addFolder(){var name=prompt('Ш§ШіЩ… Ш§Щ„Щ…Ш¬Щ„ШҜ:');if(!name||!name.trim())return;if(folders.indexOf(name.trim())>-1){toast('вҡ пёҸ Ш§Щ„Щ…Ш¬Щ„ШҜ Щ…ЩҲШ¬ЩҲШҜ');return;}folders.push(name.trim());saveFolders();toast('рҹ“Ӯ ШӘЩ… Ш§Щ„ШҘЩҶШҙШ§ШЎ');render();}

function renderFilesList(files){if(!files.length)return'<div class="empty"><div class="empty-icon">рҹ“Ӯ</div><div class="empty-title">Ш§Щ„Щ…Ш¬Щ„ШҜ ЩҒШ§ШұШә</div></div>';return files.map(function(f){var moveOptions=folders.filter(function(x){return x!==f.folder;}).map(function(folder){return'<option value="'+folder+'">рҹ“Ӯ '+folder+'</option>';}).join('');return'<div class="file-card"><div style="display:flex;align-items:center;gap:10px"><div style="width:44px;height:44px;border-radius:11px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+fileIcon(f.type)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.name+'</div><div style="display:flex;gap:8px;margin-top:3px"><span style="font-size:10px;color:var(--text3)">рҹ“… '+f.date+'</span><span style="font-size:10px;color:var(--text3)">рҹ’Ҫ '+fmtSize(f.size)+'</span></div></div><div style="display:flex;gap:5px;flex-shrink:0"><button onclick="downloadWordFile('+f.id+')" style="width:32px;height:32px;border-radius:8px;background:var(--blue-a);color:var(--blue);border:1px solid rgba(74,144,217,.3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">рҹ“Ҙ</button><button onclick="deleteWordFile('+f.id+')" style="width:32px;height:32px;border-radius:8px;background:var(--red-a);color:#f87171;border:1px solid rgba(232,80,80,.3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">рҹ—‘пёҸ</button></div></div>'+(moveOptions?'<div style="margin-top:8px;display:flex;align-items:center;gap:7px"><span style="font-size:10px;color:var(--text3)">ЩҶЩӮЩ„ ШҘЩ„Щү:</span><select onchange="moveFile('+f.id+',this.value)" style="flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:5px 8px;font-size:11px;color:var(--text)"><option value="">Ш§Ш®ШӘШұ...</option>'+moveOptions+'</select></div>':'')+'</div>';}).join('');}
function filterFiles(q2,folder){var filtered=wordFiles.filter(function(f){return f.folder===folder&&f.name.toLowerCase().includes(q2.toLowerCase());});var el=document.getElementById('filesList');if(el)el.innerHTML=renderFilesList(filtered);}
function rFiles(){var h='';if(curFolder===null){h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2)">рҹ“Ғ Щ…Щ„ЩҒШ§ШӘЩҠ Ш§Щ„ЩӮШ§ЩҶЩҲЩҶЩҠШ©</div><button onclick="addFolder()" style="background:var(--gold);color:#0a0905;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer">+ Щ…Ш¬Щ„ШҜ</button></div>';var totalSize=wordFiles.reduce(function(s,f){return s+f.size;},0);h+='<div class="stats-grid" style="margin-bottom:14px"><div class="stat-card" style="--sc-clr:var(--blue)"><div class="stat-icon">рҹ“Ғ</div><div class="stat-value">'+wordFiles.length+'</div><div class="stat-label">ШҘШ¬Щ…Ш§Щ„ЩҠ Ш§Щ„Щ…Щ„ЩҒШ§ШӘ</div></div><div class="stat-card" style="--sc-clr:var(--green)"><div class="stat-icon">рҹ’Ҫ</div><div class="stat-value" style="font-size:20px">'+fmtSize(totalSize)+'</div><div class="stat-label">Ш§Щ„ШӯШ¬Щ… Ш§Щ„ЩғЩ„ЩҠ</div></div></div>';h+=secHdr('рҹ“Ӯ','Ш§Щ„Щ…Ш¬Щ„ШҜШ§ШӘ')+'<div class="folder-grid">';folders.forEach(function(name){var count=wordFiles.filter(function(f){return f.folder===name;}).length;var clr=folderColor(name);var sz=wordFiles.filter(function(f){return f.folder===name;}).reduce(function(s,f){return s+f.size;},0);h+='<div class="folder-card" onclick="curFolder=\''+name+'\';render()"><div style="font-size:32px;margin-bottom:8px">рҹ“Ӯ</div><div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px">'+name+'</div><div style="font-size:10px;color:var(--text3)">'+count+' Щ…Щ„ЩҒ В· '+fmtSize(sz)+'</div>'+(name!=='Ш№Ш§Щ…'?'<button onclick="event.stopPropagation();deleteFolder(\''+name+'\')" style="position:absolute;top:8px;left:8px;background:none;border:none;color:var(--text3);font-size:13px;cursor:pointer">вң•</button>':'')+'<div style="width:100%;height:3px;border-radius:2px;background:'+clr+';opacity:.4;margin-top:8px"></div></div>';});h+='</div>';}else{var folderFiles=wordFiles.filter(function(f){return f.folder===curFolder;});h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px"><button onclick="curFolder=null;render()" style="width:34px;height:34px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">вҖ№</button><div style="font-family:Scheherazade New,serif;font-size:17px;color:var(--gold2)">рҹ“Ӯ '+curFolder+'</div><span style="font-size:11px;color:var(--text3);margin-right:auto">'+folderFiles.length+' Щ…Щ„ЩҒ</span><label style="background:var(--gold);color:#0a0905;border-radius:10px;padding:8px 12px;font-weight:700;font-size:12px;cursor:pointer">+ ШұЩҒШ№<input type="file" accept=".doc,.docx,.pdf,.txt,.xls,.xlsx,.png,.jpg,.jpeg" style="display:none" onchange="uploadWordFile(this)"></label></div>';h+='<div class="search-wrap" style="margin-bottom:10px"><span class="search-ico">рҹ”Қ</span><input type="search" placeholder="ШЁШӯШ« ЩҒЩҠ '+curFolder+'..." dir="rtl" oninput="filterFiles(this.value,\''+curFolder+'\')" id="fileSearch"></div>';h+='<div id="filesList">'+renderFilesList(folderFiles)+'</div>';}return h;}

function rCal(){var yr=calD.getFullYear(),mo=calD.getMonth();var days=new Date(yr,mo+1,0).getDate(),first=new Date(yr,mo,1).getDay();var byDate={};data.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});var tod=today(),selStr=selD?selD.toISOString().split('T')[0]:null;function ds(d){return yr+'-'+pad(mo+1)+'-'+pad(d);}var h='<div class="cal-wrap"><div class="cal-nav"><button class="cal-btn-nav" onclick="calPrev()">вҖә</button><div class="cal-month">'+MO[mo]+' '+yr+'</div><button class="cal-btn-nav" onclick="calNext()">вҖ№</button></div><div class="cal-days-hdr">';DY.forEach(function(d){h+='<div class="cal-day-name">'+d+'</div>';});h+='</div><div class="cal-grid">';for(var i=0;i<first;i++)h+='<div></div>';for(var d=1;d<=days;d++){var dstr=ds(d),has=!!(byDate[dstr]&&byDate[dstr].length),isT=dstr===tod,isSel=dstr===selStr;var bg=isSel?'var(--gold-a20)':isT?'var(--blue-a)':'transparent';var bdr=isSel?'var(--gold-a30)':isT?'rgba(74,144,217,.35)':'transparent';var nc=isSel?'var(--gold2)':isT?'var(--blue)':'var(--text2)';var dotC=has?(isSel?'var(--gold)':ST[byDate[dstr][0].status].clr):'';h+='<div class="cal-cell" onclick="selDay(\''+dstr+'\')" style="background:'+bg+';border-color:'+bdr+'"><div class="cal-cell-num" style="color:'+nc+'">'+d+'</div>'+(has?'<div class="cal-dot" style="background:'+dotC+'"></div>':'')+'</div>';}h+='</div></div>';if(selD){var ss=byDate[selStr]||[];h+=secHdr('рҹ“Ң',fmtL(selStr||tod));if(!ss.length)h+='<div class="empty" style="padding:22px 0"><div style="font-size:28px;opacity:.3;margin-bottom:7px">рҹ“ӯ</div><div class="empty-sub">Щ„Ш§ ШӘЩҲШ¬ШҜ Ш¬Щ„ШіШ§ШӘ ЩҒЩҠ ЩҮШ°Ш§ Ш§Щ„ЩҠЩҲЩ…</div></div>';else{h+='<div class="stagger">';ss.forEach(function(s){h+=card(s);});h+='</div>';}}return h;}

function downloadAtt(sid,idx){
  var s=data.find(function(x){return x.id===sid;});
  if(!s||!s.attachments||!s.attachments[idx])return;
  var a=s.attachments[idx];
  if(!a.data){toast('вҡ пёҸ ШЁЩҠШ§ЩҶШ§ШӘ Ш§Щ„Щ…ШұЩҒЩӮ ШәЩҠШұ Щ…ШӘЩҲЩҒШұШ©');return;}
  var link=document.createElement('a');
  link.href=a.data;
  link.download=a.name||('Щ…ШұЩҒЩӮ_'+(idx+1));
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('рҹ“Ҙ Ш¬Ш§ШұЩҚ ШӘШӯЩ…ЩҠЩ„: '+a.name);
}

/* в”Җв”Җ Meeting URL helpers в”Җв”Җ */
function getMeetInfo(url){
  if(!url)return null;
  var u=url.toLowerCase();
  if(u.includes('teams.microsoft.com')||u.includes('teams.live.com'))
    return{name:'Teams',icon:'рҹҹҰ',color:'#6499ff',bg:'rgba(100,153,255,0.12)',border:'rgba(100,153,255,0.3)'};
  if(u.includes('zoom.us')||u.includes('zoom.com'))
    return{name:'Zoom',icon:'рҹҹҰ',color:'#2d8cff',bg:'rgba(45,140,255,0.12)',border:'rgba(45,140,255,0.3)'};
  if(u.includes('meet.google.com'))
    return{name:'Google Meet',icon:'рҹҹ©',color:'#34a853',bg:'rgba(52,168,83,0.12)',border:'rgba(52,168,83,0.3)'};
  if(u.includes('webex.com'))
    return{name:'Webex',icon:'рҹҹ§',color:'#f6921e',bg:'rgba(246,146,30,0.12)',border:'rgba(246,146,30,0.3)'};
  if(u.startsWith('http'))
    return{name:'Ш§Ш¬ШӘЩ…Ш§Ш№ Ш№ЩҶ ШЁЩҸШ№ШҜ',icon:'рҹ”—',color:'var(--gold2)',bg:'var(--gold-a10)',border:'var(--gold-a30)'};
  return null;
}

function updMeetIcon(url){
  var el=document.getElementById('meetIconPreview');if(!el)return;
  var info=getMeetInfo(url);
  el.textContent=info?info.icon:'рҹ”—';
}

function setMeetTemplate(type){
  var inp=document.getElementById('fMeetUrl');if(!inp)return;
  var placeholders={
    teams:'https://teams.microsoft.com/l/meetup-join/...',
    zoom:'https://zoom.us/j/...',
    meet:'https://meet.google.com/...'
  };
  inp.value='';inp.placeholder=placeholders[type]||'';inp.focus();
  var icons={teams:'рҹҹҰ',zoom:'рҹҹҰ',meet:'рҹҹ©'};
  var el=document.getElementById('meetIconPreview');if(el)el.textContent=icons[type]||'рҹ”—';
}

function pasteMeetUrl(){
  if(navigator.clipboard&&navigator.clipboard.readText){
    navigator.clipboard.readText().then(function(t){
      var inp=document.getElementById('fMeetUrl');
      if(inp&&t&&t.startsWith('http')){inp.value=t.trim();updMeetIcon(t.trim());toast('рҹ“Ӣ ШӘЩ… Ш§Щ„Щ„ШөЩӮ');}
      else toast('вҡ пёҸ Ш§Щ„ШӯШ§ЩҒШёШ© Щ„Ш§ ШӘШӯШӘЩҲЩҠ ШұШ§ШЁШ·Ш§ЩӢ ШөШ§Щ„ШӯШ§ЩӢ');
    }).catch(function(){toast('вҡ пёҸ Щ„Ш§ ЩҠЩ…ЩғЩҶ Ш§Щ„ЩҲШөЩҲЩ„ Щ„Щ„ШӯШ§ЩҒШёШ©');});
  } else toast('вҡ пёҸ ШәЩҠШұ Щ…ШҜШ№ЩҲЩ… ЩҒЩҠ ЩҮШ°Ш§ Ш§Щ„Щ…ШӘШөЩҒШӯ');
}

function joinMeeting(url){
  if(!url){toast('вҡ пёҸ Щ„Ш§ ЩҠЩҲШ¬ШҜ ШұШ§ШЁШ· Ш§Ш¬ШӘЩ…Ш§Ш№');return;}
  window.open(url,'_blank');
  toast('рҹҡҖ Ш¬Ш§ШұЩҚ Ш§Щ„Ш§ЩҶШ¶Щ…Ш§Щ…...');
}

function meetBadge(s){
  var info=getMeetInfo(s.meetUrl||'');
  if(!info)return'';
  return'<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:14px;font-size:10px;font-weight:700;background:'+info.bg+';color:'+info.color+';border:1px solid '+info.border+'">'+info.icon+' '+info.name+'</span>';
}

function meetJoinBtn(s,size){
  var info=getMeetInfo(s.meetUrl||'');
  if(!info)return'';
  var big=size==='big';
  return'<button onclick="joinMeeting(\''+s.meetUrl.replace(/'/g,"\\'")+'\')" style="'+(big?'width:100%;padding:13px;font-size:13px;margin-bottom:8px;':'padding:5px 12px;font-size:11px;')+
    'background:'+info.bg+';color:'+info.color+';border:1px solid '+info.border+';border-radius:'+(big?'var(--r-md)':'18px')+
    ';font-weight:700;cursor:pointer;display:'+(big?'flex':'inline-flex')+';align-items:center;justify-content:center;gap:6px;font-family:Tajawal,sans-serif">'+

function findCol(headers,aliases){
  for(var i=0;i<headers.length;i++){
    var h=String(headers[i]||'').trim().toLowerCase();
    for(var j=0;j<aliases.length;j++){if(h===aliases[j].toLowerCase()||h.includes(aliases[j].toLowerCase()))return i;}
  }
  return -1;
}

function parseDate(v){
  if(!v)return'';
  var s=String(v).trim();
  // Excel serial number
  if(/^\d{4,5}$/.test(s)){var d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.toISOString().split('T')[0];}
  // dd/mm/yyyy or dd-mm-yyyy
  var m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  return s;
}

function parseTime(v){
  if(!v)return'09:00';
  var s=String(v).trim();
  if(/^\d{1,2}:\d{2}/.test(s))return s.substring(0,5);
  if(/^0\.\d+$/.test(s)){var t=Math.round(parseFloat(s)*1440);return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');}
  return'09:00';
}

function rowToSession(row,map){
  var g=function(k){var i=map[k];return i>=0?String(row[i]||'').trim():'';};
  return{
    id:Date.now()+Math.random(),

    notes:g('notes')||'',
    attachments:[],memo:'',minutes:'',quickNote:'',tags:[],stage:''
  };
}

function handleImportFile(input){
  var file=input.files[0];if(!file)return;
  var isCSV=file.name.toLowerCase().endsWith('.csv');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=[];
      if(isCSV){
        var text=e.target.result;
        // Remove BOM
        if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
        var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
        rows=lines.map(function(l){
          // Handle quoted fields
          var cols=[];var cur='';var inQ=false;
          for(var i=0;i<l.length;i++){
            var c=l[i];
            if(c==='"'&&!inQ){inQ=true;}
            else if(c==='"'&&inQ){inQ=false;}
            else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
            else cur+=c;
          }
          cols.push(cur.trim());
          return cols;
        });
      } else {
        if(typeof XLSX==='undefined'){toast('вҡ пёҸ Щ…ЩғШӘШЁШ© Excel ШәЩҠШұ Щ…ШӯЩ…Щ„Ш©');return;}
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      if(!rows||rows.length<2){toast('вҡ пёҸ Ш§Щ„Щ…Щ„ЩҒ ЩҒШ§ШұШә ШЈЩҲ ШәЩҠШұ ШөШ§Щ„Шӯ');return;}
      var headers=rows[0].map(function(h){return String(h||'');});
      var colMap={};
      Object.keys(COL_MAP).forEach(function(k){colMap[k]=findCol(headers,COL_MAP[k]);});
      var sessions=rows.slice(1).filter(function(r){return r.some(function(c){return String(c||'').trim();});}).map(function(r){return rowToSession(r,colMap);});
      if(!sessions.length){toast('вҡ пёҸ Щ„Ш§ ШӘЩҲШ¬ШҜ ШЁЩҠШ§ЩҶШ§ШӘ ШөШ§Щ„ШӯШ©');return;}
      importPreviewRows=sessions;
      showImportPreview(sessions);
    }catch(err){console.error(err);toast('вҡ пёҸ Ш®Ш·ШЈ ЩҒЩҠ ЩӮШұШ§ШЎШ© Ш§Щ„Щ…Щ„ЩҒ: '+err.message);}
  };
  if(isCSV)reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

  h+='<button onclick="document.getElementById(\'impBox\').innerHTML=impWelcomeHTML()" style="background:var(--surface2);color:var(--text2);border:1px solid var(--border2);border-radius:var(--r-md);padding:13px;font-size:12px;cursor:pointer">вҶҗ ШұШ¬ЩҲШ№</button>';

function doImport(){
  var mode=document.querySelector('input[name="impMode"]:checked');
  var replace=mode&&mode.value==='replace';
  if(replace&&!confirm('ШіЩҠШӘЩ… ШӯШ°ЩҒ '+data.length+' Ш¬Щ„ШіШ© Щ…ЩҲШ¬ЩҲШҜШ©. Щ…ШӘШ§ШЁШ№Ш©Шҹ'))return;
  var sessions=importPreviewRows;
  var fixedIds=sessions.map(function(s){return Object.assign({},s,{id:Date.now()+Math.floor(Math.random()*99999)});});
  var ops=[];
  if(replace){
    ops=data.map(function(s){return dbDel(s.id);});
    Promise.all(ops).then(function(){
      data=[];
      return Promise.all(fixedIds.map(function(s){return dbPut(s);}));
    }).then(function(){data=fixedIds;importPreviewRows=[];var m=document.getElementById('impModal');if(m)m.remove();toast('вң… ШӘЩ… Ш§Щ„Ш§ШіШӘЩҠШұШ§ШҜ: '+fixedIds.length+' Ш¬Щ„ШіШ©');render();});
  } else {
    Promise.all(fixedIds.map(function(s){return dbPut(s);})).then(function(){data=data.concat(fixedIds);importPreviewRows=[];var m=document.getElementById('impModal');if(m)m.remove();toast('вң… ШӘЩ…ШӘ ШҘШ¶Ш§ЩҒШ©: '+fixedIds.length+' Ш¬Щ„ШіШ©');render();});
  }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   EXPORT ICS (CALENDAR)
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function exportICS(ids){
  var list=ids?data.filter(function(s){return ids.indexOf(s.id)>-1;}):data.filter(function(s){return s.status==='scheduled'||s.status==='inProgress';});
  if(!list.length){toast('вҡ пёҸ Щ„Ш§ ШӘЩҲШ¬ШҜ Ш¬Щ„ШіШ§ШӘ Щ„Щ„ШӘШөШҜЩҠШұ');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ш§Щ„Ш¬Щ„ШіШ§ШӘ Ш§Щ„ЩӮШ¶Ш§ШҰЩҠШ©//AR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  list.forEach(function(s){
    var dt=s.date.replace(/-/g,'')+'T'+s.time.replace(':','')+'00';
    var uid=s.id+'@jalsat-app';
    var summary='Ш¬Щ„ШіШ©: '+s.num+' - '+s.type;
    var desc='Ш§Щ„Щ…ШӯЩғЩ…Ш©: '+(s.court||'')+' | Ш§Щ„Щ…ШҜШ№ЩҠ: '+(s.plnt||'')+' | Ш§Щ„Щ…ШҜШ№Щү Ш№Щ„ЩҠЩҮ: '+(s.dfnd||'');
    var loc=s.court+(s.room?' - '+s.room:'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid);
    lines.push('DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z');
    lines.push('DTSTART;TZID=Asia/Riyadh:'+dt);
    lines.push('DURATION:PT1H');
    lines.push('SUMMARY:'+summary);
    lines.push('DESCRIPTION:'+desc);
    lines.push('LOCATION:'+loc);
    lines.push('STATUS:'+(s.status==='scheduled'?'CONFIRMED':'TENTATIVE'));
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT30M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:ШӘШ°ЩғЩҠШұ: '+summary);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='Ш¬Щ„ШіШ§ШӘЩҠ_'+today()+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('рҹ“… ШӘЩ… ШӘШөШҜЩҠШұ '+list.length+' Ш¬Щ„ШіШ© Щ„Щ„ШӘЩӮЩҲЩҠЩ…');
}

    '<div style="font-size:10px;color:var(--text3);margin-bottom:14px">Ш§Щ…ШіШӯ Ш§Щ„ЩғЩҲШҜ Щ„Щ„Ш§Ш·Щ„Ш§Ш№ Ш№Щ„Щү ШӘЩҒШ§ШөЩҠЩ„ Ш§Щ„Ш¬Щ„ШіШ©</div>'+
    '<button onclick="this.closest(\'[style]\').parentNode.removeChild(this.closest(\'[style]\'))" style="width:100%;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:10px;cursor:pointer;font-size:13px">ШҘШәЩ„Ш§ЩӮ</button>'+
  '</div>';
  document.body.appendChild(modal);

function openFeeForm(){var f=document.getElementById('feeForm');if(f){f.style.display='block';f.scrollIntoView({behavior:'smooth'});}}
function saveFee(){
  var desc=document.getElementById('feDesc');var amt=document.getElementById('feAmt');
  if(!desc||!desc.value.trim()||!amt||!amt.value){toast('вҡ пёҸ ШЈШҜШ®Щ„ Ш§Щ„ЩҲШөЩҒ ЩҲШ§Щ„Щ…ШЁЩ„Шә');return;}
  var sessEl=document.getElementById('feSess');
  fees.push({id:'fee_'+Date.now(),desc:desc.value.trim(),amount:parseFloat(amt.value)||0,date:document.getElementById('feDate').value,sessionId:sessEl?parseInt(sessEl.value)||null:null,paid:document.getElementById('fePaid').checked});
