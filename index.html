<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>المكتب السيادي الشامل - المحامي سعود العتيبي</title>
    <style>
        :root { 
            --gold: #AF9500; --dark-blue: #1A2B48; --ios-blue: #007AFF;
            --ai-purple: #5856D6; --ios-bg: #F8F9FA; --card-bg: #FFFFFF; --danger: #FF3B30;
        }
        body.dark-mode { --ios-bg: #000000; --card-bg: #1C1C1E; --dark-blue: #0A1424; }
        body { background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; color: #2C3E50; transition: 0.3s; padding-bottom: 100px; }
        
        /* شاشة القفل */
        #lock-screen { position: fixed; inset: 0; background: var(--dark-blue); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pass-container { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; backdrop-filter: blur(15px); width: 85%; max-width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }

        /* الهيدر */
        .header { position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); padding: 50px 20px 20px; z-index: 100; border-bottom: 1px solid #EEE; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; margin: 0; color: var(--gold); }

        .container { padding: 20px; display: none; }

        /* البطاقات */
        .case-card { background: var(--card-bg); border-radius: 22px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #EEE; position: relative; }
        .case-card::after { content: '⚖️'; position: absolute; top: 15px; left: 15px; opacity: 0.1; font-size: 30px; }

        /* الإعدادات */
        #settings-panel { display: none; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid var(--gold); margin-bottom: 20px; }

        /* أزرار وشارات */
        .btn-prime { background: var(--dark-blue); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 10px; }
        .badge { font-size: 11px; padding: 5px 10px; border-radius: 8px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .badge-red { background: rgba(255,59,48,0.1); color: var(--danger); }
        .badge-blue { background: rgba(0,122,255,0.1); color: var(--ios-blue); }

        .ai-result { background: #F0F4FF; padding: 15px; border-radius: 15px; font-size: 13px; line-height: 1.6; border-right: 4px solid var(--ai-purple); margin-top: 15px; display: none; }

        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #DDD; border-radius: 12px; box-sizing: border-box; font-size: 15px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #EEE; z-index: 200; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div style="font-size: 60px; margin-bottom: 10px;">🛡️</div>
    <div class="pass-container">
        <h3 style="margin-bottom: 20px;">المكتب السيادي</h3>
        <input type="password" id="pass-input" placeholder="كلمة المرور" style="text-align:center;">
        <button class="btn-prime" onclick="unlock()" style="background:var(--gold);">دخول آمن</button>
    </div>
</div>

<div class="header" id="app-header" style="display:none;">
    <h1>مكتب سعود العتيبي ⚖️</h1>
    <button onclick="toggleSettings()" style="background:none; border:none; font-size:20px;">⚙️</button>
</div>

<div class="container" id="app-container">
    <div id="settings-panel">
        <h3 style="margin-top:0;">الإعدادات والنظام</h3>
        <input type="text" id="api-key-input" placeholder="تحديث مفتاح Gemini API">
        <input type="password" id="new-pass" placeholder="تغيير كلمة المرور">
        <button class="btn-prime" onclick="saveSettings()">حفظ الإعدادات</button>
        <button class="btn-prime" onclick="toggleDarkMode()" style="background:var(--ios-blue); margin-top:5px;">تبديل الوضع الليلي 🌓</button>
    </div>

    <div style="background:var(--card-bg); padding:20px; border-radius:20px; border:1px solid #EEE; margin-bottom:20px;">
        <h4 style="margin:0 0 10px 0;">تسجيل قضية جديدة</h4>
        <input type="text" id="title" placeholder="اسم الموكل">
        <input type="date" id="jDate" title="تاريخ الحكم">
        <textarea id="facts" placeholder="وقائع القضية للتحليل الذكي..." rows="3"></textarea>
        <input type="number" id="fee" placeholder="الأتعاب المتبقية">
        <button class="btn-prime" onclick="saveCase()">حفظ الملف في القاعدة 📂</button>
    </div>

    <div id="cases-list"></div>
</div>

<div class="nav-bar" id="nav-bar" style="display:none;">
    <span onclick="window.scrollTo(0,0)">🏠 الرئيسية</span>
    <span onclick="toggleSettings()">⚙️ الإعدادات</span>
</div>

<script>
    let API_KEY = localStorage.getItem('saud_api_v4') || '';
    let PWD = localStorage.getItem('saud_pwd_v4') || '123';
    let cases = JSON.parse(localStorage.getItem('saud_data_v4')) || [];

    function unlock() {
        if(document.getElementById('pass-input').value === PWD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('nav-bar').style.display = 'flex';
            renderCases();
        } else { alert("كلمة المرور خاطئة!"); }
    }

    function toggleSettings() {
        const panel = document.getElementById('settings-panel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function saveSettings() {
        const newK = document.getElementById('api-key-input').value;
        const newP = document.getElementById('new-pass').value;
        if(newK) { localStorage.setItem('saud_api_v4', newK); API_KEY = newK; }
        if(newP) { localStorage.setItem('saud_pwd_v4', newP); PWD = newP; }
        alert("تم تحديث النظام بنجاح.");
        toggleSettings();
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
    }

    function saveCase() {
        const title = document.getElementById('title').value;
        const jDate = document.getElementById('jDate').value;
        const facts = document.getElementById('facts').value;
        const fee = document.getElementById('fee').value || 0;

        if(!title) return alert("أدخل اسم الموكل");

        const deadline = jDate ? new Date(jDate) : null;
        if(deadline) deadline.setDate(deadline.getDate() + 30);

        cases.push({
            id: Date.now(), title, facts, fee,
            deadline: deadline ? deadline.toISOString().split('T')[0] : 'غير محدد',
            analysis: ""
        });
        localStorage.setItem('saud_data_v4', JSON.stringify(cases));
        renderCases();
        document.getElementById('title').value = '';
        document.getElementById('facts').value = '';
    }

    async function analyzeAI(id) {
        if(!API_KEY) return alert("يرجى إدخال مفتاح API في الإعدادات أولاً");
        const c = cases.find(x => x.id === id);
        const resBox = document.getElementById(`ai-box-${id}`);
        resBox.style.display = "block";
        resBox.innerText = "⏳ جاري تحليل الوقائع والأنظمة...";

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `بصفتك مستشار قانوني سعودي، حلل هذه الواقعة واذكر المواد النظامية: ${c.facts}` }] }] })
            });
            const data = await res.json();
            const reply = data.candidates[0].content.parts[0].text;
            c.analysis = reply;
            localStorage.setItem('saud_data_v4', JSON.stringify(cases));
            renderCases();
        } catch (e) { resBox.innerText = "❌ خطأ في الاتصال."; }
    }

    function renderCases() {
        const list = document.getElementById('cases-list');
        list.innerHTML = cases.map(c => {
            // نظام المنبه (تلوين التنبيه إذا اقترب الموعد)
            const isLate = c.deadline !== 'غير محدد' && new Date(c.deadline) < new Date();
            return `
            <div class="case-card">
                <h3 style="margin:0 0 10px 0;">${c.title}</h3>
                <div class="badge ${isLate ? 'badge-red' : 'badge-blue'}">📅 الاستئناف: ${c.deadline}</div>
                <div class="badge badge-blue">💰 الأتعاب: ${c.fee}</div>
                <p style="font-size:13px; color:#666;">${c.facts}</p>
                
                <div id="ai-box-${c.id}" class="ai-result" style="${c.analysis ? 'display:block' : ''}">
                    <strong>💡 التحليل الذكي:</strong><br>${c.analysis.replace(/\n/g, '<br>')}
                </div>

                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-prime" onclick="analyzeAI(${c.id})" style="background:var(--ai-purple); margin-top:0;">✨ تحليل ذكي</button>
                    <button class="btn-prime" onclick="deleteCase(${c.id})" style="background:#EEE; color:#333; margin-top:0;">🗑 حذف</button>
                </div>
            </div>
        `}).join('');
    }

    function deleteCase(id) {
        if(confirm("حذف ملف القضية؟")) {
            cases = cases.filter(x => x.id !== id);
            localStorage.setItem('saud_data_v4', JSON.stringify(cases));
            renderCases();
        }
    }
</script>
</body>
</html>
