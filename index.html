<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الجلسات القضائية">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="الجلسات القضائية">
<meta name="theme-color" content="#08090d" id="themeColorMeta">
<meta name="description" content="تطبيق إدارة الجلسات القضائية بالذكاء الاصطناعي">
<link rel="manifest" id="pwaManifest">
<title>الجلسات القضائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #08090d;
  --surface: #0f1118;
  --surface2: #161923;
  --surface3: #1d2232;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.12);
  --gold: #d4a843;
  --gold2: #f0c55a;
  --gold3: #ffe08a;
  --gold-a10: rgba(212,168,67,0.1);
  --gold-a20: rgba(212,168,67,0.2);
  --gold-a30: rgba(212,168,67,0.3);
  --text: #f0f2f8;
  --text2: #8893ab;
  --text3: #4a5568;
  --blue: #4a90d9;
  --blue-a: rgba(74,144,217,0.12);
  --amber: #e8a030;
  --amber-a: rgba(232,160,48,0.12);
  --green: #3ab882;
  --green-a: rgba(58,184,130,0.12);
  --red: #e85050;
  --red-a: rgba(232,80,80,0.12);
  --purple: #8b6fd4;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 22px;
  --r-xl: 28px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); overflow: hidden; font-family: 'Tajawal', sans-serif; color: var(--text); direction: rtl; }
::-webkit-scrollbar { display: none; }
button, input, select, textarea { font-family: inherit; border: none; outline: none; background: none; }
input[type=date], input[type=time] { -webkit-appearance: none; color: var(--text); color-scheme: dark; }

#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; max-width: 430px; margin: 0 auto; overflow: hidden; background: var(--bg); }

#hdr { flex-shrink: 0; padding-top: var(--safe-top); background: var(--bg); z-index: 40; border-bottom: 1px solid var(--border); }
.hdr-inner { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px 12px; }
.hdr-brand { display: flex; flex-direction: column; }
.hdr-eyebrow { font-size: 10px; font-weight: 500; color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.hdr-title { font-family: 'Scheherazade New', serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--gold2), var(--gold3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hdr-date { font-size: 10px; color: var(--text3); margin-top: 1px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; }
.btn-icon { width: 36px; height: 36px; border-radius: var(--r-sm); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.btn-icon:active { transform: scale(0.92); }
.btn-icon.active { background: var(--gold-a20); border-color: var(--gold-a30); color: var(--gold2); }
.btn-new { display: flex; align-items: center; gap: 6px; background: var(--gold); color: #0a0905; border-radius: var(--r-sm); padding: 9px 14px; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 0 20px rgba(212,168,67,0.3); transition: all 0.15s; }
.btn-new:active { transform: scale(0.95); opacity: 0.9; }

.tabs-scroll { display: flex; padding: 6px 10px 0; gap: 2px; overflow-x: auto; background: var(--bg); }
.tab { flex-shrink: 0; padding: 8px 14px; border-radius: var(--r-sm) var(--r-sm) 0 0; font-size: 11px; font-weight: 600; color: var(--text3); cursor: pointer; transition: all 0.15s; border: 1px solid transparent; border-bottom: none; white-space: nowrap; position: relative; }
.tab.on { background: var(--surface); color: var(--gold2); border-color: var(--border); }
.tab.on::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--surface); }

#cnt { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(20px + var(--safe-bottom)); background: var(--surface); }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
.stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 70px; height: 70px; border-radius: 50%; background: var(--sc-clr, var(--gold)); opacity: 0.07; filter: blur(18px); }
.stat-icon { font-size: 18px; margin-bottom: 8px; }
.stat-value { font-size: 30px; font-weight: 900; line-height: 1; color: var(--sc-clr, var(--gold2)); }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; font-weight: 500; }

.sec-hdr { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 10px; margin-top: 6px; }
.sec-hdr::before { content: ''; width: 3px; height: 14px; background: var(--gold); border-radius: 2px; }
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.s-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 8px; cursor: pointer; position: relative; overflow: hidden; transition: transform 0.1s, border-color 0.15s; }
.s-card:active { transform: scale(0.985); border-color: var(--gold-a30); }
.s-card-accent { position: absolute; top: 0; right: 0; width: 3px; height: 100%; border-radius: 0 var(--r-md) var(--r-md) 0; }
.s-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.s-card-num { font-family: 'Scheherazade New', serif; font-size: 17px; font-weight: 700; color: var(--gold2); }
.s-card-meta { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.s-card-time { text-align: left; }
.s-card-timestr { font-size: 22px; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.s-card-date { font-size: 10px; color: var(--text3); margin-top: 2px; }
.s-card-parties { font-size: 11px; color: var(--text2); background: var(--surface3); border-radius: 8px; padding: 7px 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
.s-card-footer { display: flex; justify-content: space-between; align-items: center; }
.s-card-court { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.s-card-actions { display: flex; align-items: center; gap: 6px; }
.btn-cycle { background: var(--surface3); border: 1px solid var(--border2); border-radius: 7px; padding: 3px 9px; font-size: 10px; color: var(--text3); cursor: pointer; transition: all 0.12s; }
.btn-cycle:active { background: var(--gold-a10); }

.prio-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; }
.prio-high { background: var(--red-a); color: #f87171; border-color: rgba(232,80,80,0.3); }
.prio-med  { background: var(--amber-a); color: #fbbf24; border-color: rgba(232,160,48,0.3); }
.prio-low  { background: var(--green-a); color: #34d399; border-color: rgba(58,184,130,0.3); }
.prio-none { background: var(--blue-a); color: #60a5fa; border-color: rgba(74,144,217,0.3); }

.status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 18px; font-size: 10px; font-weight: 700; border: 1px solid; }

.countdown-bar { margin-top: 9px; background: var(--surface3); border-radius: 8px; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.cd-label { font-size: 9px; color: var(--text3); margin-bottom: 2px; }
.cd-time { font-size: 15px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.cd-urgent { color: #f87171; }
.cd-soon   { color: #fbbf24; }
.cd-ok     { color: #34d399; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.pulse { animation: pulse 1.2s ease-in-out infinite; }

.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-md); padding: 11px 42px 11px 50px; font-size: 13px; color: var(--text); transition: border-color 0.15s; }
.search-wrap input:focus { border-color: var(--gold-a30); }
.search-ico { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--text3); }
.search-adv { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: var(--gold2); cursor: pointer; }

.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 18px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.12s; }

.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 14px; font-size: 9px; font-weight: 700; background: var(--gold-a10); color: var(--gold2); border: 1px solid var(--gold-a20); }

.empty { text-align: center; padding: 50px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.empty-icon { font-size: 52px; opacity: 0.3; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 12px; color: var(--text3); }

.overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
.overlay.hid { display: none; }
.overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(6px); }
.sheet { position: relative; background: var(--surface); border-radius: var(--r-xl) var(--r-xl) 0 0; border-top: 1px solid var(--border2); max-height: 92vh; overflow-y: auto; padding-bottom: max(20px, var(--safe-bottom)); }
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 12px auto 16px; }
.sheet-hdr { position: sticky; top: 0; background: var(--surface); padding: 0 18px 14px; border-bottom: 1px solid var(--border); z-index: 1; display: flex; justify-content: space-between; align-items: center; }
.sheet-title { font-family: 'Scheherazade New', serif; font-size: 20px; font-weight: 700; color: var(--gold2); }
.sheet-close { width: 30px; height: 30px; border-radius: 8px; background: var(--surface2); color: var(--text3); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.sheet-body { padding: 16px 18px; }

.det-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.det-row:last-of-type { border-bottom: none; }
.det-key { font-size: 11px; color: var(--text3); font-weight: 500; flex-shrink: 0; }
.det-val { font-size: 12px; color: var(--text); font-weight: 600; text-align: left; flex: 1; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; color: var(--text3); font-weight: 700; margin-bottom: 6px; letter-spacing: 0.04em; }
.field input, .field select, .field textarea { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 12px 13px; font-size: 13px; color: var(--text); display: block; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-a30); }
.field textarea { resize: none; }
option { background: var(--surface); }

.prio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.prio-btn { padding: 9px; border-radius: var(--r-sm); font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; text-align: center; transition: all 0.12s; }
.prio-btn.sel { border-color: currentColor; }

.note-box { border-radius: var(--r-md); padding: 12px; margin: 10px 0; }
.note-box-hdr { font-size: 10px; font-weight: 700; margin-bottom: 8px; }
.note-box textarea { width: 100%; background: transparent; font-size: 12px; color: var(--text); resize: none; min-height: 70px; direction: rtl; line-height: 1.6; }

.att-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--surface); border-radius: 9px; margin-bottom: 5px; }
.att-name { font-size: 11px; color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.stage-btn { padding: 4px 10px; border-radius: 14px; font-size: 10px; font-weight: 600; cursor: pointer; border: 1px solid; margin: 3px; transition: all 0.12s; }

.btn-primary { width: 100%; background: var(--gold); color: #0a0905; border-radius: var(--r-md); padding: 14px; font-weight: 700; font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(212,168,67,0.25); transition: all 0.12s; margin-bottom: 8px; }
.btn-primary:active { opacity: 0.9; transform: scale(0.98); }
.btn-primary:disabled { background: var(--surface3); color: var(--text3); box-shadow: none; }
.btn-ghost { width: 100%; background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; font-weight: 600; font-size: 13px; cursor: pointer; }
.action-row { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }
.action-btn { flex: 1; min-width: 60px; border-radius: var(--r-sm); padding: 10px 5px; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; border: 1px solid; }

.dlg-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: center; justify-content: center; padding: 22px; }
.dlg-overlay.hid { display: none; }
.dlg-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.75); }
.dlg { position: relative; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 28px 22px 22px; width: 100%; max-width: 280px; text-align: center; }
.dlg-icon { font-size: 44px; margin-bottom: 12px; }
.dlg-title { font-family: 'Scheherazade New', serif; font-size: 18px; color: var(--text); margin-bottom: 5px; }
.dlg-sub { font-size: 12px; color: var(--text3); margin-bottom: 22px; }
.dlg-btns { display: flex; gap: 9px; }
.dlg-del { flex: 1; background: var(--red); color: #fff; border-radius: 11px; padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; }
.dlg-cancel { flex: 1; background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); border-radius: 11px; padding: 12px; font-weight: 600; font-size: 13px; cursor: pointer; }

.toast { position: fixed; bottom: calc(24px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(14px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 9px 18px; font-size: 12px; font-weight: 600; color: var(--text); z-index: 999; opacity: 0; pointer-events: none; white-space: nowrap; transition: all 0.25s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.cal-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 14px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-month { font-family: 'Scheherazade New', serif; font-size: 18px; font-weight: 700; color: var(--gold2); }
.cal-btn-nav { width: 34px; height: 34px; border-radius: 9px; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-days-hdr { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; }
.cal-day-name { text-align: center; font-size: 9px; color: var(--text3); font-weight: 600; padding: 3px 0; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-cell { text-align: center; border-radius: 9px; padding: 6px 1px; cursor: pointer; border: 2px solid transparent; min-height: 40px; display: flex; flex-direction: column; align-items: center; transition: all 0.1s; }
.cal-cell-num { font-size: 13px; font-weight: 600; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

.stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-bottom: 14px; }
.stat-mini { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 8px; text-align: center; }
.stat-mini-val { font-size: 22px; font-weight: 900; }
.stat-mini-lbl { font-size: 9px; color: var(--text3); margin-top: 4px; }
.bar-chart { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; margin-bottom: 14px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
.bar-label { font-size: 10px; color: var(--text3); width: 70px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 5px; height: 9px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-size: 10px; font-weight: 700; width: 20px; }

.task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; margin-bottom: 7px; }
.task-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
.task-title { font-size: 13px; font-weight: 600; color: var(--text); }
.task-title.done { text-decoration: line-through; opacity: 0.45; }

.contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.contact-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }

.folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.folder-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 14px; cursor: pointer; position: relative; transition: transform 0.1s; }
.folder-card:active { transform: scale(0.97); }
.file-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; margin-bottom: 8px; }

/* ═══════════════════════════════════════════════
   AI CHAT - ENHANCED
═══════════════════════════════════════════════ */
.ai-wrap { display: flex; flex-direction: column; height: calc(100vh - 145px - var(--safe-top) - var(--safe-bottom)); }

.ai-header {
  background: linear-gradient(135deg, rgba(16,163,127,0.12), rgba(16,163,127,0.05));
  border: 1px solid rgba(16,163,127,0.2);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.ai-avatar-wrap { position: relative; flex-shrink: 0; }
.ai-avatar {
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, #0d9f77, #065e46);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  box-shadow: 0 0 16px rgba(16,163,127,0.35);
}
.ai-online-dot {
  position: absolute; bottom: 1px; left: 1px;
  width: 11px; height: 11px; border-radius: 50%;
  background: #10a37f; border: 2px solid var(--surface);
}
.ai-name { font-family: 'Scheherazade New', serif; font-size: 16px; color: var(--gold2); font-weight: 700; }
.ai-status { font-size: 10px; color: #10a37f; margin-top: 2px; }
.ai-clear-btn {
  margin-right: auto; background: none;
  color: var(--text3); font-size: 11px; cursor: pointer;
  border: 1px solid var(--border2); border-radius: 8px; padding: 5px 9px;
}

.ai-context-bar {
  background: var(--surface2);
  border: 1px solid var(--gold-a20);
  border-radius: 10px;
  padding: 8px 12px;
  margin-bottom: 10px;
  font-size: 11px; color: var(--text3);
  display: flex; align-items: center; gap: 7px;
}
.ai-context-bar span { color: var(--gold2); font-weight: 700; }

.ai-msg-wrap { flex: 1; overflow-y: auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }

.ai-bubble-user {
  display: flex; justify-content: flex-start; margin-bottom: 12px;
}
.ai-bubble-user > div {
  background: var(--gold-a20); border: 1px solid var(--gold-a30);
  border-radius: 18px 18px 4px 18px;
  padding: 11px 14px; max-width: 82%;
  font-size: 13px; color: var(--text); line-height: 1.65;
}

.ai-bubble-ai {
  display: flex; justify-content: flex-end; margin-bottom: 12px; gap: 8px; align-items: flex-end;
}
.ai-bubble-ai > .bubble-content {
  background: var(--surface2); border: 1px solid rgba(16,163,127,0.2);
  border-radius: 18px 18px 18px 4px;
  padding: 11px 14px; max-width: 86%;

var DB_NAME='JalsatDB', DB_VER=9, STORE='sessions';
var db=null;
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){db=e.target.result;res();};r.onerror=rej;});}
function dbAll(){return new Promise(function(res){if(!db){res([]);return;}var tx=db.transaction(STORE,'readonly');var r=tx.objectStore(STORE).getAll();r.onsuccess=function(){res(r.result||[]);};r.onerror=function(){res([]);};});}
function dbPut(s){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(s);tx.oncomplete=res;tx.onerror=res;});}
function dbDel(id){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=res;});}

function formatAIResponse(text){
  if(!text)return'';
  text=String(text);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  var lines=text.split('\n');
  var result=[];
  lines.forEach(function(line){
    var trimmed=line.trim();
    if(!trimmed)return;
    if(trimmed.match(/^[-•]\s+/)||trimmed.match(/^\d+\.\s+/)){
      var content=trimmed.replace(/^[-•]\s+/,'').replace(/^\d+\.\s+/,'');
      result.push('<div class="ai-list-item">'+content+'</div>');
    } else {
      result.push('<p style="margin-bottom:6px">'+trimmed+'</p>');
    }
  });
  return'<div class="ai-response-text">'+(result.length?result.join(''):text)+'</div>';
}

function sendAIInput(){
  var inp=document.getElementById('ai-input');
  if(!inp||!inp.value.trim())return;
  sendAI(inp.value.trim());
  inp.value='';
}

function sendAI(msg){
  if(aiLoading)return;
  if(!msg||!msg.trim())return;
  if(!requireApiKey())return;
  aiMessages.push({role:'user',content:msg.trim()});
  aiLoading=true;
  render();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);

  // Build clean alternating messages (API requires user/assistant alternation, must start with user)
  var rawMsgs=aiMessages.slice(-20);
  var cleanMsgs=[];
  var lastRole=null;
  for(var mi=rawMsgs.length-1;mi>=0;mi--){
    var rm=rawMsgs[mi];
    if(rm.role!==lastRole){
      cleanMsgs.unshift({role:rm.role,content:rm.content});
      lastRole=rm.role;
    }
  }
  // Must start with user role
  while(cleanMsgs.length&&cleanMsgs[0].role!=='user')cleanMsgs.shift();
  if(!cleanMsgs.length)cleanMsgs=[{role:'user',content:msg.trim()}];

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      system:buildAISystem(),
      messages:cleanMsgs
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(d){
    var reply='';
    if(d.content&&d.content.length>0){
      d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
    }
    if(!reply)reply='عذراً، لم أتمكن من الرد. حاول مرة أخرى.';
    aiMessages.push({role:'assistant',content:reply});
    saveAIMsgs();
    aiLoading=false;
    render();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
  })
  .catch(function(err){
    console.error('AI Error:',err);
    var errMsg='⚠️ '+( err.message&&err.message.length<120 ? err.message : 'تعذّر الاتصال. تحقق من اتصالك بالإنترنت وحاول مجدداً.' );
    aiMessages.push({role:'assistant',content:errMsg});
    saveAIMsgs();
    aiLoading=false;
    render();
  });
}

function clearAI(){
  if(aiMessages.length&&!confirm('مسح كل المحادثة؟'))return;
  aiMessages=[];
  saveAIMsgs();
  render();
}

/* ═══════════════════════════════════════════════════════════
   DOCUMENT ANALYSIS
═══════════════════════════════════════════════════════════ */
function analyzeDocument(input, hint){
  var file=input.files[0];
  if(!file){return;}
  if(!requireApiKey()){input.value='';return;}
  input.value='';

  var maxMB=20;
  if(file.size>maxMB*1024*1024){toast('⚠️ الملف أكبر من '+maxMB+'MB');return;}

  // Detect type
  var isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  var isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){toast('⚠️ يُقبل PDF أو صورة فقط');return;}

  var mediaType=isPDF?'application/pdf':file.type;
  var fileIcon=isPDF?'📕':'🖼️';
  var label=file.name.length>36?file.name.substring(0,33)+'...':file.name;

  // Show file bubble in chat immediately
  if(curTab!=='ai'){go('ai');}
  aiLoading=true;

  // Add a special "user" message showing the doc
  aiMessages.push({
    role:'user',
    content:'📎 '+label+'\n[يتم تحليل المستند...]',
    isDoc:true,
    docIcon:fileIcon,
    docName:label
  });
  render();
  setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(!b64){
      toast('⚠️ فشل قراءة الملف');
      aiMessages.pop();
      aiLoading=false;
      render();
      return;
    }

    // Build the user text input if any
    var userText=document.getElementById('ai-input');
    var customQ=userText&&userText.value.trim()?userText.value.trim():'';
    if(userText)userText.value='';

    var prompt=customQ||
      (isPDF
        ? 'حلّل هذه الوثيقة القانونية واستخرج: ١) الموضوع الرئيسي ٢) الأطراف المذكورة ٣) النقاط القانونية الجوهرية ٤) أي تواريخ أو مواعيد مهمة ٥) توصياتك القانونية.'
        : 'حلّل هذه الصورة واستخرج أي محتوى قانوني أو نصي مهم، واذكر ملاحظاتك.');

    // Build message content as multipart
    var contentBlock=[];
    if(isPDF){
      contentBlock.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else {
      contentBlock.push({type:'image',source:{type:'base64',media_type:mediaType,data:b64}});
    }
    contentBlock.push({type:'text',text:prompt});

    // Update the last message with the real prompt shown to user
    aiMessages[aiMessages.length-1].content='📎 '+label+(customQ?'\n'+customQ:'');

    // Build history — previous messages (text only) + this multipart message
    var prevMsgs=[];
    var hist=aiMessages.slice(-10,-1);
    var lastR=null;
    for(var mi=hist.length-1;mi>=0;mi--){
      var hm=hist[mi];
      if(hm.role!==lastR&&!hm.isDoc){
        prevMsgs.unshift({role:hm.role,content:hm.content});
        lastR=hm.role;
      }
    }
    // Remove trailing assistant (last must be user)
    while(prevMsgs.length&&prevMsgs[prevMsgs.length-1].role==='assistant')prevMsgs.pop();

    var apiMessages=prevMsgs.concat([{role:'user',content:contentBlock}]);

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2048,
        system:buildAISystem()+'\nعند تحليل مستند، كن منظماً واستخدم عناوين وقوائم واضحة.',
        messages:apiMessages
      })
    })
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(d){
      var reply='';
      if(d.content&&d.content.length>0){
        d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
      }
      if(!reply)reply='لم أتمكن من قراءة المستند. تأكد أنه ملف PDF أو صورة واضحة.';
      aiMessages.push({role:'assistant',content:reply});
      saveAIMsgs();
      aiLoading=false;
      render();
      setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
    })
    .catch(function(err){
      console.error('Doc analysis error:',err);
      var msg='⚠️ '+(err.message&&err.message.length<120?err.message:'فشل تحليل المستند. تأكد من الاتصال وحاول مرة أخرى.');
      aiMessages.push({role:'assistant',content:msg});
      saveAIMsgs();
      aiLoading=false;
      render();
    });
  };
  reader.onerror=function(){
    toast('⚠️ خطأ في قراءة الملف');
    aiMessages.pop();
    aiLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

function cdInfo(s){if(s.status==='completed'||s.status==='postponed')return null;var now=new Date(),tgt=new Date(s.date+'T'+s.time+':00'),diff=tgt-now;if(diff<0){var e=Math.abs(diff);return{passed:true,time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)),cls:'urgent'};}var ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;var cls=ts<3600?'urgent':ts<86400?'soon':'ok';var t=days>0?(days+'ي '+pad(h)+':'+pad(m)+':'+pad(sec)):(pad(h)+':'+pad(m)+':'+pad(sec));return{passed:false,time:t,cls:cls,ts:ts};}

function rWeek(){var next7=[];for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()+i);next7.push(d.toISOString().split('T')[0]);}var weekData=data.filter(function(s){return next7.indexOf(s.date)>-1;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});var h=secHdr('📅','الأسبوع القادم');if(!weekData.length)return h+'<div class="empty" style="padding:22px 0"><div style="font-size:32px;opacity:.25">📅</div><div class="empty-sub" style="margin-top:6px">لا توجد جلسات هذا الأسبوع</div></div>';var byDate={};weekData.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});Object.keys(byDate).sort().forEach(function(d){h+='<div class="week-date-pill">'+fmtL(d)+' ('+byDate[d].length+')</div>';byDate[d].forEach(function(s){h+=card(s);});});return h;}

function rTasks(){var pend=tasks.filter(function(t){return!t.done;}),done=tasks.filter(function(t){return t.done;});var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2)">📋 المهمات القانونية</div><button onclick="opnTaskForm()" style="background:var(--gold);color:#0a0905;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer">+ مهمة</button></div>';h+='<div class="stats-grid" style="margin-bottom:14px"><div class="stat-card" style="--sc-clr:var(--blue)"><div class="stat-icon">📋</div><div class="stat-value">'+tasks.length+'</div><div class="stat-label">إجمالي</div></div><div class="stat-card" style="--sc-clr:var(--green)"><div class="stat-icon">✅</div><div class="stat-value">'+done.length+'</div><div class="stat-label">منجزة</div></div></div>';if(pend.length){h+=secHdr('🔴','قيد التنفيذ');pend.forEach(function(t){h+=tcard(t);});}if(done.length){h+=secHdr('✅','منجزة');done.forEach(function(t){h+=tcard(t);});}if(!tasks.length)h+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا توجد مهمات</div><div class="empty-sub">اضغط + مهمة</div></div>';h+='<div id="tform" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px;margin-top:12px"><div style="font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px">مهمة جديدة</div><input id="tt" type="text" placeholder="عنوان المهمة *" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="tc" type="text" placeholder="رقم القضية" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="td2"   num:['رقم القضية','رقم','num','case number','case_number'],
  type:['نوع القضية','نوع','type','case type'],
  court:['المحكمة','محكمة','court'],

  status:['الحالة','حالة','status'],
  priority:['الأهمية','أهمية','priority'],
  notes:['ملاحظات','notes']
};
var ST_MAP={'مجدولة':'scheduled','scheduled':'scheduled','جارية':'inProgress','منتهية':'completed','completed':'completed','مؤجلة':'postponed','postponed':'postponed'};
var PR_MAP={'عالية':'high','high':'high','متوسطة':'med','med':'med','منخفضة':'low','low':'low','عادية':'none','none':'none'};

function findCol(headers,aliases){
  for(var i=0;i<headers.length;i++){
    var h=String(headers[i]||'').trim().toLowerCase();
    for(var j=0;j<aliases.length;j++){if(h===aliases[j].toLowerCase()||h.includes(aliases[j].toLowerCase()))return i;}
  }
  return -1;
}

function parseDate(v){
  if(!v)return'';
  var s=String(v).trim();
  // Excel serial number
  if(/^\d{4,5}$/.test(s)){var d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.toISOString().split('T')[0];}
  // dd/mm/yyyy or dd-mm-yyyy
  var m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  return s;
}

function parseTime(v){
  if(!v)return'09:00';
  var s=String(v).trim();
  if(/^\d{1,2}:\d{2}/.test(s))return s.substring(0,5);
  if(/^0\.\d+$/.test(s)){var t=Math.round(parseFloat(s)*1440);return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');}
  return'09:00';
}

function rowToSession(row,map){
  var g=function(k){var i=map[k];return i>=0?String(row[i]||'').trim():'';};
  return{
    id:Date.now()+Math.random(),
    num:g('num')||'—',
    type:g('type')||'مدنية',
    court:g('court')||'—',
    room:g('room')||'',
    plnt:g('plnt')||'',
    dfnd:g('dfnd')||'',
    date:parseDate(g('date'))||today(),
    time:parseTime(g('time')),
    status:ST_MAP[(g('status')||'').toLowerCase()]||'scheduled',
    priority:PR_MAP[(g('priority')||'').toLowerCase()]||'none',
    notes:g('notes')||'',
    attachments:[],memo:'',minutes:'',quickNote:'',tags:[],stage:''
  };
}

function handleImportFile(input){
  var file=input.files[0];if(!file)return;
  var isCSV=file.name.toLowerCase().endsWith('.csv');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=[];
      if(isCSV){
        var text=e.target.result;
        // Remove BOM
        if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
        var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
        rows=lines.map(function(l){
          // Handle quoted fields
          var cols=[];var cur='';var inQ=false;
          for(var i=0;i<l.length;i++){
            var c=l[i];
            if(c==='"'&&!inQ){inQ=true;}
            else if(c==='"'&&inQ){inQ=false;}
            else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
            else cur+=c;
          }
          cols.push(cur.trim());
          return cols;
        });
      } else {
        if(typeof XLSX==='undefined'){toast('⚠️ مكتبة Excel غير محملة');return;}
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      if(!rows||rows.length<2){toast('⚠️ الملف فارغ أو غير صالح');return;}
      var headers=rows[0].map(function(h){return String(h||'');});
      var colMap={};
      Object.keys(COL_MAP).forEach(function(k){colMap[k]=findCol(headers,COL_MAP[k]);});
      var sessions=rows.slice(1).filter(function(r){return r.some(function(c){return String(c||'').trim();});}).map(function(r){return rowToSession(r,colMap);});
      if(!sessions.length){toast('⚠️ لا توجد بيانات صالحة');return;}
      importPreviewRows=sessions;
      showImportPreview(sessions);
    }catch(err){console.error(err);toast('⚠️ خطأ في قراءة الملف: '+err.message);}
  };
  if(isCSV)reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function doImport(){
  var mode=document.querySelector('input[name="impMode"]:checked');
  var replace=mode&&mode.value==='replace';
  if(replace&&!confirm('سيتم حذف '+data.length+' جلسة موجودة. متابعة؟'))return;
  var sessions=importPreviewRows;
  var fixedIds=sessions.map(function(s){return Object.assign({},s,{id:Date.now()+Math.floor(Math.random()*99999)});});
  var ops=[];
  if(replace){
    ops=data.map(function(s){return dbDel(s.id);});
    Promise.all(ops).then(function(){
      data=[];
      return Promise.all(fixedIds.map(function(s){return dbPut(s);}));
    }).then(function(){data=fixedIds;importPreviewRows=[];var m=document.getElementById('impModal');if(m)m.remove();toast('✅ تم الاستيراد: '+fixedIds.length+' جلسة');render();});
  } else {
    Promise.all(fixedIds.map(function(s){return dbPut(s);})).then(function(){data=data.concat(fixedIds);importPreviewRows=[];var m=document.getElementById('impModal');if(m)m.remove();toast('✅ تمت إضافة: '+fixedIds.length+' جلسة');render();});
  }
}

/* ═══════════════════════════════════════════════════════════
   EXPORT ICS (CALENDAR)
═══════════════════════════════════════════════════════════ */
function exportICS(ids){
  var list=ids?data.filter(function(s){return ids.indexOf(s.id)>-1;}):data.filter(function(s){return s.status==='scheduled'||s.status==='inProgress';});
  if(!list.length){toast('⚠️ لا توجد جلسات للتصدير');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//الجلسات القضائية//AR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  list.forEach(function(s){
    var dt=s.date.replace(/-/g,'')+'T'+s.time.replace(':','')+'00';
    var uid=s.id+'@jalsat-app';
    var summary='جلسة: '+s.num+' - '+s.type;
    var desc='المحكمة: '+(s.court||'')+' | المدعي: '+(s.plnt||'')+' | المدعى عليه: '+(s.dfnd||'');
    var loc=s.court+(s.room?' - '+s.room:'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid);
    lines.push('DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z');
    lines.push('DTSTART;TZID=Asia/Riyadh:'+dt);
    lines.push('DURATION:PT1H');
    lines.push('SUMMARY:'+summary);
    lines.push('DESCRIPTION:'+desc);
    lines.push('LOCATION:'+loc);
    lines.push('STATUS:'+(s.status==='scheduled'?'CONFIRMED':'TENTATIVE'));
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT30M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:تذكير: '+summary);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='جلساتي_'+today()+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('📅 تم تصدير '+list.length+' جلسة للتقويم');
}

function calcDeadline(){
  var dateEl=document.getElementById('dlcDate');
  var typeEl=document.getElementById('dlcType');
  var resEl=document.getElementById('dlcResult');
  if(!dateEl||!dateEl.value){toast('⚠️ اختر التاريخ أولاً');return;}
  var days=parseInt(typeEl.value)||30;
  var base=new Date(dateEl.value+'T00:00:00');
  var deadline=new Date(base);deadline.setDate(deadline.getDate()+days);
  var remaining=Math.ceil((deadline-new Date())/86400000);
  var clr=remaining<0?'#f87171':remaining<7?'#fbbf24':'#34d399';
  var msg=remaining<0?'انتهى الموعد منذ '+Math.abs(remaining)+' يوم':remaining===0?'اليوم هو آخر يوم!':'متبقي '+remaining+' يوم';
  resEl.style.display='block';
  resEl.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:11px;color:var(--text3);margin-bottom:4px">الموعد النهائي</div>'+
    '<div style="font-size:16px;font-weight:700;color:var(--text)">'+deadline.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div></div>'+
    '<div style="text-align:left"><div style="font-size:18px;font-weight:900;color:'+clr+'">'+msg+'</div></div></div>';
}

function startVoiceSearch(){
  var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){toast('⚠️ المتصفح لا يدعم التعرف على الصوت');return;}
  var r=new SpeechRecognition();r.lang='ar-SA';r.continuous=false;r.interimResults=false;
  var btn=document.getElementById('voiceBtn');
  var status=document.getElementById('voiceStatus');
  if(btn){btn.style.background='linear-gradient(135deg,#e85050,#f87171)';btn.style.boxShadow='0 0 20px rgba(232,80,80,.4)';}
  if(status)status.textContent='جارٍ الاستماع...';
  r.onresult=function(e){
    var txt=e.results[0][0].transcript;
    if(btn){btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';btn.style.boxShadow='0 0 20px var(--gold-a30)';}
    if(status)status.textContent='تم التعرف: "'+txt+'"';
    setTimeout(function(){go('list');q=txt;render();},400);
  };
  r.onerror=function(e){
    if(btn){btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';btn.style.boxShadow='0 0 20px var(--gold-a30)';}
    if(status)status.textContent='تعذّر التعرف — حاول مرة أخرى';
  };
  r.onend=function(){if(btn)btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';};
  r.start();
}

   LIVE SESSION MODE
═══════════════════════════════════════════════════════════ */
var liveSessionId=null,liveNotes='',liveTick=null,liveStart=null;

function rLive(){

    // Pick session
    var td=today();

    if(!list.length){

      list.forEach(function(s){
        h+='<div onclick="startLiveSession('+s.id+')" style="padding:12px;background:var(--surface3);border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border2);transition:border-color .15s" onmouseenter="this.style.borderColor=\'var(--gold-a30)\'" onmouseleave="this.style.borderColor=\'var(--border2)\'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div><div style="font-size:13px;font-weight:700;color:var(--gold2)">'+s.num+'</div>';
        h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+s.court+' · '+s.time+'</div></div>';
        h+=bdg(s.status)+'</div></div>';
      });

  var etime=pad(eh)+':'+pad(em)+':'+pad(es);

  h+='<div style="background:rgba(232,80,80,0.08);border:1px solid rgba(232,80,80,0.25);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;text-align:center">';
  h+='<div style="font-size:10px;color:#f87171;font-weight:700;letter-spacing:.1em;margin-bottom:6px;animation:pulse 1.2s infinite">● جارٍ الآن</div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-bottom:4px">'+active.num+' · '+active.court+'</div>';
  h+='<div style="font-size:38px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:.04em" id="liveTimer">'+etime+'</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px">مدة الجلسة</div>';
  h+='</div>';

  h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px">📝 تدوين سريع</div>';
  h+='<textarea id="liveNoteArea" placeholder="سجّل ما يدور في الجلسة..." dir="rtl" rows="6" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;color:var(--text);resize:none;line-height:1.7;font-family:Tajawal,sans-serif">'+liveNotes+'</textarea>';

  h+='</div></div>';

  // Quick actions
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px">';
  [['📋','نسخ تفاصيل','copyS('+active.id+')'],['📥','مرفق','addAttFromLive('+active.id+')'],['🔁','غير الحالة','cycleStatusLive('+active.id+')']].forEach(function(b){
    h+='<button onclick="'+b[2]+'" style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 6px;cursor:pointer;text-align:center">';
    h+='<div style="font-size:18px">'+b[0]+'</div><div style="font-size:10px;color:var(--text3);margin-top:3px">'+b[1]+'</div></button>';
  });

  h+='<button onclick="endLiveSession()" style="width:100%;background:var(--red-a);color:#f87171;border:1px solid rgba(232,80,80,.3);border-radius:var(--r-md);padding:13px;font-weight:700;font-size:13px;cursor:pointer">⏹ إنهاء الجلسة المباشرة</button>';

function startLiveSession(id){
  liveSessionId=id;liveNotes='';liveStart=Date.now();
  var s=data.find(function(x){return x.id===id;});
  if(s&&s.status==='scheduled'){s.status='inProgress';dbPut(s);}
  render();toast('🔴 بدأت الجلسة المباشرة');
}

function startLiveTick(){
  if(liveTick)clearInterval(liveTick);
  if(!liveSessionId||!liveStart)return;
  liveTick=setInterval(function(){
    var el=document.getElementById('liveTimer');if(!el)return;
    var elapsed=Math.floor((Date.now()-liveStart)/1000);
    el.textContent=pad(Math.floor(elapsed/3600))+':'+pad(Math.floor((elapsed%3600)/60))+':'+pad(elapsed%60);
    // Sync notes
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  },1000);
}

function saveLiveNotes(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;
  dbPut(s).then(function(){toast('💾 تم حفظ الملاحظات');});
}

function askAIFromLive(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  var msg='أنا في جلسة مباشرة الآن: '+s.num+' '+s.type+' في '+s.court;
  if(liveNotes)msg+='\n\nما دوّنته:\n'+liveNotes+'\n\nأحتاج توجيهاً قانونياً سريعاً.';
  saveLiveNotes();
  go('ai');
  setTimeout(function(){sendAI(msg);},350);
}

function addAttFromLive(id){
  var input=document.createElement('input');input.type='file';input.accept='image/*,.pdf';
  input.capture='environment';
  input.onchange=function(){addAtt(id,input);toast('📎 تم إضافة المرفق');};
  input.click();
}

function cycleStatusLive(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  var order=['scheduled','inProgress','completed','postponed'];
  s.status=order[(order.indexOf(s.status)+1)%order.length];
  dbPut(s).then(function(){toast('🔁 '+ST[s.status].lbl);});
}

function endLiveSession(){
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(liveTick)clearInterval(liveTick);
  if(s){
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
    if(liveNotes){s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;dbPut(s);}
    if(s.status==='inProgress'){s.status='completed';dbPut(s);}
  }
  var elapsed=liveStart?Math.floor((Date.now()-liveStart)/1000):0;
  var em=Math.floor(elapsed/60);
  liveSessionId=null;liveNotes='';liveStart=null;
  toast('✅ انتهت الجلسة ('+em+' دقيقة)');
  render();
}

function savePinState(){try{localStorage.setItem('j_pin_enabled',pinEnabled?'1':'0');localStorage.setItem('j_pin_code',pinCode);}catch(e){}}

function showPinLock(){
  if(document.getElementById('pinScreen'))return;
  var div=document.createElement('div');div.id='pinScreen';
  div.style.cssText='position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;font-family:Tajawal,sans-serif;direction:rtl';
  div.innerHTML=
    '<div style="font-size:52px;margin-bottom:16px">⚖️</div>'+
    '<div style="font-family:Scheherazade New,serif;font-size:22px;color:var(--gold2);margin-bottom:6px">الجلسات القضائية</div>'+
    '<div style="font-size:13px;color:var(--text3);margin-bottom:32px">أدخل رمز PIN للدخول</div>'+
    '<div id="pinDots" style="display:flex;gap:14px;margin-bottom:28px">'+
      [1,2,3,4].map(function(){return'<div style="width:16px;height:16px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2);transition:all .2s"></div>';}).join('')+
    '</div>'+
    '<div id="pinErr" style="font-size:12px;color:#f87171;min-height:18px;margin-bottom:16px;text-align:center"></div>'+
    '<div style="display:grid;grid-template-columns:repeat(3,72px);gap:10px">'+
      [1,2,3,4,5,6,7,8,9,'','0','⌫'].map(function(n){
        if(n==='')return'<div></div>';
        return'<button onclick="pinKey(\''+n+'\')" style="width:72px;height:72px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);font-size:'+(n==='⌫'?'20':'22')+'px;font-weight:700;color:var(--text);cursor:pointer;font-family:Tajawal,sans-serif;transition:all .1s" onmousedown="this.style.transform=\'scale(.92)\'" onmouseup="this.style.transform=\'scale(1)\'">'+n+'</button>';
      }).join('')+
    '</div>'+
    '<button onclick="tryBiometric()" style="margin-top:24px;background:none;color:var(--text3);border:1px solid var(--border2);border-radius:20px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">🔐 بصمة / Face ID</button>';
  document.body.appendChild(div);
  window._pinEntry='';
}

function pinKey(k){
  var err=document.getElementById('pinErr');
  if(k==='⌫'){window._pinEntry=(window._pinEntry||'').slice(0,-1);}
  else if((window._pinEntry||'').length<4){window._pinEntry=(window._pinEntry||'')+k;}
  updPinDots();
  if((window._pinEntry||'').length===4){
    setTimeout(function(){
      if(window._pinEntry===pinCode){
        pinLocked=false;pinAttempts=0;
        var s=document.getElementById('pinScreen');if(s)s.remove();
        window._pinEntry='';
      } else {
        pinAttempts++;
        if(err)err.textContent='رمز خاطئ — محاولة '+(pinAttempts)+'/5';
        window._pinEntry='';updPinDots();
        if(pinAttempts>=5&&err)err.textContent='⚠️ تم إيقاف التطبيق مؤقتاً';
      }
    },200);
  }
}

function updPinDots(){
  var dots=document.querySelectorAll('#pinDots div');
  var len=(window._pinEntry||'').length;
  dots.forEach(function(d,i){
    d.style.background=i<len?'var(--gold)':'var(--surface3)';
    d.style.borderColor=i<len?'var(--gold-a30)':'var(--border2)';
    d.style.transform=i===len-1?'scale(1.2)':'scale(1)';
    setTimeout(function(){if(d)d.style.transform='scale(1)';},150);
  });
}

function tryBiometric(){
  if(window.PublicKeyCredential&&window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(ok){
      if(ok){
        // Use WebAuthn for biometric
        var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
        navigator.credentials.get({publicKey:{challenge:challenge,timeout:30000,userVerification:'required'}}).then(function(){
          pinLocked=false;var s=document.getElementById('pinScreen');if(s)s.remove();
          toast('✅ تم الدخول بالبصمة');
        }).catch(function(){toast('⚠️ فشل التحقق — أدخل PIN');});
      } else toast('⚠️ البصمة غير متوفرة على هذا الجهاز');
    });
  } else toast('⚠️ غير مدعوم — أدخل PIN');
}

// Lock on hide
document.addEventListener('visibilitychange',function(){
  if(document.hidden&&pinEnabled&&!pinLocked){pinLocked=true;}
  if(!document.hidden&&pinEnabled&&pinLocked){showPinLock();}
});

function saveCaseLinks(){try{localStorage.setItem('j_case_links',JSON.stringify(caseLinks));}catch(e){}}

function addCaseLink(fromId,toId,type){
  if(!fromId||!toId||fromId===toId)return;
  var exists=caseLinks.find(function(l){return(l.from===fromId&&l.to===toId)||(l.from===toId&&l.to===fromId);});
  if(exists){toast('⚠️ الربط موجود مسبقاً');return;}
  caseLinks.push({id:'lnk_'+Date.now(),from:fromId,to:toId,type:type||'related'});
  saveCaseLinks();toast('🔗 تم ربط القضيتين');
}

function delCaseLink(id){caseLinks=caseLinks.filter(function(l){return l.id!==id;});saveCaseLinks();render();}

function getLinkedSessions(sid){
  return caseLinks.filter(function(l){return l.from===sid||l.to===sid;}).map(function(l){
    var otherId=l.from===sid?l.to:l.from;
    var other=data.find(function(s){return s.id===otherId;})||archivedSessions.find(function(s){return s.id===otherId;});
    return other?{session:other,type:l.type,linkId:l.id}:null;
  }).filter(Boolean);
}

/* ═══════════════════════════════════════════════════════════
   3. COURT FEES CALCULATOR
═══════════════════════════════════════════════════════════ */
var COURT_FEES={
  civil:     {name:'مدنية',    base:500, pct:0.025, min:500,  max:20000},
  commercial:{name:'تجارية',   base:600, pct:0.03,  min:600,  max:30000},
  criminal:  {name:'جنائية',   base:400, pct:0,     min:400,  max:400},
  personal:  {name:'أحوال شخصية',base:300,pct:0,   min:300,  max:300},
  labor:     {name:'عمالية',   base:250, pct:0,     min:250,  max:250},
  admin:     {name:'إدارية',   base:350, pct:0,     min:350,  max:350},
  appeal:    {name:'استئناف',  base:800, pct:0.015, min:800,  max:15000},
  cassation: {name:'نقض',      base:1000,pct:0.02,  min:1000, max:20000}
};

function calcCourtFees(type,amount){
  var f=COURT_FEES[type];if(!f)return 0;
  var fee=f.base+(f.pct*( amount||0));
  return Math.min(Math.max(fee,f.min),f.max);
}

function archiveSession(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  if(!confirm('أرشفة الجلسة '+s.num+'؟ يمكن استعادتها لاحقاً.'))return;
  s.archivedAt=new Date().toISOString();

  dbDel(id).then(function(){saveArchive();closeDet();toast('🗄️ تم الأرشفة');render();});

function restoreSession(id){
  var s=archivedSessions.find(function(x){return x.id===id;});if(!s)return;

}

function showPinSetupModal(isChange){
  var modal=document.createElement('div');modal.style.cssText='position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:22px;background:rgba(0,0,0,.8)';

  var step=0,pin1='';
  function renderStep(){
    box.innerHTML=
      '<div style="font-size:32px;margin-bottom:12px">'+(step===0?'🔑':'✅')+'</div>'+
      '<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">'+(step===0?(isChange?'رمز PIN الجديد':'حدد رمز PIN'):'تأكيد رمز PIN')+'</div>'+
      '<div style="font-size:12px;color:var(--text3);margin-bottom:20px">أدخل 4 أرقام</div>'+
      '<div id="spDots" style="display:flex;gap:12px;justify-content:center;margin-bottom:16px">'+
        [1,2,3,4].map(function(){return'<div style="width:14px;height:14px;border-radius:50%;background:var(--surface3);border:2px solid var(--border2)"></div>';}).join('')+
      '</div>'+
      '<div id="spErr" style="font-size:11px;color:#f87171;min-height:16px;margin-bottom:12px"></div>'+
      '<div style="display:grid;grid-template-columns:repeat(3,62px);gap:8px;justify-content:center">'+
        [1,2,3,4,5,6,7,8,9,'','0','⌫'].map(function(n){
          if(n==='')return'<div></div>';
          return'<button onclick="spKey(\''+n+'\')" style="width:62px;height:62px;border-radius:50%;background:var(--surface3);border:1px solid var(--border2);font-size:18px;font-weight:700;color:var(--text);cursor:pointer;font-family:Tajawal,sans-serif">'+n+'</button>';
        }).join('')+
      '</div>'+
      '<button onclick="this.closest(\'div[style*=fixed]\').remove();if(!pinEnabled)render();" style="margin-top:16px;background:none;color:var(--text3);border:none;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">إلغاء</button>';
  }
  var entry='';
  window.spKey=function(k){
    var err=box.querySelector('#spErr');
    if(k==='⌫'){entry=entry.slice(0,-1);}
    else if(entry.length<4)entry+=k;
    var dots=box.querySelectorAll('#spDots div');
    dots.forEach(function(d,i){d.style.background=i<entry.length?'var(--gold)':'var(--surface3)';d.style.borderColor=i<entry.length?'var(--gold-a30)':'var(--border2)';});
    if(entry.length===4){
      setTimeout(function(){
        if(step===0){pin1=entry;entry='';step=1;renderStep();}
        else{
          if(entry===pin1){
            pinEnabled=true;pinCode=entry;savePinState();
            modal.remove();toast('✅ تم تفعيل قفل PIN');render();
          } else {
            if(err)err.textContent='الرمزان غير متطابقان';entry='';step=0;pin1='';
            setTimeout(renderStep,600);
          }
        }
      },200);
    }
  };
  renderStep();
  modal.appendChild(box);document.body.appendChild(modal);
}

  if(visible){hiddenTabs=hiddenTabs.filter(function(t){return t!==tab;});}

  toast(visible?'✅ تم إظهار التبويب':'👁 تم إخفاء التبويب');

function uploadLetterhead(input){
  var file=input.files[0];if(!file)return;
  if(!file.type.startsWith('image/')){toast('⚠️ يُقبل صور فقط');return;}
  if(file.size>10*1024*1024){toast('⚠️ الصورة أكبر من 10MB');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var canvas=document.createElement('canvas');
      var maxW=1240,maxH=1754;
      var ratio=Math.min(maxW/img.width,maxH/img.height,1);
      canvas.width=Math.round(img.width*ratio);
      canvas.height=Math.round(img.height*ratio);
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      lhImage=canvas.toDataURL('image/jpeg',0.92);
      saveLhSettings();
      toast('✅ تم رفع الورق الرسمي');
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeLhImage(){
  if(!confirm('حذف صورة الورق الرسمي؟'))return;
  lhImage='';
  try{localStorage.removeItem('j_lh_image');}catch(e){}
  render();toast('🗑️ تم الحذف');
}

function updateLhPreview(){
  var ta=document.getElementById('lhTextArea');if(!ta)return;
  ta.style.padding=lhMargins.top+'px '+lhMargins.right+'px '+lhMargins.bottom+'px '+lhMargins.left+'px';
  ta.style.fontSize=lhFontSize+'px';
  ta.style.fontFamily="'"+lhFontFamily+"',Tajawal,sans-serif";
  ta.style.lineHeight=String(lhLineHeight);
  ta.style.color=lhTextColor;
  ta.style.textAlign=lhTextAlign;
  ta.style.fontWeight=lhBold?'700':'400';
  ta.style.fontStyle=lhItalic?'italic':'normal';
  ta.style.textDecoration=lhUnderline?'underline':'none';
  autoResizeLh(ta);
}

function autoResizeLh(ta){
  ta.style.height='auto';
  ta.style.height=Math.max(580,ta.scrollHeight)+'px';
}

function loadLhTemplate(idx){
  initLhTemplates();
  var t=lhTemplates[idx];if(!t)return;
  var ta=document.getElementById('lhTextArea');if(!ta)return;
  if(ta.value.trim()&&!confirm('استبدال النص الحالي بالقالب؟'))return;
  ta.value=t.text;autoResizeLh(ta);
  toast('📝 تم تحميل: '+t.name);
}

function clearLhText(){
  var ta=document.getElementById('lhTextArea');
  if(!ta||!ta.value.trim())return;
  if(!confirm('مسح النص؟'))return;
  ta.value='';autoResizeLh(ta);
}

function copyLhText(){
  var ta=document.getElementById('lhTextArea');
  if(!ta||!ta.value.trim()){toast('⚠️ لا يوجد نص');return;}
  if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){toast('📋 تم النسخ');});}
  else{ta.select();document.execCommand('copy');toast('📋 تم النسخ');}
}

function printLetterhead(){
  var ta=document.getElementById('lhTextArea');
  var text=ta?ta.value:'';
  var pageSizes={A4:{w:'210mm',h:'297mm'},A5:{w:'148mm',h:'210mm'},Letter:{w:'216mm',h:'279mm'}};
  var ps=pageSizes[lhPageSize]||pageSizes.A4;
  var pa=document.getElementById('pa');
  var textStyle=[
    'position:relative;z-index:1',
    'padding:'+lhMargins.top+'px '+lhMargins.right+'px '+lhMargins.bottom+'px '+lhMargins.left+'px',
    'font-family:\''+lhFontFamily+'\',Tajawal,\'Times New Roman\',serif',
    'font-size:'+lhFontSize+'px',
    'line-height:'+lhLineHeight,
    'color:'+lhTextColor,
    'text-align:'+lhTextAlign,
    'font-weight:'+(lhBold?'700':'400'),
    'font-style:'+(lhItalic?'italic':'normal'),
    'text-decoration:'+(lhUnderline?'underline':'none'),
    'white-space:pre-wrap',
    'min-height:'+ps.h,
    'direction:rtl'
  ].join(';');
  pa.innerHTML=
    '<style>@page{size:'+ps.w+' '+ps.h+';margin:0}body{margin:0}#lhPrint{width:'+ps.w+';height:'+ps.h+';position:relative;overflow:hidden}#lhPrint img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}#lhPrint div{'+textStyle+'}</style>'+
    '<div id="lhPrint">'+
    '<img src="'+lhImage+'" alt="">'+
    '<div>'+text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'+
    '</div>';
  setTimeout(function(){window.print();},150);
  toast('🖨️ جارٍ الطباعة...');
}

function saveLhAsPDF(){
  toast('💡 في نافذة الطباعة اختر "حفظ كـ PDF"');
  setTimeout(printLetterhead,600);
}

(function(){

  var manifest={
    name:'الجلسات القضائية',

  // ── 2. Service Worker — skip (blob URLs not supported in all browsers) ──
  // PWA install, manifest, and offline detection work without SW

  // ── 3. Install prompt ──
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferredPrompt=e;
    showInstallBanner();
  });

  window.addEventListener('appinstalled',function(){
    hideInstallBanner();
    deferredPrompt=null;
    toast('✅ تم تثبيت التطبيق على جهازك!');
  });

  function showInstallBanner(){
    if(document.getElementById('pwaBanner'))return;
    var b=document.createElement('div');
    b.id='pwaBanner';
    b.style.cssText='position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);z-index:800;width:calc(100% - 32px);max-width:398px;background:var(--surface2);border:1px solid var(--gold-a30);border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:slideUp 0.3s ease';

      '<div style="width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#d4a843,#f0c55a);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">⚖️</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:13px;font-weight:700;color:var(--text)">تثبيت التطبيق</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:2px">يعمل بدون إنترنت على جهازك</div>'+
      '</div>'+
      '<div style="display:flex;gap:7px;flex-shrink:0">'+
        '<button onclick="doInstall()" style="background:var(--gold);color:#0a0905;border:none;border-radius:9px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">تثبيت</button>'+
        '<button onclick="hideInstallBanner()" style="background:var(--surface3);color:var(--text3);border:1px solid var(--border2);border-radius:9px;padding:8px 10px;font-size:12px;cursor:pointer">✕</button>'+
      '</div>';
    document.body.appendChild(b);
  }

  function hideInstallBanner(){var b=document.getElementById('pwaBanner');if(b)b.remove();}

  window.doInstall=function(){
    if(!deferredPrompt){showIOSInstructions();return;}
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      if(r.outcome==='accepted')toast('🎉 جارٍ تثبيت التطبيق...');
      deferredPrompt=null;

    });
  };

  function showIOSInstructions(){
    var isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
    var isSafari=/Safari/.test(navigator.userAgent)&&!/Chrome/.test(navigator.userAgent);
    var modal=document.createElement('div');
    modal.style.cssText='position:fixed;inset:0;z-index:900;display:flex;align-items:flex-end;justify-content:center';
    var bg=document.createElement('div');bg.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px)';
    bg.onclick=function(){modal.remove();};
    var box=document.createElement('div');
    box.style.cssText='position:relative;background:var(--surface2);border-radius:22px 22px 0 0;border-top:1px solid var(--border2);width:100%;max-width:430px;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom))';
    var steps=isIOS&&isSafari
      ? [['1','اضغط زر المشاركة','⬆️ في شريط Safari السفلي'],['2','اختر "إضافة للشاشة الرئيسية"','📱 من القائمة'],['3','اضغط "إضافة"','✅ التطبيق سيظهر على شاشتك']]
      : [['1','افتح قائمة المتصفح','⋮ في الزاوية اليمنى'],['2','اختر "تثبيت التطبيق" أو "إضافة للشاشة"','📱 من القائمة'],['3','اضغط تثبيت','✅ جاهز!']];
    var stepsHtml=steps.map(function(s){
      return'<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div style="width:28px;height:28px;border-radius:50%;background:var(--gold-a20);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0">'+s[0]+'</div>'+
        '<div><div style="font-size:13px;font-weight:600;color:var(--text)">'+s[1]+'</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:2px">'+s[2]+'</div></div>'+
      '</div>';
    }).join('');
    box.innerHTML=
      '<div style="text-align:center;margin-bottom:18px">'+
        '<div style="font-size:38px;margin-bottom:8px">📱</div>'+
        '<div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2)">تثبيت التطبيق</div>'+
        '<div style="font-size:11px;color:var(--text3);margin-top:4px">اتبع الخطوات التالية</div>'+
      '</div>'+
      stepsHtml+
      '<button onclick="this.closest(\'div[style]\').parentNode.removeChild(this.closest(\'div[style]\'))" style="width:100%;background:var(--gold);color:#0a0905;border:none;border-radius:var(--r-md);padding:13px;font-weight:700;font-size:14px;cursor:pointer;margin-top:16px;font-family:Tajawal,sans-serif">فهمت 👍</button>';
    modal.appendChild(bg);modal.appendChild(box);document.body.appendChild(modal);
  }

  // ── 4. PWA Install button in header area ──
  var isPWA=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(!isPWA){
    // Add install button to header
    setTimeout(function(){
      var hdrActs=document.querySelector('.hdr-actions');
      if(hdrActs&&!document.getElementById('pwaInstallBtn')){
        var btn=document.createElement('button');
        btn.id='pwaInstallBtn';
        btn.className='btn-icon';
        btn.title='تثبيت التطبيق';
        btn.innerHTML='📲';
        btn.onclick=function(){if(deferredPrompt)doInstall();else showIOSInstructions();};
        hdrActs.insertBefore(btn,hdrActs.firstChild);
      }
    },500);
    // Show banner after 3 seconds if not dismissed before
    var dismissed=localStorage.getItem('pwa_dismissed');
    if(!dismissed){
      setTimeout(function(){
        if(deferredPrompt)showInstallBanner();
        else{
          // iOS or other — show after delay
          var isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
          var isSafari=/Safari/.test(navigator.userAgent)&&!/Chrome/.test(navigator.userAgent);
          if(isIOS&&isSafari)showInstallBanner();

  }

  // Track banner dismissal
  var origHide=hideInstallBanner;

  };

  // ── 5. Offline indicator ──
  function updOnline(){

})();

// ── Helper: generate PWA icon as PNG data URL ──
function makePWAIcon(size,color){
  try{
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    // Background
    ctx.fillStyle='#08090d';
    var r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    // Scales of justice emoji approximation
    ctx.fillStyle=color||'#d4a843';
    ctx.font='bold '+(size*0.55)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚖',size/2,size/2);
    return c.toDataURL('image/png');
  }catch(e){return'data:image/png;base64,iVBORw0KGgo=';}
}
