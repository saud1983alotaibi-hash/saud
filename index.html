<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الجلسات القضائية">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="الجلسات القضائية">
<meta name="theme-color" content="#08090d" id="themeColorMeta">
<meta name="description" content="تطبيق إدارة الجلسات القضائية بالذكاء الاصطناعي">
<link rel="manifest" id="pwaManifest">
<title>الجلسات القضائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Scheherazade+New:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  /* ── Deep Legal Navy Theme ── */
  --bg: #060b14;
  --surface: #0a1120;
  --surface2: #111d32;
  --surface3: #192840;
  --border: rgba(99,140,200,0.1);
  --border2: rgba(99,140,200,0.2);

  /* Gold accent - رصين وقانوني */
  --gold: #c8a050;
  --gold2: #e8c070;
  --gold3: #f8d890;
  --gold-a10: rgba(200,160,80,0.1);
  --gold-a20: rgba(200,160,80,0.2);
  --gold-a30: rgba(200,160,80,0.3);

  /* Text */
  --text: #e8eef8;
  --text2: #7a90b8;
  --text3: #3a5070;

  /* Semantic colors */
  --blue: #4080e0;
  --blue-a: rgba(64,128,224,0.12);
  --amber: #e09030;
  --amber-a: rgba(224,144,48,0.12);
  --green: #30b880;
  --green-a: rgba(48,184,128,0.12);
  --red: #e04050;
  --red-a: rgba(224,64,80,0.12);
  --purple: #8060d0;

  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 20px);
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 26px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); overflow: hidden; font-family: 'Tajawal', sans-serif; color: var(--text); direction: rtl; }
::-webkit-scrollbar { width: 0; }
button, input, select, textarea { font-family: inherit; border: none; outline: none; background: none; }
input[type=date], input[type=time] { -webkit-appearance: none; color: var(--text); color-scheme: dark; }

#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  max-width: 430px; margin: 0 auto;
  overflow: hidden;
  background: var(--bg);
  position: relative;
}

/* ── Subtle background texture ── */
#app::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(64,128,224,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 80% 90%, rgba(200,160,80,0.05) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── Header ── */
#hdr {
  flex-shrink: 0;
  padding-top: var(--safe-top);
  background: rgba(10,17,32,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 40;
  border-bottom: 1px solid var(--border);
  position: relative;
}
#hdr::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-a20), transparent);
}

.hdr-inner { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px 10px; }
.hdr-brand { display: flex; flex-direction: column; }
.hdr-eyebrow { font-size: 9px; font-weight: 600; color: var(--text3); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 2px; }
.hdr-title {
  font-family: 'Scheherazade New', serif;
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold2) 0%, var(--gold3) 50%, var(--gold2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hdr-date { font-size: 9px; color: var(--text3); margin-top: 1px; }

.hdr-actions { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; max-width: 200px; justify-content: flex-end; }
.btn-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-icon:active { transform: scale(0.9); background: var(--surface3); }
.btn-icon.active { background: var(--gold-a20); border-color: var(--gold-a30); color: var(--gold2); }

.btn-new {
  display: flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, var(--gold), #a07030);
  color: #06090f; border-radius: 10px;
  padding: 8px 13px; font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 2px 12px rgba(200,160,80,0.35);
  transition: all 0.15s;
}
.btn-new:active { transform: scale(0.95); opacity: 0.9; }

/* ── Tabs ── */
.tabs-scroll {
  display: flex; padding: 5px 10px 0; gap: 2px;
  overflow-x: auto; background: transparent;
  scrollbar-width: none;
}
.tab {
  flex-shrink: 0; padding: 7px 13px;
  border-radius: 9px 9px 0 0;
  font-size: 11px; font-weight: 600;
  color: var(--text3); cursor: pointer;
  transition: all 0.15s; border: 1px solid transparent;
  border-bottom: none; white-space: nowrap; position: relative;
}
.tab.on {
  background: var(--surface);
  color: var(--gold2);
  border-color: var(--border);
}
.tab.on::after {
  content: ''; position: absolute;
  bottom: -1px; left: 0; right: 0; height: 1px;
  background: var(--surface);
}
.tab:not(.on):hover { color: var(--text2); background: rgba(99,140,200,0.06); }

/* ── Bottom Nav (mobile) ── */
#bottomNav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(10,17,32,0.96);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  padding: 5px 4px;
  padding-bottom: max(5px,env(safe-area-inset-bottom));
  flex-direction: row; justify-content: space-around; align-items: center;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 5px 10px; border-radius: 10px; cursor: pointer;
  transition: all .15s; min-width: 46px;
  border: none; background: none; color: var(--text3);
  font-family: Tajawal, sans-serif;
}
.bnav-btn.on { color: var(--gold2); background: var(--gold-a10); }
.bnav-btn .bnav-ico { font-size: 19px; line-height: 1; }
.bnav-btn .bnav-lbl { font-size: 8px; font-weight: 700; white-space: nowrap; }
.bnav-fab {
  width: 48px; height: 48px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), #a07030);
  color: #06090f; font-size: 22px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 16px rgba(200,160,80,0.5);
  transition: transform .15s; flex-shrink: 0;
}
.bnav-fab:active { transform: scale(.9); }
@media (max-width: 600px) {
  #bottomNav { display: flex; }
  #cnt { padding-bottom: calc(76px + env(safe-area-inset-bottom)) !important; }
  .tabs-scroll { display: none; }
}

/* ── Drag & Drop Calendar ── */
.cal-cell.drag-over { background: var(--gold-a20) !important; border-color: var(--gold-a30) !important; outline: 2px dashed var(--gold) !important; }
.s-card[draggable="true"] { cursor: grab; }
.s-card[draggable="true"]:active { cursor: grabbing; opacity: .85; }

/* ── Main Content ── */
#cnt {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 14px 14px calc(18px + var(--safe-bottom));
  background: var(--surface);
  position: relative;
}

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px; position: relative; overflow: hidden;
  cursor: pointer; transition: transform 0.1s;
}
.stat-card:active { transform: scale(0.97); }
.stat-card::before {
  content: ''; position: absolute; top: -20px; right: -20px;
  width: 70px; height: 70px; border-radius: 50%;
  background: var(--sc-clr, var(--gold)); opacity: 0.08; filter: blur(20px);
}
.stat-icon { font-size: 17px; margin-bottom: 7px; }
.stat-value { font-size: 28px; font-weight: 900; line-height: 1; color: var(--sc-clr, var(--gold2)); }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; font-weight: 600; }

/* ── Section Header ── */
.sec-hdr {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 700; color: var(--text2);
  margin-bottom: 10px; margin-top: 6px;
}
.sec-hdr::before { content: ''; width: 3px; height: 13px; background: linear-gradient(180deg,var(--gold),transparent); border-radius: 2px; }
.sec-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ── Session Card ── */
.s-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 13px; margin-bottom: 7px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.12s;
}
.s-card:active { transform: scale(0.985); border-color: var(--gold-a30); }
.s-card:hover { border-color: var(--border2); }
.s-card-accent { position: absolute; top: 0; right: 0; width: 3px; height: 100%; border-radius: 0 var(--r-md) var(--r-md) 0; }
.s-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 9px; }
.s-card-num { font-family: 'Scheherazade New', serif; font-size: 16px; font-weight: 700; color: var(--gold2); }
.s-card-meta { font-size: 10px; color: var(--text3); margin-top: 2px; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.s-card-time { text-align: left; }
.s-card-timestr { font-size: 20px; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; line-height: 1; }
.s-card-date { font-size: 9px; color: var(--text3); margin-top: 2px; }
.s-card-parties { font-size: 10px; color: var(--text2); background: var(--surface3); border-radius: 8px; padding: 6px 9px; margin-bottom: 9px; display: flex; align-items: center; gap: 5px; }
.s-card-footer { display: flex; justify-content: space-between; align-items: center; }
.s-card-court { font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.s-card-actions { display: flex; align-items: center; gap: 5px; }
.btn-cycle { background: var(--surface3); border: 1px solid var(--border2); border-radius: 7px; padding: 3px 8px; font-size: 10px; color: var(--text3); cursor: pointer; transition: all 0.12s; }
.btn-cycle:active { background: var(--gold-a10); }

/* ── Badges ── */
.prio-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; border: 1px solid; }
.prio-high { background: var(--red-a); color: #f47070; border-color: rgba(224,64,80,0.3); }
.prio-med  { background: var(--amber-a); color: #f0b040; border-color: rgba(224,144,48,0.3); }
.prio-low  { background: var(--green-a); color: #40c890; border-color: rgba(48,184,128,0.3); }
.prio-none { background: var(--blue-a); color: #60a0f8; border-color: rgba(64,128,224,0.3); }
.status-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 16px; font-size: 10px; font-weight: 700; border: 1px solid; }

/* ── Countdown ── */
.countdown-bar { margin-top: 8px; background: var(--surface3); border-radius: 8px; padding: 7px 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
.cd-label { font-size: 9px; color: var(--text3); margin-bottom: 2px; }
.cd-time { font-size: 15px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; }
.cd-urgent { color: #f47070; }
.cd-soon   { color: #f0b040; }
.cd-ok     { color: #40c890; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
.pulse { animation: pulse 1.2s ease-in-out infinite; }

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-wrap input {
  width: 100%; background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--r-md);
  padding: 11px 42px 11px 50px;
  font-size: 13px; color: var(--text);
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--gold-a30); box-shadow: 0 0 0 3px var(--gold-a10); }
.search-ico { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; color: var(--text3); }
.search-adv { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; color: var(--gold2); cursor: pointer; }

/* ── Chips ── */
.chips { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.chip { flex-shrink: 0; padding: 5px 13px; border-radius: 16px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.12s; }

/* ── Tags ── */
.tag { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 12px; font-size: 9px; font-weight: 700; background: var(--gold-a10); color: var(--gold2); border: 1px solid var(--gold-a20); }

/* ── Empty State ── */
.empty { text-align: center; padding: 48px 0; display: flex; flex-direction: column; align-items: center; gap: 7px; }
.empty-icon { font-size: 48px; opacity: 0.25; }
.empty-title { font-size: 15px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 12px; color: var(--text3); }

/* ── Sheet / Modal ── */
.overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
.overlay.hid { display: none; }
.overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); }
.sheet {
  position: relative; background: var(--surface);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  border-top: 1px solid var(--border2);
  max-height: 92vh; overflow-y: auto;
  padding-bottom: max(20px, var(--safe-bottom));
}
.sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--surface3); margin: 12px auto 14px; }
.sheet-hdr {
  position: sticky; top: 0; background: var(--surface);
  padding: 0 18px 12px; border-bottom: 1px solid var(--border);
  z-index: 1; display: flex; justify-content: space-between; align-items: center;
}
.sheet-title { font-family: 'Scheherazade New', serif; font-size: 19px; font-weight: 700; color: var(--gold2); }
.sheet-close { width: 30px; height: 30px; border-radius: 8px; background: var(--surface2); color: var(--text3); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
.sheet-body { padding: 14px 18px; }

/* ── Detail Row ── */
.det-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.det-row:last-of-type { border-bottom: none; }
.det-key { font-size: 10px; color: var(--text3); font-weight: 600; flex-shrink: 0; }
.det-val { font-size: 12px; color: var(--text); font-weight: 600; text-align: left; flex: 1; }

/* ── Form Fields ── */
.field { margin-bottom: 13px; }
.field label { display: block; font-size: 10px; color: var(--text3); font-weight: 700; margin-bottom: 5px; letter-spacing: 0.05em; text-transform: uppercase; }
.field input, .field select, .field textarea {
  width: 100%; background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r-md); padding: 11px 12px;
  font-size: 13px; color: var(--text); display: block;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold-a30); }
.field textarea { resize: none; }
option { background: var(--surface); }

/* ── Priority Grid ── */
.prio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.prio-btn { padding: 8px; border-radius: var(--r-sm); font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; text-align: center; transition: all 0.12s; }
.prio-btn.sel { border-color: currentColor; }

/* ── Note Boxes ── */
.note-box { border-radius: var(--r-md); padding: 12px; margin: 9px 0; }
.note-box-hdr { font-size: 10px; font-weight: 700; margin-bottom: 8px; }
.note-box textarea { width: 100%; background: transparent; font-size: 12px; color: var(--text); resize: none; min-height: 65px; direction: rtl; line-height: 1.6; }

/* ── Buttons ── */
.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), #a07030);
  color: #06090f; border-radius: var(--r-md);
  padding: 13px; font-weight: 700; font-size: 14px;
  cursor: pointer; margin-bottom: 8px;
  box-shadow: 0 3px 16px rgba(200,160,80,0.25);
  transition: all 0.12s;
}
.btn-primary:active { opacity: 0.9; transform: scale(0.98); }
.btn-primary:disabled { background: var(--surface3); color: var(--text3); box-shadow: none; }
.btn-ghost {
  width: 100%; background: var(--surface2);
  color: var(--text2); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 12px;
  font-weight: 600; font-size: 13px; cursor: pointer;
}
.btn-ghost:active { background: var(--surface3); }
.action-row { display: flex; gap: 6px; margin-top: 13px; flex-wrap: wrap; }
.action-btn { flex: 1; min-width: 58px; border-radius: var(--r-sm); padding: 9px 5px; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; border: 1px solid; transition: all 0.1s; }
.action-btn:active { transform: scale(0.95); }

/* ── Dialog ── */
.dlg-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: center; justify-content: center; padding: 22px; }
.dlg-overlay.hid { display: none; }
.dlg-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.8); }
.dlg { position: relative; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-lg); padding: 26px 20px 20px; width: 100%; max-width: 280px; text-align: center; }
.dlg-icon { font-size: 42px; margin-bottom: 10px; }
.dlg-title { font-family: 'Scheherazade New', serif; font-size: 17px; color: var(--text); margin-bottom: 5px; }
.dlg-sub { font-size: 12px; color: var(--text3); margin-bottom: 20px; }
.dlg-btns { display: flex; gap: 8px; }
.dlg-del { flex: 1; background: var(--red); color: #fff; border-radius: 10px; padding: 11px; font-weight: 700; font-size: 13px; cursor: pointer; }
.dlg-cancel { flex: 1; background: var(--surface3); color: var(--text2); border: 1px solid var(--border2); border-radius: 10px; padding: 11px; font-weight: 600; font-size: 13px; cursor: pointer; }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: calc(22px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%) translateY(12px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px; padding: 9px 16px;
  font-size: 12px; font-weight: 600; color: var(--text);
  z-index: 999; opacity: 0; pointer-events: none;
  white-space: nowrap;
  transition: all 0.22s ease;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Calendar ── */
.cal-wrap { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px; margin-bottom: 13px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-month { font-family: 'Scheherazade New', serif; font-size: 17px; font-weight: 700; color: var(--gold2); }
.cal-btn-nav { width: 32px; height: 32px; border-radius: 8px; background: var(--surface3); border: 1px solid var(--border2); color: var(--text2); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.cal-days-hdr { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 5px; }
.cal-day-name { text-align: center; font-size: 8px; color: var(--text3); font-weight: 700; padding: 2px 0; letter-spacing: 0.05em; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-cell { text-align: center; border-radius: 9px; padding: 5px 1px; cursor: pointer; border: 2px solid transparent; min-height: 38px; display: flex; flex-direction: column; align-items: center; transition: all 0.1s; }
.cal-cell-num { font-size: 12px; font-weight: 600; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }

/* ── Stats ── */
.stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 13px; }
.stat-mini { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 11px 7px; text-align: center; }
.stat-mini-val { font-size: 20px; font-weight: 900; }
.stat-mini-lbl { font-size: 9px; color: var(--text3); margin-top: 3px; }
.bar-chart { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; margin-bottom: 13px; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { font-size: 10px; color: var(--text3); width: 70px; text-align: right; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--surface3); border-radius: 5px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 5px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.bar-val { font-size: 10px; font-weight: 700; width: 20px; }

/* ── Task / Contact / File Cards ── */
.task-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; margin-bottom: 6px; }
.task-card-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.task-title { font-size: 13px; font-weight: 600; color: var(--text); }
.task-title.done { text-decoration: line-through; opacity: 0.4; }
.contact-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
.contact-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
.folder-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 14px; }
.folder-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 13px; cursor: pointer; position: relative; transition: transform 0.1s; }
.folder-card:active { transform: scale(0.97); }
.file-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px; margin-bottom: 7px; }

/* ── AI Chat ── */
.ai-wrap { display: flex; flex-direction: column; height: calc(100vh - 145px - var(--safe-top) - var(--safe-bottom)); }
.ai-header { background: linear-gradient(135deg, rgba(16,163,127,0.1), rgba(16,163,127,0.04)); border: 1px solid rgba(16,163,127,0.18); border-radius: var(--r-lg); padding: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 11px; }
.ai-avatar-wrap { position: relative; flex-shrink: 0; }
.ai-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #0d9f77, #065e46); display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 0 14px rgba(16,163,127,0.3); }
.ai-online-dot { position: absolute; bottom: 1px; left: 1px; width: 10px; height: 10px; border-radius: 50%; background: #10a37f; border: 2px solid var(--surface); }
.ai-name { font-family: 'Scheherazade New', serif; font-size: 15px; color: var(--gold2); font-weight: 700; }
.ai-status { font-size: 10px; color: #10a37f; margin-top: 2px; }
.ai-clear-btn { margin-right: auto; background: none; color: var(--text3); font-size: 11px; cursor: pointer; border: 1px solid var(--border2); border-radius: 7px; padding: 4px 8px; }
.ai-context-bar { background: var(--surface2); border: 1px solid var(--gold-a20); border-radius: 9px; padding: 7px 11px; margin-bottom: 9px; font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
.ai-context-bar span { color: var(--gold2); font-weight: 700; }
.ai-msg-wrap { flex: 1; overflow-y: auto; padding: 3px 0; -webkit-overflow-scrolling: touch; }
.ai-bubble-user { display: flex; justify-content: flex-start; margin-bottom: 10px; }
.ai-bubble-user > div { background: var(--gold-a20); border: 1px solid var(--gold-a30); border-radius: 16px 16px 3px 16px; padding: 10px 13px; max-width: 82%; font-size: 13px; color: var(--text); line-height: 1.65; }
.ai-bubble-ai { display: flex; justify-content: flex-end; margin-bottom: 10px; gap: 7px; align-items: flex-end; }
.ai-bubble-ai > .bubble-content { background: var(--surface2); border: 1px solid rgba(16,163,127,0.18); border-radius: 16px 16px 16px 3px; padding: 10px 13px; max-width: 86%; font-size: 13px; color: var(--text); line-height: 1.65; }
.ai-bubble-ai .ai-mini-avatar { width: 24px; height: 24px; border-radius: 50%; background: linear-gradient(135deg, #0d9f77, #065e46); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
.typing-bubble { display: flex; gap: 4px; align-items: center; padding: 3px 0; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #10a37f; opacity: 0.6; animation: typingBounce 1.3s ease-in-out infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce { 0%,60%,100%{ transform: translateY(0); opacity: 0.6; } 30%{ transform: translateY(-5px); opacity: 1; } }
.ai-quick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.ai-quick-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 9px; font-size: 11px; color: var(--text2); cursor: pointer; text-align: right; line-height: 1.4; font-family: 'Tajawal', sans-serif; transition: all 0.15s; }
.ai-quick-btn:hover { border-color: rgba(16,163,127,0.3); color: var(--text); }
.ai-quick-btn .q-icon { font-size: 15px; margin-bottom: 4px; display: block; }
.ai-smart-btn { background: rgba(16,163,127,0.07); border: 1px solid rgba(16,163,127,0.22); border-radius: 18px; padding: 6px 12px; font-size: 11px; font-weight: 600; color: #2ecc9a; cursor: pointer; white-space: nowrap; flex-shrink: 0; font-family: 'Tajawal', sans-serif; transition: all 0.15s; }
.ai-smart-btn:hover { background: rgba(16,163,127,0.14); }
.ai-input-row { display: flex; gap: 7px; padding-top: 9px; border-top: 1px solid var(--border); align-items: flex-end; }
.ai-input-row textarea { flex: 1; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: var(--r-md); padding: 10px 12px; font-size: 13px; color: var(--text); resize: none; line-height: 1.5; max-height: 85px; font-family: 'Tajawal', sans-serif; }
.ai-input-row textarea:focus { border-color: rgba(16,163,127,0.38); }
.ai-send { width: 42px; height: 42px; border-radius: var(--r-sm); background: linear-gradient(135deg, #0d9f77, #065e46); color: #fff; font-size: 17px; cursor: pointer; flex-shrink: 0; align-self: flex-end; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 12px rgba(16,163,127,0.28); transition: all 0.15s; }
.ai-send:active { transform: scale(0.92); }
.ai-send:disabled { opacity: 0.4; cursor: not-allowed; }
.ai-upload-btn { width: 42px; height: 42px; border-radius: var(--r-sm); background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text3); font-size: 17px; cursor: pointer; flex-shrink: 0; align-self: flex-end; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.ai-upload-btn:hover { border-color: rgba(16,163,127,0.38); color: #10a37f; }
.doc-analysis-card { background: var(--surface2); border: 1px solid rgba(16,163,127,0.22); border-radius: var(--r-lg); padding: 13px; margin-bottom: 11px; }
.doc-preview-bubble { background: rgba(16,163,127,0.07); border: 1px solid rgba(16,163,127,0.18); border-radius: 10px 10px 3px 10px; padding: 8px 12px; max-width: 82%; font-size: 12px; color: var(--text); display: flex; align-items: center; gap: 7px; }
.doc-file-icon { width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.analysis-progress { height: 3px; border-radius: 2px; background: var(--surface3); overflow: hidden; margin-top: 7px; }
.analysis-progress-bar { height: 100%; background: linear-gradient(90deg,#0d9f77,#10d9a0); border-radius: 2px; animation: progressSweep 1.8s ease-in-out infinite; }
@keyframes progressSweep { 0% { width: 0%; margin-right: 100%; } 50% { width: 55%; margin-right: 25%; } 100% { width: 0%; margin-right: 0%; margin-left: 100%; } }
.ai-response-text strong { color: var(--gold2); font-weight: 700; }
.ai-response-text em { color: #2ecc9a; font-style: normal; }
.ai-response-text .ai-list-item { display: flex; gap: 6px; margin-bottom: 4px; }
.ai-response-text .ai-list-item::before { content: '◈'; color: #10a37f; font-size: 9px; margin-top: 3px; flex-shrink: 0; }

/* ── Week Pill ── */
.week-date-pill { background: var(--gold-a10); border: 1px solid var(--gold-a20); border-radius: 8px; padding: 5px 11px; margin-bottom: 6px; font-size: 11px; font-weight: 700; color: var(--gold2); }

/* ── Animations ── */
@keyframes slideUp { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.ani { animation: slideUp 0.2s ease both; }
.stagger > * { animation: slideUp 0.22s ease both; }
.stagger > *:nth-child(1) { animation-delay: 0.02s; }
.stagger > *:nth-child(2) { animation-delay: 0.05s; }
.stagger > *:nth-child(3) { animation-delay: 0.09s; }
.stagger > *:nth-child(4) { animation-delay: 0.13s; }

</style>

<script>
/* ═══════════════════════════════════════════════════════════
   DATABASE
═══════════════════════════════════════════════════════════ */
var DB_NAME='JalsatDB', DB_VER=9, STORE='sessions';
var db=null;
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){db=e.target.result;res();};r.onerror=rej;});}
function dbAll(){return new Promise(function(res){if(!db){res([]);return;}var tx=db.transaction(STORE,'readonly');var r=tx.objectStore(STORE).getAll();r.onsuccess=function(){res(r.result||[]);};r.onerror=function(){res([]);};});}
function dbPut(s){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(s);tx.oncomplete=res;tx.onerror=res;});}
function dbDel(id){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=res;});}

/* ═══════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════ */
var MO=["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

function toggleNotif(){if(!('Notification' in window)){toast("⚠️ المتصفح لا يدعم الإشعارات");return;}if(notifOn){notifOn=false;notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];localStorage.setItem('j_notif','0');updNotifBtn();toast("🔕 تم إيقاف الإشعارات");return;}Notification.requestPermission().then(function(p){if(p==='granted'){notifOn=true;localStorage.setItem('j_notif','1');schedNotifs();schedDaily();updNotifBtn();toast("🔔 تم تفعيل الإشعارات");}else toast("⚠️ لم يتم السماح");});}
function updNotifBtn(){var b=document.getElementById('btnNotif');if(b){b.classList.toggle('active',notifOn);b.textContent=notifOn?'🔔':'🔕';}}
function schedNotifs(){
  notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];if(!notifOn)return;
  var now=new Date();

  data.filter(function(s){return s.status==='scheduled';}).forEach(function(s){
    if(!s.date||!s.time)return;
    var tgt=new Date(s.date+'T'+s.time+':00');
    var diff=tgt-now;
    if(diff<0||diff>48*3600000)return; // only schedule within 48h

    var prioBadge=s.priority==='high'?'🔴 ':s.priority==='med'?'🟡 ':'';
    var courtTxt=s.court?' — '+s.court:'';

    var chkN=function(k){return localStorage.getItem(k)!=='0';};
    // ── يوم قبل (في الساعة 8 مساءً من اليوم السابق) ──
    if(chkN('notif_day')){
    var dayBefore=new Date(s.date+'T20:00:00');
    dayBefore.setDate(dayBefore.getDate()-1);
    var dDay=dayBefore-now;
    if(dDay>0&&dDay<48*3600000){
      notifTimers.push(setTimeout(function(){
        new Notification('📅 جلسة غداً',{
          body:prioBadge+'جلسة '+s.num+' غداً الساعة '+s.time+courtTxt,
          tag:'sess-day-'+s.id
        });
      },dDay));
    }

    }
    // ── ساعة قبل ──
    if(chkN('notif_hour')){var d1h=diff-3600000;
    if(d1h>0){
      notifTimers.push(setTimeout(function(){
        new Notification('⏰ جلسة بعد ساعة',{
          body:prioBadge+'جلسة '+s.num+' الساعة '+s.time+courtTxt+(s.meetUrl?' 🎥 عن بُعد':''),
          requireInteraction:true,
          tag:'sess-1h-'+s.id
        });
      },d1h));
    }

    }
    // ── 30 دقيقة قبل ──
    if(chkN('notif_30m')){var d30=diff-1800000;
    if(d30>0){
      notifTimers.push(setTimeout(function(){
        new Notification('⚖️ جلسة بعد 30 دقيقة',{
          body:prioBadge+'جلسة '+s.num+courtTxt+(s.meetUrl?' — عن بُعد':''),
          tag:'sess-30m-'+s.id
        });
      },d30));
    }

    }
    // ── 5 دقائق قبل (جلسات عن بُعد) ──
    if(chkN('notif_remote')&&s.meetUrl){
      var d5=diff-300000;
      if(d5>0){
        notifTimers.push(setTimeout(function(){
          var n=new Notification('🎥 جلسة عن بُعد خلال 5 دقائق',{
            body:'جلسة '+s.num+' — اضغط للانضمام',
            requireInteraction:true,
            tag:'sess-5m-'+s.id
          });
          n.onclick=function(){window.open(s.meetUrl,'_blank');};
        },d5));
      }
    }

    // ── وقت الجلسة ──
    if(diff>0&&diff<3600000){
      notifTimers.push(setTimeout(function(){
        var body='جلسة '+s.num+' — '+(s.court||'');
        var n=new Notification('🔴 جلسة الآن',{
          body:body+(s.meetUrl?' (عن بُعد)':''),
          requireInteraction:!!s.meetUrl,
          tag:'sess-now-'+s.id
        });
        if(s.meetUrl)n.onclick=function(){window.open(s.meetUrl,'_blank');};
      },diff));
    }
  });

  // ── تنبيهات مواعيد الطعن ──
  if(localStorage.getItem('notif_deadline')!=='0')Object.keys(sessionDeadlines).forEach(function(sid){
    var d=sessionDeadlines[sid];if(!d)return;
    var deadline=new Date(d.deadlineDate+'T08:00:00');
    [7,3,1,0].forEach(function(daysLeft){
      var alertTime=new Date(deadline);
      alertTime.setDate(alertTime.getDate()-daysLeft);
      alertTime.setHours(8,0,0,0);
      var diff=alertTime-now;
      if(diff>0&&diff<8*86400000){
        notifTimers.push(setTimeout(function(){
          var msg=daysLeft===0?'⛔ اليوم آخر يوم للطعن!':
                  daysLeft===1?'⚠️ غداً آخر موعد للطعن':
                  '📋 متبقي '+daysLeft+' أيام على موعد الطعن';
          new Notification('⚖️ تنبيه موعد طعن',{
            body:msg+' — '+d.typeName.split('(')[0].trim()+(d.sessionNum?' ('+d.sessionNum+')':''),
            requireInteraction:daysLeft<=1,
            tag:'deadline-'+sid+'-'+daysLeft
          });
        },diff));
      }
    });
  });
}

function schedDaily(){
  var now=new Date(),nxt=new Date(now);
  nxt.setHours(8,0,0,0);
  if(nxt<=now)nxt.setDate(nxt.getDate()+1);
  setTimeout(function(){
    if(notifOn&&Notification.permission==='granted'){
      var td=today();
      var todaySess=data.filter(function(s){return s.date===td&&s.status==='scheduled';});
      var tomorrowSess=data.filter(function(s){
        var tmr=new Date();tmr.setDate(tmr.getDate()+1);
        return s.date===tmr.toISOString().split('T')[0]&&s.status==='scheduled';
      });
      var urgentDL=Object.keys(sessionDeadlines).filter(function(sid){
        var info=getDeadlineInfo(parseInt(sid));
        return info&&info.remaining>=0&&info.remaining<=7;
      }).length;

      var lines=[];
      if(todaySess.length)lines.push('📅 '+todaySess.length+' جلسة اليوم');
      if(tomorrowSess.length)lines.push('🔜 '+tomorrowSess.length+' جلسة غداً');
      if(urgentDL)lines.push('⏰ '+urgentDL+' موعد طعن قريب');

      if(lines.length){
        new Notification('🌅 ملخصك الصباحي',{
          body:lines.join(' · '),
          tag:'daily-summary'
        });
      }
      schedNotifs(); // re-schedule for the new day
    }
    schedDaily();
  },nxt-now);
}

function formatAIResponse(text){
  if(!text)return'';
  text=String(text);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  var lines=text.split('\n');
  var result=[];
  lines.forEach(function(line){
    var trimmed=line.trim();
    if(!trimmed)return;
    if(trimmed.match(/^[-•]\s+/)||trimmed.match(/^\d+\.\s+/)){
      var content=trimmed.replace(/^[-•]\s+/,'').replace(/^\d+\.\s+/,'');
      result.push('<div class="ai-list-item">'+content+'</div>');
    } else {
      result.push('<p style="margin-bottom:6px">'+trimmed+'</p>');
    }
  });
  return'<div class="ai-response-text">'+(result.length?result.join(''):text)+'</div>';
}

  aiLoading=true;
  render();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);

  // Build clean alternating messages (API requires user/assistant alternation, must start with user)
  var rawMsgs=aiMessages.slice(-20);
  var cleanMsgs=[];
  var lastRole=null;
  for(var mi=rawMsgs.length-1;mi>=0;mi--){
    var rm=rawMsgs[mi];
    if(rm.role!==lastRole){
      cleanMsgs.unshift({role:rm.role,content:rm.content});
      lastRole=rm.role;
    }
  }
  // Must start with user role
  while(cleanMsgs.length&&cleanMsgs[0].role!=='user')cleanMsgs.shift();
  if(!cleanMsgs.length)cleanMsgs=[{role:'user',content:msg.trim()}];

  if(aiProvider==='openai'){
    var oaiMsgs=[{role:'system',content:buildAISystem()}].concat(cleanMsgs);
    fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
      body:JSON.stringify({model:'gpt-4o',max_tokens:1024,messages:oaiMsgs})
    })
    .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'HTTP '+r.status);});return r.json();})
    .then(function(d){
      var reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'عذراً، لم أتمكن من الرد.';
      aiMessages.push({role:'assistant',content:reply});saveAIMsgs();aiLoading=false;render();
      setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
    })
    .catch(function(err){
      aiMessages.push({role:'assistant',content:'⚠️ '+(err.message&&err.message.length<120?err.message:'تعذّر الاتصال بـ ChatGPT.')});
      saveAIMsgs();aiLoading=false;render();
    });
    return;
  }

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      system:buildAISystem(),
      messages:cleanMsgs
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(d){
    var reply='';
    if(d.content&&d.content.length>0){
      d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
    }
    if(!reply)reply='عذراً، لم أتمكن من الرد. حاول مرة أخرى.';
    aiMessages.push({role:'assistant',content:reply});
    saveAIMsgs();
    aiLoading=false;
    render();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
  })
  .catch(function(err){
    console.error('AI Error:',err);
    var errMsg='⚠️ '+( err.message&&err.message.length<120 ? err.message : 'تعذّر الاتصال. تحقق من اتصالك بالإنترنت وحاول مجدداً.' );
    aiMessages.push({role:'assistant',content:errMsg});
    saveAIMsgs();
    aiLoading=false;
    render();
  });
}

function analyzeDocument(input, hint){
  var file=input.files[0];
  if(!file){return;}
  if(!requireApiKey()){input.value='';return;}
  input.value='';

  var maxMB=20;
  if(file.size>maxMB*1024*1024){toast('⚠️ الملف أكبر من '+maxMB+'MB');return;}

  // Detect type
  var isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  var isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){toast('⚠️ يُقبل PDF أو صورة فقط');return;}

  var mediaType=isPDF?'application/pdf':file.type;
  var fileIcon=isPDF?'📕':'🖼️';
  var label=file.name.length>36?file.name.substring(0,33)+'...':file.name;

  // Show file bubble in chat immediately
  if(curTab!=='ai'){go('ai');}
  aiLoading=true;

  // Add a special "user" message showing the doc
  aiMessages.push({
    role:'user',
    content:'📎 '+label+'\n[يتم تحليل المستند...]',
    isDoc:true,
    docIcon:fileIcon,
    docName:label
  });
  render();
  setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(!b64){
      toast('⚠️ فشل قراءة الملف');
      aiMessages.pop();
      aiLoading=false;
      render();
      return;
    }

    // Build the user text input if any
    var userText=document.getElementById('ai-input');
    var customQ=userText&&userText.value.trim()?userText.value.trim():'';
    if(userText)userText.value='';

    var prompt=customQ||
      (isPDF
        ? 'حلّل هذه الوثيقة القانونية واستخرج: ١) الموضوع الرئيسي ٢) الأطراف المذكورة ٣) النقاط القانونية الجوهرية ٤) أي تواريخ أو مواعيد مهمة ٥) توصياتك القانونية.'
        : 'حلّل هذه الصورة واستخرج أي محتوى قانوني أو نصي مهم، واذكر ملاحظاتك.');

    // Build message content as multipart
    var contentBlock=[];
    if(isPDF){
      contentBlock.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else {
      contentBlock.push({type:'image',source:{type:'base64',media_type:mediaType,data:b64}});
    }
    contentBlock.push({type:'text',text:prompt});

    // Update the last message with the real prompt shown to user
    aiMessages[aiMessages.length-1].content='📎 '+label+(customQ?'\n'+customQ:'');

    // Build history — previous messages (text only) + this multipart message
    var prevMsgs=[];
    var hist=aiMessages.slice(-10,-1);
    var lastR=null;
    for(var mi=hist.length-1;mi>=0;mi--){
      var hm=hist[mi];
      if(hm.role!==lastR&&!hm.isDoc){
        prevMsgs.unshift({role:hm.role,content:hm.content});
        lastR=hm.role;
      }
    }
    // Remove trailing assistant (last must be user)
    while(prevMsgs.length&&prevMsgs[prevMsgs.length-1].role==='assistant')prevMsgs.pop();

    var apiMessages=prevMsgs.concat([{role:'user',content:contentBlock}]);

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2048,
        system:buildAISystem()+'\nعند تحليل مستند، كن منظماً واستخدم عناوين وقوائم واضحة.',
        messages:apiMessages
      })
    })
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(d){
      var reply='';
      if(d.content&&d.content.length>0){
        d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
      }
      if(!reply)reply='لم أتمكن من قراءة المستند. تأكد أنه ملف PDF أو صورة واضحة.';
      aiMessages.push({role:'assistant',content:reply});
      saveAIMsgs();
      aiLoading=false;
      render();
      setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
    })
    .catch(function(err){
      console.error('Doc analysis error:',err);
      var msg='⚠️ '+(err.message&&err.message.length<120?err.message:'فشل تحليل المستند. تأكد من الاتصال وحاول مرة أخرى.');
      aiMessages.push({role:'assistant',content:msg});
      saveAIMsgs();
      aiLoading=false;
      render();
    });
  };
  reader.onerror=function(){
    toast('⚠️ خطأ في قراءة الملف');
    aiMessages.pop();
    aiLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

function cdInfo(s){if(s.status==='completed'||s.status==='postponed')return null;var now=new Date(),tgt=new Date(s.date+'T'+s.time+':00'),diff=tgt-now;if(diff<0){var e=Math.abs(diff);return{passed:true,time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)),cls:'urgent'};}var ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;var cls=ts<3600?'urgent':ts<86400?'soon':'ok';var t=days>0?(days+'ي '+pad(h)+':'+pad(m)+':'+pad(sec)):(pad(h)+':'+pad(m)+':'+pad(sec));return{passed:false,time:t,cls:cls,ts:ts};}

function startTick(){
  if(tick)clearInterval(tick);
  tick=setInterval(function(){
    // ── Session countdowns ──
    data.forEach(function(s){
      var i=cdInfo(s);if(!i)return;
      var el=document.getElementById('cdt-'+s.id);
      if(el){el.textContent=i.time;el.className='cd-time cd-'+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'');}
      var el2=document.getElementById('cdtL-'+s.id);
      if(el2&&detId===s.id)el2.textContent=i.time;
    });
    // ── Deadline full countdown (days + HH:MM:SS) ──
    var now=Date.now();
    Object.keys(sessionDeadlines).forEach(function(sid){
      var d=sessionDeadlines[sid];if(!d)return;
      // Deadline at end of the deadline day (23:59:59)
      var target=new Date(d.deadlineDate+'T23:59:59').getTime();
      var diff=target-now;
      if(diff<0)return; // expired — no ticking needed

      var totalSec=Math.floor(diff/1000);
      var days=Math.floor(totalSec/86400);
      var hours=Math.floor((totalSec%86400)/3600);
      var mins=Math.floor((totalSec%3600)/60);
      var secs=totalSec%60;

      function p(n){return n<10?'0'+n:String(n);}

      var elD=document.getElementById('dlcd-'+sid);
      var elH=document.getElementById('dlch-'+sid);
      var elM=document.getElementById('dlcm-'+sid);
      var elS=document.getElementById('dlcs-'+sid);

      if(elD)elD.textContent=days;
      if(elH)elH.textContent=p(hours);
      if(elM)elM.textContent=p(mins);
      if(elS)elS.textContent=p(secs);

      // Update progress bar
      var info=getDeadlineInfo(parseInt(sid));
      if(info){
        var elPb=document.getElementById('dlcpb-'+sid);
        var elPct=document.getElementById('dlcpct-'+sid);
        var pct=Math.min(100,Math.round(((d.days-(diff/86400000))/d.days)*100));
        if(elPb)elPb.style.width=pct+'%';
        if(elPct)elPct.textContent=pct+'%';
        // Color update if urgency changed
        var clr=info.clr;
        [elD,elH,elM,elS].forEach(function(el){if(el)el.style.color=clr;});
      }
    });
  },1000);
}

function getDeadlineInfo(sid){

  var deadline=new Date(d.deadlineDate+'T00:00:00');
  var now=new Date();now.setHours(0,0,0,0);
  var remaining=Math.ceil((deadline-now)/86400000);
  var clr,icon,urgent=false;
  if(remaining<0){clr='#f87171';icon='🔴';}

  else if(remaining<=7){clr='#fbbf24';icon='⚠️';urgent=true;}

}

function normalizeAr(str){
  if(!str)return'';
  return str
    .replace(/[\u0610-\u061A\u064B-\u065F]/g,'')
    .replace(/[أإآا]/g,'ا')
    .replace(/[ىي]/g,'ي')
    .replace(/ة/g,'ه')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}

// Stop words to skip
var AR_STOP=['ال','و','في','من','على','إلى','عن','مع','هو','هي','هم','أن','إن','لا','ما','لم'];

function searchWords(needle){
  // Split normalized needle into meaningful words (length > 1, not stop words)
  return normalizeAr(needle).split(' ').filter(function(w){
    return w.length>1 && AR_STOP.indexOf(w)===-1;
  });
}

function searchMatch(haystack,needle){
  if(!haystack||!needle)return false;
  var h=normalizeAr(String(haystack));
  var n=normalizeAr(String(needle));
  // 1. Exact contains (needle inside haystack)
  if(h.includes(n))return true;
  // 2. Haystack inside needle (stored name shorter than voice result)
  if(h.length>2&&n.includes(h))return true;
  // 3. Word-by-word: any significant word of needle found in haystack
  var words=searchWords(needle);
  return words.length>0&&words.some(function(w){return h.includes(w);});
}

function searchMatchAny(fields,needle){
  // Match against combined fields AND individual fields
  var combined=normalizeAr(fields.filter(Boolean).join(' '));
  var n=normalizeAr(String(needle));
  if(combined.includes(n))return true;
  if(n.length>3&&combined.includes(n.substring(0,n.length-1)))return true; // partial
  return fields.some(function(f){return searchMatch(f,needle);});
}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function rCal(){
  var yr=calD.getFullYear(),mo=calD.getMonth();
  var days=new Date(yr,mo+1,0).getDate(),first=new Date(yr,mo,1).getDay();
  var byDate={};
  data.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  var tod=today(),selStr=selD?selD.toISOString().split('T')[0]:null;
  function ds(d){return yr+'-'+pad(mo+1)+'-'+pad(d);}

  var h='<div class="cal-wrap">';
  h+='<div class="cal-nav"><button class="cal-btn-nav" onclick="calPrev()">›</button><div class="cal-month">'+MO[mo]+' '+yr+'</div><button class="cal-btn-nav" onclick="calNext()">‹</button></div>';
  h+='<div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:6px">💡 اسحب أي جلسة وأفلتها على يوم آخر لتغيير التاريخ</div>';
  h+='<div class="cal-days-hdr">';DY.forEach(function(d){h+='<div class="cal-day-name">'+d+'</div>';});h+='</div>';
  h+='<div class="cal-grid">';
  for(var i=0;i<first;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dstr=ds(d),has=!!(byDate[dstr]&&byDate[dstr].length);
    var isT=dstr===tod,isSel=dstr===selStr;
    var bg=isSel?'var(--gold-a20)':isT?'var(--blue-a)':'transparent';
    var bdr=isSel?'var(--gold-a30)':isT?'rgba(74,144,217,.35)':'transparent';
    var nc=isSel?'var(--gold2)':isT?'var(--blue)':'var(--text2)';
    var dotC=has?(isSel?'var(--gold)':ST[byDate[dstr][0].status].clr):'';
    var cnt=has?byDate[dstr].length:0;
    h+='<div class="cal-cell" id="calcell-'+dstr+'" onclick="selDay(\''+dstr+'\')"'+
      ' ondragover="event.preventDefault();this.classList.add(\'drag-over\')"'+
      ' ondragleave="this.classList.remove(\'drag-over\')"'+
      ' ondrop="dropOnCalDay(event,\''+dstr+'\')"'+
      ' style="background:'+bg+';border-color:'+bdr+'">';
    h+='<div class="cal-cell-num" style="color:'+nc+'">'+d+'</div>';
    if(cnt>1){
      h+='<div style="position:absolute;bottom:2px;right:2px;background:var(--gold);color:#0a0905;border-radius:6px;font-size:7px;font-weight:700;padding:1px 4px;line-height:1.4">'+cnt+'</div>';
    } else if(has){
      h+='<div class="cal-dot" style="background:'+dotC+'"></div>';
    }
    h+='</div>';
  }
  h+='</div></div>';

  if(selD){
    var ss=byDate[selStr]||[];
    h+=secHdr('📌',fmtL(selStr||tod));
    if(!ss.length){
      h+='<div class="empty" style="padding:22px 0"><div style="font-size:28px;opacity:.3;margin-bottom:7px">📭</div><div class="empty-sub">لا توجد جلسات في هذا اليوم</div>';
      h+='<button onclick="openAdd();document.getElementById(\'fDate\').value=\''+selStr+'\'" style="background:var(--gold);color:#0a0905;border-radius:var(--r-md);padding:10px 18px;font-weight:700;font-size:12px;cursor:pointer;margin-top:10px">+ إضافة جلسة في هذا اليوم</button>';
      h+='</div>';
    } else {
      h+='<div class="stagger">';
      ss.forEach(function(s){
        // Make cards draggable
        var c=card(s);
        c=c.replace('<div class="s-card"','<div class="s-card" draggable="true" ondragstart="calDragStart(event,'+s.id+')"');
        h+=c;
      });
      h+='</div>';
    }
  }
  return h;
}

var _calDragId=null;
function calDragStart(e,id){
  _calDragId=id;
  e.dataTransfer.setData('text/plain',String(id));
  e.dataTransfer.effectAllowed='move';
}

function dropOnCalDay(e,newDate){
  e.preventDefault();
  document.querySelectorAll('.cal-cell').forEach(function(el){el.classList.remove('drag-over');});
  var id=_calDragId||parseInt(e.dataTransfer.getData('text/plain'));
  _calDragId=null;
  if(!id)return;
  var s=data.find(function(x){return x.id===id;});
  if(!s||s.date===newDate)return;
  var oldDate=s.date;
  s.date=newDate;
  dbPut(s).then(function(){
    toast('📅 نُقلت الجلسة '+s.num+' إلى '+newDate);
    selD=new Date(newDate+'T00:00:00');
    render();
  });
}

function getMeetInfo(url){
  if(!url)return null;
  var u=url.toLowerCase();
  if(u.includes('teams.microsoft.com')||u.includes('teams.live.com'))
    return{name:'Teams',icon:'🟦',color:'#6499ff',bg:'rgba(100,153,255,0.12)',border:'rgba(100,153,255,0.3)'};
  if(u.includes('zoom.us')||u.includes('zoom.com'))
    return{name:'Zoom',icon:'🟦',color:'#2d8cff',bg:'rgba(45,140,255,0.12)',border:'rgba(45,140,255,0.3)'};
  if(u.includes('meet.google.com'))
    return{name:'Google Meet',icon:'🟩',color:'#34a853',bg:'rgba(52,168,83,0.12)',border:'rgba(52,168,83,0.3)'};
  if(u.includes('webex.com'))
    return{name:'Webex',icon:'🟧',color:'#f6921e',bg:'rgba(246,146,30,0.12)',border:'rgba(246,146,30,0.3)'};
  if(u.startsWith('http'))
    return{name:'اجتماع عن بُعد',icon:'🔗',color:'var(--gold2)',bg:'var(--gold-a10)',border:'var(--gold-a30)'};
  return null;
}

var importPreviewRows=[];
var COL_MAP={
  num:['رقم القضية','رقم','num','case number','case_number'],
  type:['نوع القضية','نوع','type','case type'],
  court:['المحكمة','محكمة','court'],
  room:['القاعة','قاعة','room'],
  plnt:['المدعي','مدعي','plaintiff'],
  dfnd:['المدعى عليه','المدعى','defendant'],
  date:['التاريخ','تاريخ','date'],
  time:['الوقت','وقت','time'],
  status:['الحالة','حالة','status'],
  priority:['الأهمية','أهمية','priority'],
  notes:['ملاحظات','notes']
};
var ST_MAP={'مجدولة':'scheduled','scheduled':'scheduled','جارية':'inProgress','منتهية':'completed','completed':'completed','مؤجلة':'postponed','postponed':'postponed'};
var PR_MAP={'عالية':'high','high':'high','متوسطة':'med','med':'med','منخفضة':'low','low':'low','عادية':'none','none':'none'};

function findCol(headers,aliases){
  for(var i=0;i<headers.length;i++){
    var h=String(headers[i]||'').trim().toLowerCase();
    for(var j=0;j<aliases.length;j++){if(h===aliases[j].toLowerCase()||h.includes(aliases[j].toLowerCase()))return i;}
  }
  return -1;
}

function parseDate(v){
  if(!v)return'';
  var s=String(v).trim();
  // Excel serial number
  if(/^\d{4,5}$/.test(s)){var d=new Date(Math.round((parseInt(s)-25569)*86400*1000));return d.toISOString().split('T')[0];}
  // dd/mm/yyyy or dd-mm-yyyy
  var m=s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
  // yyyy-mm-dd
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  return s;
}

function parseTime(v){
  if(!v)return'09:00';
  var s=String(v).trim();
  if(/^\d{1,2}:\d{2}/.test(s))return s.substring(0,5);
  if(/^0\.\d+$/.test(s)){var t=Math.round(parseFloat(s)*1440);return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');}
  return'09:00';
}

function rowToSession(row,map){
  var g=function(k){var i=map[k];return i>=0?String(row[i]||'').trim():'';};
  return{
    id:Date.now()+Math.random(),
    num:g('num')||'—',
    type:g('type')||'مدنية',
    court:g('court')||'—',
    room:g('room')||'',
    plnt:g('plnt')||'',
    dfnd:g('dfnd')||'',
    date:parseDate(g('date'))||today(),
    time:parseTime(g('time')),
    status:ST_MAP[(g('status')||'').toLowerCase()]||'scheduled',
    priority:PR_MAP[(g('priority')||'').toLowerCase()]||'none',
    notes:g('notes')||'',
    attachments:[],memo:'',minutes:'',quickNote:'',tags:[],stage:''
  };
}

function handleImportFile(input){
  var file=input.files[0];if(!file)return;
  var isCSV=file.name.toLowerCase().endsWith('.csv');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var rows=[];
      if(isCSV){
        var text=e.target.result;
        // Remove BOM
        if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
        var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
        rows=lines.map(function(l){
          // Handle quoted fields
          var cols=[];var cur='';var inQ=false;
          for(var i=0;i<l.length;i++){
            var c=l[i];
            if(c==='"'&&!inQ){inQ=true;}
            else if(c==='"'&&inQ){inQ=false;}
            else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
            else cur+=c;
          }
          cols.push(cur.trim());
          return cols;
        });
      } else {
        if(typeof XLSX==='undefined'){toast('⚠️ مكتبة Excel غير محملة');return;}
        var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      if(!rows||rows.length<2){toast('⚠️ الملف فارغ أو غير صالح');return;}
      var headers=rows[0].map(function(h){return String(h||'');});
      var colMap={};
      Object.keys(COL_MAP).forEach(function(k){colMap[k]=findCol(headers,COL_MAP[k]);});
      var sessions=rows.slice(1).filter(function(r){return r.some(function(c){return String(c||'').trim();});}).map(function(r){return rowToSession(r,colMap);});
      if(!sessions.length){toast('⚠️ لا توجد بيانات صالحة');return;}
      importPreviewRows=sessions;
      showImportPreview(sessions);
    }catch(err){console.error(err);toast('⚠️ خطأ في قراءة الملف: '+err.message);}
  };
  if(isCSV)reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function exportICS(ids){
  var list=ids?data.filter(function(s){return ids.indexOf(s.id)>-1;}):data.filter(function(s){return s.status==='scheduled'||s.status==='inProgress';});
  if(!list.length){toast('⚠️ لا توجد جلسات للتصدير');return;}
  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//الجلسات القضائية//AR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  list.forEach(function(s){
    var dt=s.date.replace(/-/g,'')+'T'+s.time.replace(':','')+'00';
    var uid=s.id+'@jalsat-app';
    var summary='جلسة: '+s.num+' - '+s.type;
    var desc='المحكمة: '+(s.court||'')+' | المدعي: '+(s.plnt||'')+' | المدعى عليه: '+(s.dfnd||'');
    var loc=s.court+(s.room?' - '+s.room:'');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid);
    lines.push('DTSTAMP:'+new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z');
    lines.push('DTSTART;TZID=Asia/Riyadh:'+dt);
    lines.push('DURATION:PT1H');
    lines.push('SUMMARY:'+summary);
    lines.push('DESCRIPTION:'+desc);
    lines.push('LOCATION:'+loc);
    lines.push('STATUS:'+(s.status==='scheduled'?'CONFIRMED':'TENTATIVE'));
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:-PT30M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:تذكير: '+summary);
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='جلساتي_'+today()+'.ics';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('📅 تم تصدير '+list.length+' جلسة للتقويم');
}

function openFeeForm(){var f=document.getElementById('feeForm');if(f){f.style.display='block';f.scrollIntoView({behavior:'smooth'});}}
function saveFee(){
  var desc=document.getElementById('feDesc');var amt=document.getElementById('feAmt');
  if(!desc||!desc.value.trim()||!amt||!amt.value){toast('⚠️ أدخل الوصف والمبلغ');return;}
  var statusEl=document.getElementById('feStatus');
  var st=statusEl?statusEl.value:'pending';
  var partAmt=st==='partial'?(parseFloat(document.getElementById('fePaidAmt').value)||0):0;
  var sessEl=document.getElementById('feSess');
  var feClient=document.getElementById('feClient');
  fees.push({
    id:'fee_'+Date.now(),
    desc:desc.value.trim(),
    client:feClient?feClient.value.trim():'',
    amount:parseFloat(amt.value)||0,
    date:document.getElementById('feDate').value,
    sessionId:sessEl?parseInt(sessEl.value)||null:null,
    status:st,
    paid:st==='paid',
    paidAmount:partAmt
  });
  saveFees();toast('✅ تم التسجيل');render();
}
function markFeePaid(id){var f=fees.find(function(x){return x.id===id;});if(f){f.status='paid';f.paid=true;f.paidAmount=f.amount;saveFees();toast('✅ تم تسجيل التسديد الكامل');render();}}
function markFeePartial(id){
  var amt=prompt('أدخل المبلغ المسدد (ر.س):');
  if(!amt||isNaN(parseFloat(amt)))return;
  var f=fees.find(function(x){return x.id===id;});
  if(f){f.status='partial';f.paid=false;f.paidAmount=parseFloat(amt);saveFees();toast('⚡ تم تسجيل التسديد الجزئي');render();}
}
function delFee(id){fees=fees.filter(function(x){return x.id!==id;});saveFees();toast('🗑️ تم الحذف');render();}

function calcDeadlineInSession(sid){
  var dateEl=document.getElementById('dlcDate_'+sid);
  var typeEl=document.getElementById('dlcType_'+sid);
  var resEl=document.getElementById('dlcResult_'+sid);
  if(!dateEl||!dateEl.value){toast('⚠️ اختر تاريخ الحكم أولاً');return;}
  var days=parseInt(typeEl.value)||30;
  var typeName=typeEl.options[typeEl.selectedIndex].text;
  var base=new Date(dateEl.value+'T00:00:00');
  var deadline=new Date(base);
  deadline.setDate(deadline.getDate()+days);
  var deadlineStr=deadline.toISOString().split('T')[0];

  // ── Save deadline for this session ──
  var sid2=parseInt(sid);
  var s=data.find(function(x){return x.id===sid2;});
  sessionDeadlines[sid2]={
    deadlineDate:deadlineStr,
    baseDate:dateEl.value,
    days:days,
    typeName:typeName,
    sessionNum:s?s.num:'',
    sessionType:s?s.type:'',
    court:s?s.court:''
  };
  saveDeadlines();
  // If home tab is open, refresh it immediately
  if(curTab==='home'){var cnt=document.getElementById('cnt');if(cnt){cnt.innerHTML=rHome();startTick();}}

  var now=new Date();now.setHours(0,0,0,0);
  var remaining=Math.ceil((deadline-now)/86400000);
  var clr,icon,status,bg,border;
  if(remaining<0){clr='#f87171';icon='🔴';bg='rgba(232,80,80,0.08)';border='rgba(232,80,80,0.25)';status='انتهى منذ '+Math.abs(remaining)+' يوم';}
  else if(remaining===0){clr='#f87171';icon='⚡';bg='rgba(232,80,80,0.1)';border='rgba(232,80,80,0.3)';status='اليوم هو آخر يوم!';}
  else if(remaining<=7){clr='#fbbf24';icon='⚠️';bg='rgba(251,191,36,0.08)';border='rgba(251,191,36,0.25)';status='متبقي '+remaining+' يوم فقط';}
  else if(remaining<=14){clr='#f59e0b';icon='🟡';bg='rgba(245,158,11,0.08)';border='rgba(245,158,11,0.2)';status='متبقي '+remaining+' يوم';}
  else{clr='#34d399';icon='✅';bg='rgba(52,211,153,0.08)';border='rgba(52,211,153,0.2)';status='متبقي '+remaining+' يوم';}

  var deadlineFmt=deadline.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var baseDateFmt=base.toLocaleDateString('ar-SA',{year:'numeric',month:'long',day:'numeric'});
  resEl.style.display='block';
  resEl.innerHTML=
    '<div style="background:'+bg+';border:1px solid '+border+';border-radius:10px;padding:12px">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
    '<div style="font-size:22px">'+icon+'</div>'+
    '<div style="font-size:13px;font-weight:900;color:'+clr+'">'+status+'</div>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:5px">'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">نوع الإجراء</span><span style="color:var(--text);font-weight:600">'+typeName+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">تاريخ البداية</span><span style="color:var(--text);font-weight:600">'+baseDateFmt+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:11px"><span style="color:var(--text3)">المدة القانونية</span><span style="color:var(--text);font-weight:600">'+days+' يوم</span></div>'+
    '<div style="border-top:1px solid '+border+';margin-top:5px;padding-top:7px;display:flex;justify-content:space-between;align-items:center">'+
    '<span style="font-size:10px;color:var(--text3);font-weight:700">الموعد النهائي</span>'+
    '<span style="font-size:13px;font-weight:900;color:'+clr+'">'+deadlineFmt+'</span>'+
    '</div></div>'+
    (remaining>=0?
    '<div style="margin-top:10px;background:var(--surface3);border-radius:4px;height:6px;overflow:hidden">'+
    '<div style="height:100%;background:'+clr+';border-radius:4px;width:'+Math.min(100,Math.round(((days-remaining)/days)*100))+'%;transition:width .4s"></div>'+
    '</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-top:3px"><span>اليوم 0</span><span>يوم '+days+'</span></div>':'')+'</div>'+
    '<div style="margin-top:10px;display:flex;gap:8px">'+
    '<div style="flex:1;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.2);border-radius:9px;padding:8px 10px;font-size:10px;color:#34d399;text-align:center">💾 تم حفظ الموعد</div>'+
    '<button onclick="go(\'home\')" style="flex:1;background:var(--gold);color:#0a0905;border-radius:9px;padding:8px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">🏠 عرض في الرئيسية</button>'+
    '</div>';
}

function calcDeadline(){
  var dateEl=document.getElementById('dlcDate');
  var typeEl=document.getElementById('dlcType');
  var resEl=document.getElementById('dlcResult');
  if(!dateEl||!dateEl.value){toast('⚠️ اختر التاريخ أولاً');return;}
  var days=parseInt(typeEl.value)||30;
  var base=new Date(dateEl.value+'T00:00:00');
  var deadline=new Date(base);deadline.setDate(deadline.getDate()+days);
  var remaining=Math.ceil((deadline-new Date())/86400000);
  var clr=remaining<0?'#f87171':remaining<7?'#fbbf24':'#34d399';
  var msg=remaining<0?'انتهى الموعد منذ '+Math.abs(remaining)+' يوم':remaining===0?'اليوم هو آخر يوم!':'متبقي '+remaining+' يوم';
  resEl.style.display='block';
  resEl.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center">'+
    '<div><div style="font-size:11px;color:var(--text3);margin-bottom:4px">الموعد النهائي</div>'+
    '<div style="font-size:16px;font-weight:700;color:var(--text)">'+deadline.toLocaleDateString('ar-SA',{weekday:'long',year:'numeric',month:'long',day:'numeric'})+'</div></div>'+
    '<div style="text-align:left"><div style="font-size:18px;font-weight:900;color:'+clr+'">'+msg+'</div></div></div>';
}

function exportExcel(){
  var csv='\uFEFF'+'رقم القضية,نوع القضية,المحكمة,القاعة,المدعي,المدعى عليه,التاريخ,الوقت,الحالة,الأهمية,ملاحظات\n';
  data.forEach(function(s){
    var row=[s.num,s.type,s.court||'',s.room||'',s.plnt||'',s.dfnd||'',s.date,s.time,ST[s.status].lbl,PT[s.priority||'none'].lbl,s.notes||''];
    csv+=row.map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',')+'\n';
  });
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='الجلسات_'+today()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('📊 تم تصدير '+data.length+' جلسة');
}

function startVoiceSearch(){
  var SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){toast('⚠️ المتصفح لا يدعم التعرف على الصوت');return;}
  var r=new SpeechRecognition();r.lang='ar-SA';r.continuous=false;r.interimResults=false;
  var btn=document.getElementById('voiceBtn');
  var status=document.getElementById('voiceStatus');
  if(btn){btn.style.background='linear-gradient(135deg,#e85050,#f87171)';btn.style.boxShadow='0 0 20px rgba(232,80,80,.4)';}
  if(status)status.textContent='جارٍ الاستماع...';
  r.onresult=function(e){
    var txt=e.results[0][0].transcript;
    if(btn){btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';btn.style.boxShadow='0 0 20px var(--gold-a30)';}
    if(status)status.textContent='تم التعرف: "'+txt+'"';
    setTimeout(function(){go('list');q=txt;render();},400);
  };
  r.onerror=function(e){
    if(btn){btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';btn.style.boxShadow='0 0 20px var(--gold-a30)';}
    if(status)status.textContent='تعذّر التعرف — حاول مرة أخرى';
  };
  r.onend=function(){if(btn)btn.style.background='linear-gradient(135deg,var(--gold),var(--gold2))';};
  r.start();
}

var liveSessionId=null,liveNotes='',liveTick=null,liveStart=null;

function rLive(){
  var active=liveSessionId?data.find(function(x){return x.id===liveSessionId;}):null;
  var h='<div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2);margin-bottom:14px">🔴 وضع الجلسة المباشرة</div>';

  if(!active){
    // Pick session
    var td=today();
    var todaySessions=data.filter(function(s){return s.date===td&&(s.status==='scheduled'||s.status==='inProgress');});
    var upcoming=data.filter(function(s){return s.date>=td&&s.status==='scheduled';}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);}).slice(0,5);
    var list=todaySessions.length?todaySessions:upcoming;
    h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:14px">';
    h+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px">اختر جلسة لتفعيل الوضع المباشر</div>';
    if(!list.length){
      h+='<div style="text-align:center;padding:20px;color:var(--text3);font-size:12px">لا توجد جلسات مجدولة اليوم</div>';
    } else {
      list.forEach(function(s){
        h+='<div onclick="startLiveSession('+s.id+')" style="padding:12px;background:var(--surface3);border-radius:10px;margin-bottom:7px;cursor:pointer;border:1px solid var(--border2);transition:border-color .15s" onmouseenter="this.style.borderColor=\'var(--gold-a30)\'" onmouseleave="this.style.borderColor=\'var(--border2)\'">';
        h+='<div style="display:flex;justify-content:space-between;align-items:center">';
        h+='<div><div style="font-size:13px;font-weight:700;color:var(--gold2)">'+s.num+'</div>';
        h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+s.court+' · '+s.time+'</div></div>';
        h+=bdg(s.status)+'</div></div>';
      });
    }
    h+='</div>';
    return h;
  }

  // Active live session
  var elapsed=liveStart?Math.floor((Date.now()-liveStart)/1000):0;
  var eh=Math.floor(elapsed/3600),em=Math.floor((elapsed%3600)/60),es=elapsed%60;
  var etime=pad(eh)+':'+pad(em)+':'+pad(es);

  h+='<div style="background:rgba(232,80,80,0.08);border:1px solid rgba(232,80,80,0.25);border-radius:var(--r-lg);padding:16px;margin-bottom:12px;text-align:center">';
  h+='<div style="font-size:10px;color:#f87171;font-weight:700;letter-spacing:.1em;margin-bottom:6px;animation:pulse 1.2s infinite">● جارٍ الآن</div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-bottom:4px">'+active.num+' · '+active.court+'</div>';
  h+='<div style="font-size:38px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;letter-spacing:.04em" id="liveTimer">'+etime+'</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:4px">مدة الجلسة</div>';
  h+='</div>';

  // Quick notes
  h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px;margin-bottom:12px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px">📝 تدوين سريع</div>';
  h+='<textarea id="liveNoteArea" placeholder="سجّل ما يدور في الجلسة..." dir="rtl" rows="6" style="width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;color:var(--text);resize:none;line-height:1.7;font-family:Tajawal,sans-serif">'+liveNotes+'</textarea>';

function startLiveSession(id){
  liveSessionId=id;liveNotes='';liveStart=Date.now();
  var s=data.find(function(x){return x.id===id;});
  if(s&&s.status==='scheduled'){s.status='inProgress';dbPut(s);}
  render();toast('🔴 بدأت الجلسة المباشرة');
}

function startLiveTick(){
  if(liveTick)clearInterval(liveTick);
  if(!liveSessionId||!liveStart)return;
  liveTick=setInterval(function(){
    var el=document.getElementById('liveTimer');if(!el)return;
    var elapsed=Math.floor((Date.now()-liveStart)/1000);
    el.textContent=pad(Math.floor(elapsed/3600))+':'+pad(Math.floor((elapsed%3600)/60))+':'+pad(elapsed%60);
    // Sync notes
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  },1000);
}

function saveLiveNotes(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;
  dbPut(s).then(function(){toast('💾 تم حفظ الملاحظات');});
}

function askAIFromLive(){
  var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(!s)return;
  var msg='أنا في جلسة مباشرة الآن: '+s.num+' '+s.type+' في '+s.court;
  if(liveNotes)msg+='\n\nما دوّنته:\n'+liveNotes+'\n\nأحتاج توجيهاً قانونياً سريعاً.';
  saveLiveNotes();
  go('ai');
  setTimeout(function(){sendAI(msg);},350);
}

function addAttFromLive(id){
  var input=document.createElement('input');input.type='file';input.accept='image/*,.pdf';
  input.capture='environment';
  input.onchange=function(){addAtt(id,input);toast('📎 تم إضافة المرفق');};
  input.click();
}

function cycleStatusLive(id){
  var s=data.find(function(x){return x.id===id;});if(!s)return;
  var order=['scheduled','inProgress','completed','postponed'];
  s.status=order[(order.indexOf(s.status)+1)%order.length];
  dbPut(s).then(function(){toast('🔁 '+ST[s.status].lbl);});
}

function endLiveSession(){
  var s=data.find(function(x){return x.id===liveSessionId;});
  if(liveTick)clearInterval(liveTick);
  if(s){
    var na=document.getElementById('liveNoteArea');if(na)liveNotes=na.value;
    if(liveNotes){s.minutes=(s.minutes?s.minutes+'\n---\n':'')+liveNotes;dbPut(s);}
    if(s.status==='inProgress'){s.status='completed';dbPut(s);}
  }
  var elapsed=liveStart?Math.floor((Date.now()-liveStart)/1000):0;
  var em=Math.floor(elapsed/60);
  liveSessionId=null;liveNotes='';liveStart=null;
  toast('✅ انتهت الجلسة ('+em+' دقيقة)');
  render();
}

        if(n==='')return'<div></div>';
        return'<button onclick="pinKey(\''+n+'\')" style="width:72px;height:72px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);font-size:'+(n==='DEL'?'20':'22')+'px;font-weight:700;color:var(--text);cursor:pointer;font-family:Tajawal,sans-serif;transition:all .1s" onmousedown="this.style.transform=\'scale(.92)\'" onmouseup="this.style.transform=\'scale(1)\'">'+n+'</button>';
      }).join('')+
    '</div>'+
    '<button onclick="tryBiometric()" style="margin-top:24px;background:none;color:var(--text3);border:1px solid var(--border2);border-radius:20px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:Tajawal,sans-serif">🔐 بصمة / Face ID</button>';
  document.body.appendChild(div);
  window._pinEntry='';
}

function pinKey(k){
  var err=document.getElementById('pinErr');
  if(k==='DEL'){window._pinEntry=(window._pinEntry||'').slice(0,-1);}
  else if((window._pinEntry||'').length<4){window._pinEntry=(window._pinEntry||'')+k;}
  updPinDots();
  if((window._pinEntry||'').length===4){
    setTimeout(function(){
      if(window._pinEntry===pinCode){
        pinLocked=false;pinAttempts=0;
        var s=document.getElementById('pinScreen');if(s)s.remove();
        window._pinEntry='';
      } else {
        pinAttempts++;
        if(err)err.textContent='رمز خاطئ — محاولة '+(pinAttempts)+'/5';
        window._pinEntry='';updPinDots();
        if(pinAttempts>=5&&err)err.textContent='⚠️ تم إيقاف التطبيق مؤقتاً';
      }
    },200);
  }
}

function updPinDots(){
  var dots=document.querySelectorAll('#pinDots div');
  var len=(window._pinEntry||'').length;
  dots.forEach(function(d,i){
    d.style.background=i<len?'var(--gold)':'var(--surface3)';
    d.style.borderColor=i<len?'var(--gold-a30)':'var(--border2)';
    d.style.transform=i===len-1?'scale(1.2)':'scale(1)';
    setTimeout(function(){if(d)d.style.transform='scale(1)';},150);
  });
}

function tryBiometric(){
  if(window.PublicKeyCredential&&window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable){
    window.PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable().then(function(ok){
      if(ok){
        // Use WebAuthn for biometric
        var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
        navigator.credentials.get({publicKey:{challenge:challenge,timeout:30000,userVerification:'required'}}).then(function(){
          pinLocked=false;var s=document.getElementById('pinScreen');if(s)s.remove();
          toast('✅ تم الدخول بالبصمة');
        }).catch(function(){toast('⚠️ فشل التحقق — أدخل PIN');});
      } else toast('⚠️ البصمة غير متوفرة على هذا الجهاز');
    });
  } else toast('⚠️ غير مدعوم — أدخل PIN');
}

/* ═══════════════════════════════════════════════════════════
   3. COURT FEES CALCULATOR
═══════════════════════════════════════════════════════════ */
var COURT_FEES={
  civil:     {name:'مدنية',    base:500, pct:0.025, min:500,  max:20000},
  commercial:{name:'تجارية',   base:600, pct:0.03,  min:600,  max:30000},
  criminal:  {name:'جنائية',   base:400, pct:0,     min:400,  max:400},
  personal:  {name:'أحوال شخصية',base:300,pct:0,   min:300,  max:300},
  labor:     {name:'عمالية',   base:250, pct:0,     min:250,  max:250},
  admin:     {name:'إدارية',   base:350, pct:0,     min:350,  max:350},
  appeal:    {name:'استئناف',  base:800, pct:0.015, min:800,  max:15000},
  cassation: {name:'نقض',      base:1000,pct:0.02,  min:1000, max:20000}
};

function calcCourtFees(type,amount){
  var f=COURT_FEES[type];if(!f)return 0;
  var fee=f.base+(f.pct*( amount||0));
  return Math.min(Math.max(fee,f.min),f.max);
}

function applyHiddenTabs(){
  var allTabs=['home','list','tasks','contacts','files','ai','cal','stats','fees','tools','live','archive','letterhead','legal','reports','share','settings'];

  allTabs.forEach(function(t){

function togglePin(enabled){
