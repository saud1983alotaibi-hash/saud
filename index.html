function parseAndImportNajiz(){
  var text=document.getElementById('najizText').value.trim();
  if(!text){toast('⚠️ الصق النص أولاً');return;}

  var sessions=[];
  var preview=document.getElementById('najizPreview');

  // Split by common delimiters (each session block)
  var blocks=text.split(/\n{2,}|(?=القضية\s)|(?=قضية\s)|(?=رقم القضية)/);

  blocks.forEach(function(block){
    if(!block.trim())return;
    var s={num:'',type:'مدنية',date:'',time:'09:00',court:'',plnt:'',dfnd:'',status:'scheduled',priority:'med',notes:'مستورد من ناجز'};

    // Extract case number - patterns: 44/و/7865 or 1234/44 or P-12345
    var numMatch=block.match(/(?:القضية|قضية|رقم|رقم القضية)[:\s]*([^\n،,]+)/i)||
                 block.match(/(\d{2,}\/[^\s،\n]+)/)||
                 block.match(/([A-Z]-\d{4,})/);
    if(numMatch)s.num=numMatch[1].trim();

    // Extract date - Hijri or Gregorian
    // Gregorian: 2024-08-15 or 15/08/2024
    var dateG=block.match(/(\d{4}[-\/]\d{2}[-\/]\d{2})/);
    // Hijri: 15/08/1446 or 1446/08/15 or 15-08-1446 (year starts with 14xx)
    var dateH=block.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](14\d{2})/) ||
              block.match(/(14\d{2})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
    // Hijri written in Arabic: ١٥ شعبان ١٤٤٦ or 15 شعبان 1446
    var hijriMonths={'\u064a\u0646\u0627\u064a\u0631':1,'\u0641\u0628\u0631\u0627\u064a\u0631':2,'\u0645\u0627\u0631\u0633':3,'\u0623\u0628\u0631\u064a\u0644':4,'\u0645\u0627\u064a\u0648':5,'\u064a\u0648\u0646\u064a\u0648':6,'\u064a\u0648\u0644\u064a\u0648':7,'\u0623\u063a\u0633\u0637\u0633':8,'\u0633\u0628\u062a\u0645\u0628\u0631':9,'\u0623\u0643\u062a\u0648\u0628\u0631':10,'\u0646\u0648\u0641\u0645\u0628\u0631':11,'\u062f\u064a\u0633\u0645\u0628\u0631':12,'\u0645\u062d\u0631\u0645':1,'\u0635\u0641\u0631':2,'\u0631\u0628\u064a\u0639 \u0627\u0644\u0623\u0648\u0644':3,'\u0631\u0628\u064a\u0639 \u0627\u0644\u062b\u0627\u0646\u064a':4,'\u062c\u0645\u0627\u062f\u0649 \u0627\u0644\u0623\u0648\u0644\u0649':5,'\u062c\u0645\u0627\u062f\u0649 \u0627\u0644\u062b\u0627\u0646\u064a\u0629':6,'\u0631\u062c\u0628':7,'\u0634\u0639\u0628\u0627\u0646':8,'\u0631\u0645\u0636\u0627\u0646':9,'\u0634\u0648\u0627\u0644':10,'\u0630\u0648 \u0627\u0644\u0642\u0639\u062f\u0629':11,'\u0630\u0648 \u0627\u0644\u062d\u062c\u0629':12};
    var dateTextH=block.match(/(\d{1,2})\s+([\u0600-\u06ff\s]+?)\s+(14\d{2})/);

    if(dateG && !dateG[1].startsWith('14')){
      // Pure Gregorian
      s.date=dateG[1].replace(/\//g,'-');
      s.hijriDate='';
    } else if(dateH){
      // Numeric Hijri date — convert accurately using Intl API
      var hd,hm,hy;
      // Check format: is first group the year (14xx) or the day?
      if(parseInt(dateH[1])>1400){hy=parseInt(dateH[1]);hm=parseInt(dateH[2]);hd=parseInt(dateH[3]);}
      else{hd=parseInt(dateH[1]);hm=parseInt(dateH[2]);hy=parseInt(dateH[3]);}
      s.hijriDate=hd+'/'+hm+'/'+hy+' هـ';
      s.date=hijriToGregorian(hy,hm,hd);
    } else if(dateTextH){
      // Arabic month name date
      var hd2=parseInt(dateTextH[1]);
      var monthName=dateTextH[2].trim();
      var hm2=hijriMonths[monthName]||1;
      var hy2=parseInt(dateTextH[3]);
      s.hijriDate=hd2+' '+monthName+' '+hy2+' هـ';
      s.date=hijriToGregorian(hy2,hm2,hd2);
    }

    // Extract time
    var timeMatch=block.match(/(\d{1,2}):(\d{2})\s*(ص|ام|am|م|pm)?/i);
    if(timeMatch){
      var h=parseInt(timeMatch[1]),m=parseInt(timeMatch[2]);
      var period=(timeMatch[3]||'').toLowerCase();
      if((period==='م'||period==='pm')&&h<12)h+=12;
      if((period==='ص'||period==='am')&&h===12)h=0;
      s.time=(h<10?'0'+h:h)+':'+(m<10?'0'+m:m);
    }

    // Extract court
    var courtMatch=block.match(/(?:المحكمة|محكمة)[:\s]*([^\n،,]+)/i);
    if(courtMatch)s.court=courtMatch[1].trim();

    // Extract parties
    var plntMatch=block.match(/(?:المدعي|المدعى|الطاعن)[:\s]*([^\n،,\/]+)/i);
    if(plntMatch)s.plnt=plntMatch[1].trim();
    var dfndMatch=block.match(/(?:المدعى عليه|المطعون ضده|المستأنف عليه)[:\s]*([^\n،,\/]+)/i);
    if(dfndMatch)s.dfnd=dfndMatch[1].trim();

    // Extract type
    if(block.match(/جنائ|جزائ|جريم/i))s.type='جنائية';
    else if(block.match(/تجار/i))s.type='تجارية';
    else if(block.match(/عمال|عمل/i))s.type='عمالية';
    else if(block.match(/أحوال شخصية|أسرة|طلاق|خلع|نفقة/i))s.type='أحوال شخصية';
    else if(block.match(/إدار|ديوان/i))s.type='إدارية';

    // Extract status
    if(block.match(/مؤجل/i))s.status='postponed';
    else if(block.match(/منتهي|صدر الحكم|محسوم/i))s.status='completed';
    else if(block.match(/جار|قيد النظر/i))s.status='inProgress';

    // Only add if we have at least a case number
    if(s.num){sessions.push(s);}
  });

  if(!sessions.length){
    // Try line-by-line parsing if block parsing failed
    var lines=text.split('\n');
    var cur={num:'',type:'مدنية',date:'',time:'09:00',court:'',status:'scheduled',priority:'med',notes:'مستورد من ناجز'};
    lines.forEach(function(line){
      var l=line.trim();if(!l)return;
      var nm=l.match(/(\d{2,}\/[^\s،\n،]+)/)||l.match(/القضية[:\s]+([^\n،]+)/i);
      if(nm){
        if(cur.num)sessions.push(Object.assign({},cur));
        cur={num:nm[1].trim(),type:'مدنية',date:'',time:'09:00',court:'',status:'scheduled',priority:'med',notes:'مستورد من ناجز'};
      }
      var dt=l.match(/(\d{4}[-\/]\d{2}[-\/]\d{2})/)||l.match(/(\d{1,2})[\/](\d{2})[\/](14\d{2})/);
      if(dt&&dt[1])cur.date=dt[1].replace(/\//g,'-');
      var tm=l.match(/(\d{1,2}:\d{2})/);if(tm)cur.time=tm[1];
      var ct=l.match(/(?:محكمة|المحكمة)[:\s]*(.+)/i);if(ct)cur.court=ct[1].trim();
    });
    if(cur.num)sessions.push(cur);
  }

  if(!sessions.length){
    toast('⚠️ لم يُتعرف على بيانات جلسات. تأكد من نسخ النص بشكل صحيح');
    return;
  }

  // Show preview
  preview.style.display='block';
  var ph='<div style="font-size:11px;font-weight:700;color:var(--gold2);margin-bottom:8px">✅ تم التعرف على '+sessions.length+' جلسة — مراجعة قبل الاستيراد</div>';
  sessions.forEach(function(s,i){
    ph+='<div style="background:var(--surface3);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:11px">';
    ph+='<div style="display:flex;justify-content:space-between;align-items:center">';
    ph+='<div style="font-weight:700;color:var(--gold2)">'+s.num+'</div>';
    ph+='<button onclick="najizSessions.splice('+i+',1);parseAndImportNajiz()" style="background:none;color:#f87171;font-size:12px;cursor:pointer">✕</button>';
    ph+='</div>';
    ph+='<div style="color:var(--text3);margin-top:3px">'+s.type+(s.court?' · '+s.court:'')+(s.hijriDate?' · <span style="color:var(--gold2)">'+s.hijriDate+'</span>':s.date?' · '+s.date:'')+(s.time?' '+s.time:'')+'</div>';
    ph+='</div>';
  });
  ph+='<button onclick="confirmNajizImport()" style="width:100%;background:var(--gold);color:#0a0905;border-radius:8px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;margin-top:8px;font-family:Tajawal,sans-serif">✅ استيراد '+sessions.length+' جلسة</button>';
  preview.innerHTML=ph;

  window.najizSessions=sessions;
}

function confirmNajizImport(){
  var sessions=window.najizSessions||[];
  if(!sessions.length){toast('⚠️ لا توجد جلسات للاستيراد');return;}
  var added=0;
  var promises=sessions.map(function(s){
    // Check no duplicate
    var dup=data.find(function(x){return x.num===s.num&&x.date===s.date;});
    if(dup)return Promise.resolve();
    var newS=Object.assign({id:Date.now()+Math.random(),num:s.num||'جلسة ناجز',type:s.type||'مدنية',court:s.court||'',date:s.date||today(),time:s.time||'09:00',status:s.status||'scheduled',priority:s.priority||'med',plnt:s.plnt||'',dfnd:s.dfnd||'',notes:s.notes||'مستورد من ناجز',tags:['ناجز'],hijriDate:s.hijriDate||''},s);
    newS.id=Date.now()+(added++);
    data.push(newS);
    return dbPut(newS);
  });
  Promise.all(promises).then(function(){
    toast('✅ تم استيراد '+added+' جلسة من ناجز');
    window.najizSessions=[];
    document.getElementById('najizModal').remove();
    render();
  });
}

function globalVoiceSearch(){
  var SpeechRecog=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecog){toast('⚠️ البحث الصوتي غير مدعوم في هذا المتصفح');return;}
  var btn=document.getElementById('gsVoiceBtn');
  var inp=document.getElementById('globalSearchInp');
  if(!inp)return;

  var r=new SpeechRecog();
  r.lang='ar-SA';r.continuous=false;r.interimResults=true;r.maxAlternatives=3;

  if(btn){btn.textContent='🔴';btn.style.background='rgba(224,69,85,.15)';btn.style.borderColor='rgba(224,69,85,.4)';}
  toast('🎤 تحدث الآن...');

  r.onresult=function(e){
    var result=e.results[0];
    var isFinal=result.isFinal;
    // Show interim results
    var best=result[0].transcript.trim();
    if(inp)inp.value=best;
    if(isFinal){
      // Pick best alternative
      var bestScore=0;
      for(var i=0;i<result.length;i++){
        var alt=result[i].transcript.trim();
        var score=result[i].confidence||0;
        var matches=data.filter(function(s){
          return searchMatchAny([s.num,s.plnt,s.dfnd,s.court,s.type,s.client,s.ref],alt);
        }).length+tasks.filter(function(t){return searchMatch(t.title,alt);}).length;
        var w=score+(matches>0?0.4:0);
        if(w>bestScore){bestScore=w;best=alt;}
      }
      if(inp)inp.value=best;
      doGlobalSearch(best);
    }
  };

  r.onend=function(){
    if(btn){btn.textContent='🎤';btn.style.background='var(--surface3)';btn.style.borderColor='var(--border2)';}
  };
  r.onerror=function(e){
    if(btn){btn.textContent='🎤';btn.style.background='var(--surface3)';btn.style.borderColor='var(--border2)';}
    var msgs={notallowed:'⚠️ اسمح باستخدام الميكروفون',nomatch:'⚠️ لم يُتعرف على الكلام',network:'⚠️ تحقق من الاتصال'};
    toast(msgs[e.error]||'⚠️ '+e.error);
  };
  r.start();
}

function doGlobalSearch(val){

var _touchStartX=0,_touchStartY=0,_touchStartTime=0;

function initSwipeGestures(){
  var cnt=document.getElementById('cnt');
  if(!cnt)return;
  cnt.addEventListener('touchstart',function(e){
    _touchStartX=e.touches[0].clientX;
    _touchStartY=e.touches[0].clientY;
    _touchStartTime=Date.now();
  },{passive:true});
  cnt.addEventListener('touchend',function(e){
    if(!e.changedTouches.length)return;
    var dx=e.changedTouches[0].clientX-_touchStartX;
    var dy=e.changedTouches[0].clientY-_touchStartY;
    var dt=Date.now()-_touchStartTime;
    // Valid swipe: fast (<400ms), mostly horizontal, >60px
    if(dt>400||Math.abs(dy)>Math.abs(dx)||Math.abs(dx)<60)return;
    var tabs=['home','list','tasks','contacts','files','ai','cal','stats','fees','tools','live','archive','settings'];
    var visible=tabs.filter(function(t){return hiddenTabs.indexOf(t)===-1;});
    var cur=visible.indexOf(curTab);
    if(cur===-1)return;
    if(dx>0&&cur>0){go(visible[cur-1]);toast('← '+visible[cur-1]);} // swipe right = go back
    else if(dx<0&&cur<visible.length-1){go(visible[cur+1]);toast('→ '+visible[cur+1]);} // swipe left = next
  },{passive:true});
}

var CASE_CHECKLISTS={
  'جنائية':['الاطلاع على ملف القضية ومرفقاتها','دراسة لائحة الاتهام','مراجعة الأدلة المادية','فحص تقارير الطب الشرعي إن وجدت','إعداد قائمة الشهود','تقديم الدفوع الشكلية','إعداد مرافعة الدفاع','متابعة صدور الحكم','دراسة خيار الاستئناف','دراسة خيار النقض'],
  'مدنية':['دراسة عقد أو وثيقة النزاع','تقديم لائحة الدعوى','الرد على اللائحة المقابلة','طلب الخبرة إن لزم','تبادل المذكرات','إعداد المرافعة الختامية','متابعة صدور الحكم','التنفيذ'],
  'تجارية':['مراجعة العقود والمستندات','تقديم الدعوى للمحكمة التجارية','الرد على دفوع الخصم','طلب الأوامر التحفظية','تبادل المذكرات القانونية','المرافعة الختامية','صدور الحكم','التنفيذ الجبري'],
  'أحوال شخصية':['جمع وثائق الأحوال المدنية','تقديم الدعوى','الوساطة والصلح','جلسات الإثبات','الخبرة الاجتماعية','صدور الحكم','تسجيل الحكم'],
  'عمالية':['جمع عقد العمل والمستندات','تقديم شكوى لمكتب العمل','جلسة التسوية الودية (محضر عدم التسوية)','رفع الشكوى للمحكمة العمالية','تبادل الردود والمذكرات','المرافعة','الحكم الابتدائي','الاستئناف إن لزم','النقض إن لزم'],
  'إدارية':['مراجعة القرار الإداري','تقديم التظلم الإداري','رفع الدعوى لديوان المظالم','تبادل المذكرات','المرافعة','صدور الحكم','التنفيذ'],
};

function buildCaseChecklist(s){
  var type=s.type||'مدنية';
  var templateItems=CASE_CHECKLISTS[type]||CASE_CHECKLISTS['مدنية'];
  var saved=s.checklist||[];
  // Merge template with saved state
  var items=templateItems.map(function(item,i){
    var existing=saved.find(function(x){return x.text===item;});
    return{text:item,done:existing?existing.done:false};
  });
  // Add any custom items
  saved.filter(function(x){return templateItems.indexOf(x.text)===-1;}).forEach(function(x){items.push(x);});
  return items;
}

function renderChecklist(sid){
  var s=data.find(function(x){return x.id===sid;});if(!s)return'';
  var items=buildCaseChecklist(s);
  var doneCount=items.filter(function(x){return x.done;}).length;
  var pct=items.length>0?Math.round((doneCount/items.length)*100):0;

  var h='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:13px;margin:10px 0">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2)">✅ خطوات القضية</div>';
  h+='<div style="font-size:11px;font-weight:700;color:var(--gold2)">'+doneCount+'/'+items.length+' ('+pct+'%)</div></div>';
  h+='<div style="background:var(--surface3);border-radius:4px;height:5px;overflow:hidden;margin-bottom:10px">';
  h+='<div style="height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:'+pct+'%;border-radius:4px;transition:width .4s"></div></div>';

  items.forEach(function(item,i){
    h+='<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)" onclick="toggleChecklistItem('+sid+','+i+')" style="cursor:pointer">';
    h+='<div style="width:20px;height:20px;border-radius:6px;border:2px solid '+(item.done?'var(--green)':'var(--border2)')+';background:'+(item.done?'var(--green)':'transparent')+';display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s">';
    if(item.done)h+='<div style="color:#fff;font-size:11px;font-weight:700">✓</div>';
    h+='</div>';
    h+='<div style="font-size:12px;color:'+(item.done?'var(--text3)':'var(--text)')+';'+(item.done?'text-decoration:line-through;':'')+'flex:1">'+item.text+'</div>';
    h+='</div>';
  });

  // Add custom item
  h+='<div style="display:flex;gap:7px;margin-top:8px">';
  h+='<input id="newChkItem_'+sid+'" type="text" placeholder="أضف خطوة مخصصة..." dir="rtl" style="flex:1;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:12px;color:var(--text);font-family:Tajawal,sans-serif">';
  h+='<button onclick="addChecklistItem('+sid+')" style="background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">+</button>';
  h+='</div>';
  h+='</div>';
  return h;
}

function toggleChecklistItem(sid,idx){
  var s=data.find(function(x){return x.id===sid;});if(!s)return;
  var items=buildCaseChecklist(s);
  items[idx].done=!items[idx].done;
  s.checklist=items;
  dbPut(s).then(function(){
    var detBody=document.getElementById('detBody');
    if(detBody){
      var chkEl=detBody.querySelector('.checklist-section');
      if(chkEl)chkEl.outerHTML='<div class="checklist-section">'+renderChecklist(sid)+'</div>';
    }
    render();
  }).catch(function(e){console.error('DB err',e&&e.message);toast('⚠️ فشل الحفظ');});
}

function addChecklistItem(sid){
  var inp=document.getElementById('newChkItem_'+sid);
  if(!inp||!inp.value.trim())return;
  var s=data.find(function(x){return x.id===sid;});if(!s)return;
  var items=buildCaseChecklist(s);
  items.push({text:inp.value.trim(),done:false});
  s.checklist=items;
  dbPut(s).then(function(){toast('✅ تمت الإضافة');render();}).catch(function(){toast('⚠️ فشل الحفظ');});
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">

    <input id="grMonths" type="number" placeholder="الأشهر" min="0" max="11" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px;font-size:13px;color:var(--text);font-family:Tajawal,sans-serif">

    <select id="grReason" dir="rtl" style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px;font-size:13px;color:var(--text)">
    <option value="employer">إنهاء من صاحب العمل</option>
    <option value="employee">استقالة الموظف</option>
    </select></div>
  </div>
  <button onclick="calcGratuity()" style="width:100%;background:var(--gold);color:#040608;border-radius:var(--r-md);padding:12px;font-weight:700;font-size:14px;cursor:pointer;font-family:Tajawal,sans-serif;margin-bottom:10px">احسب المكافأة</button>
  <div id="grResult"></div>`;
  document.body.appendChild(modal.el);

function calcGratuity(){
  var sal=parseFloat(document.getElementById('grSalary').value)||0;
  var yrs=parseInt(document.getElementById('grYears').value)||0;
  var mon=parseInt(document.getElementById('grMonths').value)||0;
  var reason=document.getElementById('grReason').value;
  if(!sal){toast('⚠️ أدخل الراتب');return;}
  var totalMonths=yrs*12+mon;
  if(totalMonths<24){document.getElementById('grResult').innerHTML='<div style="background:var(--red-a);border:1px solid rgba(224,69,85,.3);border-radius:var(--r-md);padding:12px;color:#f57070;font-size:13px;text-align:center">⚠️ مدة الخدمة أقل من سنتين — لا يستحق مكافأة نهاية خدمة وفق نظام العمل.</div>';return;}
  var daily=sal/30;
  var reward=0;
  // وفق نظام العمل السعودي
  if(reason==='employer'){
    // الفصل: راتب شهر عن كل سنة للسنوات 1-5، شهرين عن كل سنة فوق 5
    var first5=Math.min(yrs,5)*sal;
    var above5=yrs>5?(yrs-5)*sal*2:0;
    reward=first5+above5+(mon/12)*sal;
  } else {
    // الاستقالة: ثلث الراتب للسنوات 2-5، ثلثان 5-10، كامل فوق 10
    if(yrs<2){reward=0;}
    else if(yrs<=5){reward=(yrs+(mon/12))*(sal/3);}
    else if(yrs<=10){reward=(yrs+(mon/12))*(sal*2/3);}
    else{reward=(yrs+(mon/12))*sal;}
  }
  var el=document.getElementById('grResult');
  el.innerHTML='<div style="background:var(--green-a);border:1px solid rgba(40,184,112,.3);border-radius:var(--r-md);padding:14px;text-align:center">'+
    '<div style="font-size:11px;color:var(--text3);margin-bottom:4px">المكافأة المستحقة (تقريبي)</div>'+
    '<div style="font-size:28px;font-weight:900;color:#28b870">'+reward.toLocaleString('ar-SA',{maximumFractionDigits:0})+' ر.س</div>'+
    '<div style="font-size:10px;color:var(--text3);margin-top:6px">مدة الخدمة: '+yrs+' سنة '+mon+' شهر</div>'+
    '<div style="font-size:9px;color:var(--text3);margin-top:4px">* تقديري وفق نظام العمل السعودي — يُنصح بمراجعة المختص</div></div>';
}

function calcInterest(){
  var p=parseFloat(document.getElementById('intPrincipal').value)||0;
  var from=document.getElementById('intFrom').value;
  var to=document.getElementById('intTo').value;
  var rate=parseFloat(document.getElementById('intRate').value)||2;

  var days=Math.max(0,Math.round((new Date(to)-new Date(from))/86400000));
  var interest=p*(rate/100)*(days/365);
  var total=p+interest;
  document.getElementById('intResult').innerHTML='<div style="background:var(--gold-a10);border:1px solid var(--gold-a20);border-radius:var(--r-md);padding:14px">'

function calcAlimony(){
  var income=parseFloat(document.getElementById('alIncome').value)||0;
  var children=parseInt(document.getElementById('alChildren').value)||0;
  var withSpouse=document.getElementById('alSpouse').value==='yes';
  if(!income){toast('⚠️ أدخل الدخل');return;}
  // تقدير مبني على نسب شائعة في القضاء السعودي
  var childRate=children>0?(children===1?0.15:children===2?0.22:children===3?0.28:Math.min(0.35,0.28+(children-3)*0.03)):0;
  var spouseRate=withSpouse?0.15:0;
  var totalRate=childRate+spouseRate;
  var childAlimony=income*childRate;
  var spouseAlimony=income*spouseRate;
  var total=income*totalRate;
  document.getElementById('alResult').innerHTML='<div style="background:var(--blue-a);border:1px solid rgba(74,142,245,.3);border-radius:var(--r-md);padding:14px">'
    +(children>0?'<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text2)">نفقة الأطفال ('+children+')</span><span style="font-weight:700;color:var(--blue)">'+childAlimony.toLocaleString('ar-SA',{maximumFractionDigits:0})+' ر.س</span></div>':'')
    +(withSpouse?'<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-size:12px;color:var(--text2)">نفقة الزوجة</span><span style="font-weight:700;color:var(--blue)">'+spouseAlimony.toLocaleString('ar-SA',{maximumFractionDigits:0})+' ر.س</span></div>':'')
    +'<div style="border-top:1px solid rgba(74,142,245,.2);padding-top:8px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:700;color:var(--text)">الإجمالي الشهري</span><span style="font-size:18px;font-weight:900;color:var(--blue)">'+total.toLocaleString('ar-SA',{maximumFractionDigits:0})+' ر.س</span></div>'
    +'<div style="font-size:9px;color:var(--text3);margin-top:6px;text-align:center">تقديري — القاضي هو من يحدد النفقة الفعلية</div></div>';
}

function createRecurringSessions(){
  var baseId=parseInt(document.getElementById('recBase').value);
  var interval=parseInt(document.getElementById('recInterval').value);
  var count=parseInt(document.getElementById('recCount').value)||3;
  if(!baseId){toast('⚠️ اختر جلسة');return;}
  var base=data.find(function(x){return x.id===baseId;});if(!base)return;
  var created=0;
  var lastDate=new Date(base.date+'T00:00:00');
  for(var i=0;i<count;i++){
    lastDate=new Date(lastDate.getTime()+interval*86400000);
    var newS=Object.assign({},base,{
      id:Date.now()+i,
      date:lastDate.toISOString().split('T')[0],
      status:'scheduled',
      memo:'',minutes:'',quickNote:'',checklist:[],attachments:[]
    });
    data.push(newS);
    dbPut(newS);
    created++;
  }
  schedNotifs();
  toast('✅ تم إنشاء '+created+' جلسات مكررة');
  document.getElementById('recurringModal').remove();
  render();
}

function startVoiceNote(targetId){
  var SpeechRecog=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecog){toast('⚠️ المتصفح لا يدعم التسجيل الصوتي');return;}
  var btn=document.getElementById('voiceBtn_'+targetId);
  var target=document.getElementById(targetId);
  if(!target)return;
  if(window._voiceRecActive){window._voiceRecActive=false;if(window._voiceRec)window._voiceRec.stop();if(btn){btn.textContent='🎙️';btn.style.background='var(--surface3)';}return;}
  var r=new SpeechRecog();
  r.lang='ar-SA';r.continuous=true;r.interimResults=true;
  window._voiceRec=r;window._voiceRecActive=true;
  if(btn){btn.textContent='🔴';btn.style.background='rgba(224,69,85,.15)';}
  toast('🎙️ التسجيل يعمل — تحدث الآن...');
  r.onresult=function(e){
    var interim='',final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final)target.value+=(target.value?'\n':'')+final;
  };
  r.onend=function(){
    window._voiceRecActive=false;
    if(btn){btn.textContent='🎙️';btn.style.background='var(--surface3)';}
  };
  r.onerror=function(e){
    window._voiceRecActive=false;
    if(btn){btn.textContent='🎙️';btn.style.background='var(--surface3)';}
    toast('⚠️ '+e.error);
  };
  r.start();
}

  contacts.forEach(function(c){

  h+=secHdr('📝','ملاحظات الموكل');
  h+='<textarea id="clientNotes_'+name+'" dir="rtl" rows="3" placeholder="أدخل ملاحظات عن الموكل..." style="width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);padding:11px;font-size:12px;color:var(--text);font-family:Tajawal,sans-serif;line-height:1.7;resize:none;margin-bottom:8px">'+(profile.notes||'')+'</textarea>';
  h+='<button onclick="saveClientNote(\''+name.replace(/'/g,"\\'")+'\')" style="width:100%;background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:var(--r-md);padding:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">💾 حفظ الملاحظة</button>';

  b.innerHTML+=h;

  window.saveClientNote=function(n){

    else{clientProfiles.push({id:'cp_'+Date.now(),name:n,notes:el.value,phone:'',email:''});}
    saveClientProfiles();toast('✅ تم حفظ الملاحظة');

    var p=clientProfiles.find(function(x){return x.name===n;})||{name:n,phone:'',email:''};

var officeMeetings=[];
try{officeMeetings=JSON.parse(localStorage.getItem('j_meetings')||'[]');}catch(e){}
function saveMeetings(){try{localStorage.setItem('j_meetings',JSON.stringify(officeMeetings));}catch(e){}}

function showMeetingsModal(){
  var modal=makeModal('meetingsModal','📆 اجتماعات المكتب');
  var b=modal.box;

  var now=new Date();
  var upcoming=officeMeetings.filter(function(m){return new Date(m.date+'T'+m.time)>=now;}).sort(function(a,b){return(a.date+a.time).localeCompare(b.date+b.time);});
  var past=officeMeetings.filter(function(m){return new Date(m.date+'T'+m.time)<now;}).sort(function(a,b){return b.date.localeCompare(a.date);});

  var h='<button onclick="showAddMeetingForm()" style="width:100%;background:linear-gradient(135deg,var(--gold),#9a7030);color:#040608;border-radius:var(--r-md);padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:14px;font-family:Tajawal,sans-serif;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 2px 14px rgba(200,168,75,.3)">📅 + تحديد موعد جديد</button>';

  if(!officeMeetings.length){
    h+='<div style="text-align:center;padding:36px 0"><div style="font-size:52px;opacity:.15;margin-bottom:10px">📆</div><div style="color:var(--text3);font-size:13px">لا توجد مواعيد مكتبية</div></div>';
  } else {
    if(upcoming.length){
      h+=secHdr('📅','القادمة ('+upcoming.length+')');
      upcoming.forEach(function(m){h+=renderMeetingCard(m,false);});
    }
    if(past.length){
      h+=secHdr('🗂️','السابقة ('+past.length+')');
      past.slice(0,5).forEach(function(m){h+=renderMeetingCard(m,true);});
    }
  }
  b.innerHTML+=h;

  window.showAddMeetingForm=function(){buildMeetingForm(null,b);};
  document.body.appendChild(modal.el);
}

function renderMeetingCard(m,isPast){
  var now=new Date();
  var mDate=new Date(m.date+'T'+m.time);
  var diff=mDate-now;
  var diffHrs=Math.round(diff/3600000);
  var diffDays=Math.round(diff/86400000);
  var countdown='';
  if(!isPast){
    if(diffHrs<1)countdown='<span style="color:#f57070;font-weight:700;font-size:10px">خلال أقل من ساعة!</span>';
    else if(diffHrs<24)countdown='<span style="color:#f0b040;font-weight:700;font-size:10px">خلال '+diffHrs+' ساعة</span>';
    else countdown='<span style="color:#28b870;font-size:10px">بعد '+diffDays+' يوم</span>';
  }

  var dayNames=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  var dayName=dayNames[mDate.getDay()];
  var h='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px;margin-bottom:9px;'+(isPast?'opacity:.65':'')+'border-right:3px solid '+(isPast?'var(--text3)':m.type==='urgent'?'var(--red)':m.type==='followup'?'var(--blue)':'var(--gold)')+'">';

  // Header row
  h+='<div style="display:flex;align-items:flex-start;gap:11px;margin-bottom:9px">';
  h+='<div style="background:'+(isPast?'var(--surface3)':m.type==='urgent'?'var(--red-a)':m.type==='followup'?'var(--blue-a)':'var(--gold-a10)')+';border:1px solid '+(isPast?'var(--border)':m.type==='urgent'?'rgba(224,69,85,.3)':m.type==='followup'?'rgba(74,142,245,.3)':'var(--gold-a20)')+';border-radius:11px;padding:8px 11px;text-align:center;flex-shrink:0;min-width:52px">';
  h+='<div style="font-size:17px;font-weight:900;color:'+(isPast?'var(--text2)':m.type==='urgent'?'#f57070':m.type==='followup'?'var(--blue)':'var(--gold2)')+'">'+m.date.split('-')[2]+'</div>';
  h+='<div style="font-size:9px;color:var(--text3);margin-top:1px">'+dayName+'</div></div>';

  h+='<div style="flex:1">';
  h+='<div style="font-size:14px;font-weight:700;color:var(--text)">'+m.clientName+'</div>';
  h+='<div style="font-size:11px;color:var(--text3);margin-top:2px">⏰ '+m.time+(m.duration?' · '+m.duration+' دقيقة':'')+(m.caseNum?' · 📋 '+m.caseNum:'')+'</div>';
  h+='<div style="margin-top:4px">'+countdown+'</div></div>';

  h+='<div style="display:flex;flex-direction:column;gap:4px">';
  if(!isPast)h+='<button onclick="editMeeting(\''+m.id+'\')" style="background:var(--surface3);color:var(--text3);border:1px solid var(--border2);border-radius:7px;padding:4px 8px;font-size:10px;cursor:pointer;font-family:Tajawal,sans-serif">✏️</button>';
  h+='<button onclick="deleteMeeting(\''+m.id+'\')" style="background:var(--red-a);color:#f57070;border:1px solid rgba(224,69,85,.3);border-radius:7px;padding:4px 8px;font-size:10px;cursor:pointer">🗑️</button>';
  h+='</div></div>';

  // Type badge
  var typeLabels={'normal':'📋 استشارة عادية','urgent':'🔴 عاجل','followup':'🔄 متابعة','signing':'✍️ توقيع وثيقة'};
  h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:'+(m.notes?'9':'0')+'px">';
  h+='<span style="font-size:10px;background:var(--surface3);color:var(--text3);border-radius:8px;padding:2px 9px;font-weight:600">'+(typeLabels[m.type]||m.type)+'</span>';
  if(m.phone)h+='<a href="https://wa.me/'+m.phone.replace(/[^0-9]/g,'')+'" style="font-size:10px;color:#25d366;text-decoration:none;background:rgba(37,211,102,.1);border-radius:8px;padding:2px 9px;border:1px solid rgba(37,211,102,.2)">💬 واتساب</a>';
  h+='</div>';

  if(m.notes)h+='<div style="background:var(--surface3);border-radius:9px;padding:9px 11px;font-size:12px;color:var(--text2);line-height:1.7">'+m.notes+'</div>';

  h+='</div>';
  return h;
}

function saveMeeting(existingId){
  var cl=document.getElementById('mtClient');var dt=document.getElementById('mtDate');var tm=document.getElementById('mtTime');
  if(!cl||!cl.value.trim()||!dt||!dt.value||!tm||!tm.value){toast('⚠️ أدخل الموكل والتاريخ والوقت');return;}
  var dur=document.getElementById('mtDuration');var tp=document.getElementById('mtType');
  var ph=document.getElementById('mtPhone');var cn=document.getElementById('mtCaseNum');var nt=document.getElementById('mtNotes');
  var meetObj={id:existingId||'mt_'+Date.now(),clientName:cl.value.trim(),date:dt.value,time:tm.value,duration:dur?parseInt(dur.value)||60:60,type:tp?tp.value:'normal',phone:ph?ph.value.trim():'',caseNum:cn?cn.value.trim():'',notes:nt?nt.value.trim():''};
  if(existingId){officeMeetings=officeMeetings.map(function(x){return x.id===existingId?meetObj:x;});}
  else{officeMeetings.push(meetObj);}
  saveMeetings();
  logActivity(existingId?'✏️ تعديل موعد':'📅 موعد جديد',meetObj.clientName+' — '+meetObj.date+' '+meetObj.time);
  scheduleMeetingReminder(meetObj);
  toast('✅ تم حفظ الموعد');
  document.getElementById('meetingsModal').remove();
  showMeetingsModal();
}

function deleteMeeting(id){
  if(!confirm('حذف هذا الموعد؟'))return;
  officeMeetings=officeMeetings.filter(function(x){return x.id!==id;});
  saveMeetings();toast('🗑️ تم الحذف');
  document.getElementById('meetingsModal').remove();
  showMeetingsModal();
}

function editMeeting(id){
  var modal=document.getElementById('meetingsModal');
  if(modal){var b=modal.querySelector('div[style*="border-radius:22px"]');if(b)buildMeetingForm(id,b);}
}

function scheduleMeetingReminder(m){
  if(!notifOn||Notification.permission!=='granted')return;
  var mTime=new Date(m.date+'T'+m.time+':00');
  var now=new Date();
  // تنبيه قبل ساعة
  var d1h=mTime-now-3600000;
  if(d1h>0)setTimeout(function(){
    new Notification('📅 موعد مكتبي بعد ساعة',{body:'موعد مع '+m.clientName+(m.caseNum?' — '+m.caseNum:''),tag:'meeting-1h-'+m.id});
  },d1h);
  // تنبيه قبل 15 دقيقة
  var d15=mTime-now-900000;
  if(d15>0)setTimeout(function(){
    new Notification('⏰ موعد مكتبي بعد 15 دقيقة',{body:m.clientName+(m.notes?' — '+m.notes.substring(0,50):''),requireInteraction:true,tag:'meeting-15m-'+m.id});
  },d15);
  // تنبيه يوم قبل (8م)
  var dayBefore=new Date(m.date+'T20:00:00');dayBefore.setDate(dayBefore.getDate()-1);
  var dDay=dayBefore-now;
  if(dDay>0)setTimeout(function(){
    new Notification('📆 تذكير موعد غداً',{body:'موعد مع '+m.clientName+' غداً الساعة '+m.time,tag:'meeting-day-'+m.id});
  },dDay);
}

// إعادة جدولة التنبيهات عند بدء التطبيق
function rescheduleAllMeetingReminders(){
  var now=new Date();
  officeMeetings.filter(function(m){return new Date(m.date+'T'+m.time)>now;}).forEach(scheduleMeetingReminder);
}

// ── إعدادات الترقيم ──
/* ── إعدادات الترقيم التفاعلي حسب نوع القضية ── */
var refSettings={
  prefix:'م.م',
  year:new Date().getFullYear(),
  counter:1,
  // بادئات حسب نوع القضية
  typeCodes:{
    'جنائية':'ج','مدنية':'م','تجارية':'ت',
    'أحوال شخصية':'أ','عمالية':'ع','إدارية':'إ'
  },
  // استخدام كود النوع في الرقم
  useTypeCode:true,
  // طريقة الترقيم: 'shared' (مشترك) أو 'per_type' (منفصل لكل نوع)
  countMode:'shared'
};
try{var _rs=JSON.parse(localStorage.getItem('j_ref_settings')||'{}');refSettings=Object.assign(refSettings,_rs);if(!refSettings.typeCodes)refSettings.typeCodes={'جنائية':'ج','مدنية':'م','تجارية':'ت','أحوال شخصية':'أ','عمالية':'ع','إدارية':'إ'};}catch(e){}
function saveRefSettings(){try{localStorage.setItem('j_ref_settings',JSON.stringify(refSettings));}catch(e){}}

function getTypeCode(caseType){
  return (refSettings.typeCodes&&refSettings.typeCodes[caseType])||caseType.substring(0,1);
}

function getNextRefNum(caseType){
  var yr=new Date().getFullYear()+'';
  var maxNum=0;
  data.forEach(function(s){
    if(!s.ref)return;
    // في وضع الترقيم المنفصل نحصر القضايا من نفس النوع
    if(refSettings.countMode==='per_type'&&caseType&&s.type!==caseType)return;
    var m=s.ref.match(/(\d+)$/);
    if(m){var n=parseInt(m[1]);if(s.ref.includes(yr)&&n>maxNum)maxNum=n;}
  });
  return maxNum+1;
}

function buildRefString(caseType){
  var yr=new Date().getFullYear();
  var typeCode=refSettings.useTypeCode&&caseType?getTypeCode(caseType):'';
  var next=getNextRefNum(caseType);
  var padded=String(next).padStart(3,'0');
  var parts=[refSettings.prefix];
  if(typeCode)parts.push(typeCode);
  parts.push(String(yr));
  parts.push(padded);
  return parts.join('/');
}

function autoFillRef(){
  var typeEl=document.getElementById('fType');
  var caseType=typeEl?typeEl.value:'';
  var ref=buildRefString(caseType);
  var el=document.getElementById('fRef');
  if(el){el.value=ref;el.style.borderColor='var(--gold-a30)';setTimeout(function(){el.style.borderColor='';},1200);}
  toast('🔢 الرقم المرجعي: '+ref);
}

var voiceComments={};
try{voiceComments=JSON.parse(localStorage.getItem('j_voice_comments')||'{}');}catch(e){}
function saveVoiceComments(){
  var slim={};
  Object.keys(voiceComments).forEach(function(sid){
    slim[sid]=(voiceComments[sid]||[]).slice(-5).map(function(v){
      return{id:v.id,text:v.text,ts:v.ts};
    });
  });
  try{localStorage.setItem('j_voice_comments',JSON.stringify(slim));}catch(e){}
}

function renderVoiceComments(sid){
  var comments=voiceComments[sid]||[];
  var h='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin:10px 0">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2)">🗣️ التعليقات الصوتية</div>';
  h+='<button id="vcRecBtn_'+sid+'" onclick="toggleVoiceComment('+sid+')" style="background:var(--surface3);color:var(--text3);border:1px solid var(--border2);border-radius:9px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif;transition:all .15s">🎙️ تسجيل</button>';
  h+='</div>';

  if(!comments.length){
    h+='<div style="text-align:center;padding:14px 0;color:var(--text3);font-size:12px">لا توجد تعليقات صوتية — اضغط تسجيل</div>';
  } else {
    comments.forEach(function(c,i){
      var dt=new Date(c.ts);
      var timeStr=dt.toLocaleDateString('ar-SA',{day:'numeric',month:'short'})+' '+dt.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
      h+='<div style="background:var(--surface3);border-radius:10px;padding:10px;margin-bottom:7px">';
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      h+='<div style="font-size:9px;color:var(--text3)">🕐 '+timeStr+'</div>';
      h+='<div style="margin-right:auto;display:flex;gap:5px">';
      h+='<button onclick="playVoiceComment('+sid+','+i+')" style="background:var(--blue-a);color:var(--blue);border:1px solid rgba(74,142,245,.3);border-radius:6px;padding:3px 9px;font-size:10px;cursor:pointer">▶ تشغيل</button>';
      h+='<button onclick="deleteVoiceComment('+sid+','+i+')" style="background:var(--red-a);color:#f57070;border:1px solid rgba(224,69,85,.3);border-radius:6px;padding:3px 8px;font-size:10px;cursor:pointer">🗑️</button>';
      h+='</div></div>';
      h+='<div style="height:32px;background:var(--surface2);border-radius:6px;position:relative;overflow:hidden">';
      // Waveform visual
      h+='<div id="vcWave_'+sid+'_'+i+'" style="display:flex;align-items:center;gap:1px;height:100%;padding:0 8px">';
      var bars=Math.min(c.bars||20,40);
      for(var b=0;b<bars;b++){
        var h2=Math.round(20+Math.random()*60);
        h+='<div style="flex:1;background:var(--blue);border-radius:1px;height:'+h2+'%;opacity:.5"></div>';
      }
      h+='</div></div></div>';
    });
  }
  h+='</div>';
  return h;
}

var _vcRecording=false,_vcRecorder=null,_vcChunks=[];

function toggleVoiceComment(sid){
  var btn=document.getElementById('vcRecBtn_'+sid);
  if(_vcRecording){
    // إيقاف التسجيل
    if(_vcRecorder&&_vcRecorder.state!=='inactive')_vcRecorder.stop();
    return;
  }
  if(!navigator.mediaDevices){toast('⚠️ الجهاز لا يدعم التسجيل');return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    _vcChunks=[];
    _vcRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    _vcRecording=true;
    if(btn){btn.textContent='⏹ إيقاف';btn.style.background='rgba(224,69,85,.15)';btn.style.color='#f57070';btn.style.borderColor='rgba(224,69,85,.3)';}
    toast('🎙️ التسجيل يعمل...');

    _vcRecorder.ondataavailable=function(e){if(e.data.size>0)_vcChunks.push(e.data);};
    _vcRecorder.onstop=function(){
      _vcRecording=false;
      stream.getTracks().forEach(function(t){t.stop();});
      if(btn){btn.textContent='🎙️ تسجيل';btn.style.background='var(--surface3)';btn.style.color='var(--text3)';btn.style.borderColor='var(--border2)';}
      var blob=new Blob(_vcChunks,{type:'audio/webm'});
      var reader=new FileReader();
      reader.onload=function(e){
        if(!voiceComments[sid])voiceComments[sid]=[];
        voiceComments[sid].push({ts:Date.now(),data:e.target.result,bars:Math.round(20+Math.random()*20)});
        saveVoiceComments();
        toast('✅ تم حفظ التعليق الصوتي');
        // تحديث قسم التعليقات فقط
        var detBody=document.getElementById('detBody');
        if(detBody){
          var vcEl=detBody.querySelector('[id^="vcRecBtn_"]');
          if(vcEl){var parent=vcEl.closest('div[style*="border-radius:var(--r-md)"]');if(parent)parent.outerHTML=renderVoiceComments(sid);}
        }
        render();
      };
      reader.readAsDataURL(blob);
    };
    _vcRecorder.start();
  }).catch(function(e){toast('⚠️ لا يمكن الوصول للميكروفون: '+e.message);});
}

function playVoiceComment(sid,idx){
  var c=voiceComments[sid]&&voiceComments[sid][idx];
  if(!c){toast('⚠️ التعليق غير موجود');return;}
  var audio=new Audio(c.data);
  audio.play().catch(function(e){toast('⚠️ لا يمكن تشغيل الصوت');});
  toast('▶ جارٍ التشغيل...');
}

function deleteVoiceComment(sid,idx){
  if(!voiceComments[sid])return;
  voiceComments[sid].splice(idx,1);
  saveVoiceComments();
  toast('🗑️ تم الحذف');
  render();
}

/* ════════════════════════════════════════════════════════

════════════════════════════════════════════════════════ */
function exportICS(range){
  var sessions=[];
  var now=new Date();
  if(range==='week'){
    var next7=[];for(var i=0;i<7;i++){var d=new Date();d.setDate(d.getDate()+i);next7.push(d.toISOString().split('T')[0]);}
    sessions=data.filter(function(s){return next7.indexOf(s.date)>-1;});
  } else if(range==='month'){
    var m=now.getMonth(),y=now.getFullYear();
    sessions=data.filter(function(s){var d=new Date(s.date+'T00:00:00');return d.getMonth()===m&&d.getFullYear()===y;});
  } else {
    sessions=data.filter(function(s){return s.status==='scheduled';});
  }

  var lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Jalsat AI//Legal Sessions//AR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  sessions.forEach(function(s){
    var dt=new Date(s.date+'T'+s.time+':00');
    var end=new Date(dt.getTime()+3600000);
    var fmt=function(d){return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';};
    var uid=s.id+'@jalsat-ai.law';
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+uid);
    lines.push('DTSTART:'+fmt(dt));
    lines.push('DTEND:'+fmt(end));
    lines.push('SUMMARY:⚖️ جلسة '+s.num);
    lines.push('DESCRIPTION:'+s.type+(s.plnt?' | '+s.plnt:'')+(s.dfnd?' vs '+s.dfnd:'')+(s.notes?' | '+s.notes:''));
    lines.push('LOCATION:'+(s.court||'')+(s.room?' - قاعة '+s.room:''));
    if(s.meetUrl)lines.push('URL:'+s.meetUrl);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');

  var blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='jalsat_'+range+'.ics';a.click();
  URL.revokeObjectURL(url);
  toast('📆 تم تصدير '+sessions.length+' جلسة كتقويم');
  logActivity('📆 تصدير ICS',sessions.length+' جلسة');
}

  var modal=makeModal('icsModal','📆 تصدير للتقويم');

  b.innerHTML+='<div style="margin-bottom:10px;font-size:12px;color:var(--text3)">اختر النطاق الزمني للتصدير:</div>'

  }
}

var workloadCapacity=20;
try{workloadCapacity=parseInt(localStorage.getItem('j_capacity')||'20');}catch(e){}

function getWorkloadLevel(){
  var active=data.filter(function(s){return s.status==='scheduled'||s.status==='inProgress';}).length;
  var pct=Math.round((active/workloadCapacity)*100);
  var level=pct<50?'مرتاح':pct<75?'معتدل':pct<90?'مرتفع':'مثقل';
  var clr=pct<50?'#28b870':pct<75?'#f0b040':pct<90?'#f57070':'#e04555';
  return{active:active,pct:Math.min(pct,100),level:level,clr:clr,capacity:workloadCapacity};
}

function renderWorkloadWidget(){
  var w=getWorkloadLevel();
  var h='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:13px;margin-bottom:13px">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2)">🌡️ ضغط العمل</div>';
  h+='<div style="display:flex;align-items:center;gap:6px">';
  h+='<span style="font-size:10px;font-weight:700;color:'+w.clr+'">'+w.level+'</span>';
  h+='<button onclick="showCapacitySettings()" style="background:none;color:var(--text3);font-size:10px;cursor:pointer;border:none;padding:0">⚙️</button>';
  h+='</div></div>';
  h+='<div style="background:var(--surface3);border-radius:6px;height:10px;overflow:hidden;margin-bottom:6px">';
  h+='<div style="height:100%;background:linear-gradient(90deg,#28b870,'+w.clr+');width:'+w.pct+'%;border-radius:6px;transition:width .5s"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3)">';
  h+='<span>'+w.active+' قضية نشطة</span><span>الطاقة: '+w.capacity+'</span></div>';
  if(w.pct>=90)h+='<div style="background:var(--red-a);border:1px solid rgba(224,69,85,.3);border-radius:8px;padding:7px;margin-top:8px;font-size:11px;color:#f57070;text-align:center">⚠️ أنت على حافة طاقتك الاستيعابية</div>';
  h+='</div>';
  return h;
}

function showCapacitySettings(){
  var c=prompt('حدد الحد الأقصى لعدد القضايا النشطة (الطاقة الاستيعابية):',workloadCapacity);
  if(!c||isNaN(parseInt(c)))return;
  workloadCapacity=Math.max(1,parseInt(c));
  try{localStorage.setItem('j_capacity',workloadCapacity);}catch(e){}
  toast('✅ تم تحديث الطاقة الاستيعابية: '+workloadCapacity+' قضية');
  render();
}

function calcInheritance(){
  var total=parseFloat(document.getElementById('inhTotal').value)||0;
  var gender=document.getElementById('inhGender').value;
  var sons=parseInt(document.getElementById('inhSons').value)||0;
  var daughters=parseInt(document.getElementById('inhDaughters').value)||0;
  var spouseEl=document.getElementById('inhSpouse').value;
  var parentsEl=document.getElementById('inhParents').value;
  if(!total){toast('⚠️ أدخل قيمة التركة');return;}

  var shares=[];
  var remaining=1; // كسر من التركة الكاملة

  // الزوج/الزوجة
  if(spouseEl==='yes'){
    var hasChildren=sons>0||daughters>0;
    if(gender==='male'){// المتوفى رجل → زوجة
      var wifeShare=hasChildren?1/8:1/4;
      shares.push({name:'الزوجة',fraction:wifeShare,type:'فرض'});
      remaining-=wifeShare;
    } else {// المتوفاة امرأة → زوج
      var husbandShare=hasChildren?1/4:1/2;
      shares.push({name:'الزوج',fraction:husbandShare,type:'فرض'});
      remaining-=husbandShare;
    }
  }

  // الأب والأم
  if(parentsEl==='father'||parentsEl==='both'){
    var hasDirectChildren=sons>0||daughters>0;
    var fatherShare=hasDirectChildren?1/6:0;
    if(fatherShare>0){shares.push({name:'الأب',fraction:fatherShare,type:'فرض'});remaining-=fatherShare;}
  }
  if(parentsEl==='mother'||parentsEl==='both'){
    var hasBrothers=false;// تبسيط
    var motherShare=(sons>0||daughters>0)?1/6:1/3;
    shares.push({name:'الأم',fraction:motherShare,type:'فرض'});remaining-=motherShare;
  }

  // الأبناء والبنات (التعصيب)
  if(sons>0||daughters>0){
    var totalParts=sons*2+daughters; // للذكر مثل حظ الأنثيين
    if(sons>0){shares.push({name:'الأبناء ('+sons+')',fraction:remaining*(sons*2/totalParts),type:'تعصيب'});}
    if(daughters>0){shares.push({name:'البنات ('+daughters+')',fraction:remaining*(daughters/totalParts),type:'فرض'});}
    remaining=0;
  }

  if(remaining>0.001){shares.push({name:'الباقي (عصبة/رد)',fraction:remaining,type:'عصبة'});}

  var h='<div style="background:var(--surface3);border-radius:var(--r-md);padding:14px">';
  h+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px">📊 توزيع التركة — '+total.toLocaleString('ar-SA')+' ريال</div>';
  var colors=['var(--gold2)','var(--blue)','var(--green)','var(--amber)','#a78bfa','#f57070','#34d399'];
  shares.forEach(function(sh,i){
    var amount=total*sh.fraction;
    var pct=Math.round(sh.fraction*100*100)/100;
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    h+='<div style="width:10px;height:10px;border-radius:50%;background:'+colors[i%colors.length]+';flex-shrink:0"></div>';
    h+='<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--text)">'+sh.name+'</div>';
    h+='<div style="background:var(--surface2);border-radius:4px;height:5px;margin-top:3px;overflow:hidden"><div style="height:100%;background:'+colors[i%colors.length]+';width:'+pct+'%"></div></div></div>';
    h+='<div style="text-align:left;flex-shrink:0"><div style="font-size:12px;font-weight:700;color:'+colors[i%colors.length]+'">'+amount.toLocaleString('ar-SA',{maximumFractionDigits:0})+'</div>';
    h+='<div style="font-size:9px;color:var(--text3)">'+pct+'% · '+sh.type+'</div></div></div>';
  });
  h+='</div>';
  document.getElementById('inhResult').innerHTML=h;
}

// ── Helper: generate PWA icon as PNG data URL ──
function makePWAIcon(size,color){
  try{
    var c=document.createElement('canvas');c.width=size;c.height=size;
    var ctx=c.getContext('2d');
    // Background
    ctx.fillStyle='#08090d';
    var r=size*0.18;
    ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(size-r,0);ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.fill();
    // Scales of justice emoji approximation
    ctx.fillStyle=color||'#d4a843';
    ctx.font='bold '+(size*0.55)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚖',size/2,size/2);
    return c.toDataURL('image/png');
  }catch(e){return'data:image/png;base64,iVBORw0KGgo=';}
}

function loadGapiScript(cb){
  if(typeof gapi!=='undefined'&&typeof gapi.auth2!=='undefined'){cb();return;}
  var s=document.createElement('script');
  s.src='https://apis.google.com/js/api.js';
  s.onload=function(){
    gapi.load('client:auth2',function(){
      gapi.client.init({
        clientId:GAPI_CLIENT_ID,
        scope:'https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/drive.file',
        discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']
      }).then(function(){GAPI_LOADED=true;cb();}).catch(function(e){console.error('GAPI init error',e);cb(null,e);});
    });
  };
  s.onerror=function(){cb(null,new Error('فشل تحميل Google API'));};
  document.head.appendChild(s);
}

window.syncToDrive=function(){
  var prog=document.getElementById('driveProgress');
  if(prog)prog.style.display='block';
  var payload={version:3,date:new Date().toISOString(),sessions:data,tasks:tasks,contacts:contacts,fees:fees,lawyerProfile:lawyerProfile};
  var json=JSON.stringify(payload);
  var meta={name:'jalsat_backup_'+today()+'.json',mimeType:'application/json',parents:['appDataFolder']};
  var form=new FormData();
  form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
  form.append('file',new Blob([json],{type:'application/json'}));
  fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{
    method:'POST',
    headers:{Authorization:'Bearer '+gapi.auth.getToken().access_token},
    body:form
  }).then(function(r){return r.json();}).then(function(f){
    driveState.fileId=f.id;
    driveState.lastSync=new Date().toISOString();
    saveDriveState();
    if(prog)prog.style.display='none';
    var el=document.getElementById('driveModal');if(el)el.remove();
    showDriveModal();
    toast('✅ تمت المزامنة إلى Google Drive');
    logActivity('☁️ مزامنة Drive',data.length+' جلسة');
  }).catch(function(e){
    if(prog)prog.style.display='none';
    toast('⚠️ فشل الرفع: '+e.message);
  });

/* ═══════════════════════════════════════════════════════════
   📅 CASE TIMELINE — الجدول الزمني للقضية
═══════════════════════════════════════════════════════════ */
var caseEvents={};
try{caseEvents=JSON.parse(localStorage.getItem('j_case_events')||'{}');}catch(e){}
function saveCaseEvents(){try{localStorage.setItem('j_case_events',JSON.stringify(caseEvents));}catch(e){}}

function addCaseEvent(sid,type,title,date,note,icon){
  if(!caseEvents[sid])caseEvents[sid]=[];
  caseEvents[sid].push({id:'ev_'+Date.now(),type:type,title:title,date:date||today(),note:note||'',icon:icon||'📌',ts:Date.now()});
  caseEvents[sid].sort(function(a,b){return a.date.localeCompare(b.date);});
  saveCaseEvents();
}

function getTimelineEvents(sid,s){
  var events=[];
  // 1. Session creation
  events.push({date:s.date,type:'session',title:'موعد الجلسة',note:s.court+(s.time?' — '+s.time:''),icon:'⚖️',fixed:true});
  // 2. Stage changes from changelog
  var log=changeLog[sid]||[];
  log.filter(function(e){return e.field==='stage'||e.field==='status';}).forEach(function(e){
    var dt=new Date(e.ts).toISOString().split('T')[0];
    var icon=e.field==='stage'?'📋':'🔄';
    var title=e.field==='stage'?('مرحلة: '+e.to):('الحالة: '+e.to);
    events.push({date:dt,type:e.field,title:title,note:'تغيير من: '+(e.from||'—'),icon:icon,fixed:true,ts:e.ts});
  });
  // 3. Attachments
  (s.attachments||[]).forEach(function(a){
    events.push({date:s.date,type:'attachment',title:'مرفق: '+a.name,note:'',icon:'📎',fixed:true});
  });
  // 4. Deadline
  var dl=sessionDeadlines[sid];
  if(dl)events.push({date:dl.deadlineDate,type:'deadline',title:'آخر موعد: '+dl.typeName.split('(')[0],note:'',icon:'⏰',fixed:true,urgent:true});
  // 5. Custom events
  (caseEvents[sid]||[]).forEach(function(e){events.push(e);});
  // Sort by date then ts
  events.sort(function(a,b){
    var dc=a.date.localeCompare(b.date);
    if(dc!==0)return dc;
    return((a.ts||0)-(b.ts||0));
  });
  return events;
}

     {v:Math.ceil((new Date(s.date)-new Date(s.date.substr(0,4)+'-01-01'))/86400000)||0,l:'يوم منذ بداية العام',c:'var(--blue)',e:'📅'},

    // Vertical line
    h+='<div style="position:absolute;right:8px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),rgba(200,168,75,.1))"></div>';

    var TYPE_COLORS={session:'var(--gold)',stage:'var(--blue)',status:'var(--green)',attachment:'var(--amber)',deadline:'#f57070',default:'var(--text3)'};
    var pastCount=0,futureCount=0;

      // Content
      h+='<div style="flex:1;background:'+(isPast?'var(--surface2)':'var(--surface3)')+';border:1px solid '+(ev.urgent?'rgba(240,70,85,.3)':isPast?'var(--border)':'var(--border2)')+';border-radius:10px;padding:10px 12px;'+(ev.urgent?'border-right:3px solid #f57070':isPast?'border-right:3px solid '+clr:'')+'">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:6px">';
      h+='<div><div style="font-size:11px;font-weight:700;color:'+(isPast?'var(--text)':'var(--text3)')+'">'+ev.icon+' '+ev.title+'</div>';

      h+='<div style="font-size:10px;font-weight:700;color:'+clr+'">'+ev.date+'</div>';

    h+='<button onclick="saveTimelineEvent('+id+')" style="width:100%;background:var(--gold);color:#040608;border-radius:var(--r-md);padding:11px;font-weight:700;font-size:13px;cursor:pointer;font-family:Tajawal,sans-serif">💾 إضافة للمسار</button>';

window.saveTimelineEvent=function(sid){
  var title=document.getElementById('tlEvTitle');
  var date=document.getElementById('tlEvDate');
  var type=document.getElementById('tlEvType');
  var note=document.getElementById('tlEvNote');
  if(!title||!title.value.trim()){toast('⚠️ أدخل عنوان الحدث');return;}
  var icons={note:'📝',hearing:'⚖️',document:'📄',decision:'📋',payment:'💰',deadline:'⏰'};
  addCaseEvent(sid,type.value,title.value.trim(),date?date.value:'',note?note.value.trim():'',icons[type.value]||'📌');
  toast('✅ تمت إضافة الحدث للمسار');
  var modal=document.getElementById('timelineModal');if(modal)modal.remove();
  showCaseTimeline(sid);
};

window.deleteTimelineEvent=function(sid,evId){
  if(!caseEvents[sid])return;
  caseEvents[sid]=caseEvents[sid].filter(function(e){return e.id!==evId;});
  saveCaseEvents();
  var modal=document.getElementById('timelineModal');if(modal)modal.remove();
  showCaseTimeline(sid);
};

function processJudgmentFile(input){
  var file=input.files[0];if(!file)return;
  if(!requireApiKey()){input.value='';return;}
  if(file.size>20*1024*1024){toast('⚠️ الملف أكبر من 20MB');return;}

  var zone=document.getElementById('judgmentDropZone');
  if(zone)zone.innerHTML='<div style="font-size:28px;animation:pulse 1s infinite">⏳</div><div style="font-size:12px;color:#a78bfa;font-weight:700">جارٍ تحليل المستند...</div><div class="analysis-progress" style="width:100%;margin-top:8px"><div class="analysis-progress-bar"></div></div>';

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    var isPDF=file.type==='application/pdf';
    var mediaType=isPDF?'application/pdf':file.type;
    var contentBlock=isPDF
      ?[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}}]
      :[{type:'image',source:{type:'base64',media_type:mediaType,data:b64}}];
    contentBlock.push({type:'text',text:buildJudgmentPrompt()});

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:buildJudgmentSystem(),messages:[{role:'user',content:contentBlock}]})
    }).then(function(r){return r.json();}).then(function(d){
      var text='';
      if(d.content)d.content.forEach(function(c){if(c.type==='text')text+=c.text;});
      parseAndFillJudgmentData(text);
    }).catch(function(e){toast('⚠️ فشل التحليل: '+e.message);});
  };
  reader.readAsDataURL(file);
}

function processJudgmentText(){
  var txt=document.getElementById('judgmentText');
  if(!txt||!txt.value.trim()){toast('⚠️ الصق نصاً أولاً');return;}
  if(!requireApiKey())return;

  var btn=document.querySelector('#judgmentModal button[onclick="processJudgmentText()"]');
  if(btn)btn.textContent='⏳ جارٍ التحليل...';

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:buildJudgmentSystem(),messages:[{role:'user',content:buildJudgmentPrompt()+'\n\nالنص:\n'+txt.value.trim()}]})
  }).then(function(r){return r.json();}).then(function(d){
    var text='';
    if(d.content)d.content.forEach(function(c){if(c.type==='text')text+=c.text;});
    parseAndFillJudgmentData(text);
  }).catch(function(e){if(btn)btn.textContent='⚠️ فشل — أعد المحاولة';toast('⚠️ '+e.message);});
}

function buildJudgmentSystem(){
  return 'أنت مساعد قانوني متخصص في تحليل الوثائق القضائية السعودية. مهمتك استخراج البيانات وإرجاعها بصيغة JSON صارمة فقط بدون أي نص إضافي.';
}

function buildJudgmentPrompt(){
  return 'استخرج البيانات التالية من هذه الوثيقة القضائية وأرجعها كـ JSON فقط:\n{\n  "num": "رقم القضية",\n  "type": "نوع القضية (جنائية/مدنية/تجارية/أحوال شخصية/عمالية/إدارية)",\n  "court": "اسم المحكمة",\n  "room": "رقم القاعة إن وجد",\n  "plnt": "اسم المدعي",\n  "dfnd": "اسم المدعى عليه",\n  "date": "تاريخ الجلسة القادمة أو تاريخ الحكم بصيغة YYYY-MM-DD",\n  "time": "وقت الجلسة بصيغة HH:MM أو فارغ",\n  "status": "scheduled أو completed",\n  "notes": "أبرز ملاحظات أو خلاصة الحكم أو ما يلزم التنبه له (جملتان كحد أقصى)",\n  "client": "اسم الموكل إن ذُكر"\n}\nإذا لم تجد قيمة اترك الحقل فارغاً. أرجع JSON فقط بدون أي نص آخر.';
}

function parseAndFillJudgmentData(jsonText){
  var modal=document.getElementById('judgmentModal');
  try{
    var clean=jsonText.replace(/```json|```/g,'').trim();
    var d=JSON.parse(clean);

    // Close judgment modal
    if(modal)modal.remove();

    // Open add form and fill fields
    openAdd();
    setTimeout(function(){
      if(d.num&&document.getElementById('fNum'))document.getElementById('fNum').value=d.num;
      if(d.type&&document.getElementById('fType'))document.getElementById('fType').value=d.type;
      if(d.court&&document.getElementById('fCourt'))document.getElementById('fCourt').value=d.court;
      if(d.room&&document.getElementById('fRoom'))document.getElementById('fRoom').value=d.room;
      if(d.plnt&&document.getElementById('fPlnt'))document.getElementById('fPlnt').value=d.plnt;
      if(d.dfnd&&document.getElementById('fDfnd'))document.getElementById('fDfnd').value=d.dfnd;
      if(d.date&&document.getElementById('fDate')){document.getElementById('fDate').value=d.date;updateDateInfo(d.date);gregToHijriInput(d.date);}
      if(d.time&&document.getElementById('fTime'))document.getElementById('fTime').value=d.time;
      if(d.status&&document.getElementById('fStatus'))document.getElementById('fStatus').value=d.status;
      if(d.notes&&document.getElementById('fNotes'))document.getElementById('fNotes').value=d.notes;
      if(d.client&&document.getElementById('fClient'))document.getElementById('fClient').value=d.client;
      chkV();
      autoFillRef();
      // Flash success
      toast('✅ تم استيراد البيانات من المستند — راجع وأكمل البيانات');
      logActivity('📄 استيراد من PDF',(d.num||'')+(d.court?' — '+d.court:''));
    },400);

  }catch(e){
    // Show raw text in a reviewable form
    if(modal){
      var b=modal.querySelector('div');
      if(b){
        b.innerHTML+='<div style="background:var(--surface3);border-radius:var(--r-md);padding:12px;margin-top:12px"><div style="font-size:11px;font-weight:700;color:#f57070;margin-bottom:6px">⚠️ لم يتم التعرف على التنسيق — راجع النص:</div><pre style="font-size:10px;color:var(--text2);white-space:pre-wrap;overflow:auto;max-height:150px">'+jsonText.substring(0,500)+'</pre></div>';
      }
    }
    toast('⚠️ تعذّر تحليل البيانات — حاول بنص أوضح');
  }
}

function toggleToolsMenu(){
  var menu=document.getElementById('hdrToolsMenu');
  if(!menu)return;
  menu.classList.toggle('open');
  // Close on outside click
  if(menu.classList.contains('open')){
    setTimeout(function(){
      document.addEventListener('click',closeOnOutside,{once:true});
    },10);
  }
}
function closeToolsMenu(){
  var menu=document.getElementById('hdrToolsMenu');
  if(menu)menu.classList.remove('open');
}
function closeOnOutside(e){
  var menu=document.getElementById('hdrToolsMenu');
  var btn=document.getElementById('btnToolsMenu');
  if(menu&&!menu.contains(e.target)&&(!btn||!btn.contains(e.target))){
    menu.classList.remove('open');
  }
}

═══════════════════════════════════════════════════════════ */
function showStaleSessionsModal(){
  var td=today();
  var stale=data.filter(function(s){return s.status==='scheduled'&&s.date&&s.date<td;})
    .sort(function(a,b){return a.date.localeCompare(b.date);});
  if(!stale.length){toast('✅ لا توجد جلسات تحتاج تحديثاً');return;}
  var modal=makeModal('staleModal','⚠️ جلسات تحتاج تحديث الحالة');
  var b=modal.box;
  var h='<div style="font-family:Scheherazade New,serif;font-size:17px;color:#f0b040;margin-bottom:12px">'+stale.length+' جلسة مضى موعدها</div>';
  stale.forEach(function(s){
    h+='<div style="background:var(--surface2);border:1px solid rgba(240,160,48,.25);border-radius:var(--r-md);padding:11px;margin-bottom:8px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h+='<div><div style="font-size:13px;font-weight:700;color:var(--gold2)">'+s.num+'</div>';
    h+='<div style="font-size:10px;color:var(--text3)">'+s.date+' · '+s.court+'</div></div>';
    h+='<div style="font-size:11px;color:#f0b040;font-weight:700">'+Math.ceil((new Date(td)-new Date(s.date+'T00:00'))/86400000)+' يوم</div>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px">';
    [['completed','✅ منتهية','var(--green)'],['postponed','⏸ مؤجلة','var(--amber)'],['inProgress','⚡ جارية','var(--blue)']].forEach(function(opt){
      h+='<button onclick="quickUpdateStatus(\''+s.id+'\',\''+opt[0]+'\');document.getElementById(\'staleModal\').remove();showStaleSessionsModal();" ';
      h+='style="background:rgba(0,0,0,.2);color:'+opt[2]+';border:1px solid '+opt[2]+'44;border-radius:8px;padding:6px 4px;font-size:10px;font-weight:700;cursor:pointer;font-family:Tajawal,sans-serif">'+opt[1]+'</button>';
    });
    h+='</div></div>';
  });
  b.innerHTML=h;
  document.body.appendChild(modal.el);
}

function quickUpdateStatus(sid,newStatus){
  var s=data.find(function(x){return x.id===sid;});
  if(!s)return;
  s.status=newStatus;
  dbPut(s).then(function(){
    data=data.map(function(x){return x.id===sid?s:x;});
    var lbl={completed:'✅ منتهية',postponed:'⏸ مؤجلة',inProgress:'⚡ جارية',scheduled:'📅 مجدولة'}[newStatus]||newStatus;
    toast('✅ '+s.num+' → '+lbl);
    render();
  }).catch(function(){toast('⚠️ فشل التحديث');});
}

/* ═══════════════════════════════════════════════════════════

═══════════════════════════════════════════════════════════ */
function showFeeInstallmentsModal(feeId){
  var f=fees.find(function(x){return x.id===feeId;});
  if(!f)return;
  var insts=feeInstallments[feeId]||[];
  if(!insts.length){toast('لا توجد أقساط لهذا السجل');return;}
  var modal=makeModal('instModal','💳 جدول الأقساط');
  var b=modal.box;
  var total=insts.reduce(function(t,i){return t+(i.amount||0);},0);
  var paid=insts.filter(function(i){return i.paid;}).reduce(function(t,i){return t+(i.amount||0);},0);
  var h='<div style="font-family:Scheherazade New,serif;font-size:17px;color:var(--gold2);margin-bottom:10px">'+f.desc+'</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px">';
  [{v:total.toLocaleString('ar-SA'),l:'الإجمالي',c:'var(--gold2)'},{v:paid.toLocaleString('ar-SA'),l:'مسدّد',c:'var(--green)'},{v:(total-paid).toLocaleString('ar-SA'),l:'متبقي',c:'#f87171'}].forEach(function(x){
    h+='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px;text-align:center"><div style="font-size:14px;font-weight:900;color:'+x.c+'">'+x.v+'</div><div style="font-size:9px;color:var(--text3)">'+x.l+' ر.س</div></div>';
  });
  h+='</div>';
  var pct=total?Math.round((paid/total)*100):0;
  h+='<div style="background:var(--surface3);border-radius:4px;height:5px;margin-bottom:12px;overflow:hidden"><div style="height:100%;background:var(--green);width:'+pct+'%"></div></div>';
  insts.forEach(function(inst,i){
    var isOverdue=!inst.paid&&inst.dueDate<today();
    var bdr=inst.paid?'rgba(40,184,112,.3)':isOverdue?'rgba(232,80,80,.3)':'var(--border)';
    var clr=inst.paid?'#34d399':isOverdue?'#f87171':'var(--text3)';
    h+='<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)">';
    h+='<div style="width:26px;height:26px;border-radius:50%;background:'+(inst.paid?'rgba(40,184,112,.15)':isOverdue?'rgba(232,80,80,.12)':'var(--surface3)')+';border:1.5px solid '+bdr+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:'+clr+';flex-shrink:0">'+(inst.paid?'✓':(i+1))+'</div>';
    h+='<div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">القسط '+(i+1)+'</div><div style="font-size:10px;color:var(--text3)">'+inst.dueDate+(isOverdue?' · متأخر':inst.paid?' · مسدّد':'')+'</div></div>';
    h+='<div style="text-align:left"><div style="font-size:13px;font-weight:700;color:var(--gold2)">'+(inst.amount||0).toLocaleString('ar-SA')+'</div><div style="font-size:9px;color:var(--text3)">ر.س</div></div>';
    if(!inst.paid){
      h+='<button onclick="payInstallment(\''+feeId+'\','+i+');document.getElementById(\'instModal\').remove();showFeeInstallmentsModal(\''+feeId+'\')" ';
      h+='style="background:rgba(40,184,112,.1);color:#34d399;border:1px solid rgba(40,184,112,.3);border-radius:7px;padding:4px 8px;font-size:10px;cursor:pointer;flex-shrink:0;font-family:Tajawal,sans-serif">دفع</button>';
    }
    h+='</div>';
  });
  b.innerHTML=h;
  document.body.appendChild(modal.el);
}

function payInstallment(feeId,idx){
  if(!feeInstallments[feeId])return;
  feeInstallments[feeId][idx].paid=true;
  saveFeeInstallments();
  // Update parent fee if all paid
  var allPaid=feeInstallments[feeId].every(function(i){return i.paid;});
  var anyPaid=feeInstallments[feeId].some(function(i){return i.paid;});
  var f=fees.find(function(x){return x.id===feeId;});
  if(f){
    f.status=allPaid?'paid':anyPaid?'partial':'pending';
    f.paid=allPaid;
    f.paidAmount=feeInstallments[feeId].filter(function(i){return i.paid;}).reduce(function(t,i){return t+(i.amount||0);},0);
    saveFees();
  }
  toast(allPaid?'✅ تمت تسوية جميع الأقساط':'💳 تم تسجيل القسط');
  render();
}

// Show installments button in fee list if fee has installments
setTimeout(function(){
  var _rFees=rFees;
  rFees=function(){
    var h=_rFees();
    // Inject "أقساط" buttons next to fees that have installments
    // This works by post-processing: we'll handle it inline in the fee render above
    return h;
  };
  // Also check for overdue installments on load
  var td2=today();
  Object.keys(feeInstallments).forEach(function(fid){
    var insts=feeInstallments[fid]||[];
    var overdue=insts.filter(function(i){return !i.paid&&i.dueDate<td2;});
    if(overdue.length&&notifOn&&Notification.permission==='granted'){
      var f=fees.find(function(x){return x.id===fid;});
      if(f){
        var lastKey='j_inst_notif_'+fid+'_'+td2;
        if(!localStorage.getItem(lastKey)){
          setTimeout(function(){
            new Notification('💳 قسط متأخر',{body:overdue.length+' قسط متأخر — '+f.desc+(f.client?' — '+f.client:''),tag:'overdue-inst-'+fid});
            localStorage.setItem(lastKey,'1');
          },5000);
        }
      }
    }
  });
},0);
