<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="الجلسات">
    <meta name="theme-color" content="#0a0e17">
    <title>الجلسات القضائية | المحامي سعود العتيبي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:#0a0e17; --ink2:#111827; --ink3:#1a2233;
            --card:#1c2540; --card2:#222d48;
            --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.12);
            --gold:#c9a84c; --gold2:#e8c870; --gold-dim:rgba(201,168,76,0.15); --gold-rim:rgba(201,168,76,0.3);
            --text:#eef2ff; --text2:#94a3c0; --text3:#5a6a88;
            --safe-top:env(safe-area-inset-top,44px); --safe-bottom:env(safe-area-inset-bottom,20px);
            --p-none:#3b82f6; --danger: #ef4444;
        }
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased; }
        html, body { height:100%; background:var(--ink); overflow:hidden; font-family:'IBM Plex Sans Arabic', sans-serif; color:var(--text); direction:rtl; }
        #app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; position:relative; overflow:hidden; background:var(--ink); border-left:1px solid var(--rim); border-right:1px solid var(--rim); }
        #hdr { flex-shrink:0; padding-top:var(--safe-top); background:var(--ink); z-index:40; }
        .hdr-inner { display:flex; align-items:center; justify-content:space-between; padding:12px 20px 14px; }
        .hdr-title { font-family:'Amiri', serif; font-size:22px; font-weight:700; color:var(--gold2); }
        .hdr-sub { font-size:11px; color:var(--text3); }
        .btn-new { display:flex; align-items:center; gap:6px; background:var(--gold); color:var(--ink); border-radius:14px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(201,168,76,0.35); border:none; }
        .tab-strip { display:flex; padding:10px 10px 0; gap:4px; background:var(--ink); }
        .tab-pill { flex:1; padding:9px 4px; border-radius:12px; background:transparent; color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; border:1px solid transparent; }
        .tab-pill.active { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-rim); }
        #content { flex:1; overflow-y:auto; padding:14px 16px calc(20px + var(--safe-bottom)); }
        .s-card { background:var(--card); border:1px solid var(--rim); border-radius:18px; padding:16px; margin-bottom:12px; position:relative; overflow:hidden; border-right:4px solid var(--p-none); }
        .s-num { font-family:'Amiri', serif; font-size:18px; color:var(--gold2); font-weight:700; }
        .s-parties { font-size:12px; color:var(--text2); background:var(--ink3); border-radius:10px; padding:8px 10px; margin:10px 0; }
        .s-notes-box { font-size:11px; color:var(--text3); background:rgba(0,0,0,0.15); border-radius:8px; padding:10px; margin-top:10px; border-top:1px solid var(--rim); }
        .countdown-box { margin-top:10px; padding:10px; border-radius:12px; font-size:12px; display:flex; justify-content:space-between; align-items:center; }
        .countdown-box.urgent { background:rgba(239,68,68,0.1); color:#f87171; border:1px solid rgba(239,68,68,0.2); }
        .countdown-box.ok { background:rgba(16,185,129,0.1); color:#34d399; border:1px solid rgba(16,185,129,0.2); }
        .overlay { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; justify-content:flex-end; }
        .ov-bg { position:absolute; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(4px); }
        .sheet { position:relative; background:var(--card); border-radius:24px 24px 0 0; padding-bottom:var(--safe-bottom); max-height:90vh; overflow-y:auto; }
        .field { margin-bottom:15px; padding:0 20px; }
        .field label { display:block; font-size:12px; color:var(--text3); margin-bottom:5px; }
        .field input, .field textarea { width:100%; background:var(--ink3); border:1px solid var(--rim2); border-radius:12px; padding:12px; color:var(--text); font-family:inherit; }
        .field textarea { height:80px; resize:none; }
        .hidden { display:none !important; }
        .btn-gold { width:90%; margin:10px 5%; background:var(--gold); color:var(--ink); padding:16px; border-radius:16px; font-weight:700; border:none; cursor:pointer; }
        .btn-danger-outline { background:none; border:1px solid var(--danger); color:var(--danger); padding:10px 20px; border-radius:12px; cursor:pointer; font-weight:600; margin-top:20px; font-family:inherit; font-size:12px;}
    </style>
</head>
<body>

<div id="app">
    <div id="hdr">
        <div class="hdr-inner">
            <div>
                <div class="hdr-title">الجلسات القضائية</div>
                <div class="hdr-sub" id="hdr-date">--:--</div>
            </div>
            <button class="btn-new" onclick="openAdd()">+ جلسة جديدة</button>
        </div>
        <div class="tab-strip">
            <button class="tab-pill active" onclick="switchTab('home')">الرئيسية</button>
            <button class="tab-pill" onclick="switchTab('list')">كل الجلسات</button>
            <button class="tab-pill" onclick="switchTab('stats')">الإحصائيات</button>
        </div>
    </div>

    <div id="content"></div>
</div>

<div class="overlay hidden" id="form-sheet">
    <div class="ov-bg" onclick="closeForm()"></div>
    <div class="sheet">
        <div style="width:40px; height:4px; background:var(--rim2); margin:12px auto; border-radius:2px;"></div>
        <h3 style="text-align:center; margin-bottom:20px; font-family:'Amiri'; color:var(--gold2);">تفاصيل الجلسة والمذكرات</h3>
        <div class="field"><label>رقم القضية</label><input id="f-num" type="text" placeholder="2026/000"></div>
        <div class="field"><label>المحكمة</label><input id="f-court" type="text" placeholder="اسم المحكمة"></div>
        <div class="field"><label>المدعي</label><input id="f-plnt" type="text"></div>
        <div class="field"><label>المدعى عليه</label><input id="f-dfnd" type="text"></div>
        <div style="display:flex; gap:10px;">
            <div class="field" style="flex:1"><label>التاريخ</label><input id="f-date" type="date"></div>
            <div class="field" style="flex:1"><label>الوقت</label><input id="f-time" type="time"></div>
        </div>
        <div class="field"><label>المذكرات والملاحظات</label><textarea id="f-notes" placeholder="اكتب مذكرات القضية هنا..."></textarea></div>
        <button class="btn-gold" onclick="saveS()">حفظ في المنظومة</button>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('legal_sessions') || '[]');
    let currentTab = 'home';

    function switchTab(t) {
        currentTab = t;
        document.querySelectorAll('.tab-pill').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && t === 'home') || (i === 1 && t === 'list') || (i === 2 && t === 'stats'));
        });
        render();
    }

    function openAdd() { document.getElementById('form-sheet').classList.remove('hidden'); }
    function closeForm() { document.getElementById('form-sheet').classList.add('hidden'); }

    function saveS() {
        const newS = {
            id: Date.now(),
            num: document.getElementById('f-num').value,
            court: document.getElementById('f-court').value,
            plnt: document.getElementById('f-plnt').value,
            dfnd: document.getElementById('f-dfnd').value,
            date: document.getElementById('f-date').value,
            time: document.getElementById('f-time').value,
            notes: document.getElementById('f-notes').value,
            status: 'scheduled'
        };
        if(!newS.num || !newS.date) return alert("يرجى ملء رقم القضية والتاريخ");
        data.push(newS);
        localStorage.setItem('legal_sessions', JSON.stringify(data));
        closeForm();
        render();
        ['f-num', 'f-court', 'f-plnt', 'f-dfnd', 'f-date', 'f-time', 'f-notes'].forEach(id => document.getElementById(id).value = '');
    }

    function getCD(date, time) {
        const target = new Date(`${date}T${time || '00:00'}`);
        const diff = target - new Date();
        if (diff < 0) return { lbl: "انتهى الموعد", cls: "urgent" };
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        return { lbl: `متبقي: ${h} س و ${m} د`, cls: h < 24 ? "urgent" : "ok" };
    }

    function render() {
        const container = document.getElementById('content');
        container.innerHTML = '';

        if (currentTab === 'stats') {
            container.innerHTML = `<div style="text-align:center; padding:60px 20px;">
                <h2 style="color:var(--gold2); font-family:'Amiri';">إحصائيات المكتب</h2>
                <div style="font-size:64px; color:var(--text); margin:20px 0;">${data.length}</div>
                <p style="color:var(--text3)">إجمالي القضايا المسجلة</p>
                <button class="btn-danger-outline" onclick="cleanOldSessions()">🗑️ مسح الجلسات المنتهية</button>
            </div>`;
            return;
        }

        let list = (currentTab === 'home') 
            ? data.filter(s => new Date(s.date).toDateString() === new Date().toDateString())
            : data;

        if(list.length === 0) {
            container.innerHTML = `<p style="text-align:center; color:var(--text3); margin-top:60px;">لا توجد جلسات</p>`;
            return;
        }

        list.sort((a,b) => new Date(`${a.date}T${a.time || '00:00'}`) - new Date(`${b.date}T${b.time || '00:00'}`));

        list.forEach(s => {
            const cd = getCD(s.date, s.time);
            const card = document.createElement('div');
            card.className = `s-card`;
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="s-num">${s.num}</span>
                    <span style="font-size:12px; color:var(--gold2)">${s.date} | ${s.time || '--:--'}</span>
                </div>
                <div class="s-parties">⚖️ ${s.plnt} <b>ضد</b> ${s.dfnd}</div>
                <div style="font-size:11px; color:var(--text3)">🏫 المحكمة: ${s.court || 'غير محددة'}</div>
                ${s.notes ? `<div class="s-notes-box"><b>المذكرات:</b><br>${s.notes}</div>` : ''}
                <div class="countdown-box ${cd.cls}">
                    <span>${cd.lbl}</span>
                    <button onclick="deleteS(${s.id})" style="background:none; border:none; color:var(--text3); font-size:10px; cursor:pointer;">[حذف]</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function deleteS(id) {
        if(confirm('هل تريد حذف هذه الجلسة؟')) {
            data = data.filter(s => s.id !== id);
            localStorage.setItem('legal_sessions', JSON.stringify(data));
            render();
        }
    }

    function cleanOldSessions() {
        const todayStr = new Date().toISOString().split('T')[0];
        if(confirm(`هل تريد مسح جميع الجلسات القديمة؟`)) {
            data = data.filter(s => s.date >= todayStr);
            localStorage.setItem('legal_sessions', JSON.stringify(data));
            render();
        }
    }

    document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
    render();
    setInterval(render, 60000);
</script>

</body>
</html>
