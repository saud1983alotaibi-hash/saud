<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الجلسات">
<meta name="theme-color" content="#0a0e17">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<title>الجلسات القضائية</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0a0e17; --ink2:#111827; --ink3:#1a2233;
  --card:#1c2540; --card2:#222d48;
  --rim:rgba(255,255,255,0.07); --rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c; --gold2:#e8c870;
  --gold-dim:rgba(201,168,76,0.15); --gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff; --text2:#94a3c0; --text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);
  --safe-bottom:env(safe-area-inset-bottom,20px);
  --blue:#3b82f6; --blue-bg:rgba(59,130,246,0.12); --blue-rim:rgba(59,130,246,0.3);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,0.12); --amber-rim:rgba(245,158,11,0.3);
  --green:#10b981; --green-bg:rgba(16,185,129,0.12); --green-rim:rgba(16,185,129,0.3);
  --red:#ef4444; --red-bg:rgba(239,68,68,0.12); --red-rim:rgba(239,68,68,0.3);
}
body.day {
  --ink:#f0f4ff; --ink2:#e2e8f8; --ink3:#d8dfee;
  --card:#ffffff; --card2:#f5f8ff;
  --rim:rgba(0,0,0,0.07); --rim2:rgba(0,0,0,0.12);
  --text:#0a0e17; --text2:#334155; --text3:#64748b;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--ink); overflow:hidden; font-family:'IBM Plex Sans Arabic',sans-serif; color:var(--text); direction:rtl; transition:background .3s,color .3s; }
::-webkit-scrollbar { display:none; }
button, input, select, textarea { font-family:inherit; border:none; outline:none; background:none; }
input[type=date], input[type=time] { -webkit-appearance:none; color:var(--text); color-scheme:dark; }
body.day input[type=date], body.day input[type=time] { color-scheme:light; }

#app { display:flex; flex-direction:column; height:100vh; height:100dvh; max-width:430px; margin:0 auto; overflow:hidden; background:var(--ink); transition:background .3s; }
#hdr { flex-shrink:0; padding-top:var(--safe-top); background:var(--ink); z-index:40; transition:background .3s; }
.hi { display:flex; align-items:center; justify-content:space-between; padding:12px 18px 12px; }
.hl { display:flex; flex-direction:column; }
.he { font-size:10px; color:var(--text3); letter-spacing:.08em; margin-bottom:2px; }
.ht { font-family:'Amiri',serif; font-size:21px; font-weight:700; color:var(--gold2); }
.hs { font-size:10px; color:var(--text3); margin-top:2px; }
.ha { display:flex; gap:6px; align-items:center; }
.bn { display:flex; align-items:center; gap:5px; background:var(--gold); color:var(--ink); border-radius:13px; padding:9px 13px; font-size:12px; font-weight:700; cursor:pointer; box-shadow:0 4px 14px rgba(201,168,76,.35); }
.bn:active { opacity:.85; }
.bi { width:34px; height:34px; border-radius:10px; background:var(--card); border:1px solid var(--rim2); color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.bi.on { background:var(--gold-dim); border-color:var(--gold-rim); color:var(--gold2); }
.gd { height:1px; background:linear-gradient(90deg,transparent,var(--gold-rim),transparent); margin:0 18px; }
.ts { display:flex; padding:8px 8px 0; gap:3px; background:var(--ink); overflow-x:auto; transition:background .3s; }
.tp { flex:1; min-width:52px; padding:8px 2px; border-radius:10px; background:transparent; color:var(--text3); font-size:10px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:3px; border:1px solid transparent; white-space:nowrap; transition:background .15s,color .15s; }
.tp.on { background:var(--gold-dim); color:var(--gold2); border-color:var(--gold-rim); }
.tp .dot { width:3px; height:3px; border-radius:50%; background:currentColor; opacity:0; }
.tp.on .dot { opacity:1; }
#cnt { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:12px 14px calc(16px + var(--safe-bottom)); }

.toast { position:fixed; bottom:calc(24px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(16px); background:var(--card2); border:1px solid var(--gold-rim); border-radius:13px; padding:9px 18px; font-size:12px; font-weight:600; color:var(--gold2); z-index:999; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

.sg { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:14px; }
.sc { background:var(--card); border:1px solid var(--rim); border-radius:16px; padding:14px 12px; position:relative; overflow:hidden; }
.sc::before { content:''; position:absolute; top:-16px; left:-16px; width:64px; height:64px; border-radius:50%; background:var(--ac,var(--gold)); opacity:.06; filter:blur(16px); }
.se { font-size:20px; margin-bottom:6px; }
.sn { font-size:28px; font-weight:700; line-height:1; }
.sl { font-size:10px; color:var(--text3); margin-top:4px; }

.ph { border-right:4px solid #ef4444 !important; }
.pm { border-right:4px solid #f59e0b !important; }
.pl { border-right:4px solid #10b981 !important; }
.pn { border-right:4px solid #3b82f6 !important; }
.pt { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:7px; font-size:10px; font-weight:700; }
.pt.high { background:rgba(239,68,68,.12); color:#f87171; border:1px solid rgba(239,68,68,.3); }
.pt.med { background:rgba(245,158,11,.12); color:#fbbf24; border:1px solid rgba(245,158,11,.3); }
.pt.low { background:rgba(16,185,129,.12); color:#34d399; border:1px solid rgba(16,185,129,.3); }
.pt.none { background:rgba(59,130,246,.12); color:#60a5fa; border:1px solid rgba(59,130,246,.3); }

.card { background:var(--card); border:1px solid var(--rim); border-radius:16px; padding:14px; margin-bottom:9px; cursor:pointer; position:relative; overflow:hidden; transition:transform .1s,border-color .15s; }
.card:active { transform:scale(.985); border-color:var(--gold-rim); }
.ca { position:absolute; top:0; right:0; width:4px; height:100%; border-radius:0 16px 16px 0; }
.ct { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; }
.cn { font-family:'Amiri',serif; font-size:17px; font-weight:700; color:var(--gold2); }
.ctp { font-size:10px; color:var(--text3); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.ctm { font-size:20px; font-weight:700; color:var(--text); text-align:left; font-variant-numeric:tabular-nums; }
.cdt { font-size:10px; color:var(--text3); text-align:left; margin-top:1px; }
.cp { font-size:11px; color:var(--text2); background:var(--ink3); border-radius:9px; padding:7px 9px; margin-bottom:9px; display:flex; align-items:center; gap:5px; }
.cf { display:flex; justify-content:space-between; align-items:center; }
.cco { font-size:10px; color:var(--text3); display:flex; align-items:center; gap:3px; }
.ac { font-size:9px; color:var(--text3); display:flex; align-items:center; gap:2px; margin-top:5px; }

.badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:18px; font-size:10px; font-weight:700; border:1px solid; }
.sh { display:flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:10px; margin-top:4px; }
.sh::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--rim2),transparent); }

.si { position:relative; margin-bottom:7px; }
.si input { width:100%; background:var(--card); border:1px solid var(--rim2); border-radius:13px; padding:12px 40px 12px 56px; font-size:13px; color:var(--text); display:block; transition:border-color .15s; }
.si input:focus { border-color:var(--gold-rim); }
.si .ico { position:absolute; right:13px; top:50%; transform:translateY(-50%); font-size:15px; pointer-events:none; }
.si .adv { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:10px; color:var(--gold2); font-weight:700; cursor:pointer; }
.advsearch { background:var(--card); border:1px solid var(--rim2); border-radius:16px; padding:12px; margin-bottom:10px; }
.arow { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:7px; }
.arow input, .arow select { width:100%; background:var(--ink3); border:1px solid var(--rim2); border-radius:9px; padding:8px 10px; font-size:11px; color:var(--text); }
.arow label { font-size:9px; color:var(--text3); font-weight:600; display:block; margin-bottom:3px; }
.chips { display:flex; gap:6px; overflow-x:auto; padding-bottom:10px; margin-bottom:3px; }
.chip { flex-shrink:0; padding:6px 12px; border-radius:18px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid; }

.cw { background:var(--card); border:1px solid var(--rim); border-radius:18px; padding:16px 12px; margin-bottom:12px; }
.ch { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
.cm { font-family:'Amiri',serif; font-size:18px; font-weight:700; color:var(--gold2); }
.cn2 { width:34px; height:34px; border-radius:9px; background:var(--ink3); border:1px solid var(--rim2); color:var(--text2); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cday { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:7px; }
.cdn { text-align:center; font-size:9px; color:var(--text3); font-weight:600; padding:2px 0; }
.cgrid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cc { text-align:center; border-radius:9px; padding:6px 1px; cursor:pointer; border:2px solid transparent; min-height:40px; display:flex; flex-direction:column; align-items:center; }
.cnum { font-size:13px; font-weight:600; }
.cdot { width:4px; height:4px; border-radius:50%; margin-top:2px; }

.rg { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:14px; }
.rc { background:var(--card); border:1px solid var(--rim); border-radius:13px; padding:10px 8px; text-align:center; }
.rn { font-size:22px; font-weight:700; }
.rl { font-size:9px; color:var(--text3); margin-top:3px; }
.bw { background:var(--card); border:1px solid var(--rim); border-radius:16px; padding:14px; margin-bottom:14px; }
.br { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
.bl { font-size:10px; color:var(--text3); width:64px; text-align:right; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bt { flex:1; background:var(--ink3); border-radius:5px; height:9px; overflow:hidden; }
.bf { height:100%; border-radius:5px; }
.bv { font-size:10px; font-weight:700; width:20px; text-align:left; flex-shrink:0; }

.ov { position:fixed; inset:0; z-index:200; display:flex; flex-direction:column; justify-content:flex-end; }
.ov.hid { display:none; }
.ob { position:absolute; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); }
.sheet { position:relative; background:var(--card); border-radius:22px 22px 0 0; border-top:1px solid var(--rim2); max-height:92vh; overflow-y:auto; padding-bottom:max(18px,var(--safe-bottom)); }
.sh2 { width:38px; height:4px; border-radius:2px; background:var(--rim2); margin:12px auto 14px; }
.shdr { position:sticky; top:0; background:var(--card); padding:0 18px 12px; border-bottom:1px solid var(--rim); z-index:1; }
.shdi { display:flex; justify-content:space-between; align-items:center; }
.sht { font-family:'Amiri',serif; font-size:20px; font-weight:700; color:var(--gold2); }
.shc { width:30px; height:30px; border-radius:9px; background:var(--ink3); color:var(--text3); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.sbody { padding:14px 18px; }
.dr { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--rim); gap:10px; }
.dr:last-of-type { border-bottom:none; }
.dk { font-size:11px; color:var(--text3); font-weight:500; flex-shrink:0; }
.dv { font-size:12px; color:var(--text); font-weight:600; text-align:left; flex:1; }

.memo { background:var(--ink3); border:1px solid var(--gold-rim); border-radius:13px; padding:10px; margin:10px 0; }
.memol { font-size:10px; color:var(--gold2); font-weight:700; margin-bottom:6px; }
.memot { width:100%; background:transparent; font-size:12px; color:var(--text); resize:none; min-height:72px; direction:rtl; line-height:1.6; }

.atts { background:var(--ink3); border:1px solid var(--rim2); border-radius:13px; padding:10px; margin:10px 0; }
.attl { font-size:11px; color:var(--text3); font-weight:600; margin-bottom:8px; }
.atti { display:flex; align-items:center; gap:7px; padding:7px 9px; background:var(--card); border-radius:9px; margin-bottom:5px; }
.attn { font-size:11px; color:var(--text2); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.attd { font-size:13px; cursor:pointer; color:#f87171; }
.attadd { display:flex; align-items:center; gap:7px; padding:9px; background:var(--gold-dim); border:1px dashed var(--gold-rim); border-radius:9px; cursor:pointer; font-size:11px; color:var(--gold2); font-weight:600; }

.cd-box { margin-top:9px; background:var(--ink3); border:1px solid var(--rim2); border-radius:11px; padding:9px 11px; display:flex; align-items:center; justify-content:space-between; }
.cd-box.urgent { border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.08); }
.cd-box.soon { border-color:rgba(245,158,11,.4); background:rgba(245,158,11,.08); }
.cd-box.ok { border-color:rgba(16,185,129,.3); background:rgba(16,185,129,.06); }
.cdl { font-size:10px; color:var(--text3); }
.cdt2 { font-size:14px; font-weight:700; font-variant-numeric:tabular-nums; }
.cdt2.urgent { color:#f87171; }
.cdt2.soon { color:#fbbf24; }
.cdt2.ok { color:#34d399; }
.det-cd { background:var(--ink3); border:1px solid var(--rim2); border-radius:14px; padding:14px; margin:12px 0; text-align:center; }
.det-cd-l { font-size:11px; color:var(--text3); margin-bottom:6px; }
.det-cd-t { font-size:32px; font-weight:700; font-variant-numeric:tabular-nums; }
.det-cd-s { font-size:10px; color:var(--text3); margin-top:3px; }

.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; color:var(--text3); font-weight:600; margin-bottom:6px; }
.field input, .field select, .field textarea { width:100%; background:var(--ink3); border:1.5px solid var(--rim2); border-radius:13px; padding:12px 13px; font-size:13px; color:var(--text); display:block; transition:border-color .15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--gold-rim); }
.field textarea { resize:none; }
option { background:var(--ink2); }
.ps { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.pb { padding:9px; border-radius:11px; font-size:11px; font-weight:700; cursor:pointer; border:2px solid transparent; text-align:center; }
.pb.sel { border-color:currentColor; }
.bg { width:100%; background:var(--gold); color:var(--ink); border-radius:14px; padding:14px; font-weight:700; font-size:14px; cursor:pointer; margin-bottom:9px; box-shadow:0 4px 18px rgba(201,168,76,.3); }
.bg:active { opacity:.9; }
.bg:disabled { background:var(--rim2); color:var(--text3); box-shadow:none; }
.bgh { width:100%; background:var(--ink3); color:var(--text2); border:1px solid var(--rim2); border-radius:14px; padding:13px; font-weight:600; font-size:13px; cursor:pointer; }
.rbs { display:flex; gap:7px; margin-top:14px; flex-wrap:wrap; }
.bs { flex:1; min-width:64px; border-radius:13px; padding:11px 5px; font-weight:700; font-size:11px; cursor:pointer; text-align:center; }
.be { background:var(--gold-dim); color:var(--gold2); border:1px solid var(--gold-rim); }
.bd { background:rgba(239,68,68,.1); color:#f87171; border:1px solid rgba(239,68,68,.25); }
.bc { background:rgba(59,130,246,.1); color:#60a5fa; border:1px solid rgba(59,130,246,.25); }
.bp { background:rgba(16,185,129,.1); color:#34d399; border:1px solid rgba(16,185,129,.25); }
.bpdf { width:100%; background:rgba(239,68,68,.1); color:#f87171; border:1px solid rgba(239,68,68,.3); border-radius:13px; padding:13px; font-weight:700; font-size:13px; cursor:pointer; margin-top:9px; display:flex; align-items:center; justify-content:center; gap:7px; }

.dlg-ov { position:fixed; inset:0; z-index:400; display:flex; align-items:center; justify-content:center; padding:22px; }
.dlg-ov.hid { display:none; }
.dlg-bg { position:absolute; inset:0; background:rgba(0,0,0,.7); }
.dlg { position:relative; background:var(--card2); border:1px solid var(--rim2); border-radius:20px; padding:26px 20px; width:100%; max-width:280px; text-align:center; }
.dlg-ic { font-size:40px; margin-bottom:10px; }
.dlg-tt { font-family:'Amiri',serif; font-size:18px; color:var(--text); margin-bottom:5px; }
.dlg-sb { font-size:12px; color:var(--text3); margin-bottom:20px; }
.dlg-bs { display:flex; gap:9px; }
.dlg-d { flex:1; background:#ef4444; color:#fff; border-radius:11px; padding:12px; font-weight:700; font-size:13px; cursor:pointer; }
.dlg-c { flex:1; background:var(--ink3); color:var(--text2); border:1px solid var(--rim2); border-radius:11px; padding:12px; font-weight:600; font-size:13px; cursor:pointer; }

.empty { text-align:center; padding:48px 0; }
.empty .ei { font-size:48px; margin-bottom:10px; opacity:.5; }
.empty .et { font-size:15px; font-weight:600; color:var(--text2); }
.empty .es { font-size:12px; color:var(--text3); margin-top:5px; }

@keyframes fu { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.ani { animation:fu .22s ease both; }
.stg > * { animation:fu .28s ease both; }
.stg > *:nth-child(1) { animation-delay:.02s; }
.stg > *:nth-child(2) { animation-delay:.05s; }
.stg > *:nth-child(3) { animation-delay:.09s; }
.stg > *:nth-child(4) { animation-delay:.13s; }
.stg > *:nth-child(5) { animation-delay:.17s; }
.stg > *:nth-child(6) { animation-delay:.21s; }
.hid { display:none !important; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.5} }
.pulse { animation:pulse 1s ease-in-out infinite; }
@media print {
  body { background:#fff !important; color:#000 !important; direction:rtl; }
  #app { display:none !important; }
  #pa { display:block !important; }
}
#pa { display:none; }
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hi">
      <div class="hl">
        <div class="he">⚖️ منظومة المحاكم</div>
        <div class="ht">الجلسات القضائية</div>
        <div class="hs" id="hdate"></div>
      </div>
      <div class="ha">
        <button class="bi" id="btnTheme" onclick="toggleTheme()">🌙</button>
        <button class="bi" onclick="showColorPicker()" title="تخصيص الألوان">🎨</button>
        <button class="bi" onclick="showBackupModal()" title="حفظ واسترداد">💾</button>
        <button class="bi" id="btnNotif" onclick="toggleNotif()">🔔</button>
        <button class="bn" onclick="openAdd()"><span style="font-size:15px;line-height:1">+</span>جديدة</button>
      </div>
    </div>
    <div class="gd"></div>
    <div class="ts">
      <button class="tp on" id="tb-home" onclick="go('home')"><span class="dot"></span>الرئيسية</button>
      <button class="tp" id="tb-list" onclick="go('list')"><span class="dot"></span>الجلسات</button>
      <button class="tp" id="tb-tasks" onclick="go('tasks')"><span class="dot"></span>المهمات</button>
      <button class="tp" id="tb-contacts" onclick="go('contacts')"><span class="dot"></span>الأطراف</button>
      <button class="tp" id="tb-files" onclick="go('files')"><span class="dot"></span>الملفات</button>
      <button class="tp" id="tb-ai" onclick="go('ai')"><span class="dot"></span>المستشار</button>
      <button class="tp" id="tb-cal" onclick="go('cal')"><span class="dot"></span>التقويم</button>
      <button class="tp" id="tb-stats" onclick="go('stats')"><span class="dot"></span>التقارير</button>
    </div>
    <div style="height:9px;background:var(--ink);transition:background .3s"></div>
  </div>
  <div id="cnt"></div>
</div>
<div id="pa"></div>
<div class="toast" id="toast"></div>

<div class="ov hid" id="detSheet">
  <div class="ob" onclick="closeDet()"></div>
  <div class="sheet ani">
    <div class="sh2"></div>
    <div class="shdr"><div class="shdi"><div class="sht" id="detNum"></div><span id="detBadge"></span></div></div>
    <div class="sbody" id="detBody"></div>
  </div>
</div>

<script>
// ── DB ──
var DB_NAME = 'JalsatDB', DB_VER = 8, STORE = 'sessions';
var db = null;

function openDB() {
  return new Promise(function(res, rej) {
    var r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, {keyPath:'id'});
    };
    r.onsuccess = function(e) { db = e.target.result; res(); };
    r.onerror = function() { rej(); };
  });
}
function dbAll() {
  return new Promise(function(res) {
    if (!db) { res([]); return; }
    var tx = db.transaction(STORE, 'readonly');
    var r = tx.objectStore(STORE).getAll();
    r.onsuccess = function() { res(r.result || []); };
    r.onerror = function() { res([]); };
  });
}
function dbPut(s) {
  return new Promise(function(res) {
    if (!db) { res(); return; }
    var tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put(s);
    tx.oncomplete = res; tx.onerror = res;
  });
}
function dbDel(id) {
  return new Promise(function(res) {
    if (!db) { res(); return; }
    var tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete(id);
    tx.oncomplete = res; tx.onerror = res;
  });
}

// ── CONSTANTS ──
var MO = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
var DY = ["أحد","اثن","ثلا","أرب","خمس","جمع","سبت"];
var ST = {
  scheduled: {lbl:"مجدولة", clr:"var(--blue)", bg:"var(--blue-bg)", rim:"var(--blue-rim)"},
  inProgress: {lbl:"جارية", clr:"var(--amber)", bg:"var(--amber-bg)", rim:"var(--amber-rim)"},
  completed: {lbl:"منتهية", clr:"var(--green)", bg:"var(--green-bg)", rim:"var(--green-rim)"},
  postponed: {lbl:"مؤجلة", clr:"var(--red)", bg:"var(--red-bg)", rim:"var(--red-rim)"}
};
var PT = {
  high: {lbl:"عالية", cls:"high", icon:"🔴"},
  med: {lbl:"متوسطة", cls:"med", icon:"🟡"},
  low: {lbl:"منخفضة", cls:"low", icon:"🟢"},
  none: {lbl:"عادية", cls:"none", icon:"🔵"}
};
var SAMPLE = [
  {id:1,num:"2024/1234",type:"جنائية",court:"محكمة الجزاء",plnt:"النيابة العامة",dfnd:"أحمد السعيد",date:"2026-03-22",time:"09:00",room:"قاعة 3",status:"scheduled",priority:"high",notes:"جلسة الاستماع",attachments:[],memo:""},
  {id:2,num:"2024/5678",type:"مدنية",court:"المحكمة العامة",plnt:"شركة الأمانة",dfnd:"محمد علي",date:"2026-03-22",time:"11:00",room:"قاعة 1",status:"inProgress",priority:"med",notes:"النظر في البيّنات",attachments:[],memo:""},
  {id:3,num:"2023/9012",type:"تجارية",court:"المحكمة التجارية",plnt:"بنك الخليج",dfnd:"مؤسسة النور",date:"2026-03-16",time:"10:00",room:"قاعة 5",status:"completed",priority:"none",notes:"صدر الحكم",attachments:[],memo:""}
];

// ── STATE ──
var data = [];
var curTab = "home";
var filterS = "all";
var q = "";
var advOpen = false;
var advType = "", advCourt = "", advFrom = "", advTo = "", advPrio = "";
var calD = new Date();
var selD = new Date();
var editId = null;
var detId = null;
var delTgt = null;
var tick = null;
var notifOn = false;
var notifTimers = [];
var curPrio = "none";
var isDay = false;
var tasks = [];
var contacts = [];
var toastTimer = null;

// ── INIT DATA ──
try { tasks = JSON.parse(localStorage.getItem('j_tasks') || '[]'); } catch(e) { tasks = []; }
try { contacts = JSON.parse(localStorage.getItem('j_contacts') || '[]'); } catch(e) { contacts = []; }
try { isDay = localStorage.getItem('j_theme') === 'day'; } catch(e) {}
try { notifOn = localStorage.getItem('j_notif') === '1'; } catch(e) {}
try { var si = parseInt(localStorage.getItem('j_ctheme')); if (!isNaN(si)) { curTheme=si; var ct=COLOR_THEMES[si]; if(ct){var rs=document.documentElement.style;rs.setProperty('--gold',ct.gold);rs.setProperty('--gold2',ct.gold2);rs.setProperty('--gold-dim',ct.gold+'26');rs.setProperty('--gold-rim',ct.gold+'4d');if(!isDay){rs.setProperty('--ink',ct.ink);rs.setProperty('--card',ct.card);}}} } catch(e) {}

// ── THEME ──
function toggleTheme() {
  isDay = !isDay;
  localStorage.setItem('j_theme', isDay ? 'day' : 'night');
  applyTheme();
}
function applyTheme() {
  document.body.classList.toggle('day', isDay);
  var b = document.getElementById('btnTheme');
  if (b) b.textContent = isDay ? '☀️' : '🌙';
}

// ── TOAST ──
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

// ── NOTIFICATIONS ──
function toggleNotif() {
  if (!('Notification' in window)) { toast("⚠️ المتصفح لا يدعم الإشعارات"); return; }
  if (notifOn) {
    notifOn = false;
    notifTimers.forEach(function(t) { clearTimeout(t); });
    notifTimers = [];
    localStorage.setItem('j_notif','0');
    updNotifBtn();
    toast("🔕 تم إيقاف الإشعارات");
    return;
  }
  Notification.requestPermission().then(function(p) {
    if (p === 'granted') {
      notifOn = true;
      localStorage.setItem('j_notif','1');
      schedNotifs();
      schedDaily();
      updNotifBtn();
      toast("🔔 تم تفعيل الإشعارات");
    } else {
      toast("⚠️ لم يتم السماح");
    }
  });
}
function updNotifBtn() {
  var b = document.getElementById('btnNotif');
  if (b) { b.classList.toggle('on', notifOn); b.textContent = notifOn ? '🔔' : '🔕'; }
}
function schedNotifs() {
  notifTimers.forEach(function(t) { clearTimeout(t); });
  notifTimers = [];
  if (!notifOn) return;
  var now = new Date();
  data.filter(function(s) { return s.status === 'scheduled'; }).forEach(function(s) {
    var tgt = new Date(s.date + 'T' + s.time + ':00');
    var d30 = tgt - now - 1800000;
    var d0 = tgt - now;
    if (d30 > 0) notifTimers.push(setTimeout(function() { new Notification("⚖️ تذكير", {body:"جلسة " + s.num + " بعد 30 دقيقة"}); }, d30));
    if (d0 > 0 && d0 < 86400000) notifTimers.push(setTimeout(function() { new Notification("🔴 جلسة الآن", {body:"جلسة " + s.num + " - " + (s.court||"")}); }, d0));
  });
}
function schedDaily() {
  var now = new Date(), nxt = new Date(now);
  nxt.setHours(8,0,0,0);
  if (nxt <= now) nxt.setDate(nxt.getDate()+1);
  setTimeout(function() {
    if (notifOn && Notification.permission === 'granted') {
      var td = today();
      var n = data.filter(function(s) { return s.date === td; }).length;
      if (n > 0) new Notification("📅 جلساتك اليوم", {body:"لديك " + n + " جلسة اليوم"});
    }
    schedDaily();
  }, nxt - now);
}

// ── PRIORITY ──
function setPrio(p) {
  curPrio = p;
  ['high','med','low','none'].forEach(function(k) {
    var b = document.getElementById('p' + k.charAt(0));
    if (b) b.classList.toggle('sel', k === p);
  });
}
function ptag(p) {
  var pt = PT[p || 'none'];
  return '<span class="pt ' + pt.cls + '">' + pt.icon + ' ' + pt.lbl + '</span>';
}

// ── HELPERS ──
function pad(n) { return String(n).padStart(2,'0'); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtS(d) { return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{day:'numeric',month:'short'}); }
function fmtL(d) { return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
function fmtLD(d) { return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'short',year:'numeric',month:'long',day:'numeric'}); }
function bdg(s, lg) {
  var c = ST[s];
  return '<span class="badge' + (lg?' lg':'') + '" style="color:'+c.clr+';background:'+c.bg+';border-color:'+c.rim+'">' + c.lbl + '</span>';
}
function shdr(icon, title) { return '<div class="sh"><span>' + icon + '</span>' + title + '</div>'; }

// ── COUNTDOWN ──
function cdInfo(s) {
  if (s.status === 'completed' || s.status === 'postponed') return null;
  var now = new Date(), tgt = new Date(s.date+'T'+s.time+':00'), diff = tgt - now;
  if (diff < 0) {
    var e = Math.abs(diff);
    return {passed:true, time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)), cls:'urgent'};
  }
  var ts = Math.floor(diff/1000);
  var days = Math.floor(ts/86400), h = Math.floor((ts%86400)/3600), m = Math.floor((ts%3600)/60), sec = ts%60;
  var cls = ts < 3600 ? 'urgent' : ts < 86400 ? 'soon' : 'ok';
  var t = days > 0 ? (days+'ي '+pad(h)+':'+pad(m)+':'+pad(sec)) : (pad(h)+':'+pad(m)+':'+pad(sec));
  return {passed:false, time:t, cls:cls, ts:ts};
}
function cdInline(s) {
  var i = cdInfo(s); if (!i) return '';
  return '<div class="cd-box '+i.cls+'" id="cdb-'+s.id+'"><div><div class="cdl">'+(i.passed?'⏱ مضى':'⏳ الوقت المتبقي')+'</div><div class="cdt2 '+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'')+'" id="cdt-'+s.id+'">'+i.time+'</div></div><span>'+(i.passed?'🔴':i.cls==='urgent'?'🚨':i.cls==='soon'?'⚠️':'🟢')+'</span></div>';
}
function cdLarge(s) {
  var i = cdInfo(s); if (!i) return '';
  var clr = i.cls==='urgent'?'#f87171':i.cls==='soon'?'#fbbf24':'#34d399';
  var bdr = i.cls==='urgent'?'rgba(239,68,68,.4)':i.cls==='soon'?'rgba(245,158,11,.4)':'rgba(16,185,129,.3)';
  var sub = i.passed?'الجلسة بدأت':i.ts<3600?'أقل من ساعة':i.ts<86400?'اليوم':'قادمة';
  return '<div class="det-cd" style="border-color:'+bdr+'"><div class="det-cd-l">'+(i.passed?'⏱ مضى':'⏳ الوقت المتبقي')+'</div><div class="det-cd-t" style="color:'+clr+'" id="cdtL-'+s.id+'">'+i.time+'</div><div class="det-cd-s">'+sub+'</div></div>';
}
function startTick() {
  if (tick) clearInterval(tick);
  tick = setInterval(function() {
    data.forEach(function(s) {
      var i = cdInfo(s); if (!i) return;
      var el = document.getElementById('cdt-'+s.id);
      if (el) { el.textContent = i.time; el.className = 'cdt2 '+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':''); var b = document.getElementById('cdb-'+s.id); if (b) b.className = 'cd-box '+i.cls; }
      var el2 = document.getElementById('cdtL-'+s.id);
      if (el2 && detId === s.id) el2.textContent = i.time;
    });
  }, 1000);
}

// ── CARD ──
function card(s) {
  var c = ST[s.status], p = s.priority || 'none';
  var att = (s.attachments||[]).length;
  var hasMemo = s.memo && s.memo.trim().length > 0;
  return '<div class="card p'+p.charAt(0)+'" onclick="openDet('+s.id+')">' +
    '<div class="ca" style="background:'+c.clr+'"></div>' +
    '<div class="ct"><div><div class="cn">'+s.num+'</div><div class="ctp">'+s.type+(s.room?' · '+s.room:'')+' '+ptag(p)+'</div></div>' +
    '<div><div class="ctm">'+s.time+'</div><div class="cdt">'+fmtS(s.date)+'</div></div></div>' +
    '<div class="cp"><span style="opacity:.5">👤</span><span>'+(s.plnt||'—')+'</span><span style="color:var(--text3)"> ↔ </span><span>'+(s.dfnd||'—')+'</span></div>' +
    '<div class="cf"><div class="cco">🏛️ '+(s.court||'—')+'</div>' +
    '<div style="display:flex;align-items:center;gap:6px">' +
    bdg(s.status) +
    '<button onclick="cycleStatus('+s.id+',event)" style="background:var(--ink3);border:1px solid var(--rim2);border-radius:8px;padding:3px 8px;font-size:10px;color:var(--text3);cursor:pointer" title="تغيير الحالة">🔁</button>' +
    '</div></div>' +
    ((att>0||hasMemo)?'<div class="ac">'+(att>0?'📎 '+att+' مرفق':'')+( hasMemo?' 📝 مذكرة':'' )+'</div>':'') +
    cdInline(s) + '</div>';
}

// ── TABS ──
function go(t) {
  curTab = t;
  document.querySelectorAll('.tp').forEach(function(el) { el.classList.remove('on'); });
  var tb = document.getElementById('tb-'+t);
  if (tb) tb.classList.add('on');
  render();
}

// ── RENDER ──
function render() {
  var el = document.getElementById('cnt');
  if (curTab==='home') el.innerHTML = rHome();
  else if (curTab==='list') el.innerHTML = rList();
  else if (curTab==='tasks') el.innerHTML = rTasks();
  else if (curTab==='contacts') el.innerHTML = rContacts();
  else if (curTab==='files') el.innerHTML = rFiles();
  else if (curTab==='ai') el.innerHTML = rAI();
  else if (curTab==='cal') el.innerHTML = rCal();
  else if (curTab==='stats') el.innerHTML = rStats();
  startTick();
}

// ── HOME ──
function rHome() {
  var td = today();
  var todayS = data.filter(function(s){return s.date===td;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var upcoming = data.filter(function(s){return s.date>td&&s.status==='scheduled';}).sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);}).slice(0,3);
  var high = data.filter(function(s){return s.priority==='high'&&s.status==='scheduled'&&s.date>=td;});
  var stats = [
    {e:'📋',l:'إجمالي',v:data.length,c:'#c9a84c'},
    {e:'📅',l:'اليوم',v:todayS.length,c:'var(--amber)'},
    {e:'🔵',l:'مجدولة',v:data.filter(function(s){return s.status==='scheduled';}).length,c:'var(--blue)'},
    {e:'✅',l:'منتهية',v:data.filter(function(s){return s.status==='completed';}).length,c:'var(--green)'}
  ];
  var h = '<div class="sg stg">';
  stats.forEach(function(s) { h += '<div class="sc" style="--ac:'+s.c+'"><div class="se">'+s.e+'</div><div class="sn" style="color:'+s.c+'">'+s.v+'</div><div class="sl">'+s.l+'</div></div>'; });
  h += '</div>';
  if (high.length) { h += shdr('🔴','عالية الأهمية') + '<div class="stg">'; high.slice(0,2).forEach(function(s){h+=card(s);}); h += '</div>'; }
  if (todayS.length) { h += shdr('📅','جلسات اليوم') + '<div class="stg">'; todayS.forEach(function(s){h+=card(s);}); h += '</div>'; }
  if (upcoming.length) { h += shdr('🔜','قادمة قريباً') + '<div class="stg">'; upcoming.forEach(function(s){h+=card(s);}); h += '</div>'; }
  h += rWeek();
  if (!todayS.length && !upcoming.length && !high.length) h += '<div class="empty"><div class="ei">⚖️</div><div class="et">لا توجد جلسات مجدولة</div><div class="es">اضغط جديدة لإضافة جلسة</div></div>';
  return h;
}

// ── LIST ──
function rList() {
  var po = {high:0,med:1,low:2,none:3};
  var filt = data.filter(function(s) {
    var ms = filterS==='all'||s.status===filterS;
    var mq = !q||[s.num,s.plnt,s.dfnd,s.court,s.type,s.room,s.notes].some(function(x){return x&&x.includes(q);});
    var mt = !advType||s.type===advType;
    var mc = !advCourt||(s.court&&s.court.includes(advCourt));
    var mf = !advFrom||s.date>=advFrom;
    var mto = !advTo||s.date<=advTo;
    var mp = !advPrio||s.priority===advPrio;
    return ms&&mq&&mt&&mc&&mf&&mto&&mp;
  }).sort(function(a,b) { return (po[a.priority||'none']-po[b.priority||'none'])||(a.date+a.time).localeCompare(b.date+b.time); });

  var h = '<div class="si"><span class="ico">🔍</span><input type="search" placeholder="بحث شامل في الجلسات والمهمات والأطراف..." dir="rtl" value="'+q+'" oninput="setQ(this.value)"><button class="adv" onclick="tgAdv()">'+(advOpen?'▲':'▼ متقدم')+'</button></div>';
  if (q && q.trim().length >= 2) return h + rGlobalSearch(q);
  if (advOpen) {
    h += '<div class="advsearch">' +
      '<div class="arow"><div><label>نوع القضية</label><select onchange="advType=this.value;render()" dir="rtl"><option value="">الكل</option><option>جنائية</option><option>مدنية</option><option>تجارية</option><option>أحوال شخصية</option><option>عمالية</option><option>إدارية</option></select></div>' +
      '<div><label>الأهمية</label><select onchange="advPrio=this.value;render()" dir="rtl"><option value="">الكل</option><option value="high">عالية</option><option value="med">متوسطة</option><option value="low">منخفضة</option><option value="none">عادية</option></select></div></div>' +

function rCal() {
  var yr=calD.getFullYear(), mo=calD.getMonth();
  var days=new Date(yr,mo+1,0).getDate(), first=new Date(yr,mo,1).getDay();
  var byD = {};
  data.forEach(function(s){if(!byD[s.date])byD[s.date]=[];byD[s.date].push(s);});
  var tod = today();
  var selStr = selD ? selD.toISOString().split('T')[0] : null;
  function ds(d){return yr+'-'+pad(mo+1)+'-'+pad(d);}
  var h = '<div class="cw"><div class="ch"><button class="cn2" onclick="calPrev()">›</button><div class="cm">'+MO[mo]+' '+yr+'</div><button class="cn2" onclick="calNext()">‹</button></div><div class="cday">';
  DY.forEach(function(d){h+='<div class="cdn">'+d+'</div>';});
  h += '</div><div class="cgrid">';
  for(var i=0;i<first;i++) h += '<div></div>';
  for(var d=1;d<=days;d++){
    var dstr=ds(d), has=!!(byD[dstr]&&byD[dstr].length), isT=dstr===tod, isSel=dstr===selStr;
    var bg=isSel?'var(--gold-dim)':isT?'rgba(59,130,246,.1)':'transparent';
    var bdr=isSel?'var(--gold-rim)':isT?'rgba(59,130,246,.35)':'transparent';
    var nc=isSel?'var(--gold2)':isT?'var(--blue)':'var(--text2)';
    var dotC=has?(isSel?'var(--gold)':ST[byD[dstr][0].status].clr):'';
    h += '<div class="cc" onclick="selDay(\''+dstr+'\')" style="background:'+bg+';border-color:'+bdr+'"><div class="cnum" style="color:'+nc+'">'+d+'</div>'+(has?'<div class="cdot" style="background:'+dotC+'"></div>':'')+'</div>';
  }
  h += '</div></div>';
  if (selD) {
    var ss = byD[selStr] || [];
    h += shdr('📌',fmtL(selStr||tod));
    if (!ss.length) h += '<div class="empty" style="padding:24px 0"><div style="font-size:28px;opacity:.4;margin-bottom:7px">📭</div><div style="font-size:12px;color:var(--text3)">لا توجد جلسات في هذا اليوم</div></div>';
    else { h += '<div class="stg">'; ss.forEach(function(s){h+=card(s);}); h += '</div>'; }
  }
  return h;
}

function attHTML(s) {

  atts.forEach(function(a,i){

  });
  h += '<label class="attadd"><input type="file" style="display:none" onchange="addAtt('+s.id+',this)" accept="image/*,.pdf,.doc,.docx">➕ إضافة مرفق</label></div>';
  return h;

function addAtt(sid, input) {
  var file = input.files[0]; if (!file) return;
  var s = data.find(function(x){return x.id===sid;}); if (!s) return;
  var r = new FileReader();
  r.onload = function(e) {
    if (!s.attachments) s.attachments = [];
    s.attachments.push({name:file.name, type:file.type.startsWith('image')?'image':'doc', data:e.target.result});
    dbPut(s).then(function(){toast('📎 تم إضافة المرفق');openDet(sid);});
  };
  r.readAsDataURL(file);
}
function delAtt(sid, idx) {
  var s = data.find(function(x){return x.id===sid;}); if (!s) return;
  s.attachments.splice(idx,1);
  dbPut(s).then(function(){toast('✅ تم الحذف');openDet(sid);});
}

// ── WEEK VIEW ──
function rWeek() {
  var now = new Date();
  var start = new Date(now); start.setDate(now.getDate() - now.getDay());
  var end = new Date(start); end.setDate(start.getDate()+6);
  var next7 = [];
  for (var i=0;i<7;i++) { var d=new Date(now); d.setDate(now.getDate()+i); next7.push(d.toISOString().split('T')[0]); }
  var weekData = data.filter(function(s){return next7.indexOf(s.date)>-1;}).sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time);});
  var h = shdr('📅','جلسات الأسبوع القادم (7 أيام)');
  if (!weekData.length) return h+'<div class="empty"><div class="ei">📅</div><div class="et">لا توجد جلسات هذا الأسبوع</div></div>';
  var byDate = {};
  weekData.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  Object.keys(byDate).sort().forEach(function(d){
    h += '<div style="background:var(--gold-dim);border:1px solid var(--gold-rim);border-radius:10px;padding:7px 12px;margin-bottom:7px;font-size:12px;font-weight:700;color:var(--gold2)">'+fmtL(d)+' ('+byDate[d].length+' جلسة)</div>';
    byDate[d].forEach(function(s){h+=card(s);});
  });
  return h;
}

function importData(input) {
  var file = input.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(e) {
    try {
      var parsed = JSON.parse(e.target.result);
      if (!parsed.sessions) { toast('⚠️ ملف غير صالح'); return; }
      if (!confirm('سيتم استبدال جميع البيانات الحالية. هل أنت متأكد؟')) return;
      data = parsed.sessions || [];
      tasks = parsed.tasks || [];
      contacts = parsed.contacts || [];
      Promise.all(data.map(function(s){return dbPut(s);})).then(function(){
        saveTasks(); saveContacts();
        toast('✅ تم استيراد '+data.length+' جلسة');
        render();
      });
    } catch(err) { toast('⚠️ خطأ في قراءة الملف'); }
  };
  r.readAsText(file);
}

// ── GLOBAL SEARCH ──
function rGlobalSearch(qry) {
  if (!qry || qry.trim().length < 2) return '<div class="empty"><div class="ei">🔍</div><div class="et">ابحث في كل شيء</div><div class="es">أدخل كلمتين على الأقل</div></div>';
  var q2 = qry.trim();

  var tRes = tasks.filter(function(t){return t.title.includes(q2)||(t.caseNum&&t.caseNum.includes(q2));});
  var cRes = contacts.filter(function(c){return c.name.includes(q2)||(c.caseNum&&c.caseNum.includes(q2));});
  var total = sRes.length + tRes.length + cRes.length;
  if (!total) return '<div class="empty"><div class="ei">🔍</div><div class="et">لا توجد نتائج</div></div>';
  var h = '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">'+total+' نتيجة لـ "'+q2+'"</div>';
  if (sRes.length) { h += shdr('⚖️','الجلسات ('+sRes.length+')'); sRes.forEach(function(s){h+=card(s);}); }
  if (tRes.length) {
    h += shdr('📋','المهمات ('+tRes.length+')');
    tRes.forEach(function(t){h+='<div style="background:var(--card);border:1px solid var(--rim);border-radius:13px;padding:11px;margin-bottom:7px"><div style="font-size:13px;font-weight:600;color:var(--text)">'+t.title+'</div>'+(t.caseNum?'<div style="font-size:10px;color:var(--text3);margin-top:4px">📋 '+t.caseNum+'</div>':'')+'</div>';});
  }
  if (cRes.length) {
    h += shdr('👤','الأطراف ('+cRes.length+')');
    cRes.forEach(function(c){h+='<div style="background:var(--card);border:1px solid var(--rim);border-radius:13px;padding:11px;margin-bottom:7px"><div style="font-size:13px;font-weight:600;color:var(--text)">'+c.name+'</div><div style="font-size:10px;color:var(--text3);margin-top:4px">'+c.role+(c.caseNum?' · 📋 '+c.caseNum:'')+'</div></div>';});
  }
  return h;
}

function fullBackup() {
  var payload = {
    version: 2,
    date: new Date().toISOString(),
    sessions: data,
    tasks: tasks,
    contacts: contacts,
    theme: localStorage.getItem('j_theme') || 'night',
    ctheme: localStorage.getItem('j_ctheme') || '0'
  };
  var json = JSON.stringify(payload, null, 2);
  var blob = new Blob([json], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'جلسات_backup_' + today() + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('💾 تم حفظ النسخة الاحتياطية');
}

function fullRestore(input) {
  var file = input.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(e) {
    try {
      var p = JSON.parse(e.target.result);
      if (!p.sessions) { toast('⚠️ ملف غير صالح'); return; }
      var msg = 'سيتم استعادة:\n' +
        '• ' + (p.sessions||[]).length + ' جلسة\n' +
        '• ' + (p.tasks||[]).length + ' مهمة\n' +
        '• ' + (p.contacts||[]).length + ' طرف\n\n' +
        'هل تريد المتابعة؟';
      if (!confirm(msg)) return;
      data = p.sessions || [];
      tasks = p.tasks || [];
      contacts = p.contacts || [];
      if (p.theme) localStorage.setItem('j_theme', p.theme);
      if (p.ctheme) localStorage.setItem('j_ctheme', p.ctheme);
      Promise.all(data.map(function(s){return dbPut(s);})).then(function() {
        saveTasks();
        saveContacts();
        toast('✅ تم الاسترداد: ' + data.length + ' جلسة، ' + tasks.length + ' مهمة');
        applyTheme();
        render();
      });
    } catch(err) {
      toast('⚠️ خطأ في قراءة الملف');
    }
  };
  r.readAsText(file);
}

// ── FOLDERS & FILES ──
var wordFiles = [];
var folders = [];
var curFolder = null; // null = عرض المجلدات، string = داخل مجلد

try { wordFiles = JSON.parse(localStorage.getItem('j_wordfiles') || '[]'); } catch(e) { wordFiles = []; }
try { folders = JSON.parse(localStorage.getItem('j_folders') || '["عام","عقود","أحكام","مذكرات","صور"]'); } catch(e) { folders = ["عام","عقود","أحكام","مذكرات","صور"]; }

function saveWordFiles() { try { localStorage.setItem('j_wordfiles', JSON.stringify(wordFiles)); } catch(e) { toast('⚠️ المساحة ممتلئة'); } }
function saveFolders() { try { localStorage.setItem('j_folders', JSON.stringify(folders)); } catch(e) {} }

function uploadWordFile(input) {
  var file = input.files[0]; if (!file) return;
  var allowed = ['.doc','.docx','.pdf','.txt','.xls','.xlsx','.png','.jpg','.jpeg'];
  var ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
  if (allowed.indexOf(ext) === -1) { toast('⚠️ صيغة غير مدعومة'); return; }
  if (file.size > 10*1024*1024) { toast('⚠️ الحجم أكبر من 10MB'); return; }
  var r = new FileReader();
  r.onload = function(e) {
    wordFiles.unshift({
      id: Date.now(),
      name: file.name,
      size: file.size,
      type: ext,
      date: new Date().toLocaleDateString('ar-SA'),
      folder: curFolder || 'عام',
      data: e.target.result
    });
    saveWordFiles();
    toast('✅ تم رفع: ' + file.name + ' في ' + (curFolder||'عام'));
    render();
  };
  r.readAsDataURL(file);
}

function downloadWordFile(id) {
  var f = wordFiles.find(function(x){return x.id===id;}); if (!f) return;
  var a = document.createElement('a');
  a.href = f.data; a.download = f.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('📥 جاري تحميل: ' + f.name);
}

function deleteWordFile(id) {
  if (!confirm('حذف الملف نهائياً؟')) return;
  wordFiles = wordFiles.filter(function(x){return x.id!==id;});
  saveWordFiles(); toast('🗑️ تم الحذف'); render();
}

function moveFile(id, folder) {
  var f = wordFiles.find(function(x){return x.id===id;}); if (!f) return;
  f.folder = folder;
  saveWordFiles(); toast('📂 تم النقل إلى: ' + folder); render();
}

function addFolder() {
  var name = prompt('اسم المجلد الجديد:');
  if (!name || !name.trim()) return;
  if (folders.indexOf(name.trim()) > -1) { toast('⚠️ المجلد موجود'); return; }
  folders.push(name.trim()); saveFolders();
  toast('📂 تم إنشاء مجلد: ' + name.trim()); render();
}

function deleteFolder(name) {
  if (name === 'عام') { toast('⚠️ لا يمكن حذف المجلد العام'); return; }
  var count = wordFiles.filter(function(f){return f.folder===name;}).length;
  if (count > 0) {
    if (!confirm('المجلد يحتوي على '+count+' ملف. سيتم نقلها للمجلد العام. متابعة؟')) return;
    wordFiles.forEach(function(f){if(f.folder===name)f.folder='عام';});
    saveWordFiles();
  }
  folders = folders.filter(function(x){return x!==name;});
  saveFolders(); if (curFolder===name) curFolder=null;
  toast('🗑️ تم حذف المجلد'); render();
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

function fileIcon(ext) {
  var icons = {'.doc':'📄','.docx':'📄','.pdf':'📕','.txt':'📝','.xls':'📊','.xlsx':'📊','.png':'🖼️','.jpg':'🖼️','.jpeg':'🖼️'};
  return icons[ext] || '📎';
}

function folderColor(name) {
  var colors = {'عام':'#60a5fa','عقود':'#fbbf24','أحكام':'#f87171','مذكرات':'#34d399','صور':'#a78bfa'};

    h += '<div style="background:var(--ink3);border:1px solid var(--rim2);border-radius:13px;padding:11px">' +

function renderFilesList(files) {
  if (!files.length) return '<div class="empty"><div class="ei">🔍</div><div class="et">لا توجد نتائج</div></div>';
  return files.map(function(f) {
    var moveOptions = folders.filter(function(x){return x!==f.folder;}).map(function(folder){
      return '<option value="'+folder+'">📂 '+folder+'</option>';
    }).join('');
    return '<div style="background:var(--card);border:1px solid var(--rim);border-radius:14px;padding:13px;margin-bottom:8px">' +
      '<div style="display:flex;align-items:center;gap:10px">' +
      '<div style="width:44px;height:44px;border-radius:11px;background:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+fileIcon(f.type)+'</div>' +
      '<div style="flex:1;min-width:0">' +
      '<div style="font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.name+'</div>' +
      '<div style="display:flex;gap:8px;margin-top:3px">' +
      '<span style="font-size:10px;color:var(--text3)">📅 '+f.date+'</span>' +
      '<span style="font-size:10px;color:var(--text3)">💽 '+fmtSize(f.size)+'</span></div></div>' +
      '<div style="display:flex;gap:5px;flex-shrink:0">' +
      '<button onclick="downloadWordFile('+f.id+')" style="width:32px;height:32px;border-radius:8px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-rim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">📥</button>' +
      '<button onclick="deleteWordFile('+f.id+')" style="width:32px;height:32px;border-radius:8px;background:var(--red-bg);color:#f87171;border:1px solid var(--red-rim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center">🗑️</button>' +
      '</div></div>' +
      (moveOptions ? '<div style="margin-top:8px;display:flex;align-items:center;gap:7px"><span style="font-size:10px;color:var(--text3)">نقل إلى:</span><select onchange="moveFile('+f.id+',this.value)" style="flex:1;background:var(--ink3);border:1px solid var(--rim2);border-radius:8px;padding:5px 8px;font-size:11px;color:var(--text)"><option value="">اختر مجلد...</option>'+moveOptions+'</select></div>' : '') +
      '</div>';
  }).join('');
}

function filterFiles(q, folder) {
  var filtered = wordFiles.filter(function(f){return f.folder===folder && f.name.toLowerCase().includes(q.toLowerCase());});
  var el = document.getElementById('filesList');
  if (el) el.innerHTML = renderFilesList(filtered);
}

// ── AI LEGAL ASSISTANT ──
var aiMessages = [];
try { aiMessages = JSON.parse(localStorage.getItem('j_aimsg') || '[]'); } catch(e) { aiMessages = []; }
var aiLoading = false;

function saveAIMsgs() { try { localStorage.setItem('j_aimsg', JSON.stringify(aiMessages.slice(-50))); } catch(e) {} }

var AI_SYSTEM = 'اسمك سعود، مستشار قانوني ذكي متخصص في القانون السعودي والخليجي. تساعد المحامين والمتقاضين في الأسئلة القانونية. أجب بشكل واضح ومختصر باللغة العربية. عرّف نفسك دائماً باسم سعود. نبّه دائماً أن إجاباتك للتوجيه العام وليست استشارة قانونية رسمية. إذا كان السؤال خارج نطاق القانون أجب بأدب.';

var AI_QUICK = [
  'ما هي مدة التقادم في القضايا المدنية؟',
  'كيف أرفع دعوى تجارية؟',
  'ما هي شروط صحة العقد؟',
  'ما الفرق بين الاستئناف والنقض؟',
  'كيف أُنفّذ حكماً قضائياً؟',
  'ما هي حقوق المتهم في القانون السعودي؟'
];

function rAI() {
  var h = '<div style="display:flex;flex-direction:column;height:calc(100vh - 140px - var(--safe-top) - var(--safe-bottom))">';

  // Header
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">' +
    '<div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🤖</div>' +
    '<div><div style="font-family:Amiri,serif;font-size:17px;color:var(--gold2)">المستشار القانوني الذكي</div>' +
    '<div style="font-size:10px;color:var(--text3)">مدعوم بالذكاء الاصطناعي · للتوجيه العام فقط</div></div>' +
    '<button onclick="clearAI()" style="margin-right:auto;background:none;color:var(--text3);font-size:11px;cursor:pointer;border:1px solid var(--rim2);border-radius:8px;padding:5px 9px">مسح</button></div>';

  // Chat area
  h += '<div id="ai-chat" style="flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch">';

  if (!aiMessages.length) {
    h += '<div style="text-align:center;padding:20px 0">' +
      '<div style="font-size:40px;margin-bottom:10px">🟢</div>' +
      '<div style="font-size:14px;font-weight:700;color:var(--text2);margin-bottom:6px">مرحباً! أنا سعود مستشارك القانوني</div>' +
      '<div style="font-size:11px;color:#10a37f;margin-bottom:16px">مدعوم بـ ChatGPT-4o من OpenAI</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center">';
    AI_QUICK.forEach(function(q) {
      h += '<button onclick="sendAI(\''+q+'\')" style="background:var(--gold-dim);color:var(--gold2);border:1px solid var(--gold-rim);border-radius:18px;padding:7px 12px;font-size:11px;cursor:pointer">'+q+'</button>';
    });
    h += '</div></div>';
  } else {
    aiMessages.forEach(function(m) {
      if (m.role === 'user') {
        h += '<div style="display:flex;justify-content:flex-start;margin-bottom:10px">' +
          '<div style="background:var(--gold-dim);border:1px solid var(--gold-rim);border-radius:16px 16px 4px 16px;padding:10px 13px;max-width:82%;font-size:12px;color:var(--text);line-height:1.5">'+m.content+'</div></div>';
      } else {
        h += '<div style="display:flex;justify-content:flex-end;margin-bottom:10px;gap:7px">' +
          '<div style="background:var(--card);border:1px solid var(--rim2);border-radius:16px 16px 16px 4px;padding:10px 13px;max-width:86%;font-size:12px;color:var(--text);line-height:1.6">'+m.content.replace(/\n/g,'<br>')+'</div>' +
          '<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#10a37f,#1a7f5a);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:auto">🟢</div></div>';
      }
    });
    if (aiLoading) {
      h += '<div style="display:flex;justify-content:flex-end;margin-bottom:10px;gap:7px">' +
        '<div style="background:var(--card);border:1px solid var(--rim2);border-radius:16px;padding:12px 16px;font-size:18px">💭 ...</div>' +
        '<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:auto">🤖</div></div>';
    }
  }
  h += '</div>';

  // Quick suggestions (when has messages)
  if (aiMessages.length > 0 && !aiLoading) {
    h += '<div style="display:flex;gap:6px;overflow-x:auto;padding:8px 0;-webkit-overflow-scrolling:touch">';
    AI_QUICK.slice(0,3).forEach(function(q) {
      h += '<button onclick="sendAI(\''+q+'\')" style="flex-shrink:0;background:var(--ink3);color:var(--text3);border:1px solid var(--rim2);border-radius:16px;padding:6px 10px;font-size:10px;cursor:pointer;white-space:nowrap">'+q+'</button>';
    });
    h += '</div>';
  }

  // Input
  h += '<div style="display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--rim)">' +
    '<textarea id="ai-input" placeholder="اسأل سؤالاً قانونياً..." dir="rtl" rows="2" style="flex:1;background:var(--ink3);border:1.5px solid var(--rim2);border-radius:13px;padding:10px 12px;font-size:13px;color:var(--text);resize:none;line-height:1.5" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendAIInput();}"></textarea>' +
    '<button onclick="sendAIInput()" style="width:44px;height:44px;border-radius:13px;background:var(--gold);color:var(--ink);font-size:18px;cursor:pointer;flex-shrink:0;align-self:flex-end;display:flex;align-items:center;justify-content:center;font-weight:700">↑</button></div>';

  h += '</div>';
  return h;
}

function sendAIInput() {
  var inp = document.getElementById('ai-input');
  if (!inp || !inp.value.trim()) return;
  sendAI(inp.value.trim());
  inp.value = '';
}

function sendAI(msg) {
  if (aiLoading) return;
  aiMessages.push({role:'user', content:msg});
  aiLoading = true;
  render();
  setTimeout(function() {
    var chat = document.getElementById('ai-chat');
    if (chat) chat.scrollTop = chat.scrollHeight;
  }, 50);

  var msgs = [{role:'user', content:msg}];
  if (aiMessages.length > 1) {
    msgs = aiMessages.slice(-6).map(function(m){return {role:m.role,content:m.content};});
  }

  fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer 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'
    },
    body: JSON.stringify({
      model: 'gpt-4o-2024-11-20',
      max_tokens: 1000,
      messages: [{role:'system', content:AI_SYSTEM}].concat(msgs)
    })
  }).then(function(r){return r.json();}).then(function(d){
    var reply = d.choices && d.choices[0] ? d.choices[0].message.content : 'عذراً، حدث خطأ في الاتصال.';
    aiMessages.push({role:'assistant', content:reply});
    saveAIMsgs();
    aiLoading = false;
    render();
    setTimeout(function() {
      var chat = document.getElementById('ai-chat');
      if (chat) chat.scrollTop = chat.scrollHeight;
    }, 50);
  }).catch(function(){
    aiMessages.push({role:'assistant', content:'⚠️ تعذّر الاتصال. تأكد من اتصالك بالإنترنت وحاول مجدداً.'});
    aiLoading = false;
    render();
  });
}

function clearAI() {
  if (!confirm('مسح سجل المحادثة؟')) return;
  aiMessages = [];
  saveAIMsgs();
  render();
}
