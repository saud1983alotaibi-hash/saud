<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="الجلسات">
<meta name="theme-color" content="#0a0e17">
<title>الجلسات القضائية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0e17;--ink2:#111827;--ink3:#1a2233;
  --card:#1c2540;--card2:#222d48;
  --rim:rgba(255,255,255,0.07);--rim2:rgba(255,255,255,0.12);
  --gold:#c9a84c;--gold2:#e8c870;--gold-dim:rgba(201,168,76,0.15);--gold-rim:rgba(201,168,76,0.3);
  --text:#eef2ff;--text2:#94a3c0;--text3:#5a6a88;
  --safe-top:env(safe-area-inset-top,44px);--safe-bottom:env(safe-area-inset-bottom,20px);
  --s-blue:#3b82f6;--s-blue-bg:rgba(59,130,246,0.12);--s-blue-rim:rgba(59,130,246,0.3);
  --s-amber:#f59e0b;--s-amber-bg:rgba(245,158,11,0.12);--s-amber-rim:rgba(245,158,11,0.3);
  --s-green:#10b981;--s-green-bg:rgba(16,185,129,0.12);--s-green-rim:rgba(16,185,129,0.3);
  --s-red:#ef4444;--s-red-bg:rgba(239,68,68,0.12);--s-red-rim:rgba(239,68,68,0.3);
  --p-high:#ef4444;--p-med:#f59e0b;--p-low:#10b981;--p-none:#3b82f6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--ink);overflow:hidden;font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--text);direction:rtl;}
::-webkit-scrollbar{display:none;}
button,input,select,textarea{font-family:'IBM Plex Sans Arabic',sans-serif;border:none;outline:none;}
input[type=date],input[type=time]{-webkit-appearance:none;color:var(--text);color-scheme:dark;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--ink);}
#hdr{flex-shrink:0;padding-top:var(--safe-top);background:var(--ink);position:relative;z-index:40;}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 14px;}
.hdr-left{display:flex;flex-direction:column;}
.hdr-eyebrow{font-size:11px;color:var(--text3);letter-spacing:0.08em;margin-bottom:3px;}
.hdr-title{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--gold2);line-height:1.2;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.btn-new{display:flex;align-items:center;gap:6px;background:var(--gold);color:var(--ink);border-radius:14px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(201,168,76,0.35);transition:transform .1s;}
.btn-new:active{transform:scale(0.96);}
.btn-icon{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--rim2);color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.btn-icon.on{background:var(--gold-dim);border-color:var(--gold-rim);color:var(--gold2);}
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold-rim),transparent);margin:0 20px;}
.tab-strip{display:flex;padding:10px 10px 0;gap:4px;background:var(--ink);}
.tab-pill{flex:1;padding:9px 4px;border-radius:12px;background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:background .15s,color .15s;border:1px solid transparent;}
.tab-pill.active{background:var(--gold-dim);color:var(--gold2);border-color:var(--gold-rim);}
.tab-pip{width:4px;height:4px;border-radius:50%;background:currentColor;opacity:0;}
.tab-pill.active .tab-pip{opacity:1;}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px calc(20px + var(--safe-bottom));}
.toast{position:fixed;bottom:calc(30px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--gold-rim);border-radius:14px;padding:10px 20px;font-size:13px;font-weight:600;color:var(--gold2);z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* STATS */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-c{background:var(--card);border:1px solid var(--rim);border-radius:18px;padding:16px 14px;position:relative;overflow:hidden;}
.stat-c::before{content:'';position:absolute;top:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent-clr,var(--gold));opacity:0.06;filter:blur(20px);}
.stat-emoji{font-size:22px;margin-bottom:8px;}
.stat-num{font-size:32px;font-weight:700;line-height:1;}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:5px;font-weight:500;}
/* PRIORITY */
.p-high{border-right:4px solid var(--p-high)!important;}
.p-med{border-right:4px solid var(--p-med)!important;}
.p-low{border-right:4px solid var(--p-low)!important;}
.p-none{border-right:4px solid var(--p-none)!important;}
.priority-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;}
.priority-tag.high{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
.priority-tag.med{background:rgba(245,158,11,0.12);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
.priority-tag.low{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.priority-tag.none{background:rgba(59,130,246,0.12);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);}
/* SESSION CARD */
.s-card{background:var(--card);border:1px solid var(--rim);border-radius:18px;padding:16px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden;transition:transform .1s,border-color .15s;}
.s-card:active{transform:scale(0.985);border-color:var(--gold-rim);}
.s-card-accent{position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 18px 18px 0;}
.s-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.s-num{font-family:'Amiri',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.s-type{font-size:11px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px;}
.s-time{font-size:22px;font-weight:700;color:var(--text);text-align:left;font-variant-numeric:tabular-nums;}
.s-date{font-size:11px;color:var(--text3);text-align:left;margin-top:2px;}
.s-parties{font-size:12px;color:var(--text2);background:var(--ink3);border-radius:10px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.s-sep{color:var(--text3);flex-shrink:0;}
.s-footer{display:flex;justify-content:space-between;align-items:center;}
.s-court{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px;}
/* COUNTDOWN */
.countdown-box{margin-top:10px;background:var(--ink3);border:1px solid var(--rim2);border-radius:12px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.countdown-box.urgent{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.08);}
.countdown-box.soon{border-color:rgba(245,158,11,0.4);background:rgba(245,158,11,0.08);}
.countdown-box.ok{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.06);}
.cd-label{font-size:11px;color:var(--text3);font-weight:500;}
.cd-timer{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:0.04em;}
.cd-timer.urgent{color:#f87171;}.cd-timer.soon{color:#fbbf24;}.cd-timer.ok{color:#34d399;}
/* OVERLAY */
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
.overlay.hidden{display:none;}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.sheet{position:relative;background:var(--card);border-radius:24px 24px 0 0;border-top:1px solid var(--rim2);max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(20px,var(--safe-bottom));}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--rim2);margin:14px auto 16px;}
.sheet-hdr{position:sticky;top:0;background:var(--card);padding:0 20px 14px;border-bottom:1px solid var(--rim);z-index:1;}
.sheet-hdr-inner{display:flex;justify-content:space-between;align-items:center;}
.sheet-title{font-family:'Amiri',serif;font-size:22px;font-weight:700;color:var(--gold2);}
.sheet-close{width:32px;height:32px;border-radius:10px;background:var(--ink3);color:var(--text3);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* FORM */
.field{margin-bottom:16px; padding:0 20px;}
.field label{display:block;font-size:12px;color:var(--text3);font-weight:600;margin-bottom:7px;letter-spacing:0.03em;}
.field input,.field select,.field textarea{width:100%;background:var(--ink3);border:1.5px solid var(--rim2);border-radius:14px;padding:13px 14px;font-size:14px;color:var(--text);display:block;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-rim);}
.btn-gold{width:calc(100% - 40px);margin:10px 20px;background:var(--gold);color:var(--ink);border-radius:16px;padding:16px;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,0.3);}
.hidden{display:none!important;}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-inner">
      <div class="hdr-left">
        <div class="hdr-eyebrow">⚖️ منظومة المحاكم</div>
        <div class="hdr-title">الجلسات القضائية</div>
        <div class="hdr-sub" id="hdr-date"></div>
      </div>
      <div class="hdr-actions">
        <button class="btn-new" onclick="openAdd()"><span style="font-size:16px;line-height:1">+</span> جديدة</button>
      </div>
    </div>
    <div class="gold-divider"></div>
    <div class="tab-strip">
      <button class="tab-pill active" id="tab-home" onclick="switchTab('home')"><div class="tab-pip"></div>الرئيسية</button>
      <button class="tab-pill" id="tab-list" onclick="switchTab('list')"><div class="tab-pip"></div>الجلسات</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div class="overlay hidden" id="form-sheet">
  <div class="ov-bg" onclick="closeForm()"></div>
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-hdr"><div class="sheet-hdr-inner"><div class="sheet-title">جلسة جديدة</div><button class="sheet-close" onclick="closeForm()">✕</button></div></div>
    <div class="sheet-body" style="padding-top:15px;">
      <div class="field"><label>رقم القضية *</label><input id="f-num" type="text" placeholder="2026/000"></div>
      <div class="field"><label>المحكمة *</label><input id="f-court" type="text" placeholder="اسم المحكمة والدائرة"></div>
      <div class="field"><label>المدعي</label><input id="f-plnt" type="text"></div>
      <div class="field"><label>المدعى عليه</label><input id="f-dfnd" type="text"></div>
      <div style="display:flex; gap:10px; padding:0 20px;">
        <div class="field" style="flex:1; padding:0;"><label>التاريخ *</label><input id="f-date" type="date"></div>
        <div class="field" style="flex:1; padding:0;"><label>الوقت *</label><input id="f-time" type="time"></div>
      </div>
      <button class="btn-gold" onclick="saveS()">حفظ الجلسة</button>
    </div>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('saud_law_app') || '[]');
let currentTab = 'home';

function switchTab(t) {
    currentTab = t;
    document.getElementById('tab-home').classList.toggle('active', t==='home');
    document.getElementById('tab-list').classList.toggle('active', t==='list');
    render();
}

function openAdd() { document.getElementById('form-sheet').classList.remove('hidden'); }
function closeForm() { document.getElementById('form-sheet').classList.add('hidden'); }

function saveS() {
    const s = {
        id: Date.now(),
        num: document.getElementById('f-num').value,
        court: document.getElementById('f-court').value,
        plnt: document.getElementById('f-plnt').value,
        dfnd: document.getElementById('f-dfnd').value,
        date: document.getElementById('f-date').value,
        time: document.getElementById('f-time').value
    };
    if(!s.num || !s.date || !s.court) return alert("يرجى إكمال البيانات الأساسية");
    data.push(s);
    localStorage.setItem('saud_law_app', JSON.stringify(data));
    closeForm();
    render();
}

function render() {
    const container = document.getElementById('content');
    container.innerHTML = '';
    const today = new Date().toISOString().split('T')[0];
    
    let list = (currentTab === 'home') ? data.filter(s => s.date === today) : data;
    
    if(list.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text3);">لا توجد جلسات حالياً</div>';
        return;
    }

    list.forEach(s => {
        const card = document.createElement('div');
        card.className = 's-card p-none';
        card.innerHTML = `
            <div class="s-card-top">
                <div class="s-num">${s.num}</div>
                <div style="text-align:left"><div class="s-time">${s.time}</div><div class="s-date">${s.date}</div></div>
            </div>
            <div class="s-parties">${s.plnt} <span class="s-sep">ضد</span> ${s.dfnd}</div>
            <div class="s-footer">
                <div class="s-court">🏫 ${s.court}</div>
                <button onclick="del(${s.id})" style="background:none; color:var(--text3); font-size:10px;">[حذف]</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function del(id) {
    if(confirm('هل تريد حذف الجلسة؟')) {
        data = data.filter(s => s.id !== id);
        localStorage.setItem('saud_law_app', JSON.stringify(data));
        render();
    }
}

document.getElementById('hdr-date').textContent = new Date().toLocaleDateString('ar-SA', {weekday:'long', day:'numeric', month:'long'});
render();
</script>
</body>
</html>
