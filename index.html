<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مكتب المحامي سعود العتيبي - النسخة الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --gold: #AF9500; --dark-blue: #1A2B48; --ios-blue: #007AFF;
            --ios-bg: #F8F9FA; --card-bg: #FFFFFF; --text-dark: #2C3E50;
        }
        body { background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: var(--text-dark); transition: 0.3s; }
        
        /* شاشة القفل الفاخرة */
        #lock-screen { position: fixed; inset: 0; background: var(--dark-blue); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .lock-logo { font-size: 50px; margin-bottom: 20px; }
        .pass-container { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 25px; backdrop-filter: blur(10px); width: 80%; max-width: 320px; text-align: center; }

        /* الهيدر */
        .header { position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); padding: 50px 20px 20px; z-index: 100; border-bottom: 1px solid #E1E4E8; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; margin: 0; color: var(--dark-blue); font-weight: 800; }

        /* لوحة التحكم (Dashboard) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; }
        .stat-card { background: var(--dark-blue); color: white; padding: 15px; border-radius: 18px; text-align: center; box-shadow: 0 5px 15px rgba(26,43,72,0.2); }
        .stat-card span { font-size: 11px; opacity: 0.8; display: block; margin-bottom: 5px; }
        .stat-card b { font-size: 18px; color: var(--gold); }

        .container { padding: 0 20px 100px; display: none; }

        /* بطاقة القضية */
        .case-card { background: var(--card-bg); border-radius: 22px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid #EEE; position: relative; overflow: hidden; }
        .case-card::before { content: ''; position: absolute; top: 0; right: 0; width: 6px; height: 100%; background: var(--gold); }
        .case-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .case-title { font-size: 17px; font-weight: 700; color: var(--dark-blue); }

        /* التفاصيل الإدارية */
        .info-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .pill { font-size: 11px; padding: 6px 12px; border-radius: 10px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .pill-red { background: #FFF0F0; color: #FF3B30; }
        .pill-green { background: #F0FFF4; color: #34C759; }
        .pill-blue { background: #F0F7FF; color: var(--ios-blue); }

        /* مصفوفة الاستراتيجية */
        .strategy-map { background: #F8F9FA; border-radius: 15px; padding: 12px; margin-top: 10px; }
        .strategy-line { font-size: 12px; margin-bottom: 8px; line-height: 1.5; }
        .strategy-line b { color: var(--dark-blue); display: block; margin-bottom: 2px; }

        /* الأزرار */
        .btn-prime { background: var(--dark-blue); color: white; border: none; padding: 16px; border-radius: 16px; font-weight: 700; width: 100%; font-size: 16px; box-shadow: 0 4px 12px rgba(26,43,72,0.3); }
        .action-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn-icon { background: #F0F2F5; border: none; padding: 10px; border-radius: 12px; font-size: 12px; font-weight: 600; color: var(--dark-blue); transition: 0.2s; }
        .btn-icon:active { transform: scale(0.95); background: #E2E5E9; }

        input, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #E1E4E8; border-radius: 14px; font-size: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }

        .form-section { background: white; padding: 25px; border-radius: 25px; margin-bottom: 25px; border: 1px solid #EEE; }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-logo">⚖️</div>
    <div class="pass-container">
        <h3 style="margin:0 0 20px 0;">مكتب المحامي سعود</h3>
        <input type="password" id="pass-input" placeholder="كلمة المرور" style="text-align:center; background:rgba(255,255,255,0.9); border:none;">
        <button class="btn-prime" onclick="unlock()" style="background:var(--gold);">دخول النظام</button>
    </div>
</div>

<div class="header" id="app-header" style="display:none;">
    <h1>المكتب السيادي 🛡️</h1>
    <div style="color:var(--gold); font-size:20px;">⚖️</div>
</div>

<div class="container" id="app-container">
    <div class="stats-grid">
        <div class="stat-card">
            <span>إجمالي القضايا</span>
            <b id="stat-count">0</b>
        </div>
        <div class="stat-card">
            <span>مبالغ التحصيل</span>
            <b id="stat-finance">0</b>
        </div>
    </div>

    <div class="form-section">
        <h3 style="margin:0 0 15px 0; color:var(--dark-blue);">إدراج ملف جديد</h3>
        <input type="text" id="title" placeholder="اسم الموكل / رقم القضية">
        <div style="display:flex; gap:10px;">
            <input type="date" id="jDate" title="تاريخ الحكم">
            <input type="number" id="remaining" placeholder="المبلغ المتبقي">
        </div>
        <textarea id="strategy" placeholder="ملخص الدفوع والاستراتيجية القانونية..." rows="3"></textarea>
        <button class="btn-prime" onclick="saveCase()">اعتماد الملف في القاعدة</button>
    </div>

    <div id="cases-list"></div>
</div>

<script>
    const PWD = "123"; 
    let cases = JSON.parse(localStorage.getItem('saud_vault_v3')) || [];

    function unlock() {
        if(document.getElementById('pass-input').value === PWD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-header').style.display = 'flex';
            document.getElementById('app-container').style.display = 'block';
            updateStats();
            renderCases();
        } else { alert("كلمة المرور غير صحيحة"); }
    }

    function saveCase() {
        const title = document.getElementById('title').value;
        const jDate = document.getElementById('jDate').value;
        const remaining = document.getElementById('remaining').value || 0;
        const strategy = document.getElementById('strategy').value;

        if(!title) return alert("يرجى إدخال اسم الموكل");

        const deadline = jDate ? new Date(jDate) : null;
        if(deadline) deadline.setDate(deadline.getDate() + 30);

        cases.push({
            id: Date.now(), title, strategy, remaining,
            deadline: deadline ? deadline.toISOString().split('T')[0] : 'غير محدد',
            workMinutes: 0
        });

        localStorage.setItem('saud_vault_v3', JSON.stringify(cases));
        updateStats();
        renderCases();
        clearInputs();
    }

    function updateStats() {
        document.getElementById('stat-count').innerText = cases.length;
        const totalRem = cases.reduce((acc, c) => acc + Number(c.remaining), 0);
        document.getElementById('stat-finance').innerText = totalRem.toLocaleString() + " ر.س";
    }

    function renderCases() {
        const list = document.getElementById('cases-list');
        list.innerHTML = cases.map(c => `
            <div class="case-card">
                <div class="case-header">
                    <div class="case-title">${c.title}</div>
                    <div style="color:var(--gold); cursor:pointer;" onclick="deleteCase(${c.id})">🗑</div>
                </div>

                <div class="info-row">
                    <div class="pill pill-red">📅 استئناف: ${c.deadline}</div>
                    <div class="pill pill-green">💰 متبقي: ${c.remaining} ر.س</div>
                </div>

                <div class="strategy-map">
                    <div class="strategy-line"><b>📝 الاستراتيجية القانونية:</b>${c.strategy || 'لا يوجد ملاحظات'}</div>
                </div>

                <div class="action-bar">
                    <button class="btn-icon" onclick="shareWA(${c.id})">🟢 واتساب</button>
                    <button class="btn-icon" onclick="toggleTimer(${c.id})">⏱️ ${c.workMinutes} د</button>
                    <button class="btn-icon" onclick="alert('Case ID: '+${c.id})">🆔 تفاصيل</button>
                </div>
            </div>
        `).join('');
    }

    function toggleTimer(id) {
        const c = cases.find(x => x.id === id);
        const start = confirm("هل تريد بدء احتساب وقت العمل؟");
        if(start) {
            const startTime = Date.now();
            alert("بدأ العمل.. اضغط موافق عند الانتهاء");
            const endTime = Date.now();
            const mins = Math.round((endTime - startTime) / 60000) || 1;
            c.workMinutes += mins;
            localStorage.setItem('saud_vault_v3', JSON.stringify(cases));
            renderCases();
        }
    }

    function shareWA(id) {
        const c = cases.find(x => x.id === id);
        const msg = `⚖️ *ملخص ملف قانوني*\n📌 *الموكل:* ${c.title}\n📅 *موعد الاستئناف:* ${c.deadline}\n💰 *المطالبة المالية:* ${c.remaining} ر.س\n📜 *الاستراتيجية:* ${c.strategy}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
    }

    function deleteCase(id) {
        if(confirm("هل أنت متأكد من أرشفة (حذف) هذا الملف؟")) {
            cases = cases.filter(x => x.id !== id);
            localStorage.setItem('saud_vault_v3', JSON.stringify(cases));
            updateStats();
            renderCases();
        }
    }

    function clearInputs() {
        ['title','jDate','remaining','strategy'].forEach(id => document.getElementById(id).value = '');
    }
</script>
</body>
</html>
