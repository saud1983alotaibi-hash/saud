<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>منظومة المحامي سعود الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* سأستخدم المتغيرات اللونية الفخمة التي اخترتها أنت */
        :root {
            --ink: #0a0e17; --ink2: #111827; --gold: #c9a84c; --gold2: #e8c870;
            --card: #1c2540; --text: #eef2ff; --ai-purple: #5856D6;
        }
        
        /* ميزات إضافية للتصميم */
        body { background: var(--ink); font-family: 'IBM Plex Sans Arabic', sans-serif; color: var(--text); margin: 0; direction: rtl; }
        #app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; }
        
        .header-lux { padding: 60px 20px 20px; background: linear-gradient(to bottom, #1a2233, var(--ink)); border-bottom: 1px solid rgba(201,168,76,0.2); }
        .ai-badge { background: linear-gradient(45deg, var(--ai-purple), #af52de); color: white; padding: 4px 12px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        
        /* بطاقة القضية المطورة */
        .case-card { background: var(--card); border-radius: 20px; padding: 18px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .case-card::before { content: ''; position: absolute; right: 0; top: 20%; height: 60%; width: 4px; background: var(--gold); border-radius: 4px 0 0 4px; }
        
        .ai-response { background: rgba(88, 86, 214, 0.1); border: 1px solid rgba(88, 86, 214, 0.3); border-radius: 12px; padding: 12px; margin-top: 10px; font-size: 13px; line-height: 1.6; display: none; }
        
        /* المدخلات */
        .input-lux { width: 100%; background: #111827; border: 1px solid #222d48; border-radius: 12px; padding: 12px; color: white; margin-bottom: 10px; }
        .btn-gold { background: var(--gold); color: var(--ink); border: none; padding: 15px; border-radius: 14px; width: 100%; font-weight: bold; cursor: pointer; }
        
        #settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; padding: 40px 20px; }
    </style>
</head>
<body>

<div id="app">
    <div class="header-lux">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <div style="color: var(--gold2); font-size: 12px;">مرحباً سعادة المحامي</div>
                <div style="font-family: 'Amiri'; font-size: 24px; font-weight: bold;">سعود العتيبي ⚖️</div>
            </div>
            <button onclick="document.getElementById('settings-overlay').style.display='block'" style="background: none; border: none; font-size: 20px;">⚙️</button>
        </div>
    </div>

    <div style="padding: 20px;">
        <div style="background: #161f35; padding: 20px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.1);">
            <input type="text" id="case-title" class="input-lux" placeholder="اسم الموكل / رقم القضية">
            <textarea id="case-facts" class="input-lux" placeholder="وقائع القضية (للتحليل الذكي)..." rows="3"></textarea>
            <input type="date" id="case-date" class="input-lux">
            <button class="btn-gold" onclick="addCase()">إضافة الملف للمكتب</button>
        </div>
    </div>

    <div id="cases-container"></div>
</div>

<div id="settings-overlay">
    <h2 style="font-family: 'Amiri'; color: var(--gold2);">إعدادات المنظومة</h2>
    <p style="font-size: 12px; color: #888;">أدخل مفتاح Gemini API لتفعيل الذكاء الاصطناعي</p>
    <input type="password" id="api-key" class="input-lux" placeholder="AI API Key">
    <button class="btn-gold" onclick="saveSettings()">حفظ وإغلاق</button>
</div>

<script>
    let cases = JSON.parse(localStorage.getItem('saud_cases_v5')) || [];
    let apiKey = localStorage.getItem('saud_key_v5') || '';

    function saveSettings() {
        apiKey = document.getElementById('api-key').value;
        localStorage.setItem('saud_key_v5', apiKey);
        document.getElementById('settings-overlay').style.display = 'none';
        alert("تم تحديث الإعدادات بنجاح");
    }

    function addCase() {
        const title = document.getElementById('case-title').value;
        const facts = document.getElementById('case-facts').value;
        const date = document.getElementById('case-date').value;

        if(!title) return alert("يرجى إدخال عنوان القضية");

        const newCase = {
            id: Date.now(),
            title, facts, date,
            aiResult: ''
        };

        cases.push(newCase);
        localStorage.setItem('saud_cases_v5', JSON.stringify(cases));
        renderCases();
        document.getElementById('case-title').value = '';
        document.getElementById('case-facts').value = '';
    }

    async function askAI(id) {
        if(!apiKey) return alert("يرجى إدخال مفتاح API في الإعدادات");
        
        const c = cases.find(x => x.id === id);
        const aiBox = document.getElementById(`ai-res-${id}`);
        aiBox.style.display = 'block';
        aiBox.innerHTML = "⏳ جاري استحضار الأنظمة والتحليل...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `أنت مستشار قانوني سعودي خبير. حلل هذه الواقعة واذكر المواد النظامية المناسبة من الأنظمة السعودية: ${c.facts}` }] }] })
            });
            const data = await response.json();
            const result = data.candidates[0].content.parts[0].text;
            c.aiResult = result;
            localStorage.setItem('saud_cases_v5', JSON.stringify(cases));
            renderCases();
        } catch (e) {
            aiBox.innerHTML = "❌ فشل الاتصال بالذكاء الاصطناعي. تحقق من المفتاح.";
        }
    }

    function renderCases() {
        const container = document.getElementById('cases-container');
        container.innerHTML = cases.map(c => `
            <div class="case-card">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div>
                        <div style="font-family: 'Amiri'; font-size: 18px; color: var(--gold2);">${c.title}</div>
                        <div style="font-size: 11px; color: #888; margin-top: 5px;">📅 موعد الجلسة: ${c.date || 'غير محدد'}</div>
                    </div>
                    <span class="ai-badge">AI READY</span>
                </div>
                
                <p style="font-size: 13px; color: #aaa; margin: 12px 0;">${c.facts.substring(0, 100)}...</p>

                <div id="ai-res-${c.id}" class="ai-response" style="${c.aiResult ? 'display:block' : ''}">
                    ${c.aiResult ? '<strong>💡 التحليل القانوني:</strong><br>' + c.aiResult.replace(/\n/g, '<br>') : ''}
                </div>

                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button onclick="askAI(${c.id})" style="flex: 2; background: var(--ai-purple); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer;">✨ استشارة ذكية</button>
                    <button onclick="deleteCase(${c.id})" style="flex: 1; background: rgba(255,68,68,0.1); color: #ff4444; border: 1px solid rgba(255,68,68,0.2); border-radius: 10px; cursor: pointer;">حذف</button>
                </div>
            </div>
        `).join('');
    }

    function deleteCase(id) {
        if(confirm("هل تريد أرشفة هذا الملف؟")) {
            cases = cases.filter(x => x.id !== id);
            localStorage.setItem('saud_cases_v5', JSON.stringify(cases));
            renderCases();
        }
    }

    renderCases();
</script>

</body>
</html>
