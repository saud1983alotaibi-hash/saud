::-webkit-scrollbar{width:0;}
button,input,select,textarea{font-family:inherit;border:none;outline:none;background:none;}
input[type=date],input[type=time]{-webkit-appearance:none;color:var(--text);color-scheme:dark;}

/* ════ Global Background ════ */
#app-bg-logo{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:var(--logo-url);
  background-size:52%;background-repeat:no-repeat;background-position:center 42%;
  opacity:0.038;filter:grayscale(20%) contrast(1.3) brightness(1.1);
}
#app{
  display:flex;flex-direction:column;height:100vh;height:100dvh;
  max-width:430px;margin:0 auto;overflow:hidden;
  background:transparent;position:relative;z-index:1;
}
#app::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% 0%, rgba(200,168,75,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 0% 100%, rgba(74,142,245,0.04) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 100% 50%, rgba(200,168,75,0.03) 0%, transparent 50%);
}

/* ════ Header ════ */
#hdr{
  flex-shrink:0;padding-top:var(--safe-top);
  background:rgba(1,2,4,0.96);
  backdrop-filter:blur(40px) saturate(1.8);
  -webkit-backdrop-filter:blur(40px) saturate(1.8);
  z-index:40;position:relative;
  border-bottom:1px solid rgba(200,168,75,0.15);
  box-shadow:0 1px 30px rgba(0,0,0,0.8), 0 1px 0 rgba(200,168,75,0.08);
}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 9px;gap:8px;}
.hdr-brand{display:flex;flex-direction:row;align-items:center;gap:9px;}
.hdr-eyebrow{display:none;}
.hdr-logo-img{
  height:36px;width:36px;object-fit:contain;
  filter:drop-shadow(0 0 8px rgba(200,168,75,0.55)) drop-shadow(0 0 3px rgba(200,168,75,0.3));
  transition:filter .3s;
}
.hdr-logo-img:hover{filter:drop-shadow(0 0 14px rgba(200,168,75,0.9));}
.hdr-brand-text{display:flex;flex-direction:column;}
.hdr-title{
  font-family:'Scheherazade New',serif;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,#f2d98a 0%,#c8a84b 50%,#e4c46a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;letter-spacing:0.03em;
}
.hdr-date{font-size:9px;color:var(--text3);margin-top:1px;letter-spacing:0.02em;}
.hdr-actions{display:flex;gap:4px;align-items:center;flex-shrink:0;}

/* ════ Header Buttons ════ */
.hdr-tools-btn,.btn-icon{
  width:32px;height:32px;border-radius:10px;
  background:rgba(180,150,80,0.06);
  border:1px solid rgba(180,150,80,0.12);
  color:var(--text3);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.btn-icon:active,.hdr-tools-btn:active{transform:scale(.88);background:var(--gold-a10);border-color:var(--gold-a20);}
.btn-icon.active{background:var(--gold-a20);border-color:var(--gold-a30);color:var(--gold2);}
.btn-new{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,#d4a840,#8a6020);
  color:#030201;border-radius:11px;padding:7px 12px;
  font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;
  box-shadow:0 2px 16px rgba(200,168,75,0.45),0 0 0 1px rgba(200,168,75,0.2);
  transition:all .15s;letter-spacing:.01em;
}
.btn-new:active{transform:scale(.93);box-shadow:0 1px 8px rgba(200,168,75,0.3);}

/* ════ Tools Dropdown ════ */
.hdr-tools-menu{
  position:absolute;top:calc(100% + 6px);left:0;right:auto;min-width:220px;
  background:rgba(8,10,18,0.97);
  border:1px solid rgba(200,168,75,0.15);
  border-radius:var(--r-lg);padding:8px;z-index:500;
  box-shadow:0 12px 40px rgba(0,0,0,.8),0 0 0 1px rgba(200,168,75,0.06);
  display:none;backdrop-filter:blur(20px);
}
.hdr-tools-menu.open{display:block;animation:fadeInDown .18s ease;}
.hdr-tools-menu-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:10px;cursor:pointer;font-size:12px;font-weight:600;
  color:var(--text2);transition:all .12s;border:none;background:none;
  width:100%;text-align:right;font-family:Tajawal,sans-serif;
}
.hdr-tools-menu-item:hover{background:rgba(200,168,75,0.08);color:var(--text);}
.hdr-tools-menu-item .ti{font-size:15px;width:22px;text-align:center;flex-shrink:0;}
.hdr-tools-divider{height:1px;background:rgba(200,168,75,0.08);margin:4px 4px;}

/* ════ Tabs Bar ════ */
.tabs-scroll{
  display:flex;padding:4px 10px 0;gap:1px;
  overflow-x:auto;background:rgba(1,2,4,0.85);
  scrollbar-width:none;
  border-bottom:1px solid rgba(200,168,75,0.10);
}
.tab{
  flex-shrink:0;padding:6px 13px;border-radius:8px 8px 0 0;
  font-size:10.5px;font-weight:600;color:var(--text3);
  cursor:pointer;transition:all .15s;
  border:1px solid transparent;border-bottom:none;
  white-space:nowrap;position:relative;letter-spacing:.01em;
}
.tab.on{
  background:var(--surface);color:var(--gold2);
  border-color:rgba(200,168,75,0.15);
  text-shadow:0 0 12px rgba(200,168,75,0.4);
}
.tab.on::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:var(--surface);
}
.tab:not(.on):hover{color:var(--text2);background:rgba(200,168,75,0.05);}

/* ════ Bottom Nav ════ */
#bottomNav{
  display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(1,2,4,0.97);
  backdrop-filter:blur(30px) saturate(1.6);
  border-top:1px solid rgba(200,168,75,0.12);
  padding:4px 8px;padding-bottom:max(4px,env(safe-area-inset-bottom));
  flex-direction:row;justify-content:space-around;align-items:center;
  box-shadow:0 -4px 24px rgba(0,0,0,0.6);
}
.bnav-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:5px 8px;border-radius:11px;cursor:pointer;transition:all .15s;
  min-width:44px;border:none;background:none;color:var(--text3);
  font-family:Tajawal,sans-serif;
}
.bnav-btn.on{color:var(--gold2);background:var(--gold-a10);}
.bnav-btn .bnav-ico{font-size:19px;line-height:1;}
.bnav-btn .bnav-lbl{font-size:8px;font-weight:700;white-space:nowrap;}
.bnav-fab{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#d4a840,#8a6020);
  color:#030201;font-size:20px;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 20px rgba(200,168,75,0.6),0 0 0 2px rgba(200,168,75,0.15);
  transition:transform .15s;flex-shrink:0;
}
.bnav-fab:active{transform:scale(.88);}
@media(max-width:600px){
  #bottomNav{display:flex;}
  #cnt{padding-bottom:calc(74px + env(safe-area-inset-bottom)) !important;}
  .tabs-scroll{display:none;}
}

/* ════ Main Content ════ */
#cnt{
  flex:1;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:14px 13px calc(16px + var(--safe-bottom));
  background:var(--surface);position:relative;
}

/* ════ Section Header ════ */
.sec-hdr{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;color:var(--text2);
  margin-bottom:10px;margin-top:8px;
  text-transform:uppercase;letter-spacing:.08em;
}
.sec-hdr::before{
  content:'';width:2px;height:12px;
  background:linear-gradient(180deg,var(--gold2),rgba(200,168,75,.15));
  border-radius:1px;
}
.sec-hdr::after{content:'';flex:1;height:1px;background:var(--border);}

/* ════ Session Card ════ */
.s-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:var(--r-md);padding:13px;margin-bottom:7px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all .15s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--card-shadow);
}
.s-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(200,168,75,.025) 0%,transparent 50%);
  pointer-events:none;
}
.s-card:hover{
  border-color:rgba(200,168,75,0.2);
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(0,0,0,.7),0 0 0 1px rgba(200,168,75,0.08);
}
.s-card:active{transform:scale(.985);border-color:var(--gold-a20);}
.s-card-accent{position:absolute;top:0;right:0;width:3px;height:100%;border-radius:0 var(--r-md) var(--r-md) 0;}
.s-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.s-card-num{font-family:'Scheherazade New',serif;font-size:15px;font-weight:700;color:var(--gold2);}
.s-card-meta{font-size:9.5px;color:var(--text3);margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.s-card-time{text-align:left;}
.s-card-timestr{font-size:19px;font-weight:900;color:var(--text);font-variant-numeric:tabular-nums;line-height:1;}
.s-card-date{font-size:9px;color:var(--text3);margin-top:2px;}
.s-card-parties{
  font-size:10px;color:var(--text2);
  background:rgba(200,168,75,0.04);
  border:1px solid rgba(200,168,75,0.08);
  border-radius:9px;padding:6px 9px;margin-bottom:8px;
  display:flex;align-items:center;gap:5px;
}
.s-card-footer{display:flex;justify-content:space-between;align-items:center;}
.s-card-court{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:3px;}
.s-card-actions{display:flex;align-items:center;gap:5px;}
.btn-cycle{
  background:rgba(200,168,75,0.06);border:1px solid var(--border);
  border-radius:7px;padding:3px 8px;font-size:10px;color:var(--text3);
  cursor:pointer;transition:all .12s;
}
.btn-cycle:active{background:var(--gold-a10);}

/* ════ Stats ════ */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:14px;position:relative;
  overflow:hidden;cursor:pointer;transition:transform .12s;
  box-shadow:var(--card-shadow);
}
.stat-card:active{transform:scale(.96);}
.stat-card::before{
  content:'';position:absolute;top:-24px;right:-24px;
  width:80px;height:80px;border-radius:50%;
  background:var(--sc-clr,var(--gold));opacity:.06;filter:blur(24px);
}
.stat-icon{font-size:16px;margin-bottom:7px;}
.stat-value{font-size:26px;font-weight:900;line-height:1;color:var(--sc-clr,var(--gold2));}
.stat-label{font-size:9.5px;color:var(--text3);margin-top:4px;font-weight:600;}
.stat-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.stat-mini{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:10px 6px;text-align:center;
  transition:transform .1s;cursor:pointer;
}
.stat-mini:active{transform:scale(.96);}
.stat-mini-val{font-size:19px;font-weight:900;}
.stat-mini-lbl{font-size:9px;color:var(--text3);margin-top:3px;}
.bar-chart{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--r-md);padding:12px;margin-bottom:12px;
}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.bar-label{font-size:10px;color:var(--text3);width:68px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;background:var(--surface3);border-radius:4px;height:7px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:10px;font-weight:700;width:20px;}

/* ════ Badges ════ */
.prio-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:9.5px;font-weight:700;border:1px solid;}
.prio-high{background:var(--red-a);color:#f57070;border-color:rgba(224,69,85,.3);}
.prio-med{background:var(--amber-a);color:#f0b040;border-color:rgba(216,144,48,.3);}
.prio-low{background:var(--green-a);color:#40c890;border-color:rgba(40,184,112,.3);}
.prio-none{background:var(--blue-a);color:#60a5fa;border-color:rgba(74,142,245,.3);}
.status-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:16px;font-size:9.5px;font-weight:700;border:1px solid;}

/* ════ Countdown ════ */
.countdown-bar{
  margin-top:7px;background:var(--surface3);border-radius:9px;padding:8px 10px;
  display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);
}
.cd-label{font-size:9px;color:var(--text3);margin-bottom:2px;}
.cd-time{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:.04em;}
.cd-urgent{color:#f57070;} .cd-soon{color:#f0b040;} .cd-ok{color:#40c890;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}.pulse{animation:pulse 1.2s ease-in-out infinite;}

/* ════ Search ════ */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap input{
  width:100%;background:var(--surface2);
  border:1px solid var(--border2);border-radius:var(--r-md);
  padding:11px 42px 11px 50px;font-size:13px;color:var(--text);
  transition:all .15s;
}
.search-wrap input:focus{border-color:var(--gold-a30);box-shadow:0 0 0 3px var(--gold-a05);}
.search-ico{position:absolute;right:13px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--text3);}
.search-adv{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;color:var(--gold2);cursor:pointer;}

/* ════ Chips ════ */
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;}
.chip{
  flex-shrink:0;padding:5px 12px;border-radius:14px;
  font-size:11px;font-weight:600;cursor:pointer;
  border:1px solid;transition:all .12s;
}
.tag{
  display:inline-flex;align-items:center;padding:2px 7px;
  border-radius:10px;font-size:9px;font-weight:700;
  background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);
}

/* ════ Empty State ════ */
.empty{text-align:center;padding:52px 0;display:flex;flex-direction:column;align-items:center;gap:7px;}
.empty-icon{font-size:48px;opacity:.15;}
.empty-title{font-size:15px;font-weight:700;color:var(--text2);}
.empty-sub{font-size:12px;color:var(--text3);}

/* ════ Sheet / Modal ════ */
.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
.overlay.hid{display:none;}
.overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);}
.sheet{
  position:relative;background:var(--surface);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  border-top:1px solid rgba(200,168,75,0.15);
  max-height:92vh;overflow-y:auto;
  padding-bottom:max(20px,var(--safe-bottom));
  box-shadow:0 -8px 40px rgba(0,0,0,0.8);
}
.sheet::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,168,75,0.3) 30%,rgba(200,168,75,0.5) 50%,rgba(200,168,75,0.3) 70%,transparent);
}
.sheet-handle{width:32px;height:3px;border-radius:2px;background:rgba(200,168,75,0.2);margin:12px auto 14px;}
.sheet-hdr{
  position:sticky;top:0;background:var(--surface);
  padding:0 16px 12px;border-bottom:1px solid var(--border);
  z-index:1;display:flex;justify-content:space-between;align-items:center;
}
.sheet-title{font-family:'Scheherazade New',serif;font-size:18px;font-weight:700;color:var(--gold2);}
.sheet-close{
  width:28px;height:28px;border-radius:8px;background:var(--surface2);
  color:var(--text3);font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);transition:all .12s;
}
.sheet-close:active{background:var(--surface3);color:var(--text);}
.sheet-body{padding:13px 16px;}

/* ════ Detail Rows ════ */
.det-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);gap:10px;}
.det-row:last-of-type{border-bottom:none;}
.det-key{font-size:10px;color:var(--text3);font-weight:600;flex-shrink:0;}
.det-val{font-size:12px;color:var(--text);font-weight:600;text-align:left;flex:1;}

/* ════ Form Fields ════ */
.field{margin-bottom:13px;}
.field label{display:block;font-size:9.5px;color:var(--text3);font-weight:700;margin-bottom:5px;letter-spacing:.06em;text-transform:uppercase;}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);
  border:1.5px solid var(--border);border-radius:var(--r-md);
  padding:11px 12px;font-size:13px;color:var(--text);display:block;transition:all .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  border-color:var(--gold-a30);box-shadow:0 0 0 3px var(--gold-a05);
}
.field textarea{resize:none;}
option{background:var(--surface);}

/* ════ Priority Grid ════ */
.prio-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.prio-btn{padding:9px;border-radius:var(--r-sm);font-size:11px;font-weight:700;cursor:pointer;border:2px solid transparent;text-align:center;transition:all .12s;}
.prio-btn.sel{border-color:currentColor;}

/* ════ Note Boxes ════ */
.note-box{border-radius:var(--r-md);padding:12px;margin:8px 0;}
.note-box-hdr{font-size:10px;font-weight:700;margin-bottom:8px;}
.note-box textarea{width:100%;background:transparent;font-size:12px;color:var(--text);resize:none;min-height:65px;direction:rtl;line-height:1.65;}

/* ════ Attachments ════ */
.att-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface);border-radius:9px;margin-bottom:5px;}
.att-name{font-size:11px;color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.stage-btn{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid;margin:3px;transition:all .12s;}

/* ════ Buttons ════ */
.btn-primary{
  width:100%;
  background:linear-gradient(135deg,#d4a840,#8a6020);
  color:#030201;border-radius:var(--r-md);padding:13px;
  font-weight:800;font-size:14px;cursor:pointer;margin-bottom:8px;
  box-shadow:0 3px 20px rgba(200,168,75,0.3);transition:all .12s;
}
.btn-primary:active{opacity:.9;transform:scale(.98);}
.btn-primary:disabled{background:var(--surface3);color:var(--text3);box-shadow:none;}
.btn-ghost{
  width:100%;background:var(--surface2);color:var(--text2);
  border:1px solid var(--border2);border-radius:var(--r-md);
  padding:12px;font-weight:600;font-size:13px;cursor:pointer;transition:all .12s;
}
.btn-ghost:active{background:var(--surface3);}
.action-row{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap;}
.action-btn{
  flex:1;min-width:56px;border-radius:var(--r-sm);padding:8px 4px;
  font-weight:700;font-size:10.5px;cursor:pointer;text-align:center;
  border:1px solid;transition:all .12s;
}
.action-btn:active{transform:scale(.93);}

/* ════ Dialog ════ */
.dlg-overlay{position:fixed;inset:0;z-index:400;display:flex;align-items:center;justify-content:center;padding:22px;}
.dlg-overlay.hid{display:none;}
.dlg-bg{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);}
.dlg{
  position:relative;background:var(--surface2);
  border:1px solid rgba(200,168,75,0.15);
  border-radius:var(--r-lg);padding:26px 20px 20px;
  width:100%;max-width:280px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.8),0 0 0 1px rgba(200,168,75,0.06);
}
.dlg-icon{font-size:40px;margin-bottom:10px;}
.dlg-title{font-family:'Scheherazade New',serif;font-size:17px;color:var(--text);margin-bottom:5px;}
.dlg-sub{font-size:12px;color:var(--text3);margin-bottom:20px;}
.dlg-btns{display:flex;gap:8px;}
.dlg-del{flex:1;background:var(--red);color:#fff;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer;}
.dlg-cancel{flex:1;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-weight:600;font-size:13px;cursor:pointer;}

/* ════ Toast ════ */
.toast{
  position:fixed;bottom:calc(22px + var(--safe-bottom));left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(8,10,18,0.97);
  border:1px solid rgba(200,168,75,0.2);
  border-radius:14px;padding:10px 18px;
  font-size:12px;font-weight:600;color:var(--text);
  z-index:999;opacity:0;pointer-events:none;white-space:nowrap;
  transition:all .22s ease;
  box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 0 1px rgba(200,168,75,0.05);
  backdrop-filter:blur(20px);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ════ Calendar ════ */
.cal-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px;margin-bottom:12px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-month{font-family:'Scheherazade New',serif;font-size:17px;font-weight:700;color:var(--gold2);}
.cal-btn-nav{width:30px;height:30px;border-radius:8px;background:var(--surface3);border:1px solid var(--border2);color:var(--text2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;}
.cal-btn-nav:active{background:var(--gold-a10);}
.cal-days-hdr{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;}
.cal-day-name{text-align:center;font-size:8px;color:var(--text3);font-weight:700;padding:2px 0;letter-spacing:.04em;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  text-align:center;border-radius:8px;padding:4px 1px;cursor:pointer;
  border:2px solid transparent;min-height:36px;
  display:flex;flex-direction:column;align-items:center;transition:all .1s;
}
.cal-cell:hover{background:var(--surface3);}
.cal-cell-num{font-size:11px;font-weight:600;}
.cal-dot{width:4px;height:4px;border-radius:50%;margin-top:2px;}
.cal-cell.drag-over{background:var(--gold-a20) !important;border-color:var(--gold-a30) !important;outline:2px dashed var(--gold) !important;}
.s-card[draggable="true"]{cursor:grab;}
.s-card[draggable="true"]:active{cursor:grabbing;opacity:.85;}

/* ════ Cards ════ */
.task-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:7px;}
.task-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.task-title{font-size:13px;font-weight:600;color:var(--text);}
.task-title.done{text-decoration:line-through;opacity:.4;}
.contact-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.contact-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.folder-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px;}
.folder-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;cursor:pointer;position:relative;transition:all .12s;}
.folder-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.folder-card:active{transform:scale(.97);}
.file-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin-bottom:7px;}

/* ════ AI Chat ════ */
.ai-wrap{display:flex;flex-direction:column;height:calc(100vh - 145px - var(--safe-top) - var(--safe-bottom));}
.ai-header{
  background:linear-gradient(135deg,rgba(16,163,127,.08),rgba(16,163,127,.02));
  border:1px solid rgba(16,163,127,.15);border-radius:var(--r-lg);
  padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:11px;
}
.ai-avatar-wrap{position:relative;flex-shrink:0;}
.ai-avatar{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,#0d9f77,#065e46);
  display:flex;align-items:center;justify-content:center;font-size:19px;
  box-shadow:0 0 18px rgba(16,163,127,.3);
}
.ai-online-dot{position:absolute;bottom:1px;left:1px;width:9px;height:9px;border-radius:50%;background:#10a37f;border:2px solid var(--surface);}
.ai-name{font-family:'Scheherazade New',serif;font-size:15px;color:var(--gold2);font-weight:700;}
.ai-status{font-size:10px;color:#10a37f;margin-top:2px;}
.ai-clear-btn{margin-right:auto;background:none;color:var(--text3);font-size:11px;cursor:pointer;border:1px solid var(--border2);border-radius:7px;padding:3px 8px;}
.ai-context-bar{background:var(--surface2);border:1px solid var(--gold-a20);border-radius:9px;padding:6px 10px;margin-bottom:8px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;}
.ai-context-bar span{color:var(--gold2);font-weight:700;}
.ai-msg-wrap{flex:1;overflow-y:auto;padding:3px 0;-webkit-overflow-scrolling:touch;}
.ai-bubble-user{display:flex;justify-content:flex-start;margin-bottom:10px;}
.ai-bubble-user>div{background:var(--gold-a20);border:1px solid var(--gold-a30);border-radius:16px 16px 3px 16px;padding:10px 13px;max-width:82%;font-size:12.5px;color:var(--text);line-height:1.65;}
.ai-bubble-ai{display:flex;justify-content:flex-end;margin-bottom:10px;gap:7px;align-items:flex-end;}
.ai-bubble-ai>.bubble-content{background:var(--surface2);border:1px solid rgba(16,163,127,.15);border-radius:16px 16px 16px 3px;padding:10px 13px;max-width:86%;font-size:12.5px;color:var(--text);line-height:1.65;}
.ai-bubble-ai .ai-mini-avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,#0d9f77,#065e46);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.typing-bubble{display:flex;gap:4px;align-items:center;padding:3px 0;}
.typing-dot{width:6px;height:6px;border-radius:50%;background:#10a37f;opacity:.6;animation:typingBounce 1.3s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);opacity:.6;}30%{transform:translateY(-5px);opacity:1;}}
.ai-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:11px;}
.ai-quick-btn{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:9px;font-size:11px;color:var(--text2);cursor:pointer;text-align:right;line-height:1.4;font-family:'Tajawal',sans-serif;transition:all .15s;}
.ai-quick-btn:hover{border-color:rgba(16,163,127,.3);color:var(--text);}
.ai-quick-btn .q-icon{font-size:14px;margin-bottom:4px;display:block;}
.ai-smart-btn{background:rgba(16,163,127,.07);border:1px solid rgba(16,163,127,.2);border-radius:16px;padding:5px 12px;font-size:11px;font-weight:600;color:#2ecc9a;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Tajawal',sans-serif;transition:all .15s;}
.ai-smart-btn:hover{background:rgba(16,163,127,.13);}
.ai-input-row{display:flex;gap:7px;padding-top:8px;border-top:1px solid var(--border);align-items:flex-end;}
.ai-input-row textarea{flex:1;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--r-md);padding:10px 12px;font-size:13px;color:var(--text);resize:none;line-height:1.5;max-height:85px;font-family:'Tajawal',sans-serif;}
.ai-input-row textarea:focus{border-color:rgba(16,163,127,.35);}
.ai-send{width:40px;height:40px;border-radius:var(--r-sm);background:linear-gradient(135deg,#0d9f77,#065e46);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;align-self:flex-end;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(16,163,127,.28);transition:all .15s;}
.ai-send:active{transform:scale(.9);}
.ai-send:disabled{opacity:.4;cursor:not-allowed;}
.ai-upload-btn{width:40px;height:40px;border-radius:var(--r-sm);background:var(--surface2);border:1.5px solid var(--border2);color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0;align-self:flex-end;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ai-upload-btn:hover{border-color:rgba(16,163,127,.35);color:#10a37f;}
.doc-analysis-card{background:var(--surface2);border:1px solid rgba(16,163,127,.2);border-radius:var(--r-lg);padding:12px;margin-bottom:10px;}
.doc-preview-bubble{background:rgba(16,163,127,.06);border:1px solid rgba(16,163,127,.15);border-radius:10px 10px 3px 10px;padding:8px 12px;max-width:82%;font-size:12px;color:var(--text);display:flex;align-items:center;gap:7px;}
.doc-file-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.analysis-progress{height:3px;border-radius:2px;background:var(--surface3);overflow:hidden;margin-top:7px;}
.analysis-progress-bar{height:100%;background:linear-gradient(90deg,#0d9f77,#10d9a0);border-radius:2px;animation:progressSweep 1.8s ease-in-out infinite;}
@keyframes progressSweep{0%{width:0%;margin-right:100%;}50%{width:55%;margin-right:25%;}100%{width:0%;margin-right:0%;margin-left:100%;}}
.ai-response-text strong{color:var(--gold2);font-weight:700;}
.ai-response-text em{color:#2ecc9a;font-style:normal;}
.ai-response-text .ai-list-item{display:flex;gap:6px;margin-bottom:4px;}
.ai-response-text .ai-list-item::before{content:'◈';color:#10a37f;font-size:9px;margin-top:3px;flex-shrink:0;}

/* ════ Week Pill ════ */
.week-date-pill{background:var(--gold-a10);border:1px solid var(--gold-a20);border-radius:8px;padding:4px 10px;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--gold2);}

/* ════ Checklist ════ */
.checklist-section{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px;margin:9px 0;}

/* ════ Animations ════ */
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
@keyframes welcomeIn{from{opacity:0;transform:scale(.88) translateY(24px);}to{opacity:1;transform:scale(1) translateY(0);}}
@keyframes welcomeOut{from{opacity:1;transform:scale(1);}to{opacity:0;transform:scale(.92);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes _splashPulse{from{filter:drop-shadow(0 0 10px rgba(200,168,75,0.4));}to{filter:drop-shadow(0 0 28px rgba(200,168,75,0.85));}}
@keyframes _jspin{to{transform:rotate(360deg);}}
.ani{animation:slideUp .2s ease both;}
.stagger>*{animation:slideUp .22s ease both;}
.stagger>*:nth-child(1){animation-delay:.02s;}
.stagger>*:nth-child(2){animation-delay:.05s;}
.stagger>*:nth-child(3){animation-delay:.09s;}
.stagger>*:nth-child(4){animation-delay:.13s;}
</style>

var DB_NAME='JalsatDB', DB_VER=9, STORE='sessions';
var db=null;
function openDB(){return new Promise(function(res,rej){var r=indexedDB.open(DB_NAME,DB_VER);r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'});};r.onsuccess=function(e){db=e.target.result;res();};r.onerror=rej;});}
function dbAll(){return new Promise(function(res){if(!db){res([]);return;}var tx=db.transaction(STORE,'readonly');var r=tx.objectStore(STORE).getAll();r.onsuccess=function(){res(r.result||[]);};r.onerror=function(){res([]);};});}
function dbPut(s){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(s);tx.oncomplete=res;tx.onerror=res;});}
function dbDel(id){return new Promise(function(res){if(!db){res();return;}var tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=res;tx.onerror=res;});}

function pad(n){return String(n).padStart(2,'0');}
function today(){return new Date().toISOString().split('T')[0];}
function fmtS(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{day:'numeric',month:'short'});}
function fmtL(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function fmtLD(d){return new Date(d+'T00:00:00').toLocaleDateString('ar-SA',{weekday:'short',year:'numeric',month:'long',day:'numeric'});}

function toHijri(dateStr){

// Gregorian → update Hijri input display
function gregToHijriInput(val){
  if(!val)return;
  var hEl=document.getElementById('fDateHijri');
  if(hEl){
    try{
      var d=new Date(val+'T00:00:00');
      var hStr=d.toLocaleDateString('en-SA-u-ca-islamic-nu-latn',{year:'numeric',month:'2-digit',day:'2-digit'});
      // Format as YYYY/MM/DD
      var parts=hStr.split('/');
      if(parts.length===3)hEl.value=parts[2]+'/'+parts[0]+'/'+parts[1];
      else hEl.value=hStr;
    }catch(e){}
  }
}

// Hijri input → convert to Gregorian
function hijriToGregInput(val){
  if(!val||val.length<6)return;
  // Parse YYYY/MM/DD hijri
  var parts=val.replace(/[٠-٩]/g,function(d){return d.charCodeAt(0)-1632;}).split('/');
  if(parts.length!==3)return;
  var hy=parseInt(parts[0]),hm=parseInt(parts[1]),hd=parseInt(parts[2]);
  if(!hy||!hm||!hd)return;
  // Approximate Hijri to Gregorian
  try{
    // Use Intl if available  
    var approxGreg=new Date((hy-1)*354.367+622*365.25+hm*29.53+hd);
    // Refine by iterating ±30 days
    var best=approxGreg;
    for(var i=-30;i<=30;i++){
      var test=new Date(approxGreg.getTime()+i*86400000);
      var testH=test.toLocaleDateString('en-SA-u-ca-islamic-nu-latn',{year:'numeric',month:'2-digit',day:'2-digit'});
      var tp=testH.split('/');
      if(tp.length===3&&parseInt(tp[2])===hy&&parseInt(tp[0])===hm&&parseInt(tp[1])===hd){best=test;break;}
    }
    var gregStr=best.toISOString().split('T')[0];
    var fDate=document.getElementById('fDate');
    if(fDate){fDate.value=gregStr;chkV();updateDateInfo(gregStr);}
  }catch(e){}
}

function updateDateInfo(val){
  var box=document.getElementById('dateInfoBox');
  var dayEl=document.getElementById('dateDay');
  var gregEl=document.getElementById('dateGreg');
  if(!val||!box)return;
  var d=new Date(val+'T00:00:00');
  var dayNames=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  var dayName=dayNames[d.getDay()];
  var todayStr=today();
  var label='';
  box.style.display='block';
  if(dayEl)dayEl.textContent='يوم '+dayName+label;
  if(gregEl)gregEl.textContent=d.toLocaleDateString('ar-SA',{day:'numeric',month:'long',year:'numeric'});
}

function addDays(dateStr,n){
  var d=new Date(dateStr+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];
}

function toggleNotif(){if(!('Notification' in window)){toast("⚠️ المتصفح لا يدعم الإشعارات");return;}if(notifOn){notifOn=false;notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];localStorage.setItem('j_notif','0');updNotifBtn();toast("🔕 تم إيقاف الإشعارات");return;}Notification.requestPermission().then(function(p){if(p==='granted'){notifOn=true;localStorage.setItem('j_notif','1');schedNotifs();schedDaily();updNotifBtn();toast("🔔 تم تفعيل الإشعارات");}else toast("⚠️ لم يتم السماح");});}
function updNotifBtn(){var b=document.getElementById('btnNotif');if(b){b.classList.toggle('active',notifOn);b.textContent=notifOn?'🔔':'🔕';}}
function schedNotifs(){
  notifTimers.forEach(function(t){clearTimeout(t);});notifTimers=[];if(!notifOn)return;
  var now=new Date();

  // ── تذكير بالجلسات غير المحدّثة ──
  var td=today();
  var stale=data.filter(function(s){
    return s.status==='scheduled'&&s.date&&s.date<td;
  });
  if(stale.length>0&&Notification.permission==='granted'){
    // Show once per day
    var lastStaleKey='j_stale_notif_'+td;
    if(!localStorage.getItem(lastStaleKey)){
      setTimeout(function(){
        new Notification('⚠️ جلسات تحتاج تحديثاً',{
          body:stale.length+' جلسة مضى موعدها دون تحديث الحالة',
          tag:'stale-sessions',requireInteraction:false
        });
        localStorage.setItem(lastStaleKey,'1');
      },3000);
    }
  }
  data.filter(function(s){return s.status==='scheduled';}).forEach(function(s){
    if(!s.date||!s.time)return;
    var tgt=new Date(s.date+'T'+s.time+':00');
    var diff=tgt-now;
    if(diff<0||diff>48*3600000)return; // only schedule within 48h

    var prioBadge=s.priority==='high'?'🔴 ':s.priority==='med'?'🟡 ':'';
    var courtTxt=s.court?' — '+s.court:'';

    var chkN=function(k){return localStorage.getItem(k)!=='0';};
    // ── يوم قبل (في الساعة 8 مساءً من اليوم السابق) ──
    if(chkN('notif_day')){
    var dayBefore=new Date(s.date+'T20:00:00');
    dayBefore.setDate(dayBefore.getDate()-1);
    var dDay=dayBefore-now;
    if(dDay>0&&dDay<48*3600000){
      notifTimers.push(setTimeout(function(){
        new Notification('📅 جلسة غداً',{
          body:prioBadge+'جلسة '+s.num+' غداً الساعة '+s.time+courtTxt,
          tag:'sess-day-'+s.id
        });
      },dDay));
    }

    }
    // ── ساعة قبل ──
    if(chkN('notif_hour')){var d1h=diff-3600000;
    if(d1h>0){
      notifTimers.push(setTimeout(function(){
        new Notification('⏰ جلسة بعد ساعة',{
          body:prioBadge+'جلسة '+s.num+' الساعة '+s.time+courtTxt+(s.meetUrl?' 🎥 عن بُعد':''),
          requireInteraction:true,
          tag:'sess-1h-'+s.id
        });
      },d1h));
    }

    }
    // ── 30 دقيقة قبل ──
    if(chkN('notif_30m')){var d30=diff-1800000;
    if(d30>0){
      notifTimers.push(setTimeout(function(){
        new Notification('⚖️ جلسة بعد 30 دقيقة',{
          body:prioBadge+'جلسة '+s.num+courtTxt+(s.meetUrl?' — عن بُعد':''),
          tag:'sess-30m-'+s.id
        });
      },d30));
    }

    }
    // ── 5 دقائق قبل (جلسات عن بُعد) ──
    if(chkN('notif_remote')&&s.meetUrl){
      var d5=diff-300000;
      if(d5>0){
        notifTimers.push(setTimeout(function(){
          var n=new Notification('🎥 جلسة عن بُعد خلال 5 دقائق',{
            body:'جلسة '+s.num+' — اضغط للانضمام',
            requireInteraction:true,
            tag:'sess-5m-'+s.id
          });
          n.onclick=function(){window.open(s.meetUrl,'_blank');};
        },d5));
      }
    }

    // ── وقت الجلسة ──
    if(diff>0&&diff<3600000){
      notifTimers.push(setTimeout(function(){
        var body='جلسة '+s.num+' — '+(s.court||'');
        var n=new Notification('🔴 جلسة الآن',{
          body:body+(s.meetUrl?' (عن بُعد)':''),
          requireInteraction:!!s.meetUrl,
          tag:'sess-now-'+s.id
        });
        if(s.meetUrl)n.onclick=function(){window.open(s.meetUrl,'_blank');};
      },diff));
    }
  });

  // ── تنبيهات مواعيد الطعن ──
  if(localStorage.getItem('notif_deadline')!=='0')Object.keys(sessionDeadlines).forEach(function(sid){
    var d=sessionDeadlines[sid];if(!d)return;
    var deadline=new Date(d.deadlineDate+'T08:00:00');
    [7,3,1,0].forEach(function(daysLeft){
      var alertTime=new Date(deadline);
      alertTime.setDate(alertTime.getDate()-daysLeft);
      alertTime.setHours(8,0,0,0);
      var diff=alertTime-now;
      if(diff>0&&diff<8*86400000){
        notifTimers.push(setTimeout(function(){
          var msg=daysLeft===0?'⛔ اليوم آخر يوم للطعن!':
                  daysLeft===1?'⚠️ غداً آخر موعد للطعن':
                  '📋 متبقي '+daysLeft+' أيام على موعد الطعن';
          new Notification('⚖️ تنبيه موعد طعن',{
            body:msg+' — '+d.typeName.split('(')[0].trim()+(d.sessionNum?' ('+d.sessionNum+')':''),
            requireInteraction:daysLeft<=1,
            tag:'deadline-'+sid+'-'+daysLeft
          });
        },diff));
      }
    });
  });
}

function schedDaily(){
  var now=new Date(),nxt=new Date(now);
  nxt.setHours(8,0,0,0);
  if(nxt<=now)nxt.setDate(nxt.getDate()+1);
  setTimeout(function(){
    if(notifOn&&Notification.permission==='granted'){
      var td=today();
      var todaySess=data.filter(function(s){return s.date===td&&s.status==='scheduled';});
      var tomorrowSess=data.filter(function(s){
        var tmr=new Date();tmr.setDate(tmr.getDate()+1);
        return s.date===tmr.toISOString().split('T')[0]&&s.status==='scheduled';
      });
      var urgentDL=Object.keys(sessionDeadlines).filter(function(sid){
        var info=getDeadlineInfo(parseInt(sid));
        return info&&info.remaining>=0&&info.remaining<=7;
      }).length;

      var lines=[];
      if(todaySess.length)lines.push('📅 '+todaySess.length+' جلسة اليوم');
      if(tomorrowSess.length)lines.push('🔜 '+tomorrowSess.length+' جلسة غداً');
      if(urgentDL)lines.push('⏰ '+urgentDL+' موعد طعن قريب');

      if(lines.length){
        new Notification('🌅 ملخصك الصباحي',{
          body:lines.join(' · '),
          tag:'daily-summary'
        });
      }
      schedNotifs(); // re-schedule for the new day
    }
    schedDaily();
  },nxt-now);
}

function formatAIResponse(text){
  if(!text)return'';
  text=String(text);
  text=text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.*?)\*/g,'<em>$1</em>');
  var lines=text.split('\n');
  var result=[];
  lines.forEach(function(line){
    var trimmed=line.trim();
    if(!trimmed)return;
    if(trimmed.match(/^[-•]\s+/)||trimmed.match(/^\d+\.\s+/)){
      var content=trimmed.replace(/^[-•]\s+/,'').replace(/^\d+\.\s+/,'');
      result.push('<div class="ai-list-item">'+content+'</div>');
    } else {
      result.push('<p style="margin-bottom:6px">'+trimmed+'</p>');
    }
  });
  return'<div class="ai-response-text">'+(result.length?result.join(''):text)+'</div>';
}

function sendAIInput(){

function sendAI(msg){
  if(aiLoading)return;
  if(!msg||!msg.trim())return;
  if(!requireApiKey())return;
  aiMessages.push({role:'user',content:msg.trim()});
  aiLoading=true;
  render();
  setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);

  // Build clean alternating messages (API requires user/assistant alternation, must start with user)
  var rawMsgs=aiMessages.slice(-20);
  var cleanMsgs=[];
  var lastRole=null;
  for(var mi=rawMsgs.length-1;mi>=0;mi--){
    var rm=rawMsgs[mi];
    if(rm.role!==lastRole){
      cleanMsgs.unshift({role:rm.role,content:rm.content});
      lastRole=rm.role;
    }
  }
  // Must start with user role
  while(cleanMsgs.length&&cleanMsgs[0].role!=='user')cleanMsgs.shift();
  if(!cleanMsgs.length)cleanMsgs=[{role:'user',content:msg.trim()}];

  if(aiProvider==='openai'){
    var oaiMsgs=[{role:'system',content:buildAISystem()}].concat(cleanMsgs);
    fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+openaiKey},
      body:JSON.stringify({model:'gpt-4o',max_tokens:1024,messages:oaiMsgs})
    })
    .then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error((e.error&&e.error.message)||'HTTP '+r.status);});return r.json();})
    .then(function(d){
      var reply=(d.choices&&d.choices[0]&&d.choices[0].message&&d.choices[0].message.content)||'عذراً، لم أتمكن من الرد.';
      aiMessages.push({role:'assistant',content:reply});saveAIMsgs();aiLoading=false;render();
      setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
    })
    .catch(function(err){
      aiMessages.push({role:'assistant',content:'⚠️ '+(err.message&&err.message.length<120?err.message:'تعذّر الاتصال بـ ChatGPT.')});
      saveAIMsgs();aiLoading=false;render();
    });
    return;
  }

  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:getHeaders(),
    body:JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1024,
      system:buildAISystem(),
      messages:cleanMsgs
    })
  })
  .then(function(r){
    if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
    return r.json();
  })
  .then(function(d){
    var reply='';
    if(d.content&&d.content.length>0){
      d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
    }
    if(!reply)reply='عذراً، لم أتمكن من الرد. حاول مرة أخرى.';
    aiMessages.push({role:'assistant',content:reply});
    saveAIMsgs();
    aiLoading=false;
    render();
    setTimeout(function(){var chat=document.getElementById('ai-chat');if(chat)chat.scrollTop=chat.scrollHeight;},50);
  })
  .catch(function(err){
    console.error('AI Error:',err);
    var errMsg='⚠️ '+( err.message&&err.message.length<120 ? err.message : 'تعذّر الاتصال. تحقق من اتصالك بالإنترنت وحاول مجدداً.' );
    aiMessages.push({role:'assistant',content:errMsg});
    saveAIMsgs();
    aiLoading=false;
    render();
  });
}

function clearAI(){
  if(aiMessages.length&&!confirm('مسح كل المحادثة؟'))return;
  aiMessages=[];
  saveAIMsgs();
  render();
}

/* ═══════════════════════════════════════════════════════════
   DOCUMENT ANALYSIS
═══════════════════════════════════════════════════════════ */
function analyzeDocument(input, hint){
  var file=input.files[0];
  if(!file){return;}
  if(!requireApiKey()){input.value='';return;}
  input.value='';

  var maxMB=20;
  if(file.size>maxMB*1024*1024){toast('⚠️ الملف أكبر من '+maxMB+'MB');return;}

  // Detect type
  var isPDF=file.type==='application/pdf'||file.name.toLowerCase().endsWith('.pdf');
  var isImage=file.type.startsWith('image/');
  if(!isPDF&&!isImage){toast('⚠️ يُقبل PDF أو صورة فقط');return;}

  var mediaType=isPDF?'application/pdf':file.type;
  var fileIcon=isPDF?'📕':'🖼️';
  var label=file.name.length>36?file.name.substring(0,33)+'...':file.name;

  // Show file bubble in chat immediately
  if(curTab!=='ai'){go('ai');}
  aiLoading=true;

  // Add a special "user" message showing the doc
  aiMessages.push({
    role:'user',
    content:'📎 '+label+'\n[يتم تحليل المستند...]',
    isDoc:true,
    docIcon:fileIcon,
    docName:label
  });
  render();
  setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);

  var reader=new FileReader();
  reader.onload=function(e){
    var b64=e.target.result.split(',')[1];
    if(!b64){
      toast('⚠️ فشل قراءة الملف');
      aiMessages.pop();
      aiLoading=false;
      render();
      return;
    }

    // Build the user text input if any
    var userText=document.getElementById('ai-input');
    var customQ=userText&&userText.value.trim()?userText.value.trim():'';
    if(userText)userText.value='';

    var prompt=customQ||
      (isPDF
        ? 'حلّل هذه الوثيقة القانونية واستخرج: ١) الموضوع الرئيسي ٢) الأطراف المذكورة ٣) النقاط القانونية الجوهرية ٤) أي تواريخ أو مواعيد مهمة ٥) توصياتك القانونية.'
        : 'حلّل هذه الصورة واستخرج أي محتوى قانوني أو نصي مهم، واذكر ملاحظاتك.');

    // Build message content as multipart
    var contentBlock=[];
    if(isPDF){
      contentBlock.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
    } else {
      contentBlock.push({type:'image',source:{type:'base64',media_type:mediaType,data:b64}});
    }
    contentBlock.push({type:'text',text:prompt});

    // Update the last message with the real prompt shown to user
    aiMessages[aiMessages.length-1].content='📎 '+label+(customQ?'\n'+customQ:'');

    // Build history — previous messages (text only) + this multipart message
    var prevMsgs=[];
    var hist=aiMessages.slice(-10,-1);
    var lastR=null;
    for(var mi=hist.length-1;mi>=0;mi--){
      var hm=hist[mi];
      if(hm.role!==lastR&&!hm.isDoc){
        prevMsgs.unshift({role:hm.role,content:hm.content});
        lastR=hm.role;
      }
    }
    // Remove trailing assistant (last must be user)
    while(prevMsgs.length&&prevMsgs[prevMsgs.length-1].role==='assistant')prevMsgs.pop();

    var apiMessages=prevMsgs.concat([{role:'user',content:contentBlock}]);

    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:getHeaders(),
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2048,
        system:buildAISystem()+'\nعند تحليل مستند، كن منظماً واستخدم عناوين وقوائم واضحة.',
        messages:apiMessages
      })
    })
    .then(function(r){
      if(!r.ok)return r.json().then(function(e){throw new Error(e.error&&e.error.message||'HTTP '+r.status);});
      return r.json();
    })
    .then(function(d){
      var reply='';
      if(d.content&&d.content.length>0){
        d.content.forEach(function(block){if(block.type==='text')reply+=block.text;});
      }
      if(!reply)reply='لم أتمكن من قراءة المستند. تأكد أنه ملف PDF أو صورة واضحة.';
      aiMessages.push({role:'assistant',content:reply});
      saveAIMsgs();
      aiLoading=false;
      render();
      setTimeout(function(){var c=document.getElementById('ai-chat');if(c)c.scrollTop=c.scrollHeight;},50);
    })
    .catch(function(err){
      console.error('Doc analysis error:',err);
      var msg='⚠️ '+(err.message&&err.message.length<120?err.message:'فشل تحليل المستند. تأكد من الاتصال وحاول مرة أخرى.');
      aiMessages.push({role:'assistant',content:msg});
      saveAIMsgs();
      aiLoading=false;
      render();
    });
  };
  reader.onerror=function(){
    toast('⚠️ خطأ في قراءة الملف');
    aiMessages.pop();
    aiLoading=false;
    render();
  };
  reader.readAsDataURL(file);
}

function cdInfo(s){if(s.status==='completed'||s.status==='postponed')return null;var now=new Date(),tgt=new Date(s.date+'T'+s.time+':00'),diff=tgt-now;if(diff<0){var e=Math.abs(diff);return{passed:true,time:pad(Math.floor(e/3600000))+':'+pad(Math.floor((e%3600000)/60000))+':'+pad(Math.floor((e%60000)/1000)),cls:'urgent'};}var ts=Math.floor(diff/1000),days=Math.floor(ts/86400),h=Math.floor((ts%86400)/3600),m=Math.floor((ts%3600)/60),sec=ts%60;var cls=ts<3600?'urgent':ts<86400?'soon':'ok';var t=days>0?(days+'ي '+pad(h)+':'+pad(m)+':'+pad(sec)):(pad(h)+':'+pad(m)+':'+pad(sec));return{passed:false,time:t,cls:cls,ts:ts};}
function cdInline(s){var i=cdInfo(s);if(!i)return'';return'<div class="countdown-bar" id="cdb-'+s.id+'"><div><div class="cd-label">'+(i.passed?'⏱ مضى':'⏳ المتبقي')+'</div><div class="cd-time cd-'+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'')+'" id="cdt-'+s.id+'">'+i.time+'</div></div><span style="font-size:18px">'+(i.passed?'🔴':i.cls==='urgent'?'🚨':i.cls==='soon'?'⚠️':'🟢')+'</span></div>';}
function cdLarge(s){var i=cdInfo(s);if(!i)return'';var clr=i.cls==='urgent'?'#f87171':i.cls==='soon'?'#fbbf24':'#34d399';var bdr=i.cls==='urgent'?'rgba(232,80,80,.35)':i.cls==='soon'?'rgba(232,160,48,.35)':'rgba(58,184,130,.3)';return'<div style="background:var(--surface2);border:1px solid '+bdr+';border-radius:14px;padding:14px;margin:12px 0;text-align:center"><div style="font-size:11px;color:var(--text3);margin-bottom:6px">'+(i.passed?'⏱ مضى':'⏳ المتبقي')+'</div><div style="font-size:34px;font-weight:900;color:'+clr+';font-variant-numeric:tabular-nums" id="cdtL-'+s.id+'">'+i.time+'</div><div style="font-size:10px;color:var(--text3);margin-top:3px">'+(i.passed?'الجلسة بدأت':i.ts<3600?'أقل من ساعة':i.ts<86400?'اليوم':'قادمة')+'</div></div>';}

function startTick(){
  if(tick)clearInterval(tick);
  tick=setInterval(function(){
    // ── Session countdowns ──
    data.forEach(function(s){
      var i=cdInfo(s);if(!i)return;
      var el=document.getElementById('cdt-'+s.id);
      if(el){el.textContent=i.time;el.className='cd-time cd-'+i.cls+(i.cls==='urgent'&&!i.passed?' pulse':'');}
      var el2=document.getElementById('cdtL-'+s.id);
      if(el2&&detId===s.id)el2.textContent=i.time;
    });
    // ── Deadline full countdown (days + HH:MM:SS) ──
    var now=Date.now();
    Object.keys(sessionDeadlines).forEach(function(sid){
      var d=sessionDeadlines[sid];if(!d)return;
      // Deadline at end of the deadline day (23:59:59)
      var target=new Date(d.deadlineDate+'T23:59:59').getTime();
      var diff=target-now;
      if(diff<0)return; // expired — no ticking needed

      var totalSec=Math.floor(diff/1000);
      var days=Math.floor(totalSec/86400);
      var hours=Math.floor((totalSec%86400)/3600);
      var mins=Math.floor((totalSec%3600)/60);
      var secs=totalSec%60;

      function p(n){return n<10?'0'+n:String(n);}

      var elD=document.getElementById('dlcd-'+sid);
      var elH=document.getElementById('dlch-'+sid);
      var elM=document.getElementById('dlcm-'+sid);
      var elS=document.getElementById('dlcs-'+sid);

      if(elD)elD.textContent=days;
      if(elH)elH.textContent=p(hours);
      if(elM)elM.textContent=p(mins);
      if(elS)elS.textContent=p(secs);

      // Update progress bar
      var info=getDeadlineInfo(parseInt(sid));
      if(info){
        var elPb=document.getElementById('dlcpb-'+sid);
        var elPct=document.getElementById('dlcpct-'+sid);
        var pct=Math.min(100,Math.round(((d.days-(diff/86400000))/d.days)*100));
        if(elPb)elPb.style.width=pct+'%';
        if(elPct)elPct.textContent=pct+'%';
        // Color update if urgency changed
        var clr=info.clr;
        [elD,elH,elM,elS].forEach(function(el){if(el)el.style.color=clr;});
      }
    });
  },1000);
}

/* ── Deadline helpers ── */
function getDeadlineInfo(sid){
  var d=sessionDeadlines[sid];if(!d)return null;
  var deadline=new Date(d.deadlineDate+'T00:00:00');
  var now=new Date();now.setHours(0,0,0,0);
  var remaining=Math.ceil((deadline-now)/86400000);
  var clr,icon,urgent=false;
  if(remaining<0){clr='#f87171';icon='🔴';}
  else if(remaining===0){clr='#f87171';icon='⚡';urgent=true;}
  else if(remaining<=7){clr='#fbbf24';icon='⚠️';urgent=true;}
  else if(remaining<=14){clr='#f59e0b';icon='🟡';}
  else{clr='#34d399';icon='✅';}
  return{remaining:remaining,clr:clr,icon:icon,urgent:urgent,days:d.days,typeName:d.typeName,deadlineDate:d.deadlineDate,sessionNum:d.sessionNum,sessionType:d.sessionType,court:d.court};
}

function deadlineBadge(s){
  var info=getDeadlineInfo(s.id);if(!info)return'';
  var label=info.remaining<0?'انتهى':info.remaining===0?'اليوم':info.remaining+' يوم';

function goForce(t){

  var wasHidden=hiddenTabs.indexOf(t)>-1;
  if(wasHidden){
    hiddenTabs=hiddenTabs.filter(function(x){return x!==t;});
    saveHiddenTabs();
  }

function normalizeAr(str){
  if(!str)return'';
  return str
    .replace(/[\u0610-\u061A\u064B-\u065F]/g,'')
    .replace(/[أإآا]/g,'ا')
    .replace(/[ىي]/g,'ي')
    .replace(/ة/g,'ه')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}

// Stop words to skip
var AR_STOP=['ال','و','في','من','على','إلى','عن','مع','هو','هي','هم','أن','إن','لا','ما','لم'];

function searchWords(needle){
  // Split normalized needle into meaningful words (length > 1, not stop words)
  return normalizeAr(needle).split(' ').filter(function(w){
    return w.length>1 && AR_STOP.indexOf(w)===-1;
  });
}

function searchMatch(haystack,needle){
  if(!haystack||!needle)return false;
  var h=normalizeAr(String(haystack));
  var n=normalizeAr(String(needle));
  // 1. Exact contains (needle inside haystack)
  if(h.includes(n))return true;
  // 2. Haystack inside needle (stored name shorter than voice result)
  if(h.length>2&&n.includes(h))return true;
  // 3. Word-by-word: any significant word of needle found in haystack
  var words=searchWords(needle);
  return words.length>0&&words.some(function(w){return h.includes(w);});
}

function searchMatchAny(fields,needle){
  // Match against combined fields AND individual fields
  var combined=normalizeAr(fields.filter(Boolean).join(' '));
  var n=normalizeAr(String(needle));
  if(combined.includes(n))return true;
  if(n.length>3&&combined.includes(n.substring(0,n.length-1)))return true; // partial
  return fields.some(function(f){return searchMatch(f,needle);});
}

  // ── الأرشيف ──
  var archRes=archivedSessions.filter(function(s){
    return searchMatchAny([s.num,s.plnt,s.dfnd,s.court,s.type,s.notes,s.ref,s.client],q2);
  });
  // ── المهمات ──
  var tRes=tasks.filter(function(t){
    return searchMatch(t.title,q2)||(t.caseNum&&searchMatch(t.caseNum,q2));
  });
  // ── الأطراف ──
  var cRes=contacts.filter(function(c){
    return searchMatch(c.name,q2)||(c.caseNum&&searchMatch(c.caseNum,q2))||(c.phone&&searchMatch(c.phone,q2));
  });
  // ── الملفات ──
  var fRes=wordFiles.filter(function(f){
    return searchMatch(f.name,q2)||(f.folder&&searchMatch(f.folder,q2));
  });
  // ── الأتعاب ──
  var feRes=fees.filter(function(f){
    return searchMatch(f.desc,q2)||(f.client&&searchMatch(f.client,q2));
  });

  // ربط الأطراف بالجلسات
  if(cRes.length){
    cRes.forEach(function(c){
      if(!c.caseNum)return;
      data.forEach(function(s){
        if(s.num===c.caseNum&&!sRes.find(function(x){return x.id===s.id;}))sRes.push(s);
      });
    });
  }

  var total=sRes.length+archRes.length+tRes.length+cRes.length+fRes.length+feRes.length;

  if(!total){
    var words=searchWords(q2);
    var hint=words.length>1?'جرب كلمة واحدة مثل: "'+words[0]+'"':'تأكد من الإملاء أو جرب كلمة مختلفة';
    return'<div class="empty"><div class="empty-icon" style="font-size:52px">🔍</div>'+
      '<div class="empty-title">لا توجد نتائج لـ "'+q2+'"</div>'+
      '<div class="empty-sub">'+hint+'</div></div>';
  }

  var h='<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:10px 13px;margin-bottom:12px;display:flex;align-items:center;gap:8px">';
  h+='<span style="font-size:16px">🔍</span>';
  h+='<div><div style="font-size:13px;font-weight:700;color:var(--text)">'+total+' نتيجة</div>';
  h+='<div style="font-size:10px;color:var(--text3);margin-top:1px">عن: "'+q2+'"</div></div>';
  h+='<div style="margin-right:auto;display:flex;gap:6px;flex-wrap:wrap">';
  if(sRes.length)h+='<span style="font-size:9px;background:var(--gold-a10);color:var(--gold2);border:1px solid var(--gold-a20);border-radius:10px;padding:2px 8px;font-weight:700">⚖️ '+sRes.length+'</span>';
  if(tRes.length)h+='<span style="font-size:9px;background:var(--blue-a);color:var(--blue);border:1px solid rgba(74,142,245,.3);border-radius:10px;padding:2px 8px;font-weight:700">📋 '+tRes.length+'</span>';
  if(cRes.length)h+='<span style="font-size:9px;background:var(--green-a);color:var(--green);border:1px solid rgba(40,184,112,.3);border-radius:10px;padding:2px 8px;font-weight:700">👤 '+cRes.length+'</span>';
  if(fRes.length)h+='<span style="font-size:9px;background:var(--amber-a);color:var(--amber);border:1px solid rgba(216,144,48,.3);border-radius:10px;padding:2px 8px;font-weight:700">📁 '+fRes.length+'</span>';
  if(feRes.length)h+='<span style="font-size:9px;background:var(--green-a);color:var(--green);border:1px solid rgba(40,184,112,.3);border-radius:10px;padding:2px 8px;font-weight:700">💰 '+feRes.length+'</span>';
  if(archRes.length)h+='<span style="font-size:9px;background:var(--surface3);color:var(--text3);border:1px solid var(--border2);border-radius:10px;padding:2px 8px;font-weight:700">🗄️ '+archRes.length+'</span>';
  h+='</div></div>';

  // ── نتائج الجلسات ──
  if(sRes.length){
    h+=secHdr('⚖️','الجلسات ('+sRes.length+')');
    sRes.forEach(function(s){h+=cardForSearch(s);});
  }

  // ── المهمات ──
  if(tRes.length){
    h+=secHdr('📋','المهمات ('+tRes.length+')');
    tRes.forEach(function(t){
      var ov=t.due&&!t.done&&t.due<today();
      h+='<div onclick="goFromSearch(\'tasks\')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px 12px;margin-bottom:7px;border-right:3px solid '+(t.done?'var(--green)':ov?'var(--red)':'var(--blue)')+';cursor:pointer">';
      h+='<div style="font-size:13px;font-weight:600;color:var(--text)'+(t.done?';text-decoration:line-through;opacity:.5':'')+'">'+(t.done?'✅ ':ov?'⚠️ ':'')+t.title+'</div>';
      if(t.caseNum)h+='<div style="font-size:10px;color:var(--text3);margin-top:3px">📋 '+t.caseNum+'</div>';
      if(t.due)h+='<div style="font-size:10px;color:'+(ov?'#f57070':'var(--text3)')+';margin-top:2px">📅 '+t.due+'</div>';
      h+='</div>';
    });
  }

  // ── الأطراف ──
  if(cRes.length){
    h+=secHdr('👤','الأطراف ('+cRes.length+')');
    cRes.forEach(function(c){
      h+='<div onclick="goFromSearch(\'contacts\')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer">';
      h+='<div style="width:36px;height:36px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">👤</div>';
      h+='<div><div style="font-size:13px;font-weight:700;color:var(--text)">'+c.name+'</div>';
      h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+c.role+(c.caseNum?' · 📋 '+c.caseNum:'')+(c.phone?' · 📱 '+c.phone:'')+'</div></div>';
      h+='</div>';
    });
  }

  // ── الملفات ──
  if(fRes.length){
    h+=secHdr('📁','الملفات ('+fRes.length+')');
    fRes.forEach(function(f){
      h+='<div onclick="goFromSearch(\'files\')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer">';
      h+='<div style="width:36px;height:36px;border-radius:9px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📄</div>';
      h+='<div><div style="font-size:13px;font-weight:600;color:var(--text)">'+f.name+'</div>';
      h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">📂 '+f.folder+' · '+f.date+'</div></div></div>';
    });
  }

  // ── الأتعاب ──
  if(feRes.length){
    h+=secHdr('💰','الأتعاب ('+feRes.length+')');
    feRes.forEach(function(f){
      var st=f.status||(f.paid?'paid':'pending');
      var stClr=st==='paid'?'#28b870':st==='partial'?'#f0b040':'#f57070';
      h+='<div onclick="goFromSearch(\'fees\')" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;margin-bottom:7px;border-right:3px solid '+stClr+';cursor:pointer">';
      h+='<div style="display:flex;justify-content:space-between"><div style="font-size:13px;font-weight:600;color:var(--text)">'+f.desc+'</div>';
      h+='<div style="font-size:14px;font-weight:900;color:var(--gold2)">'+f.amount.toLocaleString('ar-SA')+'</div></div>';
      if(f.client)h+='<div style="font-size:10px;color:var(--text3);margin-top:3px">👤 '+f.client+'</div>';
      h+='</div>';
    });
  }

  // ── الأرشيف ──
  if(archRes.length){
    h+=secHdr('🗄️','الأرشيف ('+archRes.length+')');
    archRes.forEach(function(s){h+=cardForSearch(s);});
  }

  return h;
}

function rTasks(){var pend=tasks.filter(function(t){return!t.done;}),done=tasks.filter(function(t){return t.done;});var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2)">📋 المهمات القانونية</div><button onclick="opnTaskForm()" style="background:var(--gold);color:#0a0905;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer">+ مهمة</button></div>';h+='<div class="stats-grid" style="margin-bottom:14px"><div class="stat-card" style="--sc-clr:var(--blue)"><div class="stat-icon">📋</div><div class="stat-value">'+tasks.length+'</div><div class="stat-label">إجمالي</div></div><div class="stat-card" style="--sc-clr:var(--green)"><div class="stat-icon">✅</div><div class="stat-value">'+done.length+'</div><div class="stat-label">منجزة</div></div></div>';if(pend.length){h+=secHdr('🔴','قيد التنفيذ');pend.forEach(function(t){h+=tcard(t);});}if(done.length){h+=secHdr('✅','منجزة');done.forEach(function(t){h+=tcard(t);});}if(!tasks.length)h+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">لا توجد مهمات</div><div class="empty-sub">اضغط + مهمة</div></div>';h+='<div id="tform" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px;margin-top:12px"><div style="font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px">مهمة جديدة</div><input id="tt" type="text" placeholder="عنوان المهمة *" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="tc" type="text" placeholder="رقم القضية" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="td2" type="date" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block;color-scheme:dark"><select id="tp" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:11px;display:block"><option value="high">🔴 عاجلة</option><option value="med" selected>🟡 متوسطة</option><option value="low">🟢 عادية</option></select><div style="display:flex;gap:7px"><button onclick="saveTask()" style="flex:1;background:var(--gold);color:#0a0905;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer">حفظ</button><button onclick="clsTaskForm()" style="flex:1;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;cursor:pointer">إلغاء</button></div></div>';return h;}
function tcard(t){var clrs={high:'#f87171',med:'#fbbf24',low:'#34d399'},lbls={high:'🔴 عاجلة',med:'🟡 متوسطة',low:'🟢 عادية'};var clr=clrs[t.priority]||'#60a5fa',ov=t.due&&!t.done&&t.due<today();return'<div class="task-card" style="border-right:3px solid '+clr+'"><div class="task-card-hdr"><div style="display:flex;align-items:center;gap:8px"><input type="checkbox"'+(t.done?' checked':'')+' onchange="togTask('+t.id+')" style="width:17px;height:17px;cursor:pointer;accent-color:var(--gold)"><span class="task-title'+(t.done?' done':'')+'">'+t.title+'</span></div><button onclick="delTask('+t.id+')" style="background:none;color:var(--text3);font-size:15px;cursor:pointer">✕</button></div><div style="display:flex;gap:6px;flex-wrap:wrap">'+(t.caseNum?'<span style="font-size:9px;color:var(--text3);background:var(--surface3);border-radius:5px;padding:2px 7px">📋 '+t.caseNum+'</span>':'')+(t.due?'<span style="font-size:9px;color:'+(ov?'#f87171':'var(--text3)')+';background:var(--surface3);border-radius:5px;padding:2px 7px">'+(ov?'⚠️ ':'📅 ')+t.due+'</span>':'')+'<span style="font-size:9px;background:var(--surface3);border-radius:5px;padding:2px 7px;color:'+clr+'">'+lbls[t.priority]+'</span></div></div>';}
function opnTaskForm(){var f=document.getElementById('tform');if(f)f.style.display='block';}
function clsTaskForm(){var f=document.getElementById('tform');if(f)f.style.display='none';}
function saveTask(){var ttl=document.getElementById('tt');if(!ttl||!ttl.value.trim()){toast('⚠️ أدخل عنوان المهمة');return;}tasks.push({id:Date.now(),title:ttl.value.trim(),caseNum:document.getElementById('tc').value.trim(),due:document.getElementById('td2').value,priority:document.getElementById('tp').value,done:false});saveTasks();toast('✅ تمت إضافة المهمة');render();}
function togTask(id){var t=tasks.find(function(x){return x.id===id;});if(t){t.done=!t.done;saveTasks();render();}}
function delTask(id){tasks=tasks.filter(function(x){return x.id!==id;});saveTasks();toast('🗑️ تم الحذف');render();}

function rContacts(){var roles=['محامٍ','مدعي','مدعى عليه','شاهد','خبير','قاضٍ','مستشار'];var rclr={'محامٍ':'#60a5fa','مدعي':'#34d399','مدعى عليه':'#f87171','شاهد':'#fbbf24','خبير':'#a78bfa','قاضٍ':'#e8c870','مستشار':'#fb923c'};var remi={'محامٍ':'👨‍💼','مدعي':'👤','مدعى عليه':'👤','شاهد':'👁️','خبير':'🎓','قاضٍ':'⚖️','مستشار':'📚'};var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-family:Scheherazade New,serif;font-size:18px;color:var(--gold2)">👤 سجل الأطراف</div><button onclick="opnConForm()" style="background:var(--gold);color:#0a0905;border-radius:10px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer">+ إضافة</button></div>';if(!contacts.length)h+='<div class="empty"><div class="empty-icon">👤</div><div class="empty-title">لا يوجد أطراف</div><div class="empty-sub">اضغط + إضافة</div></div>';else{h+='<div class="stagger">';contacts.forEach(function(c){var clr=rclr[c.role]||'#94a3c0',em=remi[c.role]||'👤';h+='<div class="contact-card"><div class="contact-avatar" style="background:'+clr+'22;color:'+clr+';border:1px solid '+clr+'44">'+em+'</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--text)">'+c.name+'</div><div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap"><span style="font-size:9px;background:'+clr+'22;color:'+clr+';border:1px solid '+clr+'44;border-radius:5px;padding:2px 7px">'+c.role+'</span>'+(c.caseNum?'<span style="font-size:9px;color:var(--text3);background:var(--surface3);border-radius:5px;padding:2px 7px">📋 '+c.caseNum+'</span>':'')+(c.phone?'<span style="font-size:9px;color:var(--text3);background:var(--surface3);border-radius:5px;padding:2px 7px">📞 '+c.phone+'</span>':'')+'</div></div><button onclick="delCon('+c.id+')" style="background:none;border:none;color:var(--text3);font-size:15px;cursor:pointer">🗑️</button></div>';});h+='</div>';}h+='<div id="cform" style="display:none;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-md);padding:14px;margin-top:12px"><div style="font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:10px">إضافة طرف جديد</div><input id="cn" type="text" placeholder="الاسم الكامل *" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><select id="cr" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block">'+roles.map(function(r){return'<option>'+r+'</option>';}).join('')+'</select><input id="cc" type="text" placeholder="رقم القضية (اختياري)" dir="rtl" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:8px;display:block"><input id="cp" type="tel" placeholder="رقم الجوال (اختياري)" dir="ltr" style="width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px;font-size:13px;color:var(--text);margin-bottom:11px;display:block"><div style="display:flex;gap:7px"><button onclick="saveCon()" style="flex:1;background:var(--gold);color:#0a0905;border-radius:10px;padding:11px;font-weight:700;font-size:13px;cursor:pointer">حفظ</button><button onclick="clsConForm()" style="flex:1;background:var(--surface3);color:var(--text2);border:1px solid var(--border2);border-radius:10px;padding:11px;font-size:13px;cursor:pointer">إلغاء</button></div></div>';return h;}
function opnConForm(){var f=document.getElementById('cform');if(f)f.style.display='block';}
function clsConForm(){var f=document.getElementById('cform');if(f)f.style.display='none';}
function saveCon(){var cn=document.getElementById('cn');if(!cn||!cn.value.trim()){toast('⚠️ أدخل الاسم');return;}contacts.push({id:Date.now(),name:cn.value.trim(),role:document.getElementById('cr').value,caseNum:document.getElementById('cc').value.trim(),phone:document.getElementById('cp').value.trim()});saveContacts();toast('✅ تمت الإضافة');render();}
function delCon(id){contacts=contacts.filter(function(x){return x.id!==id;});saveContacts();toast('🗑️ تم الحذف');render();}

   FILES

function fmtSize(b){if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB';}
function fileIcon(ext){var m={'.doc':'📄','.docx':'📄','.pdf':'📕','.txt':'📝','.xls':'📊','.xlsx':'📊','.png':'🖼️','.jpg':'🖼️','.jpeg':'🖼️'};return m[ext]||'📎';}
function folderColor(n){var c={'عام':'#60a5fa','عقود':'#fbbf24','أحكام':'#f87171','مذكرات':'#34d399','صور':'#a78bfa'};return c[n]||'#94a3c0';}
function uploadWordFile(input){var file=input.files[0];if(!file)return;var allowed=['.doc','.docx','.pdf','.txt','.xls','.xlsx','.png','.jpg','.jpeg'];var ext=file.name.substring(file.name.lastIndexOf('.')).toLowerCase();if(allowed.indexOf(ext)===-1){toast('⚠️ صيغة غير مدعومة');return;}if(file.size>10*1024*1024){toast('⚠️ الحجم أكبر من 10MB');return;}var r=new FileReader();r.onload=function(e){wordFiles.unshift({id:Date.now(),name:file.name,size:file.size,type:ext,date:new Date().toLocaleDateString('ar-SA'),folder:curFolder||'عام',data:e.target.result});saveWordFiles();toast('✅ تم رفع: '+file.name);render();};r.readAsDataURL(file);}
function downloadWordFile(id){var f=wordFiles.find(function(x){return x.id===id;});if(!f)return;var a=document.createElement('a');a.href=f.data;a.download=f.name;document.body.appendChild(a);a.click();document.body.removeChild(a);toast('📥 جاري التحميل');}
function deleteWordFile(id){if(!confirm('حذف الملف نهائياً؟'))return;wordFiles=wordFiles.filter(function(x){return x.id!==id;});saveWordFiles();toast('🗑️ تم الحذف');render();}
function moveFile(id,folder){var f=wordFiles.find(function(x){return x.id===id;});if(!f)return;f.folder=folder;saveWordFiles();toast('📂 نقل إلى: '+folder);render();}
function addFolder(){var name=prompt('اسم المجلد:');if(!name||!name.trim())return;if(folders.indexOf(name.trim())>-1){toast('⚠️ المجلد موجود');return;}folders.push(name.trim());saveFolders();toast('📂 تم الإنشاء');render();}
function deleteFolder(name){if(name==='عام'){toast('⚠️ لا يمكن حذف المجلد العام');return;}var count=wordFiles.filter(function(f){return f.folder===name;}).length;if(count>0){if(!confirm('المجلد يحتوي على '+count+' ملف. سيتم نقلها للعام.'))return;wordFiles.forEach(function(f){if(f.folder===name)f.folder='عام';});saveWordFiles();}folders=folders.filter(function(x){return x!==name;});saveFolders();if(curFolder===name)curFolder=null;toast('🗑️ تم حذف المجلد');render();}

/* ═══════════════════════════════════════════════════════════
   CALENDAR
═══════════════════════════════════════════════════════════ */
function rCal(){
  var yr=calD.getFullYear(),mo=calD.getMonth();
  var days=new Date(yr,mo+1,0).getDate(),first=new Date(yr,mo,1).getDay();
  var byDate={};
  data.forEach(function(s){if(!byDate[s.date])byDate[s.date]=[];byDate[s.date].push(s);});
  var tod=today(),selStr=selD?selD.toISOString().split('T')[0]:null;
  function ds(d){return yr+'-'+pad(mo+1)+'-'+pad(d);}

  var h='<div class="cal-wrap">';
  h+='<div class="cal-nav"><button class="cal-btn-nav" onclick="calPrev()">›</button><div class="cal-month">'+MO[mo]+' '+yr+'</div><button class="cal-btn-nav" onclick="calNext()">‹</button></div>';
  h+='<div style="font-size:10px;color:var(--text3);text-align:center;margin-bottom:6px">💡 اسحب أي جلسة وأفلتها على يوم آخر لتغيير التاريخ</div>';
  h+='<div class="cal-days-hdr">';DY.forEach(function(d){h+='<div class="cal-day-name">'+d+'</div>';});h+='</div>';
  h+='<div class="cal-grid">';
  for(var i=0;i<first;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){
    var dstr=ds(d),has=!!(byDate[dstr]&&byDate[dstr].length);
    var isT=dstr===tod,isSel=dstr===selStr;
    var bg=isSel?'var(--gold-a20)':isT?'var(--blue-a)':'transparent';
    var bdr=isSel?'var(--gold-a30)':isT?'rgba(74,144,217,.35)':'transparent';
    var nc=isSel?'var(--gold2)':isT?'var(--blue)':'var(--text2)';
    var dotC=has?(isSel?'var(--gold)':ST[byDate[dstr][0].status].clr):'';
    var cnt=has?byDate[dstr].length:0;
    h+='<div class="cal-cell" id="calcell-'+dstr+'" onclick="selDay(\''+dstr+'\')"'+
      ' ondragover="event.preventDefault();this.classList.add(\'drag-over\')"'+
      ' ondragleave="this.classList.remove(\'drag-over\')"'+
      ' ondrop="dropOnCalDay(event,\''+dstr+'\')"'+
      ' style="background:'+bg+';border-color:'+bdr+'">';
    h+='<div class="cal-cell-num" style="color:'+nc+'">'+d+'</div>';
    if(cnt>1){
      h+='<div style="position:absolute;bottom:2px;right:2px;background:var(--gold);color:#0a0905;border-radius:6px;font-size:7px;font-weight:700;padding:1px 4px;line-height:1.4">'+cnt+'</div>';
    } else if(has){
      h+='<div class="cal-dot" style="background:'+dotC+'"></div>';
    }
    h+='</div>';
  }
  h+='</div></div>';

  if(selD){
    var ss=byDate[selStr]||[];
    h+=secHdr('📌',fmtL(selStr||tod));
    if(!ss.length){
      h+='<div class="empty" style="padding:22px 0"><div style="font-size:28px;opacity:.3;margin-bottom:7px">📭</div><div class="empty-sub">لا توجد جلسات في هذا اليوم</div>';
      h+='<button onclick="openAdd();document.getElementById(\'fDate\').value=\''+selStr+'\'" style="background:var(--gold);color:#0a0905;border-radius:var(--r-md);padding:10px 18px;font-weight:700;font-size:12px;cursor:pointer;margin-top:10px">+ إضافة جلسة في هذا اليوم</button>';
      h+='</div>';
    } else {
      h+='<div class="stagger">';
      ss.forEach(function(s){
        // Make cards draggable
        var c=card(s);
        c=c.replace('<div class="s-card"','<div class="s-card" draggable="true" ondragstart="calDragStart(event,'+s.id+')"');
        h+=c;
      });
      h+='</div>';
    }
  }
  return h;
}

var _calDragId=null;
function calDragStart(e,id){
  _calDragId=id;
  e.dataTransfer.setData('text/plain',String(id));
  e.dataTransfer.effectAllowed='move';
}

function dropOnCalDay(e,newDate){
  e.preventDefault();
  document.querySelectorAll('.cal-cell').forEach(function(el){el.classList.remove('drag-over');});
  var id=_calDragId||parseInt(e.dataTransfer.getData('text/plain'));
  _calDragId=null;
  if(!id)return;
  var s=data.find(function(x){return x.id===id;});
  if(!s||s.date===newDate)return;
  var oldDate=s.date;
  s.date=newDate;
  dbPut(s).then(function(){
    toast('📅 نُقلت الجلسة '+s.num+' إلى '+newDate);
    selD=new Date(newDate+'T00:00:00');
    render();
  }).catch(function(e){toast('⚠️ فشل تغيير التاريخ');});
}

function downloadAtt(sid,idx){
  var s=data.find(function(x){return x.id===sid;});
  if(!s||!s.attachments||!s.attachments[idx])return;
  var a=s.attachments[idx];
  if(!a.data){toast('⚠️ بيانات المرفق غير متوفرة');return;}
  var link=document.createElement('a');
  link.href=a.data;
  link.download=a.name||('مرفق_'+(idx+1));
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  toast('📥 جارٍ تحميل: '+a.name);
}

    h+='</div></div>';

function previewAtt(sid,idx){
  var s=data.find(function(x){return x.id===sid;});
  if(!s||!s.attachments||!s.attachments[idx])return;
  var a=s.attachments[idx];
  if(!a.data)return;
  var modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,0.9)';
  modal.onclick=function(){modal.remove();};
  var img=document.createElement('img');
  img.src=a.data;
  img.style.cssText='max-width:100%;max-height:90vh;border-radius:12px;box-shadow:0 0 40px rgba(0,0,0,0.5)';
  var name=document.createElement('div');
  name.style.cssText='position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);color:#fff;padding:7px 16px;border-radius:20px;font-size:12px;font-family:Tajawal,sans-serif';
  name.textContent=a.name;
  modal.appendChild(img);
  modal.appendChild(name);
  document.body.appendChild(modal);
}
function addAtt(sid,input){var file=input.files[0];if(!file)return;var s=data.find(function(x){return x.id===sid;});if(!s)return;var r=new FileReader();r.onload=function(e){if(!s.attachments)s.attachments=[];s.attachments.push({name:file.name,type:file.type.startsWith('image')?'image':'doc',data:e.target.result});dbPut(s).then(function(){toast('📎 تم إضافة المرفق');openDet(sid);}).catch(function(){toast('⚠️ فشل حفظ المرفق');});};r.readAsDataURL(file);}
